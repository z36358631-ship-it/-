function lineChart(values,color='indigo',labels=['一','二','三','四','五','六','日']){const max=Math.max(...values)*1.12,min=Math.min(...values)*.82,pts=values.map((v,i)=>`${28+i*76},${165-(v-min)/(max-min||1)*125}`).join(' ');return `<svg class="chart-svg" viewBox="0 0 510 190" role="img"><line x1="28" y1="40" x2="484" y2="40" class="chart-gridline"/><line x1="28" y1="90" x2="484" y2="90" class="chart-gridline"/><line x1="28" y1="140" x2="484" y2="140" class="chart-gridline"/><polyline points="${pts}" class="chart-line ${color==='green'?'green':''}"/>${values.map((v,i)=>`<circle cx="${28+i*76}" cy="${165-(v-min)/(max-min||1)*125}" r="4" fill="${color==='green'?'#19aa74':'#4d57d8'}"/><text x="${28+i*76}" y="184" text-anchor="middle" class="chart-label">${labels[i]}</text>`).join('')}</svg>`}

}" ${state.stats.game===g.id?'selected':''}>${g.name}</option>`).join('')}</select><select class="a-select" data-change="stats-version"><option value="all">全部版本</option><option value="standard" ${state.stats.version==='standard'?'selected':''}>标准版</option><option value="enhanced" ${state.stats.version==='enhanced'?'selected':''}>增强版</option><option value="deluxe" ${state.stats.version==='deluxe'?'selected':''}>豪华版</option></select><select class="a-select" data-change="stats-platform"><option value="steam">Steam</option></select><span style="font-size:10px;color:#8b95a4">周期指标：${s.label} · 更新于 10:00</span><span style="flex:1"></span><button class="a-btn ${state.stats.compare?'primary':''}" data-action="compare-stats">${state.stats.compare?'已开启环比':'环比对比'}</button><button class="a-btn" data-action="export-stats">${icon('download',14)} 导出</button></div>`,'21')+`<div class="stats-group-title">业务结果</div>`+target('stats-business',`<div class="kpi-grid">${kpi('支付订单量',s.paidOrders.toLocaleString(),state.stats.compare?'较上期 ↑ 18.6%':'↑ 18.6%')}${kpi('支付金额',money(s.paidAmount),state.stats.compare?'较上期 ↑ 21.3%':'↑ 21.3%')}${kpi('付费用户数',s.paidUsers.toLocaleString(),'↑ 15.4%')}${kpi('付费用户客单价',avg?money(avg):'--','↑ 5.1%')}${kpi('退款率','2.1%','↓ 0.5%')}</div>`,'22')+`<div class="stats-group-title">库存与效率</div>`+target('stats-efficiency',`<div class="kpi-grid">${kpi('现有库存',live.total,'','real')}${kpi('可租数量',live.rentable,'','real')}${kpi('已占用数量',live.occupied,'','real')}${kpi('账号使用率',s.accountUsageRate+'%','实际占用时长 ÷ 可出租总时长')}${kpi('账号复用率',s.accountReuseRate+'%','租用≥2次账号 ÷ 被租账号')}</div><div class="kpi-grid" style="grid-template-columns:repeat(5,1fr)">${kpi('用户复租率',s.userRerentRate+'%','复租用户 ÷ 付费用户')}${kpi('异常数量',live.abnormal,'','real')}${kpi('已下架数量',live.offline,'','real')}${kpi('库存占用率',live.total?((live.occupied/live.total)*100).toFixed(1)+'%':'--','','real')}${kpi('数据口径','周期 + 实时','分母为 0 显示 --')}</div>`,'23')+`<div class="chart-grid"><div class="chart-card"><div class="chart-head"><h3>订单量与支付金额趋势</h3><span>${s.label}</span></div>${lineChart(s.orderTrend)}</div><div class="chart-card"><div class="chart-head"><h3>账号使用率趋势</h3><span>账号占用时长 / 可租时长</span></div>${lineChart(s.usageTrend,'green')}</div></div>`+target('stats-funnel',`<div class="chart-card" style="margin-bottom:14px"><div class="chart-head"><h3>租号转化漏斗</h3><span>从曝光到一键上号成功</span></div>${funnel}</div>`,'24')+target('stats-table',`<div class="data-card"><div style="padding:15px 16px;border-bottom:1px solid #e5e8ee;display:flex;justify-content:space-between"><b style="font-size:13px">游戏与版本明细</b><span style="font-size:10px;color:#8b95a4">点击表头可排序</span></div><table class="data-table"><thead><tr><th style="width:280px"><button class="link-btn" data-action="sort-stats" data-value="name">游戏 / 版本</button></th><th><button class="link-btn" data-action="sort-stats" data-value="orders">订单量</button></th><th>支付金额</th><th><button class="link-btn" data-action="sort-stats" data-value="inventory">库存</button></th><th>已占用</th><th>使用率</th><th>账号复用率</th><th>用户复租率</th><th>退款率</th></tr></thead><tbody>${detail||'<tr><td colspan="9" style="text-align:center;color:#99a2af">暂无符合条件的数据</td></tr>'}</tbody></table></div>`,'25'))}
