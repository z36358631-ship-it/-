        check('all-buttons-have-actions',[...document.querySelectorAll('button')].every(button=>button.dataset.action));
      }catch(error){check('smoke-runtime',false,error.stack||String(error))}
      finally{Object.assign(state.ios,iosSnapshot);iosApps=appsSnapshot;ipaSources=sourcesSnapshot;closeModal();renderApp()}
      const pass=results.every(result=>result.pass);return{pass,results}
    }
    function applyPreviewMode(){const mode=new URLSearchParams(location.search).get('preview');if(!mode)return;state.ios.appLibraryPath='/Users/walle/Applications/iOS';state.ios.pathStatus='ready';iosApps=importTemplates.filter(item=>item.status==='importable'||item.status==='managed').map(item=>toInstalledApp(item,'目录导入'));ipaSources=[{id:'apphub',name:'AppHub',url:'https://apphub.example/source.json',domain:'apphub.example',enabled:true,status:'ok',lastSuccessAt:'今天 14:32',cachedAt:'今天 14:32'},{id:'mirror',name:'Mirror Repo',url:'https://mirror.example/repo.json',domain:'mirror.example',enabled:true,status:mode==='cache'?'error':'ok',lastSuccessAt:'今天 14:32',cachedAt:'今天 14:32'}];state.ios.tab=mode==='apps'?'apps':'resources';if(mode==='install'){state.ios.downloadTasks=[{id:'res-wechat-a',status:'ready',progress:100},{id:'res-bili-a',status:'ready',progress:100},{id:'res-tool-a',status:'validation-failed',progress:100}];state.ios.installCandidateIds=state.ios.downloadTasks.map(item=>item.id);state.ios.pendingInstallIds=new Set(['res-wechat-a','res-bili-a']);state.ios.selectedInstallIds=new Set(['res-wechat-a'])}}
    function boot(){applyPreviewMode();renderApp();const params=new URLSearchParams(location.search);if(params.get('preview')==='install')openInstallDialog(state.ios.installCandidateIds);if(params.get('smoke')==='1'){const result=runSmoke();document.body.dataset.smokeStatus=result.pass?'pass':'fail';const pre=document.createElement('pre');pre.id='smokeResult';pre.hidden=true;pre.textContent=JSON.stringify(result);document.body.appendChild(pre)}}
    boot();
