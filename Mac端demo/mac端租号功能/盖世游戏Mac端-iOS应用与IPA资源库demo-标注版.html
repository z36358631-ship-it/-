const settingTabs=[['keyboard','键盘映射'],['graphics','图像设置'],['bypass','绕过'],['misc','杂项'],['detail','详细信息']];
function toggleRow(title,desc,on=true){return `<div class="setting-row"><label>${title}${desc?`<small>${desc}</small>`:''}</label><button class="toggle ${on?'on':''}" data-action="toggle-setting"><i></i></button></div>`}
function settingsPanel(app){if(state.settingsTab==='keyboard')return `${toggleRow('启用键盘映射','使用键鼠操控触屏区域')}${toggleRow('智能键盘映射','自动识别常用游戏布局')}${toggleRow('鼠标滚轮映射','将滚轮映射为滑动手势')}<div class="setting-row"><label>鼠标灵敏度<small>调整视角移动速度</small></label><input type="number" value="1.0" min="0.1" max="5" step="0.1"></div>`;if(state.settingsTab==='graphics')return `<div class="setting-row"><label>选择 iOS 机型</label><select><option>iPad Pro (12.9-inch) (5th gen) | M1</option><option>iPhone 15 Pro Max</option></select></div><div class="setting-row"><label>分辨率</label><select><option>自动（基于显示器分辨率）</option><option>1920 × 1080</option></select></div><div class="setting-row"><label>检测到的分辨率</label><span>1470 × 956</span></div><div class="setting-row"><label>分辨率缩放</label><input type="number" value="2.0" step="0.1"></div>${toggleRow('修复窗口化显示问题','启用兼容窗口模式',false)}${toggleRow('禁用显示器息屏','应用运行时保持屏幕唤醒',false)}${toggleRow('允许旋转','跟随应用方向',true)}`;if(state.settingsTab==='bypass')return `${toggleRow('启用 PlayChain','提供 Keychain 兼容层')}${toggleRow('绕过越狱检测','隐藏运行环境特征')}${toggleRow('禁用应用内省库','减少部分应用启动崩溃',false)}<div class="setting-row"><label>iOS 框架注入</label><select><option>自动</option><option>关闭</option><option>兼容模式</option></select></div>`;if(state.settingsTab==='misc')return `${toggleRow('Discord Rich Presence','向 Discord 展示当前运行应用',false)}${toggleRow('Metal HUD','显示图形性能信息',false)}${toggleRow('LLDB 调试','仅供开发调试使用',false)}${toggleRow('注入 PlayTools','启用扩展工具能力')}${toggleRow('root 工作目录','将应用工作目录映射到 root',false)}<div class="setting-row"><label>应用程序类型</label><select><option>自动识别</option><option>游戏</option><option>应用</option></select></div>`;return `<div class="detail-grid"><div>Bundle 名称</div><div>${esc(app.name)}</div><div>Bundle ID</div><div>${esc(app.bundle)}</div><div>版本</div><div>${esc(app.version)}</div><div>最低系统版本</div><div>iOS 15.0</div><div>应用路径</div><div>/Users/walle/GaishiApps/${esc(app.name)}.app</div><div>显示名称别名</div><div>${esc(app.name)}</div></div>`}
function settingsDialog(){const app=apps.find(a=>a.id===state.selectedApp)||apps[0];return `<div class="overlay"><section class="dialog wide settings-window"><header class="dialog-head"><div class="settings-app">${appIcon(app,true)}<h2>${esc(app.name)} 设置</h2></div><button class="close" data-action="close" aria-label="关闭">${icon('x',14)}</button></header><div class="dialog-body"><div class="segmented">${settingTabs.map(([id,l])=>`<button class="${state.settingsTab===id?'active':''}" data-action="settings-tab" data-value="${id}">${l}</button>`).join('')}</div><div class="settings-panel">${settingsPanel(app)}</div></div><footer class="dialog-foot"><span class="grow"></span><div class="footer-cluster"><button class="tool-btn" data-action="reset-settings">重置设置</button><button class="tool-btn" data-action="reset-keymap">重置键盘映射</button></div></footer></section></div>`}
function dangerDialog(){const app=apps.find(a=>a.id===state.dangerContext.id),op=state.dangerContext.op,names={'clear-data':'清除应用数据','clear-preferences':'清除应用偏好设置','clear-playchain':'清除 PlayChain 数据',uninstall:'卸载应用'};return `<div class="overlay"><section class="dialog compact"><header class="dialog-head"><div class="dialog-title"><h2>${names[op]}</h2><p>${esc(app.name)} · 此操作需要单独确认</p></div><button class="close" data-action="close">${icon('x',14)}</button></header><div class="dialog-body"><div class="danger-note">${icon('warning',13)} ${op==='uninstall'?'卸载后应用本体将从当前 App 库移除；你可以选择同时清理关联数据。':'操作完成后无法在盖世游戏内恢复，请确认当前应用已退出。'}</div>${op==='uninstall'?'<div class="cleanup-options"><label class="cleanup-option"><input type="checkbox" checked> PlayChain 数据</label><label class="cleanup-option"><input type="checkbox" checked> Entitlements</label><label class="cleanup-option"><input type="checkbox" checked> 应用设置</label><label class="cleanup-option"><input type="checkbox"> 键盘映射</label><label class="cleanup-option"><input type="checkbox"> 应用数据</label></div>':''}</div><footer class="dialog-foot"><span class="grow"></span><button class="tool-btn" data-action="close">取消</button><button class="tool-btn danger" data-action="confirm-danger">确认${names[op]}</button></footer></section></div>`}
function sourceManager(){return `<div class="overlay"><section class="dialog"><header class="dialog-head"><div class="dialog-title"><h2>来源管理</h2><p>启用状态与排序会影响“全部来源”的聚合优先级。</p></div><button class="close" data-action="close" aria-label="关闭">${icon('x',14)}</button></header><div class="dialog-body"><div class="candidate-list">${sources.map((s,i)=>`<div class="candidate"><span class="check" style="background:${s.enabled?'var(--green)':'transparent'}">${s.enabled?icon('check',11):''}</span><span class="mini-icon" style="--bg:#3f6074">${icon('cloud',16)}</span><span class="candidate-copy"><strong>${esc(s.name)}</strong><small>${esc(s.url)} · 缓存 ${s.cache}</small></span><span><button class="tool-btn" data-action="source-toggle" data-id="${s.id}">${s.enabled?'停用':'启用'}</button> <button class="tool-btn" data-action="source-move" data-id="${s.id}">${i?'上移':'下移'}</button> <button class="tool-btn danger" data-action="source-delete" data-id="${s.id}">删除</button></span></div>`).join('')}</div></div></section></div>`}
function modal(){if(!state.modal)return'';if(state.modal==='local')return selectionDialog('local');if(state.modal==='source')return sourceDialog();if(state.modal==='source-select')return selectionDialog('source');if(state.modal==='info')return infoDialog();if(state.modal==='settings')return settingsDialog();if(state.modal==='danger')return dangerDialog();if(state.modal==='source-manager')return sourceManager();return''}
function annotations(){const interaction=state.annoTab==='interaction';const groups=interaction?[['核心结构',[['01','双 Tab 定位','“我的 App”管理本机已安装应用；“IPA 资源”浏览和下载远程资源。页面不再提供应用分类。'],['02','两个 Tab 都可刷新','我的 App 扫描本地库；IPA 资源按当前左侧路径刷新，失败保留缓存。'],['03','右键操作','App 右键包含设置、数据、访达、三类清理与卸载；IPA 右键只有应用信息。']]],['视图与导入',[['04','列表 / 网格','两种视图保留相同的选择、右键和双击语义。'],['05','导入 IPA 常驻','我的 App 中常驻显示；选择一个或多个 IPA 后进入二级选择框。'],['06','来源树筛选','根节点聚合全部启用来源；同名来源用 sourceId 保持独立。']]],['设置',[['07','五页应用设置','键盘映射、图像设置、绕过、杂项、详细信息；不做键盘映射导入导出。']]]]:[['异常边界',[['E1','图标失败不等于 IPA 失败','图标可显示占位；只有包体下载或校验失败才进入错误状态。'],['E2','危险操作分别确认','清数据、清偏好、清 PlayChain、卸载不可共用一次授权。'],['E3','来源失效','保留上次成功缓存；当前来源删除后自动回到根节点。'],['E4','状态不能合并','排队、下载、暂停、校验、可安装、可更新、失败、不兼容分别展示。']]]];return `<div class="anno-head"><div class="anno-head-top"><h2>交互标注</h2><button data-anno="panel">›</button></div><div class="anno-tabs"><button class="${interaction?'active':''}" data-anno="tab" data-value="interaction">交互说明</button><button class="${!interaction?'active':''}" data-anno="tab" data-value="edge">异常边界</button></div></div><div class="anno-list">${groups.map(([g,items])=>`<section class="anno-section"><h3>${g}</h3>${items.map(([n,t,p])=>`<article class="anno-item"><strong><span class="tag ${n[0]==='E'?'red':Number(n)>3?'blue':''}">${n}</span>${t}</strong><p>${p}</p></article>`).join('')}</section>`).join('')}</div>`}
function flowNav(){const sections=[['主页面',[['apps','我的 App'],['resources','IPA 资源 · 来源树'],['resource-grid','IPA 资源 · 网格视图']]],['App 操作',[['app-menu','App 右键菜单'],['settings','应用设置 · 五页'],['uninstall','卸载与清理确认'],['local','导入 IPA · 批量选择']]],['IPA 操作',[['source','添加来源 · URL 验证'],['source-select','来源资源二级选择'],['info','应用信息'],['source-manager','来源管理']]],['状态',[['states','资源完整状态'],['app-empty','我的 App · 空状态'],['empty','IPA 资源 · 空状态']]]];return `<div class="flow-brand"><strong>iOS 应用与 IPA 资源</strong><span>PlayCover 3.1.0 功能对齐 · 标注版</span></div>${sections.map(([g,items])=>`<div class="flow-group"><div class="flow-group-title">${g}</div>${items.map(([id,l])=>`<button class="flow-btn ${state.flow===id?'active':''}" data-flow="${id}"><i class="flow-dot"></i>${l}</button>`).join('')}</div>`).join('')}`}
function render(){state.context=null;$('#appRail').innerHTML=rail();$('#workspace').innerHTML=`<section class="page">${state.tab==='apps'?appsPage():resourcesPage()}</section>${modal()}${contextMenu()}`;$('#flowNav').innerHTML=flowNav();$('#annotationPanel').innerHTML=annotations();$('#annotationApp').classList.toggle('panel-collapsed',state.panel);requestAnimationFrame(fit)}
function renderKeepContext(){const c=state.context;$('#workspace').innerHTML=`<section class="page">${state.tab==='apps'?appsPage():resourcesPage()}</section>${modal()}${c?contextMenu():''}`}
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(toast.timer);toast.timer=setTimeout(()=>t.classList.remove('show'),1800)}
function fit(){const vp=$('#stageViewport'),s=$('#stageSizer'),d=$('#desktopStage');if(!vp||!s||!d)return;const scale=Math.min((vp.clientWidth-30)/1440,(vp.clientHeight-30)/900,1);d.style.setProperty('--stage-scale',scale);s.style.setProperty('--stage-scale',scale)}
function validateUrl(url){if(!/^https:\/\//i.test(url)||!url.toLowerCase().includes('.json'))return{status:'invalid',message:'链接无效，JSON 无效或未找到！'};if(url.includes('timeout'))return{status:'invalid',message:'网络请求超时，请稍后重试；已保留现有来源。'};return{status:'valid',message:'来源有效：识别到 3 个可导入应用，可继续选择。'}}
function resourceOp(id){const x=resources.find(r=>r.id===id);if(!x)return;if(x.status==='idle'||x.status==='download_failed'){x.status='downloading';x.progress=12;toast(`${x.name} 开始下载`)}else if(x.status==='downloading'){x.status='paused';toast(`${x.name} 已暂停`)}else if(x.status==='paused'){x.status='downloading';toast(`${x.name} 继续下载`)}else if(x.status==='queued'){x.status='idle';toast('已取消排队')}else if(x.status==='ready'||x.status==='install_failed'){x.status='installed';toast(`${x.name} 已安装`)}else if(x.status==='update'){x.status='downloading';x.progress=8;toast(`${x.name} 开始更新`)}render()}
function handle(action,el){const id=el.dataset.id,value=el.dataset.value;
 if(action==='tab'){state.tab=value;state.query='';state.selectedApp='';state.selectedResource='';render()}
 else if(action==='view'){if(el.dataset.kind==='apps')state.appView=value;else state.resourceView=value;render()}
 else if(action==='import-ipa'){state.modal='local';state.selection=new Set();render()}
 else if(action==='refresh-apps'){state.refreshing='apps';render();setTimeout(()=>{state.refreshing='';render();toast('App 库刷新完成，发现 8 个应用')},700)}
 else if(action==='refresh-resources'){state.refreshing='resources';render();setTimeout(()=>{state.refreshing='';render();toast(state.activeSourceId==='all'?'全部启用来源刷新完成':'当前来源刷新完成')},700)}
 else if(action==='open-settings'){state.modal='settings';state.settingsTab='keyboard';render()}
 else if(action==='settings-for'){state.selectedApp=id;state.modal='settings';state.settingsTab='keyboard';render()}
 else if(action==='source'){state.activeSourceId=id;state.selectedResource='';render()}
 else if(action==='sort'){state.sortAsc=!state.sortAsc;render()}
 else if(action==='add-source'){state.modal='source';state.sourceValidation={url:'',status:'idle',message:'输入来源地址后自动验证'};render()}
 else if(action==='resource-info'){state.modal='info';render()}
 else if(action==='show-resource-info'){state.selectedResource=id;state.modal='info';render()}
 else if(action==='resource-action')resourceOp(id)
 else if(action==='candidate'){state.selection.has(id)?state.selection.delete(id):state.selection.add(id);render()}
 else if(action==='select-all'){const ids=candidates.filter(x=>x.status!=='disabled').map(x=>x.id),all=ids.every(x=>state.selection.has(x));state.selection=all?new Set():new Set(ids);render()}
 else if(action==='confirm-selection'){const n=state.selection.size;state.modal=null;state.selection.clear();render();toast(`已提交 ${n} 个应用，任务状态将在列表中持续更新`)}
 else if(action==='continue-source'){state.modal='source-select';state.selection=new Set();render()}
 else if(action==='settings-tab'){state.settingsTab=value;render()}
 else if(action==='toggle-setting'){el.classList.toggle('on')}
 else if(action==='reset-settings'){toast('当前应用设置已重置')}
 else if(action==='reset-keymap'){toast('键盘映射已重置')}
 else if(action==='app-op'){state.context=null;render();toast({'show-data':'已在访达中打开应用数据',finder:'已在访达中定位应用'}[el.dataset.op])}
 else if(action==='danger'){state.context=null;state.dangerContext={id,op:el.dataset.op};state.modal='danger';render()}
 else if(action==='confirm-danger'){const {op,id:appId}=state.dangerContext,app=apps.find(a=>a.id===appId);state.modal=null;state.dangerContext=null;render();toast(`${app.name}：${op==='uninstall'?'卸载完成':'清理完成'}`)}
 else if(action==='source-manager'){state.modal='source-manager';render()}
 else if(action==='source-toggle'){const s=sources.find(s=>s.id===id);s.enabled=!s.enabled;render()}
 else if(action==='source-move'){const i=sources.findIndex(s=>s.id===id),j=i===0?1:i-1;[sources[i],sources[j]]=[sources[j],sources[i]];render()}
 else if(action==='source-delete'){const i=sources.findIndex(s=>s.id===id);if(i>=0)sources.splice(i,1);if(state.activeSourceId===id)state.activeSourceId='all';render();toast('来源已删除，已返回全部来源')}
 else if(action==='close'){state.modal=null;state.selection.clear();render()}
}
document.addEventListener('click',e=>{const flow=e.target.closest('[data-flow]');if(flow){applyFlow(flow.dataset.flow);return}const anno=e.target.closest('[data-anno]');if(anno){if(anno.dataset.anno==='panel'){state.panel=!state.panel;render()}else{state.annoTab=anno.dataset.value;render()}return}const row=e.target.closest('[data-type]');if(row&&!e.target.closest('[data-action]')){if(row.dataset.type==='app')state.selectedApp=row.dataset.id;else state.selectedResource=row.dataset.id;render();return}const a=e.target.closest('[data-action]');if(a&&!a.disabled){e.stopPropagation();handle(a.dataset.action,a);return}if(state.context){state.context=null;render()}});
document.addEventListener('dblclick',e=>{const r=e.target.closest('[data-type="resource"]');if(r)resourceOp(r.dataset.id)});
document.addEventListener('contextmenu',e=>{const r=e.target.closest('[data-type]');if(!r)return;e.preventDefault();if(r.dataset.type==='app')state.selectedApp=r.dataset.id;else state.selectedResource=r.dataset.id;const box=$('#workspace').getBoundingClientRect(),x=Math.min(e.clientX-box.left,box.width-230),y=Math.min(e.clientY-box.top,box.height-(r.dataset.type==='app'?295:55));state.context={kind:r.dataset.type,id:r.dataset.id,x:Math.max(8,x),y:Math.max(8,y)};renderKeepContext()});
document.addEventListener('input',e=>{if(e.target.dataset.input==='query'){state.query=e.target.value;render();requestAnimationFrame(()=>{const q=$('[data-input="query"]');if(q){q.focus();q.setSelectionRange(q.value.length,q.value.length)}})}if(e.target.dataset.input==='source-url'){const url=e.target.value;state.sourceValidation={url,...validateUrl(url)};const v=$('.validation');if(v){v.className=`validation ${state.sourceValidation.status}`;v.textContent=state.sourceValidation.message}const b=$('[data-action="continue-source"]');if(b)b.disabled=state.sourceValidation.status!=='valid'}});
function applyFlow(f){state.flow=f;state.modal=null;state.context=null;state.query='';state.forceAppEmpty=f==='app-empty';if(f==='apps'){state.tab='apps';state.appView='grid'}else if(f==='app-empty'){state.tab='apps';state.appView='grid';state.selectedApp=''}else if(f==='resources'){state.tab='resources';state.resourceView='list';state.activeSourceId='srcA'}else if(f==='resource-grid'){state.tab='resources';state.resourceView='grid'}else if(f==='app-menu'){state.tab='apps';state.selectedApp='read';render();setTimeout(()=>{state.context={kind:'app',id:'read',x:390,y:250};renderKeepContext()},0);return}else if(f==='settings'){state.tab='apps';state.selectedApp='ish';state.settingsTab='graphics';state.modal='settings'}else if(f==='uninstall'){state.tab='apps';state.selectedApp='ish';state.dangerContext={id:'ish',op:'uninstall'};state.modal='danger'}else if(f==='local'){state.tab='apps';state.modal='local';state.selection=new Set()}else if(f==='source'){state.tab='resources';state.modal='source';state.sourceValidation={url:'https://example.com/source.json',...validateUrl('https://example.com/source.json')}}else if(f==='source-select'){state.tab='resources';state.modal='source-select';state.selection=new Set()}else if(f==='info'){state.tab='resources';state.selectedResource='aidoku';state.modal='info'}else if(f==='source-manager'){state.tab='resources';state.modal='source-manager'}else if(f==='states'){state.tab='resources';state.activeSourceId='all';state.resourceView='grid'}else if(f==='empty'){state.tab='resources';state.activeSourceId='empty'}render()}
function runSmoke(){const tests=[],ok=(n,v)=>tests.push({name:n,pass:!!v});try{state.tab='apps';state.modal=null;render();ok('no-category',!$('#workspace').textContent.includes('全部 / 游戏'));ok('app-import-persistent',!!$('[data-action="import-ipa"]'));state.selectedApp='ish';render();ok('app-settings-enabled',!$('[data-action="open-settings"]').disabled);state.tab='resources';state.activeSourceId='all';state.resourceView='list';render();ok('source-tree', $$('.source-node').length===sources.length+1);ok('resource-list',!!$('.list-row[data-type="resource"]'));state.resourceView='grid';render();ok('resource-grid',!!$('.tile[data-type="resource"]'));state.modal='source';state.sourceValidation={url:'x',...validateUrl('x')};render();ok('invalid-copy',$('.validation').textContent.includes('JSON 无效或未找到'));state.selectedResource='aidoku';state.modal='info';render();ok('info-fields',$('#workspace').textContent.includes('IPA 地址')&&$('#workspace').textContent.includes('校验和'));return{pass:tests.every(t=>t.pass),tests}}catch(error){return{pass:false,tests,error:String(error)}}}
function boot(){render();fit();const p=new URLSearchParams(location.search);if(p.get('preview'))applyFlow(p.get('preview'));if(p.get('smoke')==='1'){const r=runSmoke(),pre=document.createElement('pre');pre.id='smokeResult';pre.hidden=true;pre.textContent=JSON.stringify(r);document.body.dataset.smokeStatus=r.pass?'pass':'fail';document.body.appendChild(pre)}}
window.addEventListener('resize',fit);boot();
</script>
</body>
</html>
