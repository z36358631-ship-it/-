let validationTimer=0;function validateSourceInput(url){clearTimeout(validationTimer);state.sourceValidation={url,status:url?'pending':'idle',message:url?'正在验证来源…':'输入来源地址后自动验证'};syncSourceValidationUI();if(!url)return;validationTimer=setTimeout(()=>{state.sourceValidation={url,...evaluateSource(url)};syncSourceValidationUI();positionActiveMarker()},500)}
function eligibleModalItems(){return(state.modal==='local-import'?localCandidates:sourceCandidates).filter(x=>x.status!=='disabled')}
function applyDemoState(target){state.flowState=target;state.modal=null;state.detailId='';state.batch=false;state.selected.clear();state.query='';state.category='全部';state.source='all';state.status='all';state.appStatus='all';state.appSort='recent';if(target==='apps'){state.tab='apps'}else if(target==='resources'){state.tab='resources'}else if(target==='path'){state.tab='apps';state.appLibraryPath='';state.pathStatus='unset';state.pathContext='initial';state.modal='path'}else if(target==='local-import'){state.tab='apps';state.modal='local-import';state.modalSelection=new Set()}else if(['source-valid','demo-apphub'].includes(target)){state.tab='resources';state.modal='source';state.sourceValidation={url:'https://apphub.example/source.json',...evaluateSource('https://apphub.example/source.json')}}else if(target==='demo-mirror'){state.tab='resources';state.modal='source';state.sourceValidation={url:'https://mirror.example/repo.json',...evaluateSource('https://mirror.example/repo.json')}}else if(['source-invalid','demo-network'].includes(target)){state.tab='resources';state.modal='source';state.sourceValidation={url:target==='demo-network'?'https://timeout.example/source.json':'www.baidu.com',status:'invalid',message:'链接无效，JSON无效或未找到！'}}else if(target==='source-select'){state.tab='resources';state.modal='source-select';state.sourceValidation={url:'https://apphub.example/source.json',...evaluateSource('https://apphub.example/source.json')};state.modalSelection=new Set()}else if(target==='batch'){state.tab='resources';state.batch=true}else if(target==='processing'){state.tab='resources';state.status='processing'}else if(target==='failures'){state.tab='resources';state.status='issues'}else if(target==='install'){state.tab='resources';state.modal='risk-install'}renderAll()}
function handleBusinessAction(action,el){const id=el.dataset.id,item=id?fixture(id):null;
 if(action==='switch-tab'){state.tab=el.dataset.value;state.flowState=state.tab;state.query='';state.detailId='';state.batch=false;state.selected.clear();renderAll()}
 else if(action==='set-category'){state.category=el.dataset.value;state.selected=new Set([...state.selected].filter(id=>filterResources().some(x=>x.id===id)));renderAll()}
 else if(action==='toggle-batch'){state.batch=!state.batch;state.selected.clear();renderAll()}
 else if(action==='select-all-filtered'){const eligible=filterResources().filter(isEligible),all=eligible.length&&eligible.every(x=>state.selected.has(x.id));eligible.forEach(x=>all?state.selected.delete(x.id):state.selected.add(x.id));renderAll()}
 else if(action==='toggle-select'){if(item&&isEligible(item)){state.selected.has(id)?state.selected.delete(id):state.selected.add(id);renderAll()}}
 else if(action==='download-selected'){const ids=[...state.selected];state.batch=false;state.selected.clear();ids.forEach((id,index)=>schedule(id,index*120,()=>beginDownload(id)));renderAll()}
 else if(action==='open-resource-detail'){if(!el.closest('button')){state.detailId=id;renderBusiness()}}
 else if(action==='close-detail'){state.detailId='';renderBusiness()}
 else if(action==='download-resource'||action==='update-resource'||action==='retry-download'||action==='redownload-resource'){beginDownload(id)}
 else if(action==='cancel-queue'){clearTaskTimers(id);item.download={status:'idle',progress:0};renderAll()}
 else if(action==='pause-download'){clearTaskTimers(id);item.download.status='paused';renderAll()}
 else if(action==='resume-download'){beginDownload(id,true)}
 else if(action==='install-resource'||action==='retry-install'){installResource(id)}
 else if(action==='open-installed'){showToast(`${item.resource.name} 正在打开`)}
 else if(action==='open-local-import'){state.flowState='local-import';if(!state.appLibraryPath){state.pathContext='import';state.modal='path';state.pathStatus='unset'}else{state.modal='local-import';state.modalSelection=new Set()}renderAll()}
 else if(action==='change-path'){state.pathContext='change';state.modal='path';renderAll()}
 else if(action==='confirm-path'){state.appLibraryPath='/Users/walle/GaishiApps';state.pathStatus='ready';if(state.pathContext==='import'){state.modal='local-import';state.modalSelection=new Set()}else state.modal=null;state.pathContext='';renderAll()}
 else if(action==='path-no-access'){showToast('无法写入该文件夹，请选择其他文件夹')}
 else if(action==='open-source'){state.flowState='source-valid';state.modal='source';state.sourceValidation={url:'',status:'idle',message:'输入来源地址后自动验证'};renderAll()}
 else if(action==='continue-source-import'){state.modal='source-select';state.modalSelection=new Set();renderAll()}
 else if(action==='back-to-source'){state.modal='source';renderAll()}
 else if(action==='toggle-modal-item'){state.modalSelection.has(id)?state.modalSelection.delete(id):state.modalSelection.add(id);renderModal();positionActiveMarker()}
 else if(action==='toggle-modal-all'){const items=eligibleModalItems(),all=items.length&&items.every(x=>state.modalSelection.has(x.id));state.modalSelection=all?new Set():new Set(items.map(x=>x.id));renderModal();positionActiveMarker()}
 else if(action==='confirm-local-import'){const count=state.modalSelection.size;state.modal=null;state.modalSelection.clear();renderAll();showToast(`已导入 ${count} 个 IPA`)}
 else if(action==='confirm-source-selection'){const count=state.modalSelection.size;state.modal=null;state.modalSelection.clear();renderAll();showToast(`来源已保存，已导入 ${count} 个资源`)}
 else if(action==='confirm-risk-install'){const riskItem=fixture('vault');state.modal=null;riskItem.resource.hashConfirmed=true;riskItem.download.status='ready';renderAll();installResource('vault')}
 else if(action==='source-manager'){state.modal='source-manager';renderAll()}
 else if(action==='refresh-sources'){showToast('来源已刷新，异常来源保留上次缓存')}
 else if(action==='close-modal'){state.modal=null;state.modalSelection.clear();renderAll()}
 else if(action==='rescan-apps'){showToast('重新扫描完成，未发现新增 App')}
 else if(action==='show-finder'){showToast(`已在访达中显示 ${state.appLibraryPath}`)}
 else if(action==='open-my-app-detail'){const app=myAppFixtures.find(x=>x.id===id);if(app)showToast(`${app.name} · ${app.version} (${app.build}) · ${app.size} MB`)}
 else if(action==='my-app-action'){const app=myAppFixtures.find(x=>x.id===id);showToast(app.status==='update'?`${app.name} 已加入更新队列`:app.status==='error'?`${app.name}：文件结构不完整`:`${app.name} 正在打开`)}
 else if(action==='rail-info'){showToast(`${el.dataset.label}保留原客户端入口，本 Demo 不展开`)}
 else if(action==='reset-demo')resetDemo();
}
function handleAnnotationAction(action,el){if(action==='jump-state')applyDemoState(el.dataset.state);else if(action==='switch-anno-tab'){state.annoTab=el.dataset.value;renderAll()}else if(action==='toggle-markers'){state.showMarkers=!state.showMarkers;positionActiveMarker()}else if(action==='toggle-panel'){state.panelCollapsed=!state.panelCollapsed;$('#annotationApp').classList.toggle('panel-collapsed',state.panelCollapsed);fitDesktopStage()}else if(action==='open-annotation'){const item=ANNOTATIONS.find(x=>x.id===el.dataset.id);if(!item)return;state.activeAnnotationId=item.id;state.annoTab=item.type==='error'?'error':'interaction';applyDemoState(item.state);requestAnimationFrame(()=>positionActiveMarker(item))}}
function positionActiveMarker(item){const overlay=$('#annotationOverlay');if(!overlay)return;overlay.innerHTML='';if(!state.showMarkers)return;const annotation=item||ANNOTATIONS.find(x=>x.id===state.activeAnnotationId);if(!annotation)return;const target=$(`[data-anno-target="${annotation.target}"]`,$('#desktopStage'));if(!target)return;const stageRect=$('#desktopStage').getBoundingClientRect(),targetRect=target.getBoundingClientRect(),scale=parseFloat(getComputedStyle($('#desktopStage')).getPropertyValue('--stage-scale'))||1,marker=document.createElement('span');marker.className=`anno-marker ${annotation.type==='global'?'global':annotation.type==='error'?'error':''}`;marker.textContent=annotation.id;marker.style.left=`${(targetRect.right-stageRect.left)/scale-13}px`;marker.style.top=`${(targetRect.top-stageRect.top)/scale-12}px`;overlay.appendChild(marker);target.classList.remove('annotation-flash');requestAnimationFrame(()=>target.classList.add('annotation-flash'))}
function renderAll(){renderFlowAndPanel();renderBusiness();requestAnimationFrame(fitDesktopStage)}
function renderFlowAndPanel(){$('#flowNav').innerHTML=renderFlowNav();$('#annotationPanel').innerHTML=renderAnnotationPanel();$('#annotationApp').classList.toggle('panel-collapsed',state.panelCollapsed)}
function fitDesktopStage(){const viewport=$('#stageViewport'),scale=Math.max(.42,Math.min((viewport.clientWidth-36)/1440,(viewport.clientHeight-36)/900));$('#desktopStage').style.setProperty('--stage-scale',scale);$('#stageSizer').style.setProperty('--stage-scale',scale)}
document.addEventListener('click',event=>{const anno=event.target.closest('[data-anno-action]');if(anno)return handleAnnotationAction(anno.dataset.annoAction,anno);const action=event.target.closest('[data-action]');if(!action||action.disabled)return;event.stopPropagation();handleBusinessAction(action.dataset.action,action)});
document.addEventListener('input',event=>{if(event.target.dataset.input==='resource-query'){state.query=event.target.value;renderBusiness()}else if(event.target.dataset.input==='source-url')validateSourceInput(event.target.value)});
document.addEventListener('change',event=>{if(event.target.dataset.change==='source-filter'){state.source=event.target.value;renderAll()}else if(event.target.dataset.change==='status-filter'){state.status=event.target.value;renderAll()}else if(event.target.dataset.change==='app-status-filter'){state.appStatus=event.target.value;renderAll()}else if(event.target.dataset.change==='app-sort'){state.appSort=event.target.value;renderAll()}});
window.addEventListener('resize',fitDesktopStage);
function runSmoke(){const results=[],check=(name,pass)=>results.push({name,pass:Boolean(pass)}),snapshot={tab:state.tab,modal:state.modal,batch:state.batch,status:state.status,query:state.query,appStatus:state.appStatus,appSort:state.appSort,sourceValidation:{...state.sourceValidation}};try{
 check('shell-roots',Boolean($('#flowNav')&&$('#desktopStage')&&$('#gaishiWindow')&&$('#annotationPanel')));
 check('rail-order',$$('.mac-rail>button').slice(0,7).map(x=>x.title).join(',')==='探索,云游戏,数据,找游戏,游戏库,iOS 应用,订单中心');
 check('ios-entry-active',$('.mac-rail button[title="iOS 应用"]')?.classList.contains('active'));
 state.tab='resources';state.status='all';state.modal=null;state.batch=false;renderAll();
 check('two-business-tabs',$$('.tab').length===2);
 check('fourteen-visual-states',DISPLAY_ORDER.every(value=>Boolean($(`.app-tile[data-display="${value}"]`))));
 check('mac-grid-not-cards',$$('.app-tile').length===14&&!$('.resource-card')&&getComputedStyle($('.app-grid')).gridTemplateColumns.split(' ').length===7);
 check('layered-update',fixture('genshin').install.status==='installed'&&deriveDisplayState(fixture('genshin'))==='update');
 check('unique-main-actions',$$('.app-tile').every(tile=>tile.querySelectorAll(':scope>.tile-action').length===1));
 state.tab='apps';renderAll();check('permanent-import',Boolean($('#localImportButton'))&&$('#localImportButton').textContent.includes('导入 IPA'));
 state.appStatus='update';renderAll();check('my-app-status-filter',$$('.app-tile').length===1&&$('.app-tile-name')?.textContent==='PlayCover');state.appStatus='all';state.query='com.tencent.meeting';renderAll();check('my-app-bundle-search',$$('.app-tile').length===1&&$('.app-tile-name')?.textContent==='腾讯会议');state.query='';
 state.modal='source';state.sourceValidation={url:'www.baidu.com',status:'invalid',message:'链接无效，JSON无效或未找到！'};renderAll();check('invalid-copy',$('[data-anno-target="validation"]')?.textContent.trim()==='链接无效，JSON无效或未找到！');check('examples-outside-modal',!$('#businessOverlay').textContent.includes('使用 AppHub 示例')&&$('#flowNav').textContent.includes('使用 AppHub 示例'));
 state.sourceValidation={url:'https://apphub.example/source.json',...evaluateSource('https://apphub.example/source.json')};state.modal='source';renderAll();handleBusinessAction('continue-source-import',{dataset:{}});check('source-two-step',state.modal==='source-select'&&state.modalSelection.size===0&&$('.select-all-top'));
 state.batch=true;state.modal=null;state.tab='resources';state.status='all';renderAll();handleBusinessAction('select-all-filtered',{dataset:{}});check('batch-excludes-ineligible',[...state.selected].every(id=>isEligible(fixture(id)))&&!state.selected.has('legacy'));
 check('annotation-links',ANNOTATIONS.every(item=>item.target&&item.state&&item.title));
 check('all-buttons-mapped',$$('button').every(btn=>btn.dataset.action||btn.dataset.annoAction||btn.disabled));
 }catch(error){results.push({name:'runtime',pass:false,error:String(error)})}finally{Object.assign(state,snapshot);state.sourceValidation=snapshot.sourceValidation;state.modal=null;state.batch=false;state.selected.clear();renderAll()}return{pass:results.every(x=>x.pass),results}}
function boot(){const params=new URLSearchParams(location.search),preview=params.get('preview');if(preview)applyDemoState(preview);else renderAll();fitDesktopStage();if(params.get('smoke')==='1'){const result=runSmoke(),pre=document.createElement('pre');pre.id='smokeResult';pre.hidden=true;pre.textContent=JSON.stringify(result);document.body.dataset.smokeStatus=result.pass?'pass':'fail';document.body.appendChild(pre)}}
boot();
</script>
</body>
