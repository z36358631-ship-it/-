function renderMacExplore(){const feature=games[0];return macFrame(`<section class="mac-page"><div class="hero-panel" data-anno-target="explore-shell">${marker('G1')}<div class="hero-media"><img src="${feature.image}" alt="${feature.name}" onerror="imageFallback(this)"></div><div class="hero-copy"><div class="mac-muted" style="font-size:11px">编辑精选 · 地平线系列</div><h2>${feature.name}</h2><div class="rating-row"><div class="rating-box">特别好评<b>${feature.score}</b></div><div><span class="tag">体育</span><span class="tag">模拟</span><span class="tag">竞速</span></div></div><p class="mac-muted" style="font-size:12px;line-height:1.65;margin-top:17px">驾驶超过 550 辆真实赛车，探索日本绝美风光，在地平线有史以来最宏大的冒险中成为竞速传奇。</p>${target('explore-rent-meta',`<div class="rent-meta"><b>${money(feature.price)} 租号</b><span>${feature.stock} 在租</span></div>`,'1')}<div class="hero-actions"><div class="platforms">${icon('cloud',18)} ${icon('gamepad-2',18)}</div><button class="mac-btn green" data-action="open-detail" data-game="${feature.id}">${icon('key-round',15)} 租号开玩</button></div></div></div><h3 class="section-title">编辑推荐</h3>${target('explore-card',`<div class="game-grid">${games.slice(1,4).map(g=>gameCard(g)).join('')}</div>`,'2')}</section>`,'explore')}
function renderMacCatalog(){return macFrame(`<section class="mac-page"><div class="catalog-head"><div><h1 style="font-size:26px">找游戏</h1><h2 style="font-size:17px;margin-top:13px">全部游戏 <span class="mac-muted" style="font-size:11px;font-weight:400">2248</span></h2></div>${target('catalog-filter',`<div class="catalog-tools"><select class="pill-select"><option>名称 (A-Z)</option></select><select class="pill-select"><option>发布时间</option></select><select class="pill-select"><option>评分排序</option></select><button class="pill-select" data-action="open-search">${icon('sliders-horizontal',13)} 筛选器</button></div>`,'3')}</div>${target('catalog-rent',`<div class="catalog-grid">${games.map(g=>gameCard(g,'catalog-card')).join('')}</div>`,'4')}</section>`,'library')}
function renderMacSearch(){return macFrame(`<div class="search-backdrop"><section class="search-modal"><div class="search-field">${icon('search',18)}<input value="黑神话" aria-label="搜索游戏"><button class="icon-btn" data-action="navigate" data-mode="mac" data-page="catalog">${icon('x',16)}</button></div><div class="result-list"><div class="result-title">游戏</div>${target('search-result',games.concat(games.slice(1,4)).map((g,i)=>`<div class="result-row ${i===3?'active':''}" data-action="open-detail" data-game="${g.id}"><img src="${g.image}" alt=""><strong>${i%2?'黑神话：悟空':g.name}</strong><div>${i%3===0?'':`<span class="result-price">${money(g.price)} 租号</span><span class="result-stock">${g.stock} 在租</span>`}</div></div>`).join(''),'5')}</div></section></div>`,'')}
function renderMacDetail(){const g=gameById(state.checkout.gameId);return macFrame(`<section class="mac-page"><div class="mac-top"><h1>${g.name}</h1></div><div class="detail-layout"><div><div class="detail-media"><img src="${g.image}" alt="${g.name}" onerror="imageFallback(this)">${target('detail-actions',`<div class="floating-actions"><button class="mac-btn blue">${icon('play',15)} 秒玩</button><button class="mac-btn light">${icon('circle-minus',15)} 获取游戏</button><button class="mac-btn green" data-action="rent-now">${icon('package',15)} 租号开玩</button></div>`,'6')}</div><div class="compat-card"><h3>兼容性评价</h3><p class="mac-muted" style="font-size:11px">暂时还没有玩家兼容性反馈</p></div><h2 class="section-title">游戏详情</h2></div><aside class="detail-info"><h3>★ 玩家评价：好评如潮</h3><div><span class="tag">动作</span><span class="tag">冒险</span></div><div style="margin-top:20px"><div class="info-row"><span>评分</span><b>${g.score}</b></div><div class="info-row"><span>开发商</span><b>Game Studio</b></div><div class="info-row"><span>发行日期</span><b>2026-04-18</b></div><div class="info-row"><span>支持平台</span><b>Steam</b></div><div class="info-row"><span>可租账号</span><b style="color:#2cc385">${g.stock}</b></div></div></aside></div></section>`,'')}
function renderMacCheckout(){const g=gameById(state.checkout.gameId),p=productByGame(g.id),price=getCheckoutPrice();return macFrame(`<div class="checkout-page"><section class="checkout-modal"><div class="benefit-side"><div class="checkout-game"><img src="${g.image}" alt=""><h3>${g.name}</h3></div><div class="checkout-label" style="font-size:12px;color:#fff;margin-bottom:12px">权益说明</div>${[['badge-check','100% 正版','共享游官方资源'],['power','一键启动','无需账号，极速开玩'],['shield-check','永不顶号','独享体验，稳定流畅'],['cloud-download','存档无忧','云端同步，进度保存'],['shield','保障险','100%不顶号保障']].map(x=>`<div class="benefit">${icon(x[0],18)}<div><strong>${x[1]}</strong><p>${x[2]}</p></div></div>`).join('')}</div><div><div class="checkout-control" data-anno-target="checkout-version">${marker('7')}<div class="checkout-label">版本选择</div><div class="option-row">${p.versions.map(v=>`<button class="option-btn ${state.checkout.version===v.id?'active':''}" data-action="select-version" data-value="${v.id}">${v.name}</button>`).join('')}</div></div><div class="checkout-control" data-anno-target="checkout-period">${marker('8')}<div class="checkout-label">租期选择</div><div class="option-row periods">${[['3d','3天'],['7d','7天'],['30d','30天'],['permanent','永久']].map(([id,name])=>`<button class="option-btn ${state.checkout.period===id?'active':''}" data-action="select-period" data-value="${id}">${name}</button>`).join('')}</div></div><div class="checkout-price"><span>订单金额</span><strong>${money(price)}</strong></div><div data-anno-target="checkout-payment">${marker('9')}<div class="pay-tabs"><button class="pay-btn ${state.checkout.payment==='alipay'?'active':''}" data-action="select-payment" data-value="alipay">支付宝</button><button class="pay-btn ${state.checkout.payment==='wechat'?'active':''}" data-action="select-payment" data-value="wechat">微信支付</button></div><div class="qr-box"></div><p class="pay-note">扫码支付代表同意《租赁服务协议》</p><button class="mac-btn green pay-sim" data-action="simulate-payment">模拟支付完成</button></div></div></section></div>`,'')}
function renderMacOrders(){const visible=orders.filter(o=>state.orderFilter==='all'||o.status===state.orderFilter);return macFrame(`<section class="mac-page"><div class="mac-top"><h1>租号中心</h1><input class="order-search" value="${state.orderSearch}" placeholder="搜索订单或游戏..." data-action-input="order-search"></div>${target('orders-filter',`<div class="order-tabs">${[['all','全部订单'],['renting','进行中'],['pending','待支付'],['ended','已完成']].map(([id,name])=>`<button class="order-tab ${state.orderFilter===id?'active':''}" data-action="filter-orders" data-value="${id}">${name}</button>`).join('')}</div>`,'10')}<div class="order-list">${visible.map((o,i)=>{const g=gameById(o.gameId);return `<article class="order-card"><img src="${g.image}" alt=""><div><div class="order-title"><h3>${g.name}</h3><span class="status-chip ${o.status}">${statusName(o.status)} · ${versionName(o.version)}</span></div><div class="order-info">订单号：${o.id}<br>租借时间：2026-07-13 14:00 至 2026-07-16 14:00</div>${o.status==='renting'?`<div class="order-remaining">剩余时长 <b>${o.remaining}</b></div>`:''}<div style="color:#ff565c;font-weight:700;margin-top:6px">${money(o.amount)}</div></div>${target('order-actions',`<div class="order-actions">${o.status==='renting'?`<button class="mac-btn green" data-action="launch-order" data-id="${o.id}">启动</button><button class="mac-btn ghost" data-action="renew-order" data-id="${o.id}">续租</button><button class="mac-btn ghost" data-action="open-after-sales" data-id="${o.id}">申请售后</button>`:o.status==='pending'?`<button class="mac-btn blue" data-action="rent-now">去支付</button><button class="mac-btn ghost" data-action="cancel-order" data-id="${o.id}">取消订单</button>`:`<button class="mac-btn ghost">查看详情</button><button class="mac-btn ghost" data-action="open-detail" data-game="${o.gameId}">再次租借</button>`}</div>`,i===0?'11':'')}</article>`}).join('')}</div></section>`,'')}
function adminFrame(active,title,desc,content,actions=''){return `<div class="admin-app"><aside class="admin-side"><div class="admin-brand">租号运营中心<small>GameHub Rental Ops</small></div><nav>${ADMIN_PAGES.map(p=>`<button class="admin-nav ${active===p.id?'active':''}" data-action="navigate" data-mode="admin" data-page="${p.id}">${icon(p.icon,18)} ${p.name}</button>`).join('')}</nav><div class="admin-side-bottom"><button class="admin-nav" data-action="show-audit">${icon('history',18)} 操作记录</button><button class="admin-nav">${icon('settings',18)} 系统设置</button></div></aside><main class="admin-main"><header class="admin-header"><div><h1>${title}</h1><p>${desc}</p></div><div class="admin-actions">${actions}</div></header>${content}</main></div>`}
function kpi(label,value,extra='',cls=''){return `<div class="kpi-card"><span class="${cls==='real'?'realtime':''}">${cls==='real'?'实时':''}</span><div class="kpi-label">${label}</div><strong>${value}</strong>${extra?`<div class="trend">${extra}</div>`:''}</div>`}
function renderAdminProducts(){const sel=state.selectedProductIds.size;const rows=products.map(p=>{const g=gameById(p.gameId),inv=accounts.filter(a=>a.gameId===g.id),occ=inv.filter(a=>a.status==='occupied').length;return `<tr><td><input type="checkbox" data-action="select-product" data-id="${p.id}" ${state.selectedProductIds.has(p.id)?'checked':''}></td><td><div class="table-game"><img src="${g.image}" alt=""><div><strong>${g.name}</strong><span class="subline">${p.platform} · ${p.versions.length} 个版本</span></div></div></td><td>${p.exposure.join('、')}</td><td>${money(Math.min(...p.versions.map(v=>v.prices['3d'])))}/3天起</td><td>${inv.length||g.stock}</td><td>${occ}</td><td><span class="a-chip ${p.status==='online'?'online':'offline'}">${p.status==='online'?'已上架':'已下架'}</span></td><td><div class="row-actions"><button class="link-btn" data-action="toggle-product" data-id="${p.id}">版本价格</button><button class="link-btn" data-action="copy-product" data-id="${p.id}">复制</button><button class="link-btn danger" data-action="single-product-offline" data-id="${p.id}">${p.status==='online'?'下架':'上架'}</button></div></td></tr>${state.expandedProduct===p.id?`<tr class="expand-row"><td colspan="8"><div class="sku-panel">${p.versions.map(v=>`<div class="sku-card"><div class="sku-head"><span>${v.name}</span><button class="link-btn" data-action="copy-version" data-id="${p.id}" data-version="${v.id}">复制版本</button></div><div class="price-grid">${Object.entries(v.prices).map(([period,price])=>`<div class="price-cell">${{'3d':'3天','7d':'7天','30d':'30天',permanent:'永久'}[period]}<b>${money(price)}</b></div>`).join('')}</div></div>`).join('')}</div></td></tr>`:''}`;}).join('');return adminFrame('products','租号商品管理','统一管理游戏、版本、租期、价格和前端展示状态',target('product-summary',`<div class="kpi-grid">${kpi('在线商品','42','↑ 3 本周')}${kpi('已下架','6')}${kpi('版本 SKU','126')}${kpi('可租库存','89','','real')}${kpi('已占用','52','','real')}</div>`,'12')+target('product-bulk',`<div class="admin-toolbar"><div class="filter-row"><select class="a-select"><option>全部平台</option><option>Steam</option></select><select class="a-select"><option>全部状态</option><option>已上架</option><option>已下架</option></select><input class="a-input" placeholder="搜索游戏或商品ID"></div><div class="admin-actions"><button class="a-btn">${icon('download',14)} 导出</button><button class="a-btn primary" data-action="sync-product-stock">${icon('refresh-cw',14)} 同步库存</button></div></div><div class="batch-bar"><span class="batch-count">已选择 ${sel} 项</span><button class="a-btn" data-action="batch-price" ${sel?'':'disabled'}>批量改价</button><button class="a-btn success" data-action="batch-product-online" ${sel?'':'disabled'}>批量上架</button><button class="a-btn danger" data-action="batch-product-offline" ${sel?'':'disabled'}>批量下架</button><span class="batch-spacer"></span><span class="batch-count">复制商品会生成新的商品 ID</span></div>`,'13')+target('product-row',`<div class="data-card"><table class="data-table"><thead><tr><th style="width:42px"><input type="checkbox" data-action="select-all-products"></th><th style="width:270px">租号商品</th><th>前端展示</th><th>最低价格</th><th>总库存</th><th>已占用</th><th>状态</th><th style="width:240px">快捷操作</th></tr></thead><tbody>${rows}</tbody></table></div>`,'14'),`<button class="a-btn primary" data-action="copy-product" data-id="${products[0].id}">${icon('plus',14)} 新建商品</button>`)}
function accountCounts(){return {total:accounts.length,rentable:accounts.filter(a=>a.status==='rentable').length,occupied:accounts.filter(a=>a.status==='occupied').length,abnormal:accounts.filter(a=>a.status==='abnormal').length,offline:accounts.filter(a=>a.status==='offline').length}}
function renderAdminAccounts(){const c=accountCounts(),sel=state.selectedAccountIds.size;const rows=accounts.map(a=>{const g=gameById(a.gameId);return `<tr><td><input type="checkbox" data-action="select-account" data-id="${a.id}" ${state.selectedAccountIds.has(a.id)?'checked':''}></td><td><b>${a.maskedName}</b><span class="subline">${a.providerId}</span></td><td><div class="table-game"><img src="${g.image}" alt=""><div><strong>${g.name}</strong><span class="subline">${versionName(a.version)}</span></div></div></td><td><span class="a-chip ${a.status}">${statusName(a.status)}</span></td><td>${a.orderId||'--'}</td><td>${a.rentCount}</td><td>${a.lastCheck}</td><td><div class="row-actions"><button class="link-btn" data-action="check-account" data-id="${a.id}">检测</button>${a.status==='occupied'?`<button class="link-btn" data-action="release-account" data-id="${a.id}">释放</button>`:''}<button class="link-btn danger" data-action="offline-account" data-id="${a.id}">${a.status==='offline'?'上架':'下架'}</button></div></td></tr>`}).join('');return adminFrame('accounts','账号资源管理','同步第三方账号资源，处理健康状态、占用和上下架',target('account-summary',`<div class="kpi-grid">${kpi('现有库存',c.total,'','real')}${kpi('可租数量',c.rentable,'','real')}${kpi('已占用数量',c.occupied,'','real')}${kpi('异常数量',c.abnormal,'','real')}${kpi('已下架数量',c.offline,'','real')}</div>`,'15')+`<div class="admin-toolbar"><div class="filter-row"><select class="a-select"><option>全部状态</option><option>可租</option><option>已占用</option><option>异常</option><option>已下架</option></select><select class="a-select"><option>全部游戏</option>${games.map(g=>`<option>${g.name}</option>`).join('')}</select><input class="a-input" placeholder="账号ID / 第三方资源ID"></div><button class="a-btn primary" data-action="sync-accounts">${icon('refresh-cw',14)} 同步共享游资源</button></div>`+target('account-bulk',`<div class="batch-bar"><span class="batch-count">已选择 ${sel} 项</span><button class="a-btn" data-action="batch-check-accounts" ${sel?'':'disabled'}>批量检测</button><button class="a-btn danger" data-action="batch-offline-accounts" ${sel?'':'disabled'}>批量下架</button><span class="batch-spacer"></span><span class="batch-count">账号凭据不展示、不复制</span></div>`,'16')+target('account-row',`<div class="data-card"><table class="data-table"><thead><tr><th style="width:42px"><input type="checkbox" data-action="select-all-accounts"></th><th>账号资源</th><th style="width:280px">关联游戏 / 版本</th><th>状态</th><th>占用订单</th><th>累计租次</th><th>最近检测</th><th style="width:190px">操作</th></tr></thead><tbody>${rows}</tbody></table></div>`,'17'))}
function renderAdminOrders(){const tabs=[['all','全部'],['pending','待支付'],['renting','租赁中'],['ended','已结束'],['refunded','已退款'],['failed','下单失败'],['after-sales','售后处理中']];const visible=orders.filter(o=>state.adminOrderFilter==='all'||(state.adminOrderFilter==='after-sales'?o.afterSales:o.status===state.adminOrderFilter));const rows=visible.map(o=>{const g=gameById(o.gameId);return `<tr><td><b>${o.id}</b><span class="subline">${o.user}</span></td><td><div class="table-game"><img src="${g.image}" alt=""><div><strong>${g.name}</strong><span class="subline">${versionName(o.version)} · ${o.period}</span></div></div></td><td>${money(o.amount)}<span class="subline">${o.payment}</span></td><td><span class="a-chip ${o.status}">${statusName(o.status)}</span></td><td>${o.accountId||'--'}</td><td>${o.afterSales?`<span class="risk-dot"></span>${o.afterSales}`:'--'}</td><td><div class="row-actions"><button class="link-btn" data-action="open-order" data-id="${o.id}">详情</button>${o.status==='renting'?`<button class="link-btn" data-action="replace-order-account" data-id="${o.id}">换号</button><button class="link-btn danger" data-action="refund-order" data-id="${o.id}">退款</button>`:''}</div></td></tr>`}).join('');return adminFrame('admin-orders','订单与售后','在同一工作台处理订单状态、账号占用、退款、补偿和售后',target('order-summary',`<div class="kpi-grid">${kpi('今日支付订单','67','↑ 18%')}${kpi('今日支付金额','¥486','↑ 23%')}${kpi('租赁中','52','','real')}${kpi('售后处理中','6')}${kpi('退款率','2.1%','↓ 0.5%')}</div>`,'18')+target('admin-order-filter',`<div class="admin-tabs">${tabs.map(([id,name])=>`<button class="admin-tab ${state.adminOrderFilter===id?'active':''}" data-action="admin-order-filter" data-value="${id}">${name}</button>`).join('')}</div><div class="admin-toolbar"><div class="filter-row"><input class="a-input" placeholder="订单号 / 游戏 / 用户"><select class="a-select"><option>全部支付方式</option><option>支付宝</option><option>微信支付</option></select><select class="a-select"><option>全部版本</option><option>标准版</option><option>增强版</option><opti function lineChart(values,color='indigo',labels=['一','二','三','四','五','六','日']){const max=Math.max(...values)*1.12,min=Math.min(...values)*.82,pts=values.map((v,i)=>`${28+i*76},${165-(v-min)/(max-min||1)*125}`).join(' ');return `<svg class="chart-svg" viewBox="0 0 510 190" role="img"><line x1="28" y1="40" x2="484" y2="40" class="chart-gridline"/><line x1="28" y1="90" x2="484" y2="90" class="chart-gridline"/><line x1="28" y1="140" x2="484" y2="140" class="chart-gridline"/><polyline points="${pts}" class="chart-line ${color==='green'?'green':''}"/>${values.map((v,i)=>`<circle cx="${28+i*76}" cy="${165-(v-min)/(max-min||1)*125}" r="4" fill="${color==='green'?'#19aa74':'#4d57d8'}"/><text x="${28+i*76}" y="184" text-anchor="middle" class="chart-label">${labels[i]}</text>`).join('')}</svg>`}

 if(action==='select-period'){state.checkout.period=el.dataset.value;return renderApp()}
 if(action==='select-payment'){state.checkout.payment=el.dataset.value;return renderApp()}
 if(action==='simulate-payment'){const id=`GS20260713${String(orders.length+1).padStart(3,'0')}`;orders.unshift({id,gameId:state.checkout.gameId,version:state.checkout.version,period:{'3d':'3天','7d':'7天','30d':'30天',permanent:'永久'}[state.checkout.period],amount:getCheckoutPrice(),status:'renting',payment:state.checkout.payment==='alipay'?'支付宝':'微信支付',accountId:'AC-1001',remaining:'2天23时',afterSales:'',user:'U***999'});showToast('支付成功，已锁定账号');return navigate('mac','orders')}
 if(action==='filter-orders'){state.orderFilter=el.dataset.value;return renderApp()}
 if(action==='launch-order')return showToast('正在获取 Steam 账号并启动游戏');
 if(action==='renew-order')return navigate('mac','checkout');
 if(action==='cancel-order')return openConfirm({title:'取消订单',message:'取消后订单将关闭，未支付金额不会扣除。',confirmText:'确认取消',onConfirm:()=>{const o=orders.find(x=>x.id===el.dataset.id);if(o)o.status='ended';addAudit('取消订单',el.dataset.id);showToast('订单已取消');renderApp()}});
 if(action==='open-after-sales')return showToast('已打开售后问题提交界面');
 if(action==='delete-order')return showToast('订单已删除');
 if(action==='toggle-product'){state.expandedProduct=state.expandedProduct===el.dataset.id?'':el.dataset.id;return renderApp()}
 if(action==='select-product'||action==='select-account'){const kind=action.includes('product')?'product':'account',set=selectedSet(kind),id=el.dataset.id;set.has(id)?set.delete(id):set.add(id);return renderApp()}
 if(action==='select-all-products'){state.selectedProductIds=state.selectedProductIds.size===products.length?new Set():new Set(products.map(p=>p.id));return renderApp()}
 if(action==='select-all-accounts'){state.selectedAccountIds=state.selectedAccountIds.size===accounts.length?new Set():new Set(accounts.map(a=>a.id));return renderApp()}
 if(action==='copy-product'){const source=products.find(p=>p.id===el.dataset.id)||products[0],copy=JSON.parse(JSON.stringify(source));copy.id=`${source.id}-copy-${products.length+1}`;copy.status='offline';copy.exposure=[];products.push(copy);addAudit('复制商品',`${source.id} -> ${copy.id}`);showToast('商品配置已复制，副本默认为下架');return renderApp()}
 if(action==='copy-version'){const product=products.find(p=>p.id===el.dataset.id),source=product?.versions.find(v=>v.id===el.dataset.version);if(product&&source){const copy=JSON.parse(JSON.stringify(source));copy.id=`${source.id}-copy-${product.versions.length+1}`;copy.name=`${source.name} 副本`;product.versions.push(copy);addAudit('复制版本',`${product.id} / ${source.id}`);showToast('版本与价格已复制');renderApp()}return}
 if(action==='sync-product-stock'){showToast('库存同步完成：89 可租，52 已占用');addAudit('同步库存','全部商品');return}
 if(action==='batch-price')return openConfirm({title:'批量改价',message:`演示操作：将 ${state.selectedProductIds.size} 个商品的全部租期价格统一上调 5%。`,confirmText:'确认改价',onConfirm:()=>{products.filter(p=>state.selectedProductIds.has(p.id)).forEach(p=>p.versions.forEach(v=>Object.keys(v.prices).forEach(k=>v.prices[k]=Number((v.prices[k]*1.05).toFixed(1)))));addAudit('批量改价',`${state.selectedProductIds.size} 个商品 / 上调 5%`);showToast('批量改价成功');state.selectedProductIds.clear();renderApp()}});
 if(['batch-product-online','batch-product-offline'].includes(action)){const online=action==='batch-product-online';return openConfirm({title:online?'批量上架':'批量下架',message:`已选择 ${state.selectedProductIds.size} 个商品，操作将同步影响 Mac 端租号入口。`,confirmText:online?'确认上架':'确认下架',onConfirm:()=>{products.filter(p=>state.selectedProductIds.has(p.id)).forEach(p=>p.status=online?'online':'offline');addAudit(online?'批量上架':'批量下架',`${state.selectedProductIds.size} 个商品`);showToast(`${online?'上架':'下架'}完成`);state.selectedProductIds.clear();renderApp()}})}
 if(action==='single-product-offline'){const p=products.find(x=>x.id===el.dataset.id);if(p){p.status=p.status==='online'?'offline':'online';addAudit(p.status==='online'?'商品上架':'商品下架',p.id);showToast(`商品已${p.status==='online'?'上架':'下架'}`);renderApp()}return}
 if(action==='sync-accounts'){showToast('共享游资源同步完成');addAudit('同步第三方资源','全部账号');return}
 if(action==='check-account'){const a=accounts.find(x=>x.id===el.dataset.id);if(a){a.lastCheck='刚刚';if(a.status==='abnormal')a.status='rentable';addAudit('账号检测',a.id);showToast('登录检测通过');renderApp()}return}
 if(action==='release-account')return openConfirm({title:'强制释放账号',message:'释放后关联订单将无法继续使用此账号，操作会写入记录。',confirmText:'确认释放',onConfirm:()=>{const a=accounts.find(x=>x.id===el.dataset.id);if(a){a.status='rentable';a.orderId=''}addAudit('强制释放',el.dataset.id);showToast('账号已释放');renderApp()}});
 if(action==='offline-account'){const a=accounts.find(x=>x.id===el.dataset.id);if(!a)return;if(a.status==='offline'){a.status='rentable';addAudit('账号上架',a.id);showToast('账号已重新上架');return renderApp()}if(a.status==='occupied')return openConfirm({title:'占用账号下架',message:`账号关联订单 ${a.orderId}，请选择处理方式。`,options:[{label:'订单结束后下架',desc:'保留当前订单，到期后自动下架'},{label:'立即换号并下架',desc:'为订单分配同版本账号后立即下架'}],onConfirm:index=>{a.status='offline';a.orderId='';addAudit(index===0?'预约下架':'换号并下架',a.id);showToast(index===0?'已设置订单结束后下架':'换号完成，账号已下架');renderApp()}});return openConfirm({title:'下架账号',message:'下架后该账号不再参与取号分配。',confirmText:'确认下架',onConfirm:()=>{a.status='offline';addAudit('账号下架',a.id);showToast('账号已下架');renderApp()}})}
 if(action==='batch-check-accounts'){state.selectedAccountIds.forEach(id=>{const a=accounts.find(x=>x.id===id);if(a)a.lastCheck='刚刚'});addAudit('批量检测',`${state.selectedAccountIds.size} 个账号`);showToast('批量检测完成：全部通过');state.selectedAccountIds.clear();return renderApp()}
 if(action==='batch-offline-accounts')return openConfirm({title:'批量下架账号',message:`将处理 ${state.selectedAccountIds.size} 个账号，占用账号需先换号。`,confirmText:'确认处理',onConfirm:()=>{state.selectedAccountIds.forEach(id=>{const a=accounts.find(x=>x.id===id);if(a){a.status='offline';a.orderId=''}});addAudit('批量下架',`${state.selectedAccountIds.size} 个账号`,'成功，0 个失败');showToast('批量下架完成：成功全部，失败 0');state.selectedAccountIds.clear();renderApp()}});
 if(action==='admin-order-filter'){state.adminOrderFilter=el.dataset.value;return renderApp()}
 if(action==='open-order')return showToast(`已打开订单 ${el.dataset.id} 详情`);
 if(action==='replace-order-account')return openConfirm({title:'更换租赁账号',message:'系统将分配同游戏、同版本的可租账号，并释放原账号。',confirmText:'确认换号',onConfirm:()=>{addAudit('订单换号',el.dataset.id);showToast('换号成功，新账号已锁定');renderApp()}});
 if(action==='refund-order')return openConfirm({title:'订单退款',message:'退款将结束租赁、释放账号并原路退回实付金额。',confirmText:'确认退款',onConfirm:()=>{const o=orders.find(x=>x.id===el.dataset.id);if(o)o.status='refunded';addAudit('订单退款',el.dataset.id);showToast('退款已提交');renderApp()}});
 if(action==='stats-range'){state.stats.range=el.dataset.value;return renderApp()}
 if(action==='export-stats'){addAudit('导出统计',statsData[state.stats.range].label);return showToast('统计数据已生成导出任务')}
 if(action==='show-audit')return showAudit();
 if(action==='confirm-no')return closeConfirm();
 if(action==='confirm-yes'){const fn=confirmHandler;closeConfirm();if(fn)fn();return}
 if(action==='confirm-option'){const fn=confirmHandler,index=Number(el.dataset.index);closeConfirm();if(fn)fn(index);return}
}
document.addEventListener('click',e=>{const el=e.target.closest('[data-action]');if(el&&!el.disabled)dispatchAction(el.dataset.action,el)});
window.addEventListener('resize',updateScale);new ResizeObserver(updateScale).observe(document.getElementById('canvasViewport'));
function validateAnnotations(){const ids=annotations.map(a=>a.id),duplicates=[...new Set(ids.filter((id,i)=>ids.indexOf(id)!==i))];const missingTargets=annotations.filter(a=>{const html=SCREEN_RENDERERS[a.mode]?.[a.page]?.()||'';return !html.includes(`data-anno-target="${a.target}"`)}).map(a=>a.id);return{duplicates,missingTargets}}
const nextPaint=()=>new Promise(r=>requestAnimationFrame(()=>requestAnimationFrame(r)));
window.__demoSmoke=async function(){const results=[],check=(name,pass)=>results.push({name,pass:Boolean(pass)}),canvas=document.getElementById('demoCanvas');for(const p of MAC_PAGES){navigate('mac',p.id);await nextPaint();check(`mac:${p.id}`,canvas.childElementCount>0)}const price=getCheckoutPrice();state.checkout.period='7d';navigate('mac','checkout');await nextPaint();check('checkout-price-change',getCheckoutPrice()!==price);for(const p of ADMIN_PAGES){navigate('admin',p.id);await nextPaint();check(`admin:${p.id}`,canvas.childElementCount>0)}state.stats.range='30d';navigate('admin','stats');await nextPaint();check('stats-range',canvas.textContent.includes('近 30 天'));const productCount=products.length;dispatchAction('copy-product',{dataset:{id:products[0].id}});check('copy-product',products.length===productCount+1&&products.at(-1).status==='offline');state.selectedProductIds.add(products[0].id);dispatchAction('batch-product-offline',{dataset:{}});dispatchAction('confirm-yes',{dataset:{}});check('batch-offline',products[0].status==='offline');const occupied=accounts.find(a=>a.status==='occupied');dispatchAction('offline-account',{dataset:{id:occupied.id}});dispatchAction('confirm-option',{dataset:{index:'1'}});check('occupied-account-offline',occupied.status==='offline'&&!occupied.orderId);const renting=orders.find(o=>o.status==='renting');dispatchAction('refund-order',{dataset:{id:renting.id}});dispatchAction('confirm-yes',{dataset:{}});check('order-refund',renting.status==='refunded');const valid=validateAnnotations();check('annotation-ids',valid.duplicates.length===0);check('annotation-targets',valid.missingTargets.length===0);return{pass:results.every(x=>x.pass),results}}
function applyQuery(){const q=new URLSearchParams(location.search),mode=q.get('mode'),page=q.get('page');if(mode==='admin'||mode==='mac'){state.mode=mode;state.page=page&&SCREEN_RENDERERS[mode]?.[page]?page:(mode==='admin'?'products':'explore')}}
async function boot(){applyQuery();renderApp();if(new URLSearchParams(location.search).get('smoke')==='1'){const result=await window.__demoSmoke();document.body.dataset.smokeStatus=result.pass?'pass':'fail';const pre=document.createElement('pre');pre.id='smokeResult';pre.hidden=true;pre.textContent=JSON.stringify(result);document.body.appendChild(pre)}}
boot();
</script>
</body>
</html>
