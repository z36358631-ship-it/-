function renderFlowNav(){const pages=state.mode==='mac'?MAC_PAGES:ADMIN_PAGES;document.getElementById('flowNav').innerHTML=`<div class="flow-head"><div class="flow-title">Mac 端租号功能</div><div class="flow-subtitle">交互标注文档 · 前后台一体</div></div><div class="mode-switch"><button class="mode-btn ${state.mode==='mac'?'active':''}" data-action="switch-mode" data-mode="mac">Mac 客户端</button><button class="mode-btn ${state.mode==='admin'?'active':''}" data-action="switch-mode" data-mode="admin">运营后台</button></div><div class="nav-group-label">${state.mode==='mac'?'用户链路':'后台模块'}</div><nav class="page-nav">${pages.map(p=>`<button class="page-item ${state.page===p.id?'active':''}" data-action="navigate" data-mode="${state.mode}" data-page="${p.id}">${icon(p.icon,16)}<span>${p.name}</span></button>`).join('')}</nav><div class="flow-bottom"><button class="shell-button ${state.badgeVisible?'active':''}" data-action="toggle-badges">${icon('badge-help',15)} ${state.badgeVisible?'隐藏标号':'显示标号'}</button>${state.mode==='admin'?`<button class="shell-button" data-action="show-audit">${icon('history',15)} 操作记录 (${state.auditLog.length})</button>`:''}</div>`}
function appendOriginalGamePrice(canvas){if(state.mode!=='mac'||state.page!=='checkout')return;const game=gameById(state.checkout.gameId),price=money(game.originalPrice),total=canvas.querySelector('.checkout-price');if(!total)return;const row=document.createElement('div'),label=document.createElement('span'),value=document.createElement('s');row.className='checkout-original-price';label.textContent='游戏原价';value.textContent=price;row.append(label,value);total.before(row)}
function renderCanvas(){const renderer=SCREEN_RENDERERS[state.mode]?.[state.page];if(!renderer)throw new Error(`Missing renderer: ${state.mode}/${state.page}`);const canvas=document.getElementById('demoCanvas');canvas.style.width=state.mode==='mac'?'1076px':'1800px';canvas.style.height=state.mode==='mac'?'734px':'1300px';canvas.innerHTML=renderer();appendOriginalGamePrice(canvas);refreshIcons();requestAnimationFrame(updateScale)}
function renderAnnotationPanel(){const list=annotations.filter(a=>a.mode===state.mode&&a.page===state.page&&a.tab===state.annotationTab);const pageName=(state.mode==='mac'?MAC_PAGES:ADMIN_PAGES).find(p=>p.id===state.page)?.name||(state.page==='refund-detail'?'退款详情':''),demoControls=state.mode==='mac'&&state.page==='after-sales'?`<section class="demo-controls" data-demo-controls="refund-case"><h4>演示控制 · 审核结果</h4><p>仅用于切换后续审核分支，不属于客户端功能。</p><div class="demo-control-row"><button class="${state.refundCase==='eligible'?'active':''}" data-action="set-refund-case" data-value="eligible">审核通过分支</button><button class="${state.refundCase==='ineligible'?'active':''}" data-action="set-refund-case" data-value="ineligible">审核拒绝分支</button></div></section>`:'';document.getElementById('annotationPanel').innerHTML=`<div class="anno-head"><strong>${pageName} · 标注</strong><div class="anno-actions"><button class="icon-btn badge-toggle ${state.badgeVisible?'active':''}" data-action="toggle-badges" title="显示标号">${icon('badge-help',15)}</button><button class="icon-btn" data-action="toggle-panel" title="收起">${icon('panel-right-close',15)}</button></div></div><div class="anno-tabs"><button class="anno-tab ${state.annotationTab==='interaction'?'active':''}" data-action="anno-tab" data-value="interaction">交互说明</button><button class="anno-tab ${state.annotationTab==='edge'?'active':''}" data-action="anno-tab" data-value="edge">异常 & 边界</button></div>${demoControls}<div class="anno-scroll"><div class="anno-section-title">${state.mode==='mac'?'MAC CLIENT':'OPERATIONS'} / ${pageName}</div>${list.length?list.map(a=>`<button class="anno-card" data-action="focus-annotation" data-id="${a.id}"><span class="anno-id ${a.id.startsWith('E')?'error':a.id.startsWith('G')?'global':''}">${a.id}</span><span class="anno-copy"><h5>${a.title}</h5><span class="anno-fields"><span class="anno-field"><b>触发条件</b><p>${a.trigger}</p></span><span class="anno-field"><b>展示说明</b><p>${a.display}</p></span><span class="anno-field"><b>交互说明</b><p>${a.interaction}</p></span></span><span class="anno-tag">${a.tag}</span></span></button>`).join(''):`<div style="padding:30px 10px;text-align:center;color:var(--shell-faint);font-size:11px">当前页面暂无此类标注</div>`}</div>`;refreshIcons()}
function renderApp(){document.body.dataset.mode=state.mode;document.body.dataset.page=state.page;document.body.dataset.badges=state.badgeVisible?'visible':'hidden';document.getElementById('app').classList.toggle('panel-closed',!state.panelOpen);renderFlowNav();renderCanvas();renderAnnotationPanel();if(!state.auditOpen)document.getElementById('auditLayer').innerHTML=''}
function navigate(mode,page,track=true){if(track&&state.mode==='mac'&&mode==='mac'&&state.page!==page)state.macHistory.push(state.page);state.mode=mode;state.page=page;if(page!=='detail')state.detailGuardOpen=false;state.auditOpen=false;renderApp()}
function updateScale(){const vp=document.getElementById('canvasViewport'),canvas=document.getElementById('demoCanvas');if(!vp||!canvas)return;const w=state.mode==='mac'?1076:1800,h=state.mode==='mac'?734:1300;const scale=Math.min((vp.clientWidth-28)/w,(vp.clientHeight-28)/h,1);canvas.style.transform=`translate(-50%,-50%) scale(${Math.max(scale,.1)})`}
