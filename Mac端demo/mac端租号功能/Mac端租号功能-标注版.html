me}</option>`).join('')}</select></label><label class="audit-filter-field">动作<select class="a-select" data-change="audit-action"><option value="all">全部动作</option>${actions.map(([id,name])=>`<option value="${auditEsc(id)}" ${f.action===id?'selected':''}>${auditEsc(name)}</option>`).join('')}</select></label><label class="audit-filter-field">结果<select class="a-select" data-change="audit-result"><option value="all">全部结果</option><option value="success" ${f.result==='success'?'selected':''}>成功</option><option value="failed" ${f.result==='failed'?'selected':''}>失败</option></select></label><label class="audit-filter-field">对象 ID<input class="a-input" value="${auditEsc(f.objectId)}" data-input="audit-object-id" placeholder="精确对象或批次ID"></label><label class="audit-filter-field">关键词<input class="a-input" value="${auditEsc(f.keyword)}" data-input="audit-keyword" placeholder="日志ID / 摘要 / Request ID"></label></div><div class="audit-filter-actions"><span class="audit-retention-note">仅展示最近 ${state.auditRetentionDays} 天的操作记录，筛选和浏览不会写入日志</span><button class="a-btn" data-action="reset-audit-filters">重置筛选</button></div></div>`;const table=`<div class="data-card" data-audit-table data-anno-target="audit-table"><table class="data-table"><thead><tr><th style="width:170px">操作时间</th><th style="width:135px">操作人</th><th style="width:100px">模块</th><th style="width:155px">动作</th><th style="width:80px">结果</th><th style="width:155px">对象 ID</th><th>摘要</th><th style="width:80px">详情</th></tr></thead><tbody>${rows||'<tr><td colspan="8" class="audit-empty">暂无符合条件的操作记录</td></tr>'}</tbody></table><div class="audit-pagination"><span>共 ${data.filtered.length} 条 · 第 ${data.page}/${data.totalPages} 页</span><select class="a-select" data-change="audit-page-size"><option value="10" ${data.pageSize===10?'selected':''}>10 条/页</option><option value="20" ${data.pageSize===20?'selected':''}>20 条/页</option><option value="50" ${data.pageSize===50?'selected':''}>50 条/页</option></select><button class="a-btn" data-action="audit-prev-page" ${data.page<=1?'disabled':''}>上一页</button><button class="a-btn" data-action="audit-next-page" ${data.page>=data.totalPages?'disabled':''}>下一页</button></div></div>`;return adminFrame('audit','操作记录','查询后台关键操作、执行结果与变更快照，记录只读且默认保留180天',filters+table,`<button class="a-btn" data-action="export-audit">${icon('download',14)} 导出当前筛选</button>`).replace('</main></div>',`${renderAuditDetail()}</main></div>`)}

annotations.forEach(annotation=>{const details=annotationDetails[annotation.id];if(!details)return;[annotation.trigger,annotation.display,annotation.interaction]=details});
function renderFlowNav(){const pages=state.mode==='mac'?MAC_PAGES:ADMIN_PAGES;document.getElementById('flowNav').innerHTML=`<div class="flow-head"><div class="flow-title">Mac 端租号功能</div><div class="flow-subtitle">交互标注文档 · 前后台一体</div></div><div class="mode-switch"><button class="mode-btn ${state.mode==='mac'?'active':''}" data-action="switch-mode" data-mode="mac">Mac 客户端</button><button class="mode-btn ${state.mode==='admin'?'active':''}" data-action="switch-mode" data-mode="admin">运营后台</button></div><div class="nav-group-label">${state.mode==='mac'?'用户链路':'后台模块'}</div><nav class="page-nav">${pages.map(p=>`<button class="page-item ${state.page===p.id?'active':''}" data-action="navigate" data-mode="${state.mode}" data-page="${p.id}">${icon(p.icon,16)}<span>${p.name}</span></button>`).join('')}</nav><div class="flow-bottom"><button class="shell-button ${state.badgeVisible?'active':''}" data-action="toggle-badges">${icon('badge-help',15)} ${state.badgeVisible?'隐藏标号':'显示标号'}</button></div>`}
function renderCanvas(){const renderer=SCREEN_RENDERERS[state.mode]?.[state.page];if(!renderer)throw new Error(`Missing renderer: ${state.mode}/${state.page}`);const canvas=document.getElementById('demoCanvas');canvas.style.width=state.mode==='mac'?'1076px':'1800px';canvas.style.height=state.mode==='mac'?'734px':'1300px';canvas.innerHTML=renderer();refreshIcons();requestAnimationFrame(updateScale)}
function renderAnnotationPanel(){const list=annotations.filter(a=>a.mode===state.mode&&a.page===state.page&&a.tab===state.annotationTab);const pageName=(state.mode==='mac'?MAC_PAGES:ADMIN_PAGES).find(p=>p.id===state.page)?.name||(state.page==='refund-detail'?'退款详情':''),demoControls=state.mode==='mac'&&state.page==='after-sales'?`<section class="demo-controls" data-demo-controls="refund-case"><h4>演示控制 · 审核结果</h4><p>仅用于切换后续审核分支，不属于客户端功能。</p><div class="demo-control-row"><button class="${state.refundCase==='eligible'?'active':''}" data-action="set-refund-case" data-value="eligible">审核通过分支</button><button class="${state.refundCase==='ineligible'?'active':''}" data-action="set-refund-case" data-value="ineligible">审核拒绝分支</button></div></section>`:'';document.getElementById('annotationPanel').innerHTML=`<div class="anno-head"><strong>${pageName} · 标注</strong><div class="anno-actions"><button class="icon-btn badge-toggle ${state.badgeVisible?'active':''}" data-action="toggle-badges" title="显示标号">${icon('badge-help',15)}</button><button class="icon-btn" data-action="toggle-panel" title="收起">${icon('panel-right-close',15)}</button></div></div><div class="anno-tabs"><button class="anno-tab ${state.annotationTab==='interaction'?'active':''}" data-action="anno-tab" data-value="interaction">交互说明</button><button class="anno-tab ${state.annotationTab==='edge'?'active':''}" data-action="anno-tab" data-value="edge">异常 & 边界</button></div>${demoControls}<div class="anno-scroll"><div class="anno-section-title">${state.mode==='mac'?'MAC CLIENT':'OPERATIONS'} / ${pageName}</div>${list.length?list.map(a=>`<button class="anno-card" data-action="focus-annotation" data-id="${a.id}"><span class="anno-id ${a.id.startsWith('E')?'error':a.id.startsWith('G')?'global':''}">${a.id}</span><span class="anno-copy"><h5>${a.title}</h5><span class="anno-fields"><span class="anno-field"><b>触发条件</b><p>${a.trigger}</p></span><span class="anno-field"><b>展示说明</b><p>${a.display}</p></span><span class="anno-field"><b>交互说明</b><p>${a.interaction}</p></span></span><span class="anno-tag">${a.tag}</span></span></button>`).join(''):`<div style="padding:30px 10px;text-align:center;color:var(--shell-faint);font-size:11px">当前页面暂无此类标注</div>`}</div>`;refreshIcons()}
function renderApp(){const reminderLayer=document.getElementById('expiryReminderLayer');if(reminderLayer&&!reminderLayer.hidden&&(state.steamSession!=='rental'||reminderLayer.dataset.orderId!==state.activeRentalOrderId))hideExpiryReminder();document.body.dataset.mode=state.mode;document.body.dataset.page=state.page;document.body.dataset.badges=state.badgeVisible?'visible':'hidden';document.getElementById('app').classList.toggle('panel-closed',!state.panelOpen);renderFlowNav();renderCanvas();renderAnnotationPanel()}
function navigate(mode,page,track=true){if(track&&state.mode==='mac'&&mode==='mac'&&state.page!==page)state.macHistory.push(state.page);state.mode=mode;state.page=page;if(page!=='detail')state.detailGuardOpen=false;if(page!=='audit')state.auditDetailId='';renderApp()}
function updateScale(){const vp=document.getElementById('canvasViewport'),canvas=document.getElementById('demoCanvas');if(!vp||!canvas)return;const w=state.mode==='mac'?1076:1800,h=state.mode==='mac'?734:1300;const scale=Math.min((vp.clientWidth-28)/w,(vp.clientHeight-28)/h,1);canvas.style.transform=`translate(-50%,-50%) scale(${Math.max(scale,.1)})`}
function refreshIcons(){if(window.lucide)window.lucide.createIcons()}
function imageFallback(img){img.style.display='none';img.parentElement.style.background='#292d32'}
let toastTimer;function showToast(message,tone='success'){const t=document.getElementById('toast');t.textContent=message;t.className=`toast ${tone} show`;clearTimeout(toastTimer);toastTimer=setTimeout(()=>t.classList.remove('show'),2200)}

function refreshPaymentCountdowns(now=Date.now()){
 const expired=[];
 orders.filter(o=>o.status==='pending').forEach(o=>{if(paymentSecondsLeft(o,now)<=0){o.status='cancelled';o.closeReason='超过30分钟未支付';o.paymentDeadline=0;expired.push(o)}});
 if(expired.length){expired.forEach(o=>addAudit('待支付订单超时取消',o.id,'超过30分钟未支付'));if((state.mode==='mac'&&['orders','order-detail','checkout'].includes(state.page))||(state.mode==='admin'&&state.page==='admin-orders'))renderApp();showToast('待支付订单已超过30分钟并自动取消','error');return expired}
 document.querySelectorAll('[data-payment-countdown]').forEach(node=>{const order=orders.find(o=>o.id===node.dataset.paymentCountdown);if(!order)return;const seconds=paymentSecondsLeft(order,now);node.classList.toggle('expiring',seconds<=300);const value=node.querySelector('b');if(value)value.textContent=formatPaymentCountdown(seconds)});
 return expired
}
