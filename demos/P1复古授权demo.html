<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>盖世游戏 - 授权联动 Demo</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #000000;
            --bg-panel: #111113;
            --primary-purple: #815df2;
            --primary-blue: #0a84ff;
            --text-main: #ffffff;
            --text-sub: #8a9ba8;
            --auth-gold: #ffdf00;
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; font-family: -apple-system, "Microsoft YaHei", sans-serif; }
        ::-webkit-scrollbar { display: none; }
        
        body {
            background-color: #1a1a1e; height: 100vh; width: 100vw;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; color: var(--text-main);
        }

        /* === 外部控制面板 (模拟硬件操作) === */
        .external-controls {
            position: absolute; top: 20px; left: 20px;
            display: flex; flex-direction: column; gap: 12px; z-index: 1000;
        }
        .ctrl-group {
            background: rgba(0,0,0,0.6); padding: 16px; border-radius: 12px; border: 1px solid #333; display: flex; flex-direction: column; gap: 10px;
        }
        .ctrl-title { font-size: 12px; color: #aaa; font-weight: bold; margin-bottom: 4px; border-bottom: 1px solid #444; padding-bottom: 4px; }
        .ctrl-btn {
            padding: 10px 16px; background: #2a2a2e; color: #fff; border: 1px solid #444;
            border-radius: 8px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 8px; transition: 0.2s;
        }
        .ctrl-btn:hover { background: #3a3a3e; }
        .ctrl-btn.active { background: rgba(74, 222, 128, 0.2); border-color: #27C93F; color: #4ade80; }
        .ctrl-btn.danger { background: rgba(255, 69, 58, 0.2); border-color: #ff453a; color: #ff453a; }

        /* === 手机容器 (支持横竖版切换) === */
        .phone-wrapper {
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1);
            background: var(--bg-dark); position: relative;
            box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 0 4px #444;
            border-radius: 24px; overflow: hidden; display: flex; flex-direction: column;
        }
        .phone-wrapper.portrait { width: 360px; height: 680px; }
        .phone-wrapper.landscape { width: 680px; height: 360px; }

        /* 顶部模拟 */
        .status-bar { height: 24px; background: rgba(0,0,0,0.5); display: flex; justify-content: space-between; align-items: center; padding: 0 16px; font-size: 12px; color: #aaa; }
        
        /* 顶部搜索 */
        .header-bar { padding: 10px 16px; display: flex; align-items: center; background: var(--bg-panel); }
        .search-box { flex: 1; height: 32px; background: #222; border-radius: 16px; display: flex; align-items: center; padding: 0 16px; color: #666; font-size: 13px; }

        /* Tabs 切换 */
        .tabs { display: flex; padding: 0 16px; background: var(--bg-panel); gap: 20px; border-bottom: 1px solid #222; }
        .tab-item { font-size: 14px; color: var(--text-sub); padding: 12px 0; cursor: pointer; position: relative; font-weight: bold; transition: 0.3s; }
        .tab-item.active { color: #fff; font-size: 15px; }
        .tab-item.active::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 24px; height: 3px; background: #fff; border-radius: 2px; }

        /* 游戏视图容器 */
        .view-container { flex: 1; overflow-y: auto; position: relative; background: var(--bg-dark); }
        .page-view { padding: 16px; display: none; animation: fadeIn 0.3s; }
        .page-view.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 网格布局 (响应式：竖版3列，横版自动适配变多列) */
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(95px, 1fr)); gap: 12px; }
        
        .game-item { display: flex; flex-direction: column; gap: 6px; cursor: pointer; }
        .cover { width: 100%; aspect-ratio: 1/1; border-radius: 12px; background-color: #222; background-size: cover; background-position: center; border: 1px solid #333; position: relative; }
        .name { font-size: 12px; color: #ddd; text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .btn-dl { width: 60px; height: 24px; background: #333; border-radius: 12px; color: #ccc; font-size: 11px; display: flex; align-items: center; justify-content: center; }

        /* 授权游戏专属样式 */
        .auth-item .cover { border: 1.5px solid var(--auth-gold); box-shadow: 0 4px 15px rgba(255, 223, 0, 0.15); }
        .auth-item .name { color: var(--auth-gold); font-weight: bold; }
        .auth-tag {
            position: absolute; top: 6px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.85); border: 1px solid var(--auth-gold);
            padding: 2px 4px; border-radius: 4px; display: flex; flex-direction: column; align-items: center;
        }
        .auth-tag span:first-child { font-size: 8px; color: var(--auth-gold); font-weight: 900; }
        .auth-tag span:last-child { background: var(--auth-gold); color: #000; font-size: 8px; padding: 1px 3px; border-radius: 2px; font-weight: bold; }

        /* 底部导航 */
        .bottom-nav { height: 50px; background: var(--bg-panel); display: flex; align-items: center; justify-content: space-around; border-top: 1px solid #222; padding-bottom: env(safe-area-inset-bottom); }
        .nav-btn { color: #555; display: flex; flex-direction: column; align-items: center; font-size: 10px; gap: 4px; }
        .nav-btn.active { color: #fff; }
        .nav-btn i { font-size: 18px; }

        /* === Toast 提示 === */
        .toast {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0.9);
            background: rgba(0,0,0,0.8); color: #fff; padding: 12px 20px; border-radius: 8px;
            font-size: 13px; font-weight: bold; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 100;
            white-space: nowrap; border: 1px solid #444; backdrop-filter: blur(5px);
        }
        .toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }

        /* === 悬浮横幅 (非阻碍性弹窗，完美复刻截图) === */
        .auth-banner {
            position: absolute; bottom: 65px; left: 50%; transform: translate(-50%, 20px);
            width: 92%; max-width: 400px; background: #1c1c1e; border: 1px solid #333;
            border-radius: 16px; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7); opacity: 0; pointer-events: none; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 90;
        }
        .auth-banner.show { opacity: 1; transform: translate(-50%, 0); pointer-events: auto; }
        
        .banner-text { font-size: 13px; color: #fff; line-height: 1.4; flex: 1; padding-right: 10px; }
        .banner-actions { display: flex; align-items: center; gap: 12px; }
        .btn-go {
            background: linear-gradient(180deg, #1ea1f2 0%, #0a84ff 100%);
            color: #fff; border: none; padding: 6px 16px; border-radius: 16px; font-size: 13px; font-weight: bold; cursor: pointer;
            box-shadow: 0 2px 10px rgba(10, 132, 255, 0.3);
        }
        .btn-close { color: #888; font-size: 18px; cursor: pointer; }

    </style>
</head>
<body>

<!-- 左侧上帝视角控制器 -->
<div class="external-controls">
    <div class="ctrl-group">
        <div class="ctrl-title">硬件模拟器 (上帝视角)</div>
        <button class="ctrl-btn" id="btnConnect" onclick="triggerConnect()">
            <i class="fas fa-gamepad"></i> 插入授权手柄
        </button>
        <button class="ctrl-btn danger" id="btnDisconnect" onclick="triggerDisconnect()">
            <i class="fas fa-plug-circle-xmark"></i> 拔出手柄
        </button>
    </div>
    <div class="ctrl-group">
        <div class="ctrl-title">界面控制</div>
        <button class="ctrl-btn" onclick="toggleOrientation()">
            <i class="fas fa-mobile-screen"></i> 切换横/竖屏
        </button>
        <button class="ctrl-btn" id="btnLang" onclick="toggleCoverLang()">
            <i class="fas fa-language"></i> 封面：中文标签
        </button>
        <button class="ctrl-btn" onclick="resetDemo()">
            <i class="fas fa-rotate-right"></i> 重置演示
        </button>
    </div>
</div>

<!-- 手机模拟容器 -->
<div class="phone-wrapper portrait" id="phoneBox">
    <div class="status-bar">
        <span>15:16</span>
        <div style="display:flex; gap:4px;"><i class="fas fa-wifi"></i><i class="fas fa-battery-full"></i></div>
    </div>

    <div class="header-bar">
        <div class="search-box"><i class="fas fa-search" style="margin-right:8px;"></i> 搜索游戏...</div>
    </div>

    <div class="tabs">
        <div class="tab-item" onclick="switchTab('pc')" id="tab-pc">PC游戏</div>
        <div class="tab-item active" onclick="switchTab('retro')" id="tab-retro">复古游戏</div>
    </div>

    <div class="view-container">
        <!-- PC 游戏视图 -->
        <div class="page-view" id="view-pc">
            <div class="game-grid" id="pc-grid">
                <!-- 填充一些占位 PC 游戏 -->
            </div>
        </div>

        <!-- 复古游戏视图 -->
        <div class="page-view active" id="view-retro">
            <div class="game-grid" id="retro-grid">
                <!-- 填充一些占位普通复古游戏 -->
            </div>
        </div>
        
        <!-- Toast 提示框 -->
        <div class="toast" id="sysToast"></div>

        <!-- 底部悬浮弹窗 (截图同款) -->
        <div class="auth-banner" id="authBanner">
            <div class="banner-text">检测到授权手柄连接，是否前往查看授权游戏？</div>
            <div class="banner-actions">
                <button class="btn-go" onclick="goToRetroTab()">前往</button>
                <i class="fas fa-times btn-close" onclick="closeBanner()"></i>
            </div>
        </div>
    </div>

    <!-- 底部导航 -->
    <div class="bottom-nav">
        <div class="nav-btn"><i class="fas fa-planet-ringed"></i>社区</div>
        <div class="nav-btn active"><i class="fas fa-gamepad"></i>玩游戏</div>
        <div class="nav-btn"><i class="fas fa-chart-simple"></i>榜单</div>
        <div class="nav-btn"><i class="fas fa-face-smile"></i>我的</div>
    </div>
</div>

        }
    ];

    let coverLang = 'cn';

    // === 状态变量 ===
    let currentTab = 'retro';
    let isConnected = false;

    // 初始化渲染基础游戏列表
    function initGrids() {
        const retroGrid = document.getElementById('retro-grid');
        const pcGrid = document.getElementById('pc-grid');
        
        // 渲染普通复古游戏
        NormalRetroGames.forEach(g => {
            retroGrid.innerHTML += `<div class="game-item">
                <div class="cover" style="background-image:url('${g.img}')"></div>
                <div class="name">${g.name}</div><div class="btn-dl">下载</div>
            </div>`;
        });
        
        // 渲染普通PC游戏
        NormalPCGames.forEach(g => {
            pcGrid.innerHTML += `<div class="game-item">
                <div class="cover" style="background-image:url('${g.img}')"></div>
                <div class="name">${g.name}</div><div class="btn-dl">秒玩</div>
            </div>`;
        });
    }

    // === 交互逻辑：Tab切换 ===
    function switchTab(tabId) {
        currentTab = tabId;
        // 切换 Tab 样式
        document.getElementById('tab-pc').classList.remove('active');
        document.getElementById('tab-retro').classList.remove('active');
        document.getElementById(`tab-${tabId}`).classList.add('active');
        
        // 切换内容视图
        document.getElementById('view-pc').classList.remove('active');
        document.getElementById('view-retro').classList.remove('active');
        document.getElementById(`view-${tabId}`).classList.add('active');
    }

    // === 交互逻辑：屏幕横竖切换 ===
    function toggleOrientation() {
        const phoneBox = document.getElementById('phoneBox');
        if (phoneBox.classList.contains('portrait')) {
            phoneBox.classList.replace('portrait', 'landscape');
        } else {
            phoneBox.classList.replace('landscape', 'portrait');
        }
    }

    // === 核心逻辑：手柄接入 ===
    function triggerConnect() {
        if (isConnected) return;
        isConnected = true;

        // 更新外部按钮样式
        document.getElementById('btnConnect').classList.add('active');
        document.getElementById('btnConnect').innerHTML = '<i class="fas fa-check-circle"></i> 手柄已连接';

        // 1. 动态生成授权游戏节点并插入到复古游戏网格最前面
        const retroGrid = document.getElementById('retro-grid');
        [...LicensedGames].reverse().forEach(g => {
            const el = document.createElement('div');
            el.className = 'game-item auth-item';
            const img = coverLang === 'cn' ? g.imgCn : g.imgEn;
            const name = coverLang === 'cn' ? g.nameCn : g.nameEn;
            el.innerHTML = `
                <div class="cover" style="background-image:url('${img}')">
                    <div class="auth-tag"><span>TECHNOS</span><span>正版授权</span></div>
                </div>
                <div class="name">${name}</div>
                <div class="btn-dl" style="color:#ffdf00">下载</div>
            `;
            retroGrid.insertBefore(el, retroGrid.firstChild);
        }); 

        // 2. 根据当前所在的 Tab 执行不同提示逻辑
        if (currentTab === 'retro') {
            // 在复古页：直接提示新增
            showToast("✅ 新增了 8 款专属授权游戏！");
        } else {
            // 在PC/其他页：弹出非阻碍横幅
            document.getElementById('authBanner').classList.add('show');
        }
    }

    // === 核心逻辑：手柄断开 ===
    function triggerDisconnect() {
        if (!isConnected) return;
        isConnected = false;

        // 更新外部按钮样式
        document.getElementById('btnConnect').classList.remove('active');
        document.getElementById('btnConnect').innerHTML = '<i class="fas fa-gamepad"></i> 插入授权手柄';

        // 1. 隐藏可能存在的横幅
        closeBanner();

        // 2. 需求：断开后授权游戏直接消失 (移除所有 .auth-item)
        const authItems = document.querySelectorAll('.auth-item');
        authItems.forEach(item => item.remove());

        // 3. 提示已断开
        showToast("手柄已断开，授权游戏已隐藏");
    }

    // === Banner 操作逻辑 ===
    function goToRetroTab() {
        closeBanner();
        switchTab('retro');
        // 可选：平滑滚动到顶部
        document.querySelector('.view-container').scrollTo({ top: 0, behavior: 'smooth' });
    }

    function closeBanner() {
        document.getElementById('authBanner').classList.remove('show');
    }

    // === UI 辅助功能 ===
    function showToast(msg) {
        const toast = document.getElementById('sysToast');
        toast.innerText = msg;
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 2000);
    }

    // 重置演示
    function resetDemo() {
        if(isConnected) triggerDisconnect();
        switchTab('retro');
        document.querySelector('.view-container').scrollTop = 0;
    }


    // === 切换封面语言 ===
    function toggleCoverLang() {
        coverLang = coverLang === 'cn' ? 'en' : 'cn';
        const label = coverLang === 'cn' ? '中文标签' : '英文标签';
        document.getElementById('btnLang').innerHTML = '<i class="fas fa-language"></i> 封面：' + label;
        if (isConnected) {
            document.querySelectorAll('.auth-item').forEach(el => el.remove());
            const retroGrid = document.getElementById('retro-grid');
            [...LicensedGames].reverse().forEach(g => {
                const el = document.createElement('div');
                el.className = 'game-item auth-item';
                const img = coverLang === 'cn' ? g.imgCn : g.imgEn;
                const name = coverLang === 'cn' ? g.nameCn : g.nameEn;
                el.innerHTML = `
                    <div class="cover" style="background-image:url('${img}')">
                        <div class="auth-tag"><span>TECHNOS</span><span>正版授权</span></div>
                    </div>
                    <div class="name">${name}</div>
                    <div class="btn-dl" style="color:#ffdf00">下载</div>
                `;
                retroGrid.insertBefore(el, retroGrid.firstChild);
            });
        }
    }

    // 初始化运行
    initGrids();
</script>
