<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>盖世游戏 - 云存档付费Demo</title>
<style>
:root{--bg:#0b0d12;--card:#151820;--border:rgba(255,255,255,0.08);--text:#f4f4f5;--sub:#8e8e93;--primary:#d4b473;--green:#52c41a;--red:#f5222d;--blue:#1890ff}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,"PingFang SC",sans-serif}
body{background:#000;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:20px}
.orient-btn{margin-bottom:15px;padding:8px 20px;border-radius:20px;background:#222;color:#fff;border:1px solid #444;cursor:pointer;font-size:14px}
#app{background:var(--bg);border-radius:40px;box-shadow:0 0 0 10px #222;overflow:hidden;display:flex;flex-direction:column;position:relative;transition:width 0.4s,height 0.4s}
#app.portrait{width:390px;height:844px}
#app.landscape{width:844px;height:390px;border-radius:20px}
.status-bar{height:44px;display:flex;justify-content:space-between;align-items:center;padding:0 24px;font-size:13px;font-weight:bold;color:#fff;flex-shrink:0}
.landscape .status-bar{height:30px;padding:0 16px;font-size:12px}
.top-bar{display:flex;align-items:center;padding:10px 16px;gap:12px}
.top-bar .back{font-size:20px;cursor:pointer;color:#fff}
.top-bar .title{font-size:16px;font-weight:bold;color:#fff;flex:1}
.main-tabs{display:flex;gap:20px;padding:0 16px;border-bottom:1px solid var(--border)}
.m-tab{padding:10px 0;font-size:14px;color:var(--sub);cursor:pointer;position:relative}
.m-tab.active{color:#fff;font-weight:bold}
.m-tab.active::after{content:'';position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);width:20px;height:3px;background:var(--primary);border-radius:2px}
.sub-tabs{display:flex;gap:16px;padding:8px 16px;font-size:13px}
.s-tab{color:var(--sub);cursor:pointer;padding:4px 12px;border-radius:14px;background:rgba(255,255,255,0.05)}
.s-tab.active{background:#fff;color:#000;font-weight:bold}
.scroll{flex:1;overflow-y:auto;padding-bottom:20px}
.scroll::-webkit-scrollbar{display:none}
.save-card{display:flex;gap:12px;padding:12px 16px;border-bottom:1px solid var(--border);cursor:pointer}
.save-card:active{background:rgba(255,255,255,0.02)}
.save-cover{width:100px;height:70px;border-radius:8px;background:#222;object-fit:cover;flex-shrink:0}
.landscape .save-cover{width:80px;height:56px}
.save-info{flex:1;display:flex;flex-direction:column;justify-content:space-between;min-width:0}
.save-title{font-size:13px;color:#fff;font-weight:500;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.save-meta{font-size:11px;color:var(--sub);display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.save-price{display:flex;align-items:center;gap:8px;margin-top:4px}
.price-tag{background:var(--primary);color:#000;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:bold}
.type-tag{padding:2px 6px;border-radius:4px;font-size:10px;font-weight:bold}
.type-tag.pass{background:rgba(82,196,26,0.15);color:var(--green)}
.type-tag.mod{background:rgba(24,144,255,0.15);color:var(--blue)}
.type-tag.full{background:rgba(250,173,20,0.15);color:var(--primary)}
/* 详情页 */
.detail-page{position:absolute;inset:0;background:var(--bg);z-index:100;display:none;flex-direction:column}
.detail-page.show{display:flex}
.detail-cover{width:100%;height:180px;object-fit:cover;background:#222;flex-shrink:0}
.landscape .detail-cover{height:120px}
.detail-body{flex:1;overflow-y:auto;padding:16px;padding-bottom:90px}
.detail-author{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.detail-author img{width:32px;height:32px;border-radius:50%}
.detail-author .name{font-size:14px;font-weight:bold;color:#fff}
.detail-title{font-size:16px;font-weight:bold;color:#fff;margin-bottom:8px}
.detail-desc{font-size:13px;color:#ccc;line-height:1.6;margin-bottom:14px}
.detail-screenshots{display:flex;gap:8px;overflow-x:auto;margin-bottom:14px}
.detail-screenshots img{width:120px;height:80px;border-radius:8px;object-fit:cover;flex-shrink:0}
.detail-meta{background:var(--card);border-radius:10px;padding:12px}
.detail-meta-row{display:flex;justify-content:space-between;padding:5px 0;font-size:12px}
.detail-meta-row .label{color:var(--sub)}
.detail-meta-row .value{color:#fff}
.detail-footer{position:absolute;bottom:0;left:0;right:0;padding:10px 16px 24px;background:var(--bg);border-top:1px solid var(--border)}
.detail-footer .tip{font-size:10px;color:var(--sub);text-align:center;margin-bottom:6px}
.buy-btn{width:100%;padding:12px;border-radius:20px;background:var(--primary);color:#000;text-align:center;font-size:15px;font-weight:bold;cursor:pointer}
.buy-btn.bought{background:rgba(82,196,26,0.15);color:var(--green)}
/* 我的存档 */
.my-section{padding:16px}
.my-card{background:var(--card);border-radius:12px;padding:14px;margin-bottom:10px;border:1px solid var(--border)}
.my-card .mc-title{font-size:14px;color:#fff;font-weight:500;margin-bottom:6px}
.my-card .mc-meta{font-size:11px;color:var(--sub);margin-bottom:10px}
.my-card .mc-actions{display:flex;gap:8px}
.mc-btn{padding:6px 14px;border-radius:12px;font-size:12px;font-weight:bold;cursor:pointer;border:none}
.mc-btn.import{background:var(--green);color:#fff}
.mc-btn.upload{background:var(--primary);color:#000}
.mc-btn.outline{background:transparent;border:1px solid var(--border);color:var(--sub)}
/* 上传面板 */
.upload-panel{position:absolute;inset:0;background:var(--bg);z-index:150;display:none;flex-direction:column}
.upload-panel.show{display:flex}
.upload-body{flex:1;overflow-y:auto;padding:16px}
.form-group{margin-bottom:16px}
.form-group label{display:block;font-size:13px;color:var(--sub);margin-bottom:6px;font-weight:500}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;color:#fff;font-size:14px;outline:none}
.form-group textarea{height:80px;resize:vertical}
.form-group input:focus,.form-group textarea:focus{border-color:var(--primary)}
.file-pick{display:flex;gap:8px}
.file-pick-btn{flex:1;padding:12px;border-radius:8px;background:rgba(255,255,255,0.05);border:1px dashed var(--border);text-align:center;cursor:pointer;color:var(--sub);font-size:12px}
.file-pick-btn:hover{border-color:var(--primary);color:var(--primary)}
.price-input{display:flex;align-items:center;gap:8px}
.price-input span{color:var(--sub);font-size:12px}
.submit-btn{width:100%;padding:14px;border-radius:20px;background:var(--primary);color:#000;text-align:center;font-size:15px;font-weight:bold;cursor:pointer;margin-top:10px;border:none}
/* 弹窗 */
.modal-mask{position:absolute;inset:0;background:rgba(0,0,0,0.7);z-index:200;display:none;align-items:center;justify-content:center}
.modal-mask.show{display:flex}
.modal-box{background:#1e1e24;width:82%;border-radius:16px;padding:20px;text-align:center}
.modal-box h3{color:#fff;margin-bottom:10px;font-size:16px}
.modal-box p{color:var(--sub);font-size:13px;margin-bottom:16px;line-height:1.5}
.modal-btns{display:flex;gap:10px}
.modal-btns button{flex:1;padding:11px;border-radius:12px;font-size:14px;font-weight:bold;cursor:pointer;border:none}
.modal-btns .cancel{background:rgba(255,255,255,0.1);color:#fff}
.modal-btns .confirm{background:var(--primary);color:#000}
.toast{position:absolute;top:70px;left:50%;transform:translateX(-50%);background:#fff;color:#000;padding:8px 18px;border-radius:16px;font-size:13px;font-weight:bold;opacity:0;transition:0.3s;z-index:500;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<button class="orient-btn" onclick="toggleOrient()">🔄 切换横竖屏</button>
<div id="app" class="portrait">
<div class="status-bar"><span>15:30</span><span>📶 📡 🔋</span></div>
<div class="top-bar"><span class="back" onclick="showToast('返回')">‹</span><span class="title">GTA V</span></div>
<div class="main-tabs">
<div class="m-tab" onclick="showToast('详情Tab')">详情</div>
<div class="m-tab" onclick="showToast('社区Tab')">社区</div>
<div class="m-tab active">存档</div>
</div>
<div class="sub-tabs" id="sub-tabs">
<div class="s-tab active" onclick="switchSub('recommend',this)">推荐存档(5)</div>
<div class="s-tab" onclick="switchSub('mine',this)">我的存档(2)</div>
</div>
<div class="scroll" id="main-scroll">
<!-- 推荐存档 -->
<div id="sec-recommend"></div>
<!-- 我的存档 -->
<div id="sec-mine" style="display:none"></div>
</div>

<!-- 详情页 -->
<div class="detail-page" id="detail-page">
<div class="top-bar"><span class="back" onclick="closeDetail()">‹</span><span class="title" id="d-page-title">存档详情</span></div>
<img class="detail-cover" id="d-cover">
<div class="detail-body">
<div class="detail-author"><img id="d-avatar" src=""><div><div class="name" id="d-author"></div></div></div>
<div class="detail-title" id="d-title"></div>
<div class="detail-desc" id="d-desc"></div>
<div class="detail-screenshots" id="d-shots"></div>
<div class="detail-meta">
<div class="detail-meta-row"><span class="label">适用游戏</span><span class="value">GTA V (Steam版)</span></div>
<div class="detail-meta-row"><span class="label">存档类型</span><span class="value" id="d-type"></span></div>
<div class="detail-meta-row"><span class="label">存档大小</span><span class="value" id="d-size"></span></div>
<div class="detail-meta-row"><span class="label">已购买</span><span class="value" id="d-buyers"></span></div>
</div>
</div>
<div class="detail-footer">
<div class="tip">存档为虚拟商品，购买后不支持退款</div>
<div class="buy-btn" id="d-buy" onclick="handleBuy()"></div>
</div>
</div>

<!-- 上传面板 -->
<div class="upload-panel" id="upload-panel">
<div class="top-bar"><span class="back" onclick="closeUpload()">‹</span><span class="title">上传存档</span></div>
<div class="upload-body">
<div class="form-group"><label>* 关联游戏</label><select><option>GTA V</option><option>艾尔登法环</option><option>赛博朋克2077</option><option>空洞骑士</option></select></div>
<div class="form-group"><label>* 存档类型</label><select id="up-type"><option value="通关存档">通关存档</option><option value="修改存档">修改存档</option><option value="导入存档">导入存档（从其他平台搬过来）</option></select></div>
<div class="form-group">
<label>* 存档文件</label>
<div class="file-pick">
<div class="file-pick-btn" onclick="pickFile('game')">📂 从当前游戏读取</div>
<div class="file-pick-btn" onclick="pickFile('local')">📁 从手机存储选择</div>
</div>
<div id="file-status" style="font-size:11px;color:var(--green);margin-top:6px;display:none">✓ 已选择: save_slot1.dat (12.3MB)</div>
</div>
<div class="form-group"><label>* 标题</label><input type="text" placeholder="如：500万CR+440辆车全收集" id="up-title"></div>
<div class="form-group"><label>* 描述</label><textarea placeholder="描述存档内容、适用版本等信息..." id="up-desc"></textarea></div>
<div class="form-group"><label>截图（最多4张）</label><div class="file-pick"><div class="file-pick-btn" onclick="showToast('选择截图')">+ 添加截图</div></div></div>
<div class="form-group">
<label>* 定价</label>
<div class="price-input">
<span>¥</span><input type="number" min="1" max="20" value="6" style="width:80px" id="up-price">
<span>（平台抽成30%，你实得 ¥<span id="up-earn">4.20</span>）</span>
</div>
</div>
<button class="submit-btn" onclick="submitUpload()">提交审核</button>
<div style="text-align:center;font-size:11px;color:var(--sub);margin-top:10px">审核通过后自动上架，审核周期约1-3个工作日</div>
</div>
</div>

<!-- 弹窗 -->
<div class="modal-mask" id="modal">
<div class="modal-box">
<h3 id="modal-title"></h3>
<p id="modal-desc"></p>
<div class="modal-btns">
<button class="cancel" onclick="closeModal()">取消</button>
<button class="confirm" onclick="confirmAction()">确认</button>
</div>
</div>
</div>
<div class="toast" id="toast"></div>
</div>

<script>
var saves=[
{id:1,title:'500多万CR，440辆车全收集',author:'咪儿',type:'通关存档',price:6,buyers:877,desc:'CR不多，决赛已到团队。包含440辆改装车辆，全部调校完毕。',size:'12.3 MB',cover:'https://images.unsplash.com/photo-1542751371-adc38448a05e?w=400'},
{id:2,title:'线上模式满级+全武器解锁+1000万',author:'盖世游戏官方',type:'修改存档',price:8,buyers:1200,desc:'线上模式等级200+，全武器MK2改装，现金1000万。',size:'8.7 MB',cover:'https://images.unsplash.com/photo-1493711662062-fa541adb3fc8?w=400'},
{id:3,title:'430辆车200万CR，大人时代变了',author:'老王',type:'通关存档',price:6,buyers:644,desc:'430辆车全部精心改装，200万CR余额。',size:'15.1 MB',cover:'https://images.unsplash.com/photo-1511512578047-dfb367046420?w=400'},
{id:4,title:'96辆车3000U+变装全改装',author:'神枪手',type:'修改存档',price:3,buyers:234,desc:'精选96辆热门车辆，全部改装到位。',size:'6.2 MB',cover:'https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=400'},
{id:5,title:'单人模式100%通关全收集',author:'大表哥',type:'通关存档',price:5,buyers:156,desc:'单人模式100%完成度，三个角色全满技能。',size:'9.8 MB',cover:'https://images.unsplash.com/photo-1606144042614-b2417e99c4e3?w=400'}
];
var mySaves=[
{id:101,title:'我的GTA5线上存档',type:'本地备份',time:'2026-05-25',size:'8.1 MB',status:'已备份'},
{id:102,title:'全收集通关存档（已上传）',type:'通关存档',time:'2026-05-20',size:'12.3 MB',status:'已上架',sold:23,earn:96.6}
];
var boughtSet=new Set();
var currentIdx=0;
var pendingAction=null;

function renderRecommend(){
var h='';
saves.forEach(function(s,i){
var typeCls=s.type==='修改存档'?'mod':s.type==='通关存档'?'full':'pass';
h+='<div class="save-card" onclick="openDetail('+i+')"><img class="save-cover" src="'+s.cover+'" onerror="this.style.background=\'#333\'"><div class="save-info"><div class="save-title">'+s.title+'</div><div class="save-meta"><span class="type-tag '+typeCls+'">'+s.type+'</span> by '+s.author+' · '+s.buyers+'人已购买</div><div class="save-price"><span class="price-tag">¥'+s.price.toFixed(2)+'购买</span></div></div></div>';
});
document.getElementById('sec-recommend').innerHTML=h;
}

function renderMine(){
var h='<div class="my-section">';
h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><div style="font-size:15px;font-weight:bold;color:#fff">我的存档</div><button class="mc-btn upload" onclick="openUpload()">+ 上传存档</button></div>';
mySaves.forEach(function(s){
h+='<div class="my-card"><div class="mc-title">'+s.title+'</div><div class="mc-meta">'+s.type+' · '+s.size+' · '+s.time+(s.sold?' · 已售'+s.sold+'份':'')+'</div><div class="mc-actions">';
if(s.status==='已备份') h+='<button class="mc-btn import" onclick="handleImport()">一键导入</button><button class="mc-btn outline" onclick="showToast(\'下载到本地\')">导出</button>';
else h+='<button class="mc-btn outline" onclick="showToast(\'查看详情\')">查看</button><button class="mc-btn outline" onclick="showToast(\'编辑存档信息\')">编辑</button><button class="mc-btn outline" style="color:var(--red);border-color:rgba(245,34,45,0.3)" onclick="showToast(\'已下架\')">下架</button>';
h+='</div></div>';
});
// 已购买的
boughtSet.forEach(function(idx){
var s=saves[idx];
h+='<div class="my-card"><div class="mc-title">'+s.title+'</div><div class="mc-meta">已购买 · '+s.size+'</div><div class="mc-actions"><button class="mc-btn import" onclick="handleImport()">一键导入</button></div></div>';
});
h+='</div>';
document.getElementById('sec-mine').innerHTML=h;
}

function switchSub(type,el){
document.querySelectorAll('.s-tab').forEach(function(t){t.classList.remove('active')});
el.classList.add('active');
document.getElementById('sec-recommend').style.display=type==='recommend'?'block':'none';
document.getElementById('sec-mine').style.display=type==='mine'?'block':'none';
if(type==='mine') renderMine();
}

function openDetail(idx){
currentIdx=idx;var s=saves[idx];
document.getElementById('d-cover').src=s.cover;
document.getElementById('d-title').textContent=s.title;
document.getElementById('d-desc').textContent=s.desc;
document.getElementById('d-author').textContent=s.author;
document.getElementById('d-avatar').src='https://api.dicebear.com/7.x/avataaars/svg?seed='+s.author;
document.getElementById('d-type').textContent=s.type;
document.getElementById('d-size').textContent=s.size;
document.getElementById('d-buyers').textContent=s.buyers+'人';
document.getElementById('d-shots').innerHTML='<img src="'+s.cover+'"><img src="https://images.unsplash.com/photo-1542751371-adc38448a05e?w=300&h=200&fit=crop"><img src="https://images.unsplash.com/photo-1493711662062-fa541adb3fc8?w=300&h=200&fit=crop">';
var btn=document.getElementById('d-buy');
if(boughtSet.has(idx)){btn.textContent='已购买 - 一键导入';btn.className='buy-btn bought';btn.onclick=handleImport}
else{btn.textContent='¥'+s.price.toFixed(2)+' 购买';btn.className='buy-btn';btn.onclick=handleBuy}
document.getElementById('detail-page').classList.add('show');
}
function closeDetail(){document.getElementById('detail-page').classList.remove('show')}

function handleBuy(){
document.getElementById('modal-title').textContent='确认购买';
document.getElementById('modal-desc').textContent='确认支付 ¥'+saves[currentIdx].price.toFixed(2)+' 购买此存档？\n存档为虚拟商品，购买后不支持退款。';
pendingAction='buy';
document.getElementById('modal').classList.add('show');
}
function handleImport(){
document.getElementById('modal-title').textContent='确认导入';
document.getElementById('modal-desc').textContent='导入将覆盖当前游戏存档，是否继续？建议先备份当前存档。';
pendingAction='import';
document.getElementById('modal').classList.add('show');
}
function confirmAction(){
closeModal();
if(pendingAction==='buy'){
boughtSet.add(currentIdx);saves[currentIdx].buyers++;
var btn=document.getElementById('d-buy');btn.textContent='已购买 - 一键导入';btn.className='buy-btn bought';btn.onclick=handleImport;
showToast('购买成功！已加入"我的存档"');
}else{showToast('导入成功！启动游戏即可体验')}
}
function closeModal(){document.getElementById('modal').classList.remove('show')}

function openUpload(){document.getElementById('upload-panel').classList.add('show')}
function closeUpload(){document.getElementById('upload-panel').classList.remove('show')}
function pickFile(from){
document.getElementById('file-status').style.display='block';
showToast(from==='game'?'已读取当前游戏存档':'已选择本地文件');
}
function submitUpload(){
var t=document.getElementById('up-title').value;
if(!t){showToast('请填写标题');return}
mySaves.unshift({id:Date.now(),title:t,type:document.getElementById('up-type').value,time:new Date().toLocaleDateString('zh-CN'),size:'12.3 MB',status:'审核中'});
closeUpload();showToast('提交成功，审核通过后自动上架');
}
function toggleOrient(){
var app=document.getElementById('app');
app.classList.toggle('portrait');app.classList.toggle('landscape');
}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2000)}

// 价格联动
document.getElementById('up-price')&&document.getElementById('up-price').addEventListener('input',function(){
var v=parseFloat(this.value)||0;
document.getElementById('up-earn').textContent=(v*0.7).toFixed(2);
});

renderRecommend();
</script>
</body>
</html>
