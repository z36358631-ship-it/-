<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>盖世游戏 - 云存档付费Demo</title>
<style>
:root{--bg:#0b0d12;--card:#151820;--border:rgba(255,255,255,0.08);--text:#f4f4f5;--sub:#8e8e93;--primary:#d4b473;--green:#52c41a;--red:#f5222d;--blue:#1890ff}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,"PingFang SC",sans-serif;color:var(--text)}
body{background:#000;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:20px}
.ctrl-btns{display:flex;gap:10px;margin-bottom:12px}
.ctrl-btn{padding:7px 16px;border-radius:14px;background:#222;color:#fff;border:1px solid #444;cursor:pointer;font-size:12px}
#app{background:var(--bg);border-radius:40px;box-shadow:0 0 0 10px #222;overflow:hidden;display:flex;flex-direction:column;position:relative;transition:0.4s}
#app.portrait{width:390px;height:844px}
#app.landscape{width:844px;height:390px;border-radius:20px}
.top-bar{display:flex;align-items:center;padding:10px 16px;gap:10px;flex-shrink:0}
.top-bar .back{font-size:18px;cursor:pointer}
.top-bar .title{font-size:15px;font-weight:bold;flex:1}
.top-bar .guide{font-size:11px;color:var(--sub);cursor:pointer;padding:3px 8px;border:1px solid var(--border);border-radius:8px}
.tabs{display:flex;gap:18px;padding:0 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.tab{padding:10px 0;font-size:13px;color:var(--sub);cursor:pointer;position:relative}
.tab.active{color:#fff;font-weight:bold}
.tab.active::after{content:'';position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);width:18px;height:2.5px;background:var(--primary);border-radius:2px}
.sub-tabs{display:flex;gap:10px;padding:8px 16px;flex-shrink:0}
.stab{padding:4px 12px;border-radius:12px;font-size:12px;color:var(--sub);background:rgba(255,255,255,0.05);cursor:pointer}
.stab.active{background:#fff;color:#000;font-weight:bold}
.scroll{flex:1;overflow-y:auto}.scroll::-webkit-scrollbar{display:none}
/* 存档卡片grid */
.save-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px 16px}
.landscape .save-grid{grid-template-columns:1fr 1fr 1fr}
.save-card{background:var(--card);border-radius:10px;overflow:hidden;border:1px solid var(--border);cursor:pointer}
.save-card img{width:100%;height:80px;object-fit:cover;display:block}
.landscape .save-card img{height:60px}
.sc-body{padding:8px 10px}
.sc-title{font-size:11px;color:#fff;font-weight:500;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;line-height:1.3;margin-bottom:4px}
.sc-meta{font-size:10px;color:var(--sub);margin-bottom:6px}
.sc-btn{display:block;width:100%;padding:5px;border-radius:8px;text-align:center;font-size:11px;font-weight:bold;border:none;cursor:pointer}
.sc-btn.buy{background:var(--primary);color:#000}
.sc-btn.bought{background:rgba(255,255,255,0.08);color:var(--sub)}
.sc-btn.using{background:rgba(82,196,26,0.15);color:var(--green)}
.sc-btn.use{background:rgba(255,255,255,0.08);color:#fff}
.sc-time{font-size:9px;color:var(--sub);margin-top:4px}
.sc-del{position:absolute;top:4px;right:4px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,0.6);color:#fff;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.type-tag{display:inline-block;padding:1px 5px;border-radius:3px;font-size:9px;font-weight:bold;margin-right:4px}
.type-tag.full{background:rgba(250,173,20,0.15);color:var(--primary)}
.type-tag.boss{background:rgba(245,34,45,0.15);color:var(--red)}
.section-label{padding:12px 16px 4px;font-size:11px;color:var(--sub);font-weight:bold}
/* 详情页 */
.detail{position:absolute;inset:0;background:var(--bg);z-index:350;display:none;flex-direction:column}
.detail.show{display:flex}
.detail-scroll{flex:1;overflow-y:auto}
.d-media{width:100%;height:180px;overflow-x:auto;display:flex;scroll-snap-type:x mandatory;flex-shrink:0}
.d-media img{min-width:100%;height:100%;object-fit:cover;scroll-snap-align:center;flex-shrink:0}
.landscape .detail-scroll{display:flex;flex-direction:row}
.landscape .d-media{width:50%;height:100%;flex-shrink:0;flex-direction:column;overflow-y:auto;overflow-x:hidden}
.landscape .d-media img{min-width:100%;min-height:100%;width:100%}
.landscape .d-info{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column}
.d-info{padding:16px}
.d-title{font-size:16px;font-weight:bold;margin-bottom:8px}
.d-desc{font-size:13px;color:#ccc;line-height:1.6;margin-bottom:12px}
.d-meta{background:var(--card);border-radius:8px;padding:10px;margin-bottom:12px}
.dm-row{display:flex;justify-content:space-between;padding:3px 0;font-size:12px}
.dm-row .l{color:var(--sub)}
.d-footer{padding:10px 16px 20px;border-top:1px solid var(--border);flex-shrink:0}
.d-footer .tip{font-size:10px;color:var(--sub);text-align:center;margin-bottom:6px}
.d-buy{width:100%;padding:12px;border-radius:18px;background:var(--primary);color:#000;text-align:center;font-size:14px;font-weight:bold;cursor:pointer;border:none}
.d-buy.bought{background:rgba(82,196,26,0.15);color:var(--green)}
/* 寄售页 */
.consign{position:absolute;inset:0;background:var(--bg);z-index:360;display:none;flex-direction:column}
.consign.show{display:flex}
.consign-body{flex:1;overflow-y:auto;padding:16px}
.fg{margin-bottom:14px}
.fg label{display:block;font-size:12px;color:var(--sub);margin-bottom:5px;font-weight:500}
.fg input,.fg textarea,.fg select{width:100%;padding:9px 11px;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:8px;color:#fff;font-size:13px;outline:none}
.fg textarea{height:70px;resize:vertical}
.fg input:focus,.fg textarea:focus{border-color:var(--primary)}
.radio-list label{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--card);border-radius:8px;margin-bottom:5px;border:1px solid var(--border);cursor:pointer;font-size:12px}
.radio-list input{accent-color:var(--primary)}
.submit-btn{width:100%;padding:13px;border-radius:18px;background:var(--primary);color:#000;font-size:14px;font-weight:bold;border:none;cursor:pointer;margin-top:8px}
/* 游戏中 */
.ingame{position:absolute;inset:0;background:#111;z-index:300;display:none;flex-direction:row}
.ingame.show{display:flex}
.ig-bg{flex:1;background:url('https://images.unsplash.com/photo-1542751371-adc38448a05e?w=800') center/cover;position:relative}
.ig-bg::after{content:'游戏画面';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(255,255,255,0.2);font-size:12px}
.ig-bar{width:42px;background:rgba(0,0,0,0.9);display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:10px}
.ig-icon{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:13px}
.ig-icon.active{background:var(--primary);color:#000}
.ig-panel{position:absolute;top:0;right:42px;width:280px;height:100%;background:rgba(11,13,18,0.97);border-left:1px solid var(--border);display:none;flex-direction:column;z-index:5}
.ig-panel.show{display:flex}
.ig-head{padding:8px 12px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.ig-head h4{font-size:13px}
.ig-tabs{display:flex;gap:8px;padding:6px 12px;border-bottom:1px solid var(--border)}
.ig-tab{font-size:10px;color:var(--sub);cursor:pointer;padding:3px 8px;border-radius:8px;background:rgba(255,255,255,0.05)}
.ig-tab.active{background:#fff;color:#000;font-weight:bold}
.ig-body{flex:1;overflow-y:auto}
/* 弹窗 */
.modal{position:absolute;inset:0;background:rgba(0,0,0,0.7);z-index:400;display:none;align-items:center;justify-content:center}
.modal.show{display:flex}
.modal-box{background:#1e1e24;width:80%;max-width:300px;border-radius:14px;padding:18px;position:relative}
.modal-box h3{font-size:14px;margin-bottom:8px;padding-right:24px}
.modal-box p{font-size:11px;color:var(--sub);line-height:1.6;white-space:pre-line;margin-bottom:14px}
.modal-close{position:absolute;top:12px;right:14px;cursor:pointer;color:var(--sub);font-size:16px}
.modal-btns{display:flex;gap:8px}
.modal-btns button{flex:1;padding:9px;border-radius:10px;font-size:13px;font-weight:bold;cursor:pointer;border:none}
.mbtn-cancel{background:rgba(255,255,255,0.1);color:#fff}
.mbtn-confirm{background:var(--primary);color:#000}
.toast{position:absolute;top:60px;left:50%;transform:translateX(-50%);background:#fff;color:#000;padding:7px 16px;border-radius:12px;font-size:12px;font-weight:bold;opacity:0;transition:0.3s;z-index:500;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="ctrl-btns">
<button class="ctrl-btn" onclick="toggleOrient()">🔄 横竖屏</button>
<button class="ctrl-btn" onclick="enterIngame()">🎮 游戏中模式</button>
</div>
<div id="app" class="portrait">
<div class="top-bar"><span class="back" onclick="showToast('返回')">‹</span><span class="title">GTA V</span><span class="guide" onclick="showGuide()">❓说明</span></div>
<div class="tabs">
<div class="tab" onclick="showToast('详情')">详情</div>
<div class="tab" onclick="showToast('社区')">社区</div>
<div class="tab active">存档</div>
</div>
<div class="sub-tabs">
<div class="stab active" onclick="switchSub('plaza',this)">存档广场</div>
<div class="stab" onclick="switchSub('mine',this)">我的存档</div>
</div>
<div class="scroll">
<div id="sec-plaza" class="save-grid"></div>
<div id="sec-mine" style="display:none"></div>
</div>
<!-- 详情页 -->
<div class="detail" id="detailPage">
<div class="top-bar"><span class="back" onclick="closeDetail()">‹</span><span class="title">存档详情</span></div>
<div class="detail-scroll" id="detailScroll">
<div class="d-media" id="dMedia"></div>
<div class="d-info" id="dInfo"></div>
</div>
<div class="d-footer"><div class="tip">存档为虚拟商品，购买后不支持退款</div><button class="d-buy" id="dBuy"></button></div>
</div>
<!-- 寄售页 -->
<div class="consign" id="consignPage">
<div class="top-bar"><span class="back" onclick="closeConsign()">‹</span><span class="title">寄售存档</span></div>
<div class="consign-body">
<div class="fg"><label>* 选择存档</label><div class="radio-list" id="consignFiles"></div></div>
<div class="fg"><label>关联游戏</label><div style="padding:9px 11px;background:var(--card);border-radius:8px;border:1px solid var(--border);font-size:13px">GTA V（当前游戏）</div></div>
<div class="fg"><label>* 标题</label><input id="cTitle" placeholder="如：全BOSS击杀存档"></div>
<div class="fg"><label>* 内容描述</label><textarea id="cDesc" placeholder="描述存档内容..."></textarea></div>
<div class="fg"><label>上传图片（首张作封面）</label><div style="display:flex;gap:8px"><div style="width:60px;height:60px;border-radius:8px;border:1px dashed var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--sub)" onclick="showToast('选择图片')">+</div></div></div>
<div class="fg"><label>价格</label><div style="padding:9px 11px;background:var(--card);border-radius:8px;border:1px solid var(--border);color:var(--primary);font-weight:bold">¥6.00（固定价格）</div><div style="font-size:10px;color:var(--sub);margin-top:4px">每成交1次，赠送30分钟云游时长</div></div>
<button class="submit-btn" onclick="submitConsign()">确认寄售</button>
</div>
</div>
<!-- 游戏中 -->
<div class="ingame" id="ingame">
<div class="ig-bg"></div>
<div class="ig-panel" id="igPanel">
<div class="ig-head"><h4>存档管理</h4><span style="font-size:10px;color:var(--sub);cursor:pointer;padding:2px 6px;border:1px solid var(--border);border-radius:6px" onclick="showGuide()">❓说明</span></div>
<div class="ig-tabs"><div class="ig-tab active" onclick="switchIg('market',this)">存档广场</div><div class="ig-tab" onclick="switchIg('my',this)">我的存档</div></div>
<div class="ig-body" id="igBody"></div>
</div>
<div class="ig-bar">
<div class="ig-icon" onclick="exitIngame()">‹</div>
<div class="ig-icon" onclick="showToast('键盘')">⌨</div>
<div class="ig-icon" onclick="showToast('手柄')">🎮</div>
<div class="ig-icon active" onclick="toggleIgPanel()">💾</div>
<div class="ig-icon" onclick="showToast('设置')">⚙</div>
</div>
</div>
<!-- 弹窗 -->
<div class="modal" id="modal" onclick="if(event.target===this)closeModal()">
<div class="modal-box"><span class="modal-close" id="mClose" onclick="closeModal()">×</span><h3 id="mTitle"></h3><p id="mDesc"></p><div class="modal-btns" id="mBtns"><button class="mbtn-cancel" onclick="closeModal()">取消</button><button class="mbtn-confirm" onclick="modalConfirm()">确认</button></div></div>
</div>
<div class="toast" id="toast"></div>
</div>
<script>
var saves=[
{id:1,title:'500多万CR，440辆车全收集',type:'通关存档',price:6,buyers:877,desc:'包含440辆改装车辆全部调校完毕，CR余额500万+。',size:'12.3 MB',cover:'https://images.unsplash.com/photo-1542751371-adc38448a05e?w=400',imgs:['https://images.unsplash.com/photo-1542751371-adc38448a05e?w=600','https://images.unsplash.com/photo-1493711662062-fa541adb3fc8?w=600','https://images.unsplash.com/photo-1511512578047-dfb367046420?w=600']},
{id:2,title:'线上模式满级+全武器+1000万',type:'通关存档',price:6,buyers:1200,desc:'线上等级200+，全武器MK2改装，现金1000万。',size:'8.7 MB',cover:'https://images.unsplash.com/photo-1493711662062-fa541adb3fc8?w=400',imgs:['https://images.unsplash.com/photo-1493711662062-fa541adb3fc8?w=600','https://images.unsplash.com/photo-1542751371-adc38448a05e?w=600']},
{id:3,title:'全BOSS击杀存档（含DLC）',type:'BOSS存档',price:6,buyers:644,desc:'全部BOSS击杀完成含DLC。',size:'15.1 MB',cover:'https://images.unsplash.com/photo-1511512578047-dfb367046420?w=400',imgs:['https://images.unsplash.com/photo-1511512578047-dfb367046420?w=600']},
{id:4,title:'96辆车3000U全改装',type:'通关存档',price:6,buyers:234,desc:'精选96辆热门车辆全部改装。',size:'6.2 MB',cover:'https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=400',imgs:['https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=600']},
{id:5,title:'单人模式100%全收集',type:'通关存档',price:6,buyers:156,desc:'单人100%完成度，三角色全满技能。',size:'9.8 MB',cover:'https://images.unsplash.com/photo-1606144042614-b2417e99c4e3?w=400',imgs:['https://images.unsplash.com/photo-1606144042614-b2417e99c4e3?w=600']}
];
var autoSaves=[{name:'autosave_01.dat',size:'8.0 MB',time:'2026-05-27 16:00'},{name:'autosave_02.dat',size:'7.8 MB',time:'2026-05-25 14:30'},{name:'autosave_03.dat',size:'8.1 MB',time:'2026-05-23 09:15'}];
var consignSaves=[];
var bought=new Set();
var activeIdx=-1;
var curIdx=0;
var pendingAction='';

function renderPlaza(){
var h='';
saves.forEach(function(s,i){
var cls=s.type==='BOSS存档'?'boss':'full';
var isA=activeIdx===i;
var btn=isA?'<button class="sc-btn using">使用中</button>':'<button class="sc-btn buy">¥6.00 购买</button>';
h+='<div class="save-card" onclick="openDetail('+i+')"><img src="'+s.cover+'"><div class="sc-body"><div class="sc-title"><span class="type-tag '+cls+'">'+s.type+'</span>'+s.title+'</div><div class="sc-meta">'+s.buyers+'人已购买</div>'+btn+'</div></div>';
});
document.getElementById('sec-plaza').innerHTML=h;
}

function renderMine(){
var h='';
// 本地存档
h+='<div class="section-label" style="display:flex;justify-content:space-between;align-items:center">本地存档（'+autoSaves.length+'/4）<span style="font-size:11px;color:var(--primary);cursor:pointer;font-weight:bold" onclick="event.stopPropagation();doImportSave()">+ 导入</span></div><div class="save-grid">';
autoSaves.forEach(function(s){
h+='<div class="save-card" style="position:relative"><div style="height:50px;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:20px">💾</div><div class="sc-body"><div class="sc-title">'+s.name+'</div><div class="sc-time">'+s.time+'</div></div></div>';
});
h+='</div>';
// 已购存档
h+='<div class="section-label">已购存档（'+bought.size+'）</div><div class="save-grid">';
if(bought.size>0){
bought.forEach(function(idx){
var s=saves[idx];var isA=activeIdx===idx;
var btn=isA?'<button class="sc-btn using">使用中</button>':'<button class="sc-btn use" onclick="event.stopPropagation();doUse('+idx+')">使用</button>';
h+='<div class="save-card" onclick="openDetail('+idx+')"><img src="'+s.cover+'"><div class="sc-body"><div class="sc-title">'+s.title+'</div>'+btn+'</div></div>';
});
}else{h+='<div style="grid-column:1/-1;padding:20px;text-align:center;color:var(--sub);font-size:12px">暂无已购存档</div>';}
h+='</div>';
// 寄售存档
h+='<div class="section-label">我的寄售（'+consignSaves.length+'/4）</div><div class="save-grid">';
if(consignSaves.length>0){
consignSaves.forEach(function(c,ci){
h+='<div class="save-card" style="position:relative"><div style="height:50px;background:linear-gradient(135deg,#1a2940,#0d1b2a);display:flex;align-items:center;justify-content:center;font-size:16px">🏷️</div><div class="sc-del" onclick="event.stopPropagation();delConsign('+ci+')">×</div><div class="sc-body"><div class="sc-title">'+c.title+'</div><div class="sc-meta">已售'+c.sold+'份 · 获'+c.sold*30+'分钟</div></div></div>';
});
}else{h+='<div style="grid-column:1/-1;padding:20px;text-align:center;color:var(--sub);font-size:12px">暂无寄售</div>';}
h+='</div>';
h+='<div style="padding:12px 16px"><button style="width:100%;padding:10px;border-radius:10px;background:transparent;border:1px dashed var(--border);color:var(--sub);font-size:12px;cursor:pointer" onclick="openConsign()">🏷️ 寄售存档</button></div>';
document.getElementById('sec-mine').innerHTML=h;
}

function switchSub(type,el){
document.querySelectorAll('.stab').forEach(function(t){t.classList.remove('active')});
el.classList.add('active');
document.getElementById('sec-plaza').style.display=type==='plaza'?'grid':'none';
document.getElementById('sec-mine').style.display=type==='mine'?'block':'none';
if(type==='mine')renderMine();
}

function openDetail(idx){
curIdx=idx;var s=saves[idx];
document.getElementById('dMedia').innerHTML=s.imgs.map(function(u){return '<img src="'+u+'">';}).join('');
var info='<div class="d-title">'+s.title+'</div><div class="d-desc">'+s.desc+'</div><div class="d-meta"><div class="dm-row"><span class="l">类型</span><span>'+s.type+'</span></div><div class="dm-row"><span class="l">大小</span><span>'+s.size+'</span></div><div class="dm-row"><span class="l">已购买</span><span>'+s.buyers+'人</span></div></div>';
document.getElementById('dInfo').innerHTML=info;
var btn=document.getElementById('dBuy');
btn.textContent='¥6.00 购买';btn.className='d-buy';btn.onclick=function(){doBuy()};
document.getElementById('detailPage').classList.add('show');
}
function closeDetail(){document.getElementById('detailPage').classList.remove('show')}

function doBuy(){showModal('确认购买','确认支付 ¥6.00 购买此存档？\n存档为虚拟商品，购买后不支持退款。','buy')}
function doUse(idx){curIdx=idx;showModal('确认加载存档','加载此存档将覆盖当前游戏进度，是否继续？','use')}

function showModal(t,d,action){
document.getElementById('mTitle').textContent=t;
document.getElementById('mDesc').textContent=d;
document.getElementById('mBtns').style.display='flex';
document.getElementById('mClose').style.display='none';
pendingAction=action;
document.getElementById('modal').classList.add('show');
}
function showGuide(){
document.getElementById('mTitle').textContent='存档说明';
document.getElementById('mDesc').textContent='• 购买的存档可在"我的存档"中使用\n• 使用存档会覆盖当前游戏进度\n• 存档为虚拟商品，购买后不支持退款\n• 本地存档每次退出游戏时自动保存\n• 支持导入外部存档文件\n• 寄售存档每成交1次赠送30分钟云游时长';
document.getElementById('mBtns').style.display='none';
document.getElementById('mClose').style.display='block';
document.getElementById('modal').classList.add('show');
}
function closeModal(){document.getElementById('modal').classList.remove('show')}
function modalConfirm(){
closeModal();
if(pendingAction==='buy'){
bought.add(curIdx);saves[curIdx].buyers++;
closeDetail();
switchSub('mine',document.querySelectorAll('.stab')[1]);
renderMine();
showToast('购买成功！已加入我的存档');
}else if(pendingAction==='use'){
activeIdx=curIdx;renderMine();renderPlaza();
showToast('存档已加载！重启游戏生效');
}
}

function openConsign(){
var fl=document.getElementById('consignFiles');
fl.innerHTML=autoSaves.map(function(s,i){return '<label style="display:flex;align-items:center;gap:10px"><div style="flex:4;display:flex;flex-direction:column;gap:2px"><span style="font-size:12px;color:#fff">💾 '+s.name+'</span><span style="font-size:10px;color:var(--sub)">'+s.time+' · '+s.size+'</span></div><div style="flex:1;display:flex;justify-content:flex-end"><input type="radio" name="cf" value="'+i+'"'+(i===0?' checked':'')+'></div></label>';}).join('');
document.getElementById('consignPage').classList.add('show');
}
function closeConsign(){document.getElementById('consignPage').classList.remove('show')}
function submitConsign(){
var t=document.getElementById('cTitle').value;
if(!t){showToast('请填写标题');return;}
if(consignSaves.length>=4){showToast('寄售存档最多4个');return;}
consignSaves.push({title:t,sold:0});
closeConsign();renderMine();showToast('寄售成功！已上架');
document.getElementById('cTitle').value='';document.getElementById('cDesc').value='';
}
function delConsign(i){consignSaves.splice(i,1);renderMine();showToast('已删除');}

function doImportSave(){
if(autoSaves.length>=4){showToast('本地存档最多4个');return;}
var name='imported_'+new Date().toTimeString().slice(0,5).replace(':','')+'.dat';
autoSaves.push({name:name,size:'9.2 MB',time:new Date().toLocaleString('zh-CN')});
renderMine();
try{renderIgMine();}catch(e){}
showToast('导入成功：'+name);
}

function toggleOrient(){document.getElementById('app').classList.toggle('portrait');document.getElementById('app').classList.toggle('landscape')}
function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2000)}

// 游戏中
function enterIngame(){document.getElementById('app').classList.remove('portrait');document.getElementById('app').classList.add('landscape');document.getElementById('ingame').classList.add('show');document.getElementById('igPanel').classList.add('show');renderIgPlaza();}
function exitIngame(){document.getElementById('ingame').classList.remove('show');document.getElementById('app').classList.remove('landscape');document.getElementById('app').classList.add('portrait')}
function toggleIgPanel(){document.getElementById('igPanel').classList.toggle('show')}
function switchIg(type,el){document.querySelectorAll('.ig-tab').forEach(function(t){t.classList.remove('active')});el.classList.add('active');if(type==='market')renderIgPlaza();else renderIgMine();}

function renderIgPlaza(){
var h='<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:6px 8px">';
saves.forEach(function(s,i){
var b=bought.has(i);var isA=activeIdx===i;
var st=isA?'<span style="color:var(--green);font-size:9px">使用中</span>':b?'<span style="color:var(--sub);font-size:9px">已购</span>':'<span style="color:var(--primary);font-size:9px;font-weight:bold">¥6</span>';
h+='<div style="background:var(--card);border-radius:6px;overflow:hidden;border:1px solid var(--border);cursor:pointer" onclick="igDetail('+i+')"><img src="'+s.cover+'" style="width:100%;height:50px;object-fit:cover;display:block"><div style="padding:6px"><div style="font-size:10px;color:#fff;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:3px">'+s.title+'</div><div style="display:flex;justify-content:space-between;align-items:center"><span style="font-size:9px;color:var(--sub)">'+s.buyers+'人</span>'+st+'</div></div></div>';
});
h+='</div>';
document.getElementById('igBody').innerHTML=h;
}

function renderIgMine(){
var h='<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 10px;font-size:10px;color:var(--sub);border-bottom:1px solid var(--border)"><span>本地存档</span><span style="color:var(--primary);cursor:pointer;font-weight:bold" onclick="doImportSave()">+ 导入</span></div>';
h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:6px 8px">';
// 本地存档
autoSaves.forEach(function(s){
h+='<div style="background:var(--card);border-radius:6px;overflow:hidden;border:1px solid var(--border)"><div style="height:40px;background:rgba(255,255,255,0.03);display:flex;align-items:center;justify-content:center;font-size:14px">💾</div><div style="padding:6px"><div style="font-size:10px;color:#fff;margin-bottom:2px">'+s.name+'</div><div style="font-size:9px;color:var(--sub)">'+s.time+'</div></div></div>';
});
h+='</div>';
// 已购存档
h+='<div style="padding:4px 8px;font-size:10px;color:var(--sub);border-bottom:1px solid var(--border)">已购存档</div>';
h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:6px 8px">';
if(bought.size>0){
bought.forEach(function(idx){
var s=saves[idx];var isA=activeIdx===idx;
var btn=isA?'<div style="text-align:center;padding:3px;font-size:9px;color:var(--green);font-weight:bold">使用中</div>':'<div style="text-align:center;padding:3px;font-size:9px;color:#fff;background:rgba(255,255,255,0.08);border-radius:4px;cursor:pointer" onclick="event.stopPropagation();igUse('+idx+')">使用</div>';
h+='<div style="background:var(--card);border-radius:6px;overflow:hidden;border:1px solid var(--border);cursor:pointer" onclick="igDetail('+idx+')"><img src="'+s.cover+'" style="width:100%;height:40px;object-fit:cover;display:block"><div style="padding:6px"><div style="font-size:10px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px">'+s.title+'</div>'+btn+'</div></div>';
});
}else{h+='<div style="grid-column:1/-1;padding:12px;text-align:center;color:var(--sub);font-size:10px">暂无</div>';}
h+='</div>';
// 寄售入口
h+='<div style="padding:6px 8px"><button style="width:100%;padding:6px;border-radius:6px;background:transparent;border:1px dashed var(--border);color:var(--sub);font-size:10px;cursor:pointer" onclick="showToast(\'请在主界面我的存档中寄售\')">🏷️ 寄售存档</button></div>';
document.getElementById('igBody').innerHTML=h;
}

function igDetail(idx){
var s=saves[idx];var b=bought.has(idx);
var h='<div style="padding:10px"><div style="cursor:pointer;color:var(--sub);font-size:11px;margin-bottom:8px" onclick="renderIgPlaza()">‹ 返回</div>';
h+='<img src="'+s.cover+'" style="width:100%;height:80px;object-fit:cover;border-radius:6px;margin-bottom:8px">';
h+='<div style="font-size:13px;font-weight:bold;margin-bottom:6px">'+s.title+'</div>';
h+='<div style="font-size:11px;color:#ccc;line-height:1.5;margin-bottom:8px">'+s.desc+'</div>';
h+='<div style="font-size:10px;color:var(--sub);margin-bottom:10px">'+s.type+' · '+s.size+' · '+s.buyers+'人已购买</div>';
if(b){h+='<button style="width:100%;padding:8px;border-radius:10px;background:rgba(82,196,26,0.15);color:var(--green);font-size:12px;font-weight:bold;border:none">已购买</button>';}
else{h+='<button style="width:100%;padding:8px;border-radius:10px;background:var(--primary);color:#000;font-size:12px;font-weight:bold;border:none;cursor:pointer" onclick="igBuy('+idx+')">¥6.00 购买</button>';}
h+='</div>';
document.getElementById('igBody').innerHTML=h;
}
function igBuy(idx){if(confirm('确认支付 ¥6.00？')){bought.add(idx);saves[idx].buyers++;renderIgMine();switchIg('my',document.querySelectorAll('.ig-tab')[1]);showToast('购买成功！已加入我的存档');}}
function igUse(idx){if(confirm('确认加载存档吗？')){activeIdx=idx;renderIgMine();renderPlaza();renderMine();showToast('存档已加载');}}

renderPlaza();
</script>
</body>
</html>
