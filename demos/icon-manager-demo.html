<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>官方图标管理</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1890ff;
            --success: #52c41a;
            --danger:  #ff4d4f;
            --warning: #faad14;
            --bg-dark:  #001529;
            --bg-page:  #f0f2f5;
            --border:       #d9d9d9;
            --border-light: #f0f0f0;
            --text-main: #333;
            --text-sub:  #888;
            --white: #fff;
        }

        * { margin:0; padding:0; box-sizing:border-box;
            font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
        body { background:var(--bg-page); color:var(--text-main); display:flex; height:100vh; overflow:hidden; }

        /* ── 侧边栏 ──────────────────────────────────── */
        .sidebar { width:200px; background:var(--bg-dark); color:rgba(255,255,255,.65);
                   display:flex; flex-direction:column; flex-shrink:0; }
        .logo { height:64px; display:flex; align-items:center; justify-content:center;
                font-size:16px; font-weight:700; color:#fff; background:#002140;
                gap:8px; letter-spacing:.5px; flex-shrink:0; }
        .logo i { color:var(--primary); font-size:18px; }
        .menu { flex:1; padding-top:6px; }
        .menu-item { padding:13px 20px 13px 24px; cursor:pointer; display:flex;
                     align-items:center; gap:10px; font-size:13px; transition:.2s; }
        .menu-item:hover { color:#fff; background:rgba(255,255,255,.05); }
        .menu-item.active { background:var(--primary); color:#fff; }

        /* ── 主区域 ──────────────────────────────────── */
        .main { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:800px; }

        .topbar { height:56px; background:#fff;
                  box-shadow:0 1px 4px rgba(0,21,41,.08);
                  display:flex; align-items:center; justify-content:space-between;
                  padding:0 24px; flex-shrink:0; z-index:10; }
        .topbar-bc { font-size:13px; color:var(--text-sub); }
        .topbar-bc span { color:var(--text-main); font-weight:600; }
        .topbar-user { display:flex; align-items:center; gap:8px; font-size:13px;
                       cursor:pointer; padding:4px 8px; border-radius:4px; }
        .topbar-user:hover { background:var(--bg-page); }
        .avatar { width:28px; height:28px; border-radius:50%; background:var(--primary);
                  color:#fff; display:flex; align-items:center; justify-content:center;
                  font-size:12px; font-weight:700; }

        .content { flex:1; overflow-y:auto; padding:20px 24px;
                   display:flex; flex-direction:column; gap:12px; }

        /* ── 卡片 ────────────────────────────────────── */
        .card { background:#fff; border-radius:4px; box-shadow:0 1px 3px rgba(0,0,0,.06); }
        .card-body { padding:16px 20px; }

        /* ── 按钮 ────────────────────────────────────── */
        .btn { padding:0 14px; height:32px; border-radius:4px; font-size:13px; cursor:pointer;
               border:1px solid transparent; transition:.2s;
               display:inline-flex; align-items:center; gap:5px; white-space:nowrap; }
        .btn-primary  { background:var(--primary); color:#fff; border-color:var(--primary); }
        .btn-primary:hover  { background:#40a9ff; border-color:#40a9ff; }
        .btn-default  { border-color:var(--border); background:#fff; color:var(--text-main); }
        .btn-default:hover  { border-color:var(--primary); color:var(--primary); }
        .btn-danger   { background:var(--danger); color:#fff; border-color:var(--danger); }
        .btn-danger:hover   { background:#ff7875; }
        .btn[disabled] { opacity:.45; cursor:not-allowed; pointer-events:none; }
        .btn-sm { height:26px; padding:0 10px; font-size:12px; }

        /* ── 筛选行 ──────────────────────────────────── */
        .filter-row { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
        .fi { display:flex; align-items:center; gap:6px; font-size:13px; }
        .fi label { color:var(--text-sub); white-space:nowrap; }
        .fi input, .fi select {
            padding:5px 10px; border:1px solid var(--border); border-radius:4px;
            font-size:13px; height:32px; outline:none; color:var(--text-main); background:#fff; }
        .fi input:focus, .fi select:focus { border-color:var(--primary); }
        .fi input[type=text] { width:200px; }
        .filter-sep { width:1px; height:20px; background:var(--border-light); margin:0 2px; }

        /* ── 工具栏（上传 + 批量操作） ────────────────── */
        .toolbar { display:flex; align-items:center; gap:8px; }
        .toolbar-left  { display:flex; align-items:center; gap:8px; flex:1; flex-wrap:wrap; }
        .toolbar-right { display:flex; align-items:center; gap:8px; flex-shrink:0; }

        /* 批量操作区（选中后才显示） */
        .batch-zone { display:none; align-items:center; gap:8px; }
        .batch-zone.show { display:flex; }
        .batch-info { font-size:13px; color:var(--primary); font-weight:600; }
        .batch-cancel { font-size:12px; color:var(--text-sub); cursor:pointer; text-decoration:underline; }
        .batch-cancel:hover { color:var(--text-main); }

        /* ── 路径导航 ────────────────────────────────── */
        .path-nav { display:flex; align-items:center; gap:3px; font-size:13px; flex-wrap:wrap;
                    padding:6px 0 2px; }
        .pseg { cursor:pointer; color:var(--primary); padding:2px 5px; border-radius:3px; }
        .pseg:hover { background:#e6f7ff; }
        .pseg.cur { color:var(--text-main); font-weight:600; cursor:default; }
        .pseg.cur:hover { background:none; }
        .psep { color:#ccc; font-size:10px; line-height:1; }

        /* ── 统计 ────────────────────────────────────── */
        .stats { display:flex; gap:16px; font-size:12px; color:var(--text-sub);
                 padding:4px 0 10px; border-bottom:1px solid var(--border-light); margin-bottom:12px; }
        .stats b { color:var(--text-main); }

        /* ── 文件列表表格 ────────────────────────────── */
        .table-wrap { overflow-x:auto; }
        table { width:100%; border-collapse:collapse; font-size:13px; }
        th, td { padding:10px 12px; border-bottom:1px solid var(--border-light);
                 text-align:left; white-space:nowrap; }
        th { background:#fafafa; font-weight:600; color:#555; font-size:12px; }
        tr.data-row:hover td { background:#fafafa; }
        td { vertical-align:middle; }

        .checkbox { width:15px; height:15px; cursor:pointer; accent-color:var(--primary); }

        /* 文件夹行 */
        tr.row-folder { cursor:pointer; }
        tr.row-folder:hover td { background:#fff9e6; }
        .folder-icon-cell { font-size:28px; color:#fac858; line-height:1; }

        /* 图标缩略图 */
        .thumb { width:44px; height:44px; border-radius:4px; border:1px solid var(--border-light);
                 background:#f5f5f5; display:flex; align-items:center; justify-content:center;
                 overflow:hidden; cursor:pointer; flex-shrink:0; }
        .thumb:hover { border-color:var(--primary); }
        .thumb img { width:100%; height:100%; object-fit:contain; }
        .thumb-placeholder { font-size:18px; color:#bbb; }

        /* 格式标签 */
        .tag { padding:1px 7px; border-radius:3px; font-size:11px; font-weight:600; display:inline-block; }
        .tag-PNG  { background:#e6f7ff; color:#096dd9; border:1px solid #91d5ff; }
        .tag-SVG  { background:#f9f0ff; color:#531dab; border:1px solid #d3adf7; }
        .tag-WEBP { background:#f6ffed; color:#389e0d; border:1px solid #b7eb8f; }
        .tag-JPG  { background:#fff7e6; color:#d46b08; border:1px solid #ffd591; }
        .tag-other { background:#fafafa; color:var(--text-sub); border:1px solid var(--border); }

        /* 操作链接 */
        .ops { display:flex; gap:10px; }
        .ops a { color:var(--primary); text-decoration:none; cursor:pointer; font-size:12px; }
        .ops a.del { color:var(--danger); }
        .ops a:hover { opacity:.75; }


        /* ── 分页 ────────────────────────────────────── */
        .pager { display:flex; justify-content:space-between; align-items:center;
                 margin-top:14px; font-size:13px; color:var(--text-sub); }
        .pager-nums { display:flex; gap:5px; }
        .pn { min-width:30px; height:28px; padding:0 6px; display:flex; align-items:center;
              justify-content:center; border:1px solid var(--border); border-radius:4px;
              cursor:pointer; transition:.2s; font-size:12px; }
        .pn.active { background:var(--primary); color:#fff; border-color:var(--primary); }
        .pn:hover:not(.active):not(.disabled) { border-color:var(--primary); color:var(--primary); }
        .pn.disabled { opacity:.4; cursor:not-allowed; }

        /* ── 空状态 ──────────────────────────────────── */
        .empty { text-align:center; padding:52px 0; color:var(--text-sub); }
        .empty i { font-size:42px; color:#ddd; display:block; margin-bottom:10px; }
        .empty p { font-size:14px; }

        /* ── 上传进度（内嵌在工具栏下方） ────────────── */
        .upload-progress { display:none; flex-direction:column; gap:5px;
                           margin-top:10px; max-height:160px; overflow-y:auto; }
        .upload-progress.show { display:flex; }
        .up-row { display:flex; align-items:center; gap:8px;
                  padding:6px 10px; background:#fafafa;
                  border:1px solid var(--border-light); border-radius:4px; }
        .up-row-name { flex:1; font-size:12px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .up-row-bar { width:100px; height:4px; background:var(--border-light); border-radius:2px; overflow:hidden; flex-shrink:0; }
        .up-row-fill { height:100%; background:var(--primary); border-radius:2px; transition:width .25s; }
        .up-row-state { font-size:11px; color:var(--text-sub); flex-shrink:0; width:52px; text-align:right; }
        .up-row-state.done { color:var(--success); }
        .up-row-state.fail { color:var(--danger); }

        /* ── 上传弹窗 ────────────────────────────────── */
        .overlay { position:fixed; inset:0; background:rgba(0,0,0,.42); z-index:1500;
                   display:none; align-items:center; justify-content:center; }
        .overlay.show { display:flex; }
        .modal { background:#fff; border-radius:6px;
                 box-shadow:0 4px 24px rgba(0,0,0,.16);
                 display:flex; flex-direction:column; overflow:hidden; }
        .mhd { padding:14px 20px; border-bottom:1px solid var(--border-light);
               display:flex; justify-content:space-between; align-items:center;
               font-size:15px; font-weight:700; }
        .mhd .x { cursor:pointer; color:var(--text-sub); font-size:20px; line-height:1; }
        .mhd .x:hover { color:var(--danger); }
        .mbd { padding:20px; overflow-y:auto; }
        .mft { padding:12px 20px; border-top:1px solid var(--border-light);
               display:flex; justify-content:flex-end; gap:8px; background:#fafafa; }

        /* 上传拖拽区 */
        .drop-zone { border:2px dashed var(--border); border-radius:6px; padding:28px 20px;
                     text-align:center; cursor:pointer; background:#fafafa; transition:.2s; }
        .drop-zone:hover, .drop-zone.over { border-color:var(--primary); background:#e6f7ff; }
        .drop-zone i { font-size:32px; color:#bbb; display:block; margin-bottom:8px; }
        .drop-zone:hover i, .drop-zone.over i { color:var(--primary); }
        .drop-zone p { font-size:14px; font-weight:500; color:var(--text-main); margin-bottom:4px; }
        .drop-zone small { font-size:12px; color:var(--text-sub); }
        .drop-zone .hl { color:var(--primary); }

        /* 预览弹窗 */
        .prev-img-box { background:#f5f5f5; border-radius:4px; padding:20px;
                        display:flex; align-items:center; justify-content:center; min-height:160px; }
        .prev-img-box img { max-width:100%; max-height:380px; object-fit:contain; border-radius:4px; }
        .prev-meta { display:grid; grid-template-columns:72px 1fr; gap:7px 0; margin-top:14px; font-size:13px; }
        .prev-meta dt { color:var(--text-sub); }
        .prev-meta dd { font-weight:600; color:var(--text-main); }

        /* ── Toast ───────────────────────────────────── */
        #toast { position:fixed; top:-60px; left:50%; transform:translateX(-50%);
                 background:#333; color:#fff; padding:9px 18px; border-radius:4px;
                 font-size:13px; z-index:2000; transition:top .28s;
                 display:flex; align-items:center; gap:7px;
                 box-shadow:0 4px 14px rgba(0,0,0,.2); white-space:nowrap; }
        #toast.show { top:18px; }
        #toast .ico.ok   { color:#73d13d; }
        #toast .ico.err  { color:#ff7875; }
        #toast .ico.warn { color:#ffc53d; }
    </style>
</head>
<body>

<!-- 侧边栏 -->
<aside class="sidebar">
    <div class="logo"><i class="fas fa-gamepad"></i> 盖世运营后台</div>
    <div class="menu">
        <div class="menu-item active">
            <i class="fas fa-icons"></i> 官方图标管理
        </div>
    </div>
</aside>

<!-- 主区域 -->
<main class="main">

    <!-- 顶栏 -->
    <div class="topbar">
        <div class="topbar-bc">首页 / 资源管理 / <span>官方图标管理</span></div>
        <div class="topbar-user">
            <div class="avatar">管</div>
            <span>运营管理员</span>
            <i class="fas fa-caret-down" style="color:var(--text-sub);font-size:11px;"></i>
        </div>
    </div>

    <div class="content">
        <div class="card">
            <div class="card-body">

                <!-- ① 筛选行 -->
                <div class="filter-row" id="prd-filter-row">
                    <div class="fi">
                        <label>搜索</label>
                        <span class="prd-anchor-wrap" id="anc-1">
                            <input type="text" id="inp-search" placeholder="文件夹名 / 图标名" oninput="onFilter()">
                        </span>
                    </div>
                    <div class="fi">
                        <label>格式</label>
                        <select id="inp-format" onchange="onFilter()">
                            <option value="">全部格式</option>
                            <option>PNG</option><option>SVG</option>
                            <option>WEBP</option><option>JPG</option>
                        </select>
                    </div>
                    <div class="fi">
                        <label>类型</label>
                        <select id="inp-type" onchange="onFilter()">
                            <option value="">全部类型</option>
                            <option value="folder">文件夹</option>
                            <option value="file">图标文件</option>
                        </select>
                    </div>
                    <button class="btn btn-default" onclick="resetFilter()">
                        <i class="fas fa-undo"></i> 重置
                    </button>
                </div>

                <div style="height:12px;"></div>

                <!-- ② 工具栏 -->
                <span class="prd-anchor-wrap" id="anc-6" style="display:block;">
                <div class="toolbar" id="prd-toolbar">
                    <div class="toolbar-left">
                        <span class="prd-anchor-wrap" id="anc-2">
                            <button class="btn btn-primary" onclick="openUpload('file')">
                                <i class="fas fa-upload"></i> 上传图标
                            </button>
                        </span>
                        <button class="btn btn-default" onclick="openUpload('folder')">
                            <i class="fas fa-folder-open"></i> 上传文件夹
                        </button>
                        <!-- 批量操作（有选中才显示） -->
                        <div class="batch-zone" id="batch-zone">
                            <span class="batch-info">已选 <span id="batch-n">0</span> 项</span>
                            <button class="btn btn-sm btn-danger" onclick="batchDelete()">
                                <i class="fas fa-trash"></i> 批量删除
                            </button>
                            <span class="batch-cancel" onclick="clearSel()">取消</span>
                        </div>
                    </div>
                    <div class="toolbar-right"></div>
                </div>
                </span><!-- /anc-6 -->

                <!-- 上传进度（展开在工具栏下） -->
                <div class="upload-progress" id="up-progress"></div>

                <div style="height:14px;"></div>

                <!-- ③ 路径导航 -->
                <span class="prd-anchor-wrap" id="anc-3" style="display:block;">
                    <div class="path-nav" id="path-nav"></div>
                </span>

                <!-- 统计行 -->
                <div class="stats" id="stats-row"></div>

                <!-- ④⑤ 文件列表表格 -->
                <div class="table-wrap">
                    <table id="main-table">
                        <thead>
                            <tr>
                                <th style="width:36px">
                                    <input type="checkbox" class="checkbox" id="chk-all" onchange="toggleAll(this)">
                                </th>
                                <th style="width:80px">ID</th>
                                <th style="width:60px">内容</th>
                                <th><span class="prd-anchor-wrap" id="anc-5">名称</span></th>
                                <th style="width:90px">格式</th>
                                <th style="width:88px">大小</th>
                                <th style="width:130px">上传时间</th>
                                <th style="width:90px">上传人</th>
                                <th style="width:110px; position:relative;"><span class="prd-anchor-wrap" id="anc-4">操作</span></th>
                            </tr>
                        </thead>
                        <tbody id="tbody"></tbody>
                    </table>
                    <div class="empty" id="empty" style="display:none">
                        <i class="fas fa-folder-open"></i>
                        <p>当前目录暂无内容</p>
                    </div>
                </div>

                <!-- 分页 -->
                <div class="pager" id="pager">
                    <span style="font-size:13px;color:var(--text-sub)">
                        共 <b id="total-n">0</b> 项，每页 10 条
                    </span>
                    <div class="pager-nums" id="pager-nums"></div>
                </div>

            </div>
        </div>
    </div><!-- /content -->

</main>

<!-- ── 上传弹窗 ──────────────────────────────────── -->
<div class="overlay" id="modal-upload">
    <div class="modal" style="width:480px;">
        <div class="mhd">
            <span id="upload-title">上传图标</span>
            <span class="x" onclick="closeModal('modal-upload')">×</span>
        </div>
        <div class="mbd">
            <div class="drop-zone" id="drop-zone"
                 ondragover="dzOver(event)" ondragleave="dzLeave(event)" ondrop="dzDrop(event)"
                 onclick="dzClick()">
                <i class="fas fa-cloud-upload-alt" id="dz-icon"></i>
                <p id="dz-title">点击或拖拽文件到此上传</p>
                <small id="dz-hint">支持 PNG、SVG、WEBP、JPG，单文件 ≤ 2MB</small>
            </div>
            <input type="file" id="inp-file-hidden" multiple accept="image/*"
                   style="display:none" onchange="onPickFiles(event)">
            <input type="file" id="inp-folder-hidden" webkitdirectory multiple accept="image/*"
                   style="display:none" onchange="onPickFolder(event)">

            <!-- 弹窗内进度列表 -->
            <div id="modal-progress" style="margin-top:12px;display:flex;flex-direction:column;gap:6px;max-height:200px;overflow-y:auto;"></div>
        </div>
        <div class="mft">
            <button class="btn btn-default" onclick="closeModal('modal-upload')">关闭</button>
        </div>
    </div>
</div>

<!-- ── 预览弹窗 ──────────────────────────────────── -->
<div class="overlay" id="modal-preview">
    <div class="modal" style="width:500px;">
        <div class="mhd">
            <span id="prev-title">图标预览</span>
            <span class="x" onclick="closeModal('modal-preview')">×</span>
        </div>
        <div class="mbd">
            <div class="prev-img-box">
                <img id="prev-img" src="" alt="">
            </div>
            <dl class="prev-meta">
                <dt>名称</dt><dd id="pm-name">-</dd>
                <dt>格式</dt><dd id="pm-fmt">-</dd>
                <dt>大小</dt><dd id="pm-size">-</dd>
                <dt>路径</dt><dd id="pm-path" style="word-break:break-all;white-space:normal;">-</dd>
                <dt>上传时间</dt><dd id="pm-time">-</dd>
                <dt>上传人</dt><dd id="pm-uploader">-</dd>
            </dl>
        </div>
        <div class="mft">
            <button class="btn btn-default" onclick="closeModal('modal-preview')">关闭</button>
            <button class="btn btn-primary" onclick="doDownload()">
                <i class="fas fa-download"></i> 下载
            </button>
        </div>
    </div>
</div>

<!-- Toast -->
<div id="toast">
    <i class="fas fa-check-circle ico ok" id="t-ico"></i>
    <span id="t-msg"></span>
</div>

<!-- ════════════════════════════════════════════════
     JS
════════════════════════════════════════════════ -->
<script>
/* ── 数据结构 ────────────────────────────────────────────
   节点: { type:'folder'|'file', id, parentId, name,
           children(folder), format, size, uploadTime, uploader, dataUrl }
   id — 系统自动生成的唯一整数 ID
────────────────────────────────────────────────────── */
let _id = 1;
const ROOT = 0;
const db = { [ROOT]: { type:'folder', id:ROOT, parentId:null, name:'root', children:[] } };

let currentPath = [ROOT];
let selected    = new Set();
let page        = 1;
const PAGE      = 10;
let prevNode    = null;
let uploadMode  = 'file';

/* ── Mock 数据 ──────────────────────────────────────── */
const MC = ['#f97316','#3b82f6','#10b981','#8b5cf6','#ef4444','#f59e0b','#14b8a6','#6366f1','#ec4899','#0ea5e9'];
const MF = ['PNG','SVG','WEBP','PNG','PNG','SVG','JPG','PNG'];
const MS = ['12.4 KB','3.2 KB','8.7 KB','22.1 KB','5.0 KB','14.3 KB','7.8 KB','9.6 KB'];

function mockSvg(c) {
    return `data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80'><rect width='80' height='80' rx='8' fill='${enc(c)}22'/><text x='40' y='52' text-anchor='middle' font-size='30' fill='${enc(c)}' font-family='sans-serif'>◈</text></svg>`;
}
function enc(s){ return encodeURIComponent(s); }
function mockTime(daysAgo, h, m){
    const d = new Date(); d.setDate(d.getDate()-daysAgo);
    return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())} ${p2(h)}:${p2(m)}`;
}
function p2(n){ return String(n).padStart(2,'0'); }
function now(){ const d=new Date(); return `${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())} ${p2(d.getHours())}:${p2(d.getMinutes())}`; }

(function seed(){

/* ── 路径导航 ───────────────────────────────────────── */
function renderPath(){
    const nav = document.getElementById('path-nav');
    nav.innerHTML = currentPath.map((id,i)=>{
        const node = db[id];
        const isLast = i===currentPath.length-1;
        const label = id===ROOT

            : node.name;
        return isLast
            ? `<span class="pseg cur">${label}</span>`
            : `<span class="pseg" onclick="navTo(${i})">${label}</span>
               <span class="psep"><i class="fas fa-chevron-right"></i></span>`;

}

    const files   = dir.children.filter(n=>n.type==='file').length;
    document.getElementById('stats-row').innerHTML =

/* ── 筛选 + 排序 ────────────────────────────────────── */
function filteredRows(){
    const dir = curDir();
    const kw  = document.getElementById('inp-search').value.trim().toLowerCase();
    const fmt = document.getElementById('inp-format').value;
    const typ = document.getElementById('inp-type').value;

    let rows = [...dir.children];
    if(kw)  rows = rows.filter(n => n.name.toLowerCase().includes(kw));
    if(fmt) rows = rows.filter(n => n.type==='file' && n.format===fmt);
    if(typ) rows = rows.filter(n => n.type===typ);

    // 文件夹优先，再按名称升序
    rows.sort((a,b)=>{
        if(a.type !== b.type) return a.type==='folder' ? -1 : 1;
        return a.name.localeCompare(b.name, 'zh-CN');
    });
    return rows;
}

/* ── 导航 ───────────────────────────────────────────── */
function curDir(){ return db[currentPath[currentPath.length-1]]; }

function enterDir(id){
    currentPath.push(id); page=1; selected.clear(); render();
}

function navTo(idx){
    currentPath = currentPath.slice(0,idx+1); page=1; selected.clear(); render();
}

/* ── 筛选 UI ────────────────────────────────────────── */
function onFilter(){ page=1; renderTable(); }
function resetFilter(){
    document.getElementById('inp-search').value='';
    document.getElementById('inp-format').value='';
    document.getElementById('inp-type').value='';

/* ── 选择 ───────────────────────────────────────────── */
function toggleAll(cb){
    const slice = filteredRows().slice((page-1)*PAGE, page*PAGE);
    slice.forEach(n=> cb.checked ? selected.add(n.id) : selected.delete(n.id));
    renderTable();
}
function toggleOne(id,cb){
    cb.checked ? selected.add(id) : selected.delete(id);
    syncChkAll(); updateBatch();
}
function syncChkAll(){
    const slice = filteredRows().slice((page-1)*PAGE, page*PAGE);
    document.getElementById('chk-all').checked =
        slice.length>0 && slice.every(n=>selected.has(n.id));
}
function updateBatch(){
    const n = selected.size;
    document.getElementById('batch-n').textContent = n;
    document.getElementById('batch-zone').classList.toggle('show', n>0);
}
function clearSel(){ selected.clear(); renderTable(); }

/* ── 删除 ───────────────────────────────────────────── */
function delNode(id){
    const node = db[id];
    if(!node) return;
    const label = node.type==='folder' ? `文件夹「${node.name}」（含内部全部内容）` : `「${node.name}.${node.format?.toLowerCase()}」`;
    if(!confirm(`确认删除 ${label}？`)) return;
    removeRec(id);
    selected.delete(id);
    page=1; render();
    toast('ok','已删除');
}

function batchDelete(){
    if(!selected.size) return;
    if(!confirm(`确认删除选中的 ${selected.size} 项（含文件夹将递归删除）？`)) return;
    [...selected].forEach(removeRec);
    selected.clear();
    page=1; render();
    toast('ok',`已删除所选项`);
}

function removeRec(id){
    const node = db[id]; if(!node) return;
    if(node.type==='folder') [...node.children].forEach(c=>removeRec(c.id));
    const p = db[node.parentId];
    if(p) p.children = p.children.filter(c=>c.id!==id);
    delete db[id];
}

/* ── 预览 ───────────────────────────────────────────── */
function openPreview(id){
    const n = db[id]; if(!n) return;
    prevNode = n;
    document.getElementById('prev-title').textContent = n.name+'.'+n.format.toLowerCase();
    document.getElementById('prev-img').src = n.dataUrl;
    document.getElementById('pm-name').textContent  = n.name+'.'+n.format.toLowerCase();
    document.getElementById('pm-fmt').textContent   = n.format;
    document.getElementById('pm-size').textContent  = n.size;
    document.getElementById('pm-time').textContent     = n.uploadTime;
    document.getElementById('pm-uploader').textContent = n.uploader||'—';
    document.getElementById('pm-path').textContent     = buildPath(id);
    openModal('modal-preview');
}

function buildPath(id){
    const parts=[];
    let cur=db[id];
    while(cur && cur.id!==ROOT){
        parts.unshift(cur.name+(cur.type==='file'?'.'+cur.format.toLowerCase():''));
        cur=db[cur.parentId];
    }
    return '/ '+parts.join(' / ');
}

function doDownload(){
    if(!prevNode) return;
    toast('ok',`已下载 ${prevNode.name}.${prevNode.format.toLowerCase()}`);
    closeModal('modal-preview');
}

/* ── 上传弹窗 ───────────────────────────────────────── */
function openUpload(mode){
    uploadMode = mode;
    const isFolder = mode==='folder';
    document.getElementById('upload-title').textContent = isFolder ? '上传文件夹' : '上传图标';
    document.getElementById('dz-icon').className = isFolder ? 'fas fa-folder-open' : 'fas fa-cloud-upload-alt';

        ? '点击选择文件夹，或将文件夹拖入此处'
        : '点击选择图标文件，或拖拽到此处';
    document.getElementById('dz-hint').textContent = isFolder
        ? '将保留文件夹内部的目录层级结构'
        : '支持 PNG、SVG、WEBP、JPG，单文件 ≤ 2MB';
    document.getElementById('modal-progress').innerHTML='';
    openModal('modal-upload');
}

function dzClick(){
    if(uploadMode==='folder') document.getElementById('inp-folder-hidden').click();
    else document.getElementById('inp-file-hidden').click();
}

function dzOver(e){ e.preventDefault(); document.getElementById('drop-zone').classList.add('over'); }
function dzLeave(e){ document.getElementById('drop-zone').classList.remove('over'); }
function dzDrop(e){
    e.preventDefault();
    document.getElementById('drop-zone').classList.remove('over');
    const items=[...e.dataTransfer.items];
    if(uploadMode==='folder'){
        processDropItems(items);
    } else {
        const files=[...e.dataTransfer.files].filter(f=>f.type.startsWith('image/'));
        ingestFiles(files, curDirId());
    }
}

function curDirId(){ return currentPath[currentPath.length-1]; }

function onPickFiles(e){
    ingestFiles([...e.target.files].filter(f=>f.type.startsWith('image/')), curDirId());
    e.target.value='';
}

function onPickFolder(e){
    ingestFolder([...e.target.files]);
    e.target.value='';
}

/* 文件夹上传：利用 webkitRelativePath 重建目录树 */
function ingestFolder(files){
    if(!files.length) return;
    const dirId = curDirId();
    const pathMap = {}; // relFolderPath -> nodeId

    files.forEach(file=>{
        const parts = file.webkitRelativePath.split('/');
        const segs = parts.slice(0,-1);  // 目录段
        let pid = dirId, key='';
        segs.forEach(seg=>{
            key = key ? key+'/'+seg : seg;
            if(pathMap[key]===undefined){
                const ex = db[pid].children.find(n=>n.type==='folder'&&n.name===seg);
                if(ex){ pathMap[key]=ex.id; }
                else {
                    const nid=_id++;
                    const fn={ type:'folder',id:nid,parentId:pid,name:seg,children:[] };
                    db[nid]=fn; db[pid].children.push(fn);
                    pathMap[key]=nid;
                }
            }
            pid=pathMap[key];
        });
        addFileToDir(file, pid);
    });
    showProgress(files.slice(0,8),'modal-progress');
    render();
    toast('ok',`已导入 ${files.length} 个文件`);
}

/* 拖拽目录（DataTransferItem API） */
function processDropItems(items){
    const promises = items.map(item=>{
        const entry = item.webkitGetAsEntry?.();
        return entry ? readEntry(entry, curDirId()) : Promise.resolve();
    });
    Promise.all(promises).then(()=>{ render(); toast('ok','文件夹已导入'); });
}

function readEntry(entry, pid){
    if(entry.isFile){
        return new Promise(res=>{ entry.file(f=>{ if(f.type.startsWith('image/')) addFileToDir(f,pid); res(); }); });
    }
    const ex = db[pid].children.find(n=>n.type==='folder'&&n.name===entry.name);
    let fid = ex ? ex.id : _id++;
    if(!ex){
        const fn={ type:'folder',id:fid,parentId:pid,name:entry.name,children:[] };
        db[fid]=fn; db[pid].children.push(fn);
    }
    return new Promise(res=>{
        entry.createReader().readEntries(entries=>
            Promise.all(entries.map(e=>readEntry(e,fid))).then(res));
    });
}

/* 普通文件上传 */
function ingestFiles(files, pid){
    if(!files.length) return;
    files.forEach(f=>addFileToDir(f,pid));
    showProgress(files.slice(0,8),'modal-progress');
    render();
    toast('ok',`已上传 ${files.length} 个图标`);
}

function addFileToDir(file, pid){
    const id = _id++;
    const dot = file.name.lastIndexOf('.');
    const name   = dot>-1 ? file.name.slice(0,dot) : file.name;
    const format = (dot>-1 ? file.name.slice(dot+1) : 'PNG').toUpperCase();
    const sz = file.size<1024 ? file.size+' B'
             : file.size<1024*1024 ? (file.size/1024).toFixed(1)+' KB'
             : (file.size/1024/1024).toFixed(2)+' MB';
    const color = MC[id % MC.length];
    const node = { type:'file',id,parentId:pid,name,format,size:sz,
                   uploadTime:now(), uploader:'运营管理员', dataUrl:mockSvg(color) };
    db[id]=node; db[pid].children.push(node);
    // 异步读取真实缩略图
    if(file instanceof File){
        const r=new FileReader();
        r.onload=e=>{ if(db[id]) db[id].dataUrl=e.target.result; };
        r.readAsDataURL(file);
    }
}

/* 上传进度模拟（UI 反馈） */
function showProgress(files, containerId){
    const el = document.getElementById(containerId);
    if(!el) return;
    el.innerHTML = files.map((f,i)=>`
        <div class="up-row">
            <span style="font-size:16px;flex-shrink:0;">🖼️</span>
            <span class="up-row-name" title="${f.name}">${f.name}</span>
            <div class="up-row-bar"><div class="up-row-fill" id="uf${i}" style="width:0"></div></div>
            <span class="up-row-state" id="us${i}">${(f.size/1024).toFixed(0)} KB</span>
        </div>`).join('');
    files.forEach((_,i)=>{
        let p=0;
        const t=setInterval(()=>{
            p+=Math.random()*35+15; if(p>=100){ p=100; clearInterval(t); }
            const bar=document.getElementById('uf'+i), st=document.getElementById('us'+i);
            if(bar) bar.style.width=p+'%';
            if(p===100&&st){ st.textContent='完成'; st.className='up-row-state done'; }
        }, 100+i*30);
    });
    setTimeout(()=>{ if(el) el.innerHTML=''; }, 5000);
}

/* ── 分页 ───────────────────────────────────────────── */
function renderPager(total){
    const pages=Math.max(1,Math.ceil(total/PAGE));
    let html=`<div class="pn ${page===1?'disabled':''}" onclick="goPage(${page-1})">
                <i class="fas fa-chevron-left" style="font-size:10px;"></i></div>`;
    for(let p=1;p<=pages;p++){
        if(pages>7 && Math.abs(p-page)>2 && p!==1 && p!==pages){
            if(p===page-3||p===page+3) html+=`<div class="pn" style="border:none;pointer-events:none;">…</div>`;
            continue;
        }
        html+=`<div class="pn ${p===page?'active':''}" onclick="goPage(${p})">${p}</div>`;
    }
    html+=`<div class="pn ${page===pages?'disabled':''}" onclick="goPage(${page+1})">
             <i class="fas fa-chevron-right" style="font-size:10px;"></i></div>`;
    document.getElementById('pager-nums').innerHTML=html;
}

function goPage(p){
    const total=filteredRows().length, pages=Math.max(1,Math.ceil(total/PAGE));
    if(p<1||p>pages) return;
    page=p; renderTable();
}

/* ── 弹窗 ───────────────────────────────────────────── */
function openModal(id){ document.getElementById(id).classList.add('show'); }
function closeModal(id){ document.getElementById(id).classList.remove('show'); }
document.querySelectorAll('.overlay').forEach(el=>
    el.addEventListener('click',e=>{ if(e.target===el) el.classList.remove('show'); }));

/* ── Toast ──────────────────────────────────────────── */
function toast(type,msg){
    const el=document.getElementById('toast');
    const ico=document.getElementById('t-ico');
    document.getElementById('t-msg').textContent=msg;
    ico.className=`fas ico ${type==='ok'?'fa-check-circle ok':type==='err'?'fa-times-circle err':'fa-info-circle warn'}`;
    el.classList.add('show');
    clearTimeout(el._t);
    el._t=setTimeout(()=>el.classList.remove('show'),2500);
}

/* ── 初始化 ─────────────────────────────────────────── */
render();
</script>

(function initPRD(){
    const tips = {};
    let drag = null, dx = 0, dy = 0;

    PRD_ANNOTATIONS.forEach(ann => {
        const wrap = document.getElementById(ann.anchor);
        if (!wrap) return;

        const badge = document.createElement('div');
        badge.className = 'prd-badge';
        badge.textContent = ann.label;
        wrap.appendChild(badge);

        const tt = document.createElement('div');
        tt.className = 'prd-tooltip';
        tt.innerHTML = `<div class="prd-tt-hd"><span>${ann.title}</span><span class="prd-tt-close" data-id="${ann.id}">×</span></div><div class="prd-tt-bd">${ann.content}</div>`;
        document.body.appendChild(tt);
        tips[ann.id] = tt;

        tt.querySelector('.prd-tt-hd').addEventListener('mousedown', e => {
            drag = tt; dx = e.clientX - tt.getBoundingClientRect().left;
            dy = e.clientY - tt.getBoundingClientRect().top; e.preventDefault();
        });
        tt.querySelector('.prd-tt-close').addEventListener('click', e => {
            e.stopPropagation(); tt.classList.remove('show');
        });

        badge.addEventListener('click', e => {
            e.stopPropagation();
            const open = tt.classList.contains('show');
            Object.values(tips).forEach(t => t.classList.remove('show'));
            if (!open) {
                const r = badge.getBoundingClientRect();
                tt.style.left = Math.min(Math.max(r.left - 8, 8), window.innerWidth - 392) + 'px';
                tt.style.top  = (r.bottom + 6) + 'px';
                tt.classList.add('show');
            }
        });
    });

    document.addEventListener('mousemove', e => {
        if (!drag) return;
        drag.style.left = (e.clientX - dx) + 'px';
        drag.style.top  = (e.clientY - dy) + 'px';
    });
    document.addEventListener('mouseup', () => { drag = null; });
    document.addEventListener('click', () => Object.values(tips).forEach(t => t.classList.remove('show')));
})();
</script>
