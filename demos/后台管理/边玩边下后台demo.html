<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>边玩边下数据统计 - 后台Demo</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;color:#333;font-size:13px}
.layout{display:flex;height:100vh}
.sidebar{width:200px;background:#001529;color:#fff;flex-shrink:0;display:flex;flex-direction:column}
.sidebar .logo{padding:16px;font-size:15px;font-weight:700;border-bottom:1px solid #002140;color:#d4b473}
.menu-item{padding:11px 20px;font-size:13px;color:rgba(255,255,255,.65);cursor:pointer;display:flex;align-items:center;gap:8px;transition:0.2s}
.menu-item:hover{color:#fff;background:#002140}
.menu-item.active{color:#fff;background:#d4b473}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:50px;background:#fff;border-bottom:1px solid #e8e8e8;display:flex;align-items:center;justify-content:space-between;padding:0 20px}
.topbar .title{font-size:16px;font-weight:600}
.content{flex:1;overflow-y:auto;padding:20px}
.card{background:#fff;border-radius:8px;padding:18px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.card-title{font-size:14px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.stats-3{grid-template-columns:repeat(3,1fr)}
.stat-card{background:#fff;border-radius:8px;padding:16px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.stat-card .num{font-size:24px;font-weight:bold;color:#333}
.stat-card .num.blue{color:#1890ff}
.stat-card .num.green{color:#52c41a}
.stat-card .num.orange{color:#fa8c16}
.stat-card .num.gold{color:#d4b473}
.stat-card .label{font-size:12px;color:#999;margin-top:4px}
.stat-card .trend{font-size:11px;margin-top:4px}
.stat-card .trend.up{color:#52c41a}
.stat-card .trend.down{color:#ff4d4f}
.filter-bar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-bar input,.filter-bar select{padding:6px 10px;border:1px solid #d9d9d9;border-radius:4px;font-size:12px;outline:none}
.filter-bar input:focus,.filter-bar select:focus{border-color:#d4b473}
.btn{padding:5px 14px;border-radius:4px;font-size:12px;cursor:pointer;border:1px solid #d9d9d9;background:#fff;color:#333;display:inline-flex;align-items:center;gap:4px}
.btn:hover{border-color:#d4b473;color:#d4b473}
.btn-primary{background:#d4b473;color:#fff;border-color:#d4b473}
.btn-primary:hover{background:#c5a562}
.btn-sm{padding:3px 10px;font-size:11px}
.quick-dates{display:flex;gap:6px}
.quick-date{padding:4px 10px;border-radius:4px;font-size:11px;cursor:pointer;background:#f5f5f5;color:#666;border:1px solid #e8e8e8}
.quick-date:hover,.quick-date.active{background:#d4b473;color:#fff;border-color:#d4b473}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#fafafa;padding:9px 10px;text-align:left;font-weight:500;color:#666;border-bottom:1px solid #f0f0f0;cursor:default}
th.sortable{cursor:pointer}
th.sortable:hover{color:#d4b473}
th .sort-icon{font-size:10px;margin-left:3px;color:#ccc}
td{padding:9px 10px;border-bottom:1px solid #f0f0f0}
tr:hover td{background:#fafafa}
.tag{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px}
.tag-green{background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f}
.tag-red{background:#fff1f0;color:#ff4d4f;border:1px solid #ffa39e}
.tag-blue{background:#e6f7ff;color:#1890ff;border:1px solid #91d5ff}
.pagination{display:flex;align-items:center;justify-content:space-between;margin-top:12px;font-size:12px;color:#999}
.page-btns{display:flex;gap:4px}
.page-btn{width:28px;height:28px;border-radius:4px;border:1px solid #d9d9d9;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:11px}
.page-btn:hover{border-color:#d4b473;color:#d4b473}
.page-btn.active{background:#d4b473;color:#fff;border-color:#d4b473}

/* 漏斗图 */
.funnel{display:flex;flex-direction:column;align-items:center;gap:0;padding:20px 0}
.funnel-step{display:flex;align-items:center;gap:14px;width:100%;max-width:600px;position:relative}
.funnel-bar{height:36px;border-radius:4px;display:flex;align-items:center;padding:0 14px;color:#fff;font-size:12px;font-weight:600;justify-content:space-between;transition:0.3s}
.funnel-arrow{text-align:center;color:#ccc;font-size:10px;padding:2px 0;width:100%;max-width:600px}
.funnel-rate{font-size:11px;color:#999;min-width:60px;text-align:right}
.funnel-label{font-size:12px;color:#333;min-width:100px}

.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 20px;border-radius:16px;font-size:13px;opacity:0;transition:0.3s;z-index:200;pointer-events:none}
.toast.show{opacity:1}
.data-update{font-size:11px;color:#999;font-weight:400;margin-left:auto}
</style>
</head>
<body>
<div class="layout">
<div class="sidebar">
<div class="logo">盖世游戏 · 边玩边下</div>
<div class="menu-item active" onclick="switchPage('overview')"><i class="fas fa-chart-pie"></i> 数据总览</div>
<div class="menu-item" onclick="switchPage('payment')"><i class="fas fa-credit-card"></i> 付费统计</div>
<div class="menu-item" onclick="switchPage('games')"><i class="fas fa-gamepad"></i> 游戏维度</div>
</div>
<div class="main">
<div class="topbar"><div class="title" id="pageTitle">数据总览</div><div style="color:#999">管理员: 王五</div></div>
<div class="content" id="pageContent"></div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
function switchPage(page){
    document.querySelectorAll('.menu-item').forEach(function(m){m.classList.remove('active')});
    event.currentTarget.classList.add('active');
    var titles={overview:'数据总览',payment:'付费统计',games:'游戏维度统计'};
    document.getElementById('pageTitle').textContent=titles[page];
    var renders={overview:renderOverview,payment:renderPayment,games:renderGames};
    renders[page]();
}

function renderOverview(){
    var h='';
    // 筛选
    h+='<div class="card" style="padding:12px 18px"><div class="filter-bar" style="margin-bottom:0">';
    h+='<div class="quick-dates"><span class="quick-date" onclick="selectDate(this)">今日</span><span class="quick-date active" onclick="selectDate(this)">近7日</span><span class="quick-date" onclick="selectDate(this)">近30日</span><span class="quick-date" onclick="selectDate(this)">自定义</span></div>';
    h+='<input type="date" value="2026-07-08" style="width:130px"><span style="color:#999">~</span><input type="date" value="2026-07-15" style="width:130px">';
    h+='<input placeholder="游戏名搜索" style="width:140px">';
    h+='<button class="btn" onclick="showToast(\'查询成功\')">查询</button><button class="btn">重置</button>';
    h+='</div></div>';

    // 核心指标卡片
    h+='<div class="stats">';
    h+='<div class="stat-card"><div class="num">38,420</div><div class="label">游戏详情页访问</div><div class="trend up"><i class="fas fa-arrow-up"></i> 8.1% vs 上周</div></div>';
    h+='<div class="stat-card"><div class="num">12,847</div><div class="label">安装弹窗触发次数</div><div class="trend up"><i class="fas fa-arrow-up"></i> 12.3% vs 上周</div></div>';
    h+='<div class="stat-card"><div class="num blue">5,139</div><div class="label">边玩边下选择次数</div><div class="trend up"><i class="fas fa-arrow-up"></i> 18.7% vs 上周</div></div>';
    h+='<div class="stat-card"><div class="num orange">40.0%</div><div class="label">边玩边下转化率</div><div class="trend up"><i class="fas fa-arrow-up"></i> 2.1pp vs 上周</div></div>';
    h+='</div>';

    h+='<div class="stats">';
    h+='<div class="stat-card"><div class="num">42,680</div><div class="label">云游戏总时长（分钟）</div></div>';
    h+='<div class="stat-card"><div class="num gold">¥8,536</div><div class="label">付费总收入</div><div class="trend up"><i class="fas fa-arrow-up"></i> 22.5% vs 上周</div></div>';
    h+='<div class="stat-card"><div class="num">14.6</div><div class="label">人均云游戏时长（分钟）</div></div>';
    h+='<div class="stat-card"><div class="num">11.1</div><div class="label">人均时长中位数（分钟）</div></div>';
    h+='</div>';

    // 趋势图占位
    h+='<div class="card"><div class="card-title"><i class="fas fa-chart-line"></i> 每日趋势<span class="data-update">数据更新至：2026-07-15 08:00</span></div>';
    h+='<div style="height:200px;background:#fafafa;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#ccc;border:1px dashed #e8e8e8">';
    h+='<div style="text-align:center"><i class="fas fa-chart-area" style="font-size:32px;margin-bottom:8px;display:block"></i>每日触发次数 / 选择次数 / 转化率趋势图</div>';
    h+='</div></div>';

    // 转化漏斗表格
    h+='<div class="card"><div class="card-title"><i class="fas fa-filter"></i> 转化漏斗</div>';
    h+='<table><thead><tr><th>步骤</th><th>事件</th><th>人数</th><th>次数</th><th>整体转化率</th><th>流失人数</th><th>流失率</th></tr></thead><tbody>';
    var steps=[
        {step:1, label:'游戏详情页访问', users:28650, times:38420},
        {step:2, label:'安装弹窗展示', users:9420, times:12847},
        {step:3, label:'点击"边玩边下"', users:3860, times:5139},
        {step:4, label:'云游戏启动成功', users:3745, times:4982},
        {step:5, label:'下载完成', users:3652, times:4856},
        {step:6, label:'发起切换', users:3180, times:4201},
        {step:7, label:'存档同步成功', users:3102, times:4098},
        {step:8, label:'切换成功', users:3064, times:4042}
    ];
    steps.forEach(function(s,i){
        var totalRate = (s.users/steps[0].users*100).toFixed(1)+'%';
        var lost = i===0?'—':(steps[i-1].users - s.users).toLocaleString();
        var lostRate = i===0?'—':((steps[i-1].users - s.users)/steps[i-1].users*100).toFixed(1)+'%';
        var lostColor = i===0?'':parseFloat(lostRate)>30?'color:#ff4d4f':parseFloat(lostRate)>10?'color:#fa8c16':'color:#52c41a';
        h+='<tr><td>Step '+s.step+'</td><td><b>'+s.label+'</b></td><td>'+s.users.toLocaleString()+'</td><td style="color:#999">'+s.times.toLocaleString()+'</td><td>'+(i===0?'100%':'<span style="color:#666">'+totalRate+'</span>')+'</td><td>'+(i===0?'—':lost)+'</td><td>'+(i===0?'—':'<span style="'+lostColor+'">'+lostRate+'</span>')+'</td></tr>';
    });
    h+='</tbody></table>';
    h+='<div style="display:flex;justify-content:space-around;padding:14px 0;border-top:1px solid #f0f0f0;font-size:12px;color:#666">';
    h+='<span>整体转化率（详情页→切换成功）：<b style="color:#52c41a">'+(3064/28650*100).toFixed(1)+'%</b></span>';
    h+='<span>最大流失步骤：<b style="color:#ff4d4f">详情页→弹窗展示（流失 67.1%）</b></span>';
    h+='</div></div>';

    document.getElementById('pageContent').innerHTML=h;
}

function renderPayment(){
    var h='';
    // 筛选
    h+='<div class="card" style="padding:12px 18px"><div class="filter-bar" style="margin-bottom:0">';
    h+='<div class="quick-dates"><span class="quick-date" onclick="selectDate(this)">今日</span><span class="quick-date active" onclick="selectDate(this)">近7日</span><span class="quick-date" onclick="selectDate(this)">近30日</span><span class="quick-date" onclick="selectDate(this)">自定义</span></div>';
    h+='<input type="date" value="2026-07-08" style="width:130px"><span style="color:#999">~</span><input type="date" value="2026-07-15" style="width:130px">';
    h+='<button class="btn" onclick="showToast(\'查询成功\')">查询</button><button class="btn">重置</button>';
    h+='</div></div>';

    // 付费转化卡片
    h+='<div class="stats stats-3">';
    h+='<div class="stat-card"><div class="num">5,139</div><div class="label">免费体验人数</div></div>';
    h+='<div class="stat-card"><div class="num blue">1,078</div><div class="label">免费→付费转化人数</div></div>';
    h+='<div class="stat-card"><div class="num orange">21.0%</div><div class="label">免费→付费转化率</div><div class="trend up"><i class="fas fa-arrow-up"></i> 3.2pp vs 上周</div></div>';
    h+='</div>';

    h+='<div class="stats stats-3">';
    h+='<div class="stat-card"><div class="num gold">¥8,536</div><div class="label">付费总收入</div></div>';
    h+='<div class="stat-card"><div class="num">1,078</div><div class="label">付费用户数</div></div>';
    h+='<div class="stat-card"><div class="num">¥7.92</div><div class="label">人均付费金额</div></div>';
    h+='</div>';

    // 付费明细表
    h+='<div class="card"><div class="card-title"><i class="fas fa-list"></i> 付费明细<span class="data-update">数据更新至：2026-07-15 08:00</span></div>';
    h+='<div class="filter-bar"><input placeholder="用户UID" style="width:100px"><input placeholder="游戏名" style="width:140px"><input type="date" style="width:130px"><span style="color:#999">~</span><input type="date" style="width:130px"><button class="btn" onclick="showToast(\'查询成功\')">查询</button><button class="btn">重置</button><button class="btn" onclick="showToast(\'正在导出CSV...\')"><i class="fas fa-download"></i> 导出CSV</button></div>';
    h+='<table><thead><tr><th>用户UID</th><th>游戏名</th><th>云游戏时长</th><th>免费时长</th><th>付费时长</th><th class="sortable" onclick="showToast(\'按付费金额排序\')">付费金额 <i class="fas fa-sort sort-icon"></i></th><th>切换状态</th><th class="sortable" onclick="showToast(\'按日期排序\')">日期 <i class="fas fa-sort sort-icon"></i></th></tr></thead><tbody>';

    var records=[
        {uid:'u50001',game:'生化危机 2重制版',total:28,free:10,paid:18,amount:0.90,switched:true,date:'2026-07-15'},
        {uid:'u50023',game:'GTA V',total:45,free:10,paid:35,amount:1.75,switched:true,date:'2026-07-15'},
        {uid:'u50045',game:'艾尔登法环',total:32,free:10,paid:22,amount:1.10,switched:true,date:'2026-07-14'},
        {uid:'u50067',game:'赛博朋克2077',total:10,free:10,paid:0,amount:0,switched:true,date:'2026-07-14'},
        {uid:'u50089',game:'生化危机 2重制版',total:38,free:10,paid:28,amount:1.40,switched:true,date:'2026-07-14'},
        {uid:'u50100',game:'GTA V',total:22,free:10,paid:12,amount:0.60,switched:false,date:'2026-07-13'},
        {uid:'u50112',game:'逃离鸭科夫',total:55,free:10,paid:45,amount:2.25,switched:true,date:'2026-07-13'},
        {uid:'u50134',game:'艾尔登法环',total:10,free:10,paid:0,amount:0,switched:true,date:'2026-07-13'},
        {uid:'u50156',game:'生化危机 2重制版',total:15,free:10,paid:5,amount:0.25,switched:true,date:'2026-07-12'},
        {uid:'u50178',game:'GTA V',total:42,free:10,paid:32,amount:1.60,switched:true,date:'2026-07-12'}
    ];

    records.forEach(function(r){
        var switchTag=r.switched?'<span class="tag tag-green">成功</span>':'<span class="tag tag-red">失败</span>';
        var amountStr=r.amount>0?'¥'+r.amount.toFixed(2):'<span style="color:#999">—</span>';
        h+='<tr><td>'+r.uid+'</td><td>'+r.game+'</td><td>'+r.total+' 分钟</td><td>'+r.free+' 分钟</td><td>'+r.paid+' 分钟</td><td><b>'+amountStr+'</b></td><td>'+switchTag+'</td><td>'+r.date+'</td></tr>';
    });

    h+='</tbody></table>';
    h+='<div class="pagination"><span>共 1,078 条</span><div class="page-btns"><span class="page-btn"><i class="fas fa-chevron-left"></i></span><span class="page-btn active">1</span><span class="page-btn">2</span><span class="page-btn">3</span><span class="page-btn">...</span><span class="page-btn">54</span><span class="page-btn"><i class="fas fa-chevron-right"></i></span></div></div>';
    h+='</div>';

    document.getElementById('pageContent').innerHTML=h;
}

function renderGames(){
    var h='';
    h+='<div class="card" style="padding:12px 18px"><div class="filter-bar" style="margin-bottom:0">';
    h+='<div class="quick-dates"><span class="quick-date" onclick="selectDate(this)">今日</span><span class="quick-date active" onclick="selectDate(this)">近7日</span><span class="quick-date" onclick="selectDate(this)">近30日</span><span class="quick-date" onclick="selectDate(this)">自定义</span></div>';

    h+='<div class="card"><div class="card-title"><i class="fas fa-gamepad"></i> 游戏维度统计<span class="data-update">数据更新至：2026-07-15 08:00</span></div>';

    var games=[
        {name:'GTA V',trigger:3240,select:1458,rate:'45.0%',dlOnly:'32分钟',dlPlay:'38分钟',revenue:'¥2,468',sync:'97.8%',switchRate:'96.5%'},

        {name:'艾尔登法环',trigger:1860,select:688,rate:'37.0%',dlOnly:'28分钟',dlPlay:'33分钟',revenue:'¥1,378',sync:'95.4%',switchRate:'95.8%'},
        {name:'赛博朋克2077',trigger:1520,select:638,rate:'42.0%',dlOnly:'35分钟',dlPlay:'42分钟',revenue:'¥1,046',sync:'96.1%',switchRate:'96.8%'},

        {name:'巫师3',trigger:980,select:372,rate:'38.0%',dlOnly:'30分钟',dlPlay:'35分钟',revenue:'¥596',sync:'97.5%',switchRate:'97.8%'},
        {name:'空洞骑士',trigger:420,select:176,rate:'41.9%',dlOnly:'8分钟',dlPlay:'10分钟',revenue:'¥248',sync:'99.1%',switchRate:'98.5%'},
        {name:'只狼：影逝二度',trigger:307,select:122,rate:'39.7%',dlOnly:'20分钟',dlPlay:'24分钟',revenue:'¥192',sync:'95.8%',switchRate:'96.0%'}
    ];

    games.forEach(function(g){
        var syncColor=parseFloat(g.sync)>=97?'color:#52c41a':parseFloat(g.sync)>=95?'color:#fa8c16':'color:#ff4d4f';
        var switchColor=parseFloat(g.switchRate)>=97?'color:#52c41a':parseFloat(g.switchRate)>=95?'color:#fa8c16':'color:#ff4d4f';
        h+='<tr><td><b>'+g.name+'</b></td><td>'+g.trigger.toLocaleString()+'</td><td>'+g.select.toLocaleString()+'</td><td><b style="color:#1890ff">'+g.rate+'</b></td><td>'+g.dlOnly+'</td><td>'+g.dlPlay+'</td><td><b style="color:#d4b473">'+g.revenue+'</b></td><td><span style="'+syncColor+'">'+g.sync+'</span></td><td><span style="'+switchColor+'">'+g.switchRate+'</span></td></tr>';
    });

    h+='</tbody></table>';
    h+='<div class="pagination"><span>共 8 条</span><div class="page-btns"><span class="page-btn active">1</span></div></div>';
    h+='</div>';

    document.getElementById('pageContent').innerHTML=h;
}

function selectDate(el){
    el.parentElement.querySelectorAll('.quick-date').forEach(function(d){d.classList.remove('active')});
    el.classList.add('active');
}

function showToast(msg){
    var t=document.getElementById('toast');
    t.textContent=msg;t.classList.add('show');
    setTimeout(function(){t.classList.remove('show')},2000);
}

// 初始渲染
renderOverview();
</script>
</body>
</html>
