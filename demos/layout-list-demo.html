<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>按键与布局 Demo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:#1a1a2e;display:flex;justify-content:center;align-items:flex-start;padding:30px 16px;font-family:-apple-system,'PingFang SC','Helvetica Neue',sans-serif;min-height:100vh}

/* 手机外壳 */
.phone-shell{
  width:390px;height:844px;background:#0d1e2c;border-radius:48px;
  box-shadow:0 0 0 2px #2a2a3e,0 32px 80px rgba(0,0,0,.7);
  overflow:hidden;position:relative;flex-shrink:0;transition:width .3s,height .3s,border-radius .3s;
}
.phone-shell.landscape{width:844px;height:390px;border-radius:40px;}
.phone-shell.landscape .list{grid-template-columns:repeat(4,1fr)}
.phone-shell.landscape .search-row{display:none}
.search-icon-btn{display:none}
.phone-shell.landscape .search-icon-btn{display:flex}
/* 页面容器 */
.page{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden;transition:transform .32s cubic-bezier(.32,1,.32,1),opacity .25s;background:#0d1e2c}
.page.hidden-right{transform:translateX(100%);opacity:0;pointer-events:none}

/* 状态栏 */
.status-bar{height:44px;display:flex;align-items:center;justify-content:space-between;padding:0 28px;color:rgba(255,255,255,.8);font-size:13px;font-weight:600;flex-shrink:0}

/* 页头 */
.page-header{padding:2px 20px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.page-title{font-size:20px;font-weight:700;color:#fff;display:flex;align-items:center;gap:8px}
.back-btn{display:flex;align-items:center;gap:4px;color:rgba(255,255,255,.7);font-size:15px;cursor:pointer;padding:4px 0}
.back-btn svg{width:18px;height:18px}
/* Tabs */
.tabs{display:flex;align-items:center;padding:0 16px;border-bottom:1px solid rgba(255,255,255,.08);overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:10px 10px;font-size:14px;color:rgba(255,255,255,.45);cursor:pointer;white-space:nowrap;position:relative;flex-shrink:0}
.tab.active{color:#fff}
.tab.active::after{content:'';position:absolute;bottom:0;left:10px;right:10px;height:2px;background:#00c896;border-radius:1px}
.tab-actions{margin-left:auto;display:flex;gap:10px;padding:8px 0 8px 8px;flex-shrink:0}
.tab-icon-btn{width:28px;height:28px;border:1.5px solid rgba(255,255,255,.3);border-radius:50%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.6);cursor:pointer}

/* 搜索栏 */
.search-row{padding:12px 16px;flex-shrink:0}
.search-bar{background:rgba(255,255,255,.07);border-radius:22px;padding:10px 16px;display:flex;align-items:center;gap:8px;color:rgba(255,255,255,.35);font-size:14px}
.home-search-overlay{position:absolute;inset:0;z-index:150;background:#0d1e2c;display:flex;flex-direction:column;transform:translateY(-100%);transition:transform .28s cubic-bezier(.32,1,.32,1);pointer-events:none}
.home-search-overlay.show{transform:translateY(0);pointer-events:all}
.home-search-bar{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.08);flex-shrink:0}
.home-search-bar input{flex:1;background:none;border:none;outline:none;color:#fff;font-size:15px}
.home-search-cancel{font-size:14px;color:rgba(0,200,150,.9);cursor:pointer;white-space:nowrap;padding:4px 0}
.home-search-results{flex:1;overflow-y:auto;scrollbar-width:none}
.home-search-results .list{padding:0 16px}
.home-search-empty{text-align:center;padding:60px 0;color:rgba(255,255,255,.3);font-size:14px}

/* 排序栏 */
.sort-bar{display:flex;align-items:center;gap:8px;padding:0 16px 10px;flex-shrink:0}
.sort-label{font-size:13px;color:rgba(255,255,255,.4)}
.sort-btn{padding:4px 12px;border-radius:12px;font-size:13px;color:rgba(255,255,255,.45);cursor:pointer;border:1px solid rgba(255,255,255,.12);background:transparent;transition:all .15s}
.sort-btn.active{color:#00c896;border-color:rgba(0,200,150,.4);background:rgba(0,200,150,.08)}
.list-section-title{font-size:12px;font-weight:600;color:rgba(255,255,255,.35);padding:12px 0 6px;letter-spacing:.5px;grid-column:1/-1}

/* 分类宫格 */
.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:16px}
.cat-card{border-radius:12px;overflow:hidden;cursor:pointer;background:rgba(255,255,255,.05);transition:opacity .15s}
.cat-card:active{opacity:.7}
.cat-cover{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;position:relative}
.cat-cover-icon{opacity:.85}
.cat-count{position:absolute;bottom:5px;right:7px;font-size:10px;color:rgba(255,255,255,.55)}
.cat-name{font-size:12px;font-weight:500;color:#fff;padding:7px 8px 9px;text-align:center}
.diamond-zone{display:grid;grid-template-columns:repeat(3,1fr);padding:14px 16px 10px;gap:4px;flex-shrink:0}
.diamond-item{display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;padding:8px 4px;border-radius:12px;transition:background .15s}
.diamond-item:active{background:rgba(255,255,255,.06)}
.diamond-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center}
.diamond-label{font-size:12px;color:rgba(255,255,255,.65)}

/* 推荐横滑 */
.section-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px;flex-shrink:0}
.section-title{font-size:15px;font-weight:600;color:#fff}
.section-more{font-size:13px;color:rgba(0,200,150,.8);cursor:pointer}
.hscroll-wrap{overflow-x:auto;padding:0 16px 12px;flex-shrink:0;scrollbar-width:none}
.hscroll-wrap::-webkit-scrollbar{display:none}
.hscroll{display:flex;gap:10px}
.hcard{width:140px;flex-shrink:0;background:rgba(255,255,255,.055);border-radius:12px;overflow:hidden;cursor:pointer}
.hcard-thumb{width:140px;height:88px;overflow:hidden;background:#0a1520}
.hcard-thumb svg{width:100%;height:100%;display:block}
.hcard-info{padding:7px 10px 9px}
.hcard-name{font-size:12px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.hcard-uses{font-size:11px;color:rgba(255,255,255,.38)}

/* 列表 */
.list-wrap{flex:1;overflow-y:auto;padding:0 16px 24px}
.list-wrap::-webkit-scrollbar{width:0}
.list{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.list-item{background:rgba(255,255,255,.055);border-radius:14px;overflow:hidden;cursor:pointer;transition:background .15s;display:flex;flex-direction:column}
.list-item:active{background:rgba(255,255,255,.1)}
.thumb{width:100%;aspect-ratio:16/10;overflow:hidden;background:#0a1520}
.thumb svg{width:100%;height:100%;display:block}
.item-info{padding:8px 10px 10px}
.item-name{font-size:13px;font-weight:500;color:#fff;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.item-meta{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.tag{padding:2px 6px;border-radius:4px;font-size:11px;font-weight:500}
.tag-general{background:rgba(0,200,150,.12);color:#00c896;border:1px solid rgba(0,200,150,.25)}
.tag-special{background:rgba(255,165,60,.12);color:#ffa040;border:1px solid rgba(255,165,60,.3)}
.uses{font-size:11px;color:rgba(255,255,255,.38);display:flex;align-items:center;gap:3px}
.author{font-size:11px;color:rgba(255,255,255,.38)}
.empty{text-align:center;padding:60px 0;color:rgba(255,255,255,.3);font-size:14px}

/* 游戏布局页头 */
.special-page-banner{
  margin:12px 16px 4px;padding:16px;border-radius:14px;
  background:linear-gradient(135deg,rgba(255,140,0,.18) 0%,rgba(255,80,0,.1) 100%);
  border:1px solid rgba(255,140,0,.25);
}
.banner-title{font-size:16px;font-weight:700;color:#ffc060;margin-bottom:4px}
.banner-desc{font-size:13px;color:rgba(255,255,255,.5);line-height:1.5}

/* 弹出详情 */
.overlay{position:absolute;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:flex-end;z-index:200;opacity:0;pointer-events:none;transition:opacity .22s}
.overlay.show{opacity:1;pointer-events:all}
.popup{background:#162535;border-radius:20px 20px 0 0;width:100%;padding:20px 20px 36px;transform:translateY(100%);transition:transform .28s cubic-bezier(.32,1,.32,1);position:relative}
.overlay.show .popup{transform:translateY(0)}
.popup-close{position:absolute;top:16px;right:16px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.5);cursor:pointer;font-size:22px}
.popup-thumb{width:100%;height:190px;border-radius:12px;overflow:hidden;background:#0a1520;margin-bottom:16px}
.popup-thumb svg{width:100%;height:100%;display:block}
.popup-name{font-size:18px;font-weight:700;color:#fff;margin-bottom:8px}
.popup-actions{display:flex;justify-content:space-around;margin-top:24px}
.act-btn{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer}
.act-icon{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;color:#fff}
.act-label{font-size:13px;color:rgba(255,255,255,.65)}

/* 图标管理器 */
.icon-section-title{font-size:13px;font-weight:600;color:rgba(255,255,255,.5);padding:14px 16px 8px;letter-spacing:.5px}
.pkg-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;padding:0 16px}
.phone-shell.landscape .pkg-grid{grid-template-columns:repeat(4,1fr)}
.pkg-card{background:rgba(255,255,255,.055);border-radius:14px;overflow:hidden;cursor:pointer;transition:background .15s}
.pkg-card:active{background:rgba(255,255,255,.1)}
.pkg-thumb{width:100%;aspect-ratio:1;background:#0a1520;display:grid;grid-template-columns:1fr 1fr;gap:2px;padding:10px}
.pkg-thumb-icon{border-radius:6px;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;overflow:hidden}
.pkg-thumb-icon img{width:100%;height:100%;object-fit:contain}
.pkg-thumb-icon svg{opacity:.4}
.pkg-name{font-size:13px;font-weight:500;color:#fff;padding:8px 10px 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pkg-count{font-size:11px;color:rgba(255,255,255,.35);padding:0 10px 10px}
.icon-sub-tabs{display:flex;gap:0;padding:10px 16px 0;flex-shrink:0}
.icon-sub-tab{padding:6px 18px;font-size:13px;color:rgba(255,255,255,.45);cursor:pointer;border-radius:16px;transition:all .15s}
.icon-sub-tab.active{color:#fff;background:rgba(255,255,255,.1)}
.icon-tab-content{display:none;flex:1;overflow-y:auto}
.icon-tab-content.active{display:block}
.import-row{padding:10px 16px 4px;display:flex;gap:8px}
.import-btn{flex:1;background:rgba(0,200,150,.12);border:1px solid rgba(0,200,150,.3);color:#00c896;border-radius:22px;padding:9px 0;font-size:14px;text-align:center;cursor:pointer}

/* 图标包详情页 */
.icon-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 16px 24px}
.icon-cell{aspect-ratio:1;background:rgba(255,255,255,.06);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;overflow:hidden;transition:background .15s}
.icon-cell:active{background:rgba(255,255,255,.14)}
.icon-cell img{width:72%;height:72%;object-fit:contain}
.icon-cell svg{opacity:.35}

/* icon 大图预览弹层 */
.icon-overlay{position:absolute;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:300;opacity:0;pointer-events:none;transition:opacity .2s}
.icon-overlay.show{opacity:1;pointer-events:all}
.icon-preview-box{background:#162535;border-radius:20px;padding:28px;display:flex;flex-direction:column;align-items:center;gap:16px;width:220px}

/* Toast */
.toast{position:absolute;bottom:72px;left:50%;transform:translateX(-50%);background:rgba(10,20,30,.92);color:#fff;font-size:13px;padding:8px 18px;border-radius:20px;white-space:nowrap;z-index:500;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}

/* 导入结果弹层 */
.import-modal{position:absolute;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:400;opacity:0;pointer-events:none;transition:opacity .22s;padding:0 20px}
.import-modal.show{opacity:1;pointer-events:all}
.import-modal-box{background:#162535;border-radius:20px;width:100%;max-height:78%;display:flex;flex-direction:column;transform:scale(.92);transition:transform .28s cubic-bezier(.32,1,.32,1)}
.import-modal.show .import-modal-box{transform:scale(1)}
.import-modal-header{padding:18px 20px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,.07)}
.import-modal-title{font-size:15px;font-weight:600;color:#fff}
.import-modal-done{font-size:14px;color:#00c896;cursor:pointer;padding:4px 0}
.import-modal-scroll{overflow-y:auto;padding:4px 16px 20px}
.import-pkg-row{display:flex;align-items:center;gap:12px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.05)}
.import-pkg-row:last-child{border-bottom:none}
.import-pkg-cover{width:54px;height:54px;border-radius:10px;background:#0a1520;display:grid;grid-template-columns:1fr 1fr;gap:1px;overflow:hidden;flex-shrink:0;position:relative}
.import-pkg-cover-cell{display:flex;align-items:center;justify-content:center;overflow:hidden;background:rgba(255,255,255,.06)}
.import-pkg-cover-cell img{width:100%;height:100%;object-fit:contain}
.import-pkg-info{flex:1;min-width:0}
.import-pkg-name{font-size:14px;font-weight:500;color:#fff;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.import-pkg-meta{font-size:12px;color:rgba(255,255,255,.38)}
.import-pkg-edit{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background .15s}
.import-pkg-edit:active{background:rgba(255,255,255,.16)}
.icon-preview-img{width:100px;height:100px;display:flex;align-items:center;justify-content:center}
.icon-preview-img img{width:100%;height:100%;object-fit:contain}
.icon-preview-name{font-size:13px;color:rgba(255,255,255,.6);text-align:center;word-break:break-all}
.icon-preview-close{font-size:13px;color:rgba(255,255,255,.4);cursor:pointer;padding:4px 16px;border:1px solid rgba(255,255,255,.15);border-radius:12px}
</style>
</head>
<body>
<div style="display:flex;flex-direction:column;align-items:center;gap:12px;">
<button onclick="toggleOrientation()" style="background:rgba(255,255,255,.12);color:#fff;border:none;border-radius:20px;padding:7px 22px;font-size:14px;cursor:pointer;letter-spacing:.5px;">⇄ 横竖屏</button>
<button onclick="openIconPicker()" style="background:rgba(0,200,150,.18);color:#00c896;border:1px solid rgba(0,200,150,.4);border-radius:20px;padding:7px 22px;font-size:14px;cursor:pointer;letter-spacing:.5px;">编辑预览</button>
<div class="phone-shell">

  <!-- =========== 主页 =========== -->
  <div class="page" id="page-main">
    <div class="status-bar">
      <span>17:40</span>
      <span style="display:flex;gap:5px;align-items:center;font-size:12px">
        <svg width="15" height="11" viewBox="0 0 15 11" fill="currentColor"><rect x="0" y="3" width="2.5" height="8" rx="1" opacity=".4"/><rect x="4" y="2" width="2.5" height="9" rx="1" opacity=".6"/><rect x="8" y="0" width="2.5" height="11" rx="1"/><rect x="12" y="1" width="2.5" height="9" rx="1" fill="none" stroke="currentColor" stroke-width="1"/></svg>
        38%
      </span>
    </div>
    <div class="page-header">
      <div class="page-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.7)" stroke-width="2.5" style="cursor:pointer"><path d="M15 18l-6-6 6-6"/></svg>
        按键与布局
      </div>
      <div class="tab-icon-btn" onclick="openHomeSearch()" style="width:32px;height:32px;border:none;background:rgba(255,255,255,.08);border-radius:50%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,.65);cursor:pointer;flex-shrink:0">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </div>
    </div>
    <!-- 金刚区 -->
    <div class="diamond-zone">
      <div class="diamond-item" onclick="goPage('page-rank')">
        <div class="diamond-icon" style="background:linear-gradient(135deg,#3a1a10,#2a1008)">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ffa040" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
        </div>
        <span class="diamond-label">排行</span>
      </div>
      <div class="diamond-item" onclick="goPage('page-custom')">
        <div class="diamond-icon" style="background:linear-gradient(135deg,#1a3a1a,#0f280f)">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#00c896" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4z"/></svg>
        </div>
        <span class="diamond-label">自定义</span>
      </div>
      <div class="diamond-item" onclick="goPage('page-icon-mgr')">
        <div class="diamond-icon" style="background:linear-gradient(135deg,#2a1a3a,#1a0f2a)">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#c87aff" stroke-width="2"><circle cx="12" cy="12" r="3"/><circle cx="4" cy="6" r="2"/><circle cx="20" cy="6" r="2"/><circle cx="4" cy="18" r="2"/><circle cx="20" cy="18" r="2"/></svg>
        </div>
        <span class="diamond-label">图标管理器</span>
      </div>
    </div>
    <!-- 探索内容 -->
    <div style="flex:1;overflow-y:auto;scrollbar-width:none">
      <!-- 推荐横滑 -->
      <div class="section-header">
        <span class="section-title">适合「空洞骑士」的推荐布局</span>
        <span class="section-more" onclick="goPage('page-category')">查看全部 ›</span>
      </div>
      <div class="hscroll-wrap">
        <div class="hscroll" id="home-hot-scroll"></div>
      </div>
      <!-- 全部布局 -->
      <div class="section-header">
        <span class="section-title">全部布局</span>
      </div>
      <div class="list-wrap" style="padding-top:0;padding-bottom:32px">
        <div class="list" id="home-all-list"></div>
      </div>
    <!-- 主页搜索覆盖层 -->
    <div class="home-search-overlay" id="home-search-overlay">
      <div class="status-bar">
        <span>17:40</span>
        <span style="display:flex;gap:5px;align-items:center;font-size:12px">
          <svg width="15" height="11" viewBox="0 0 15 11" fill="currentColor"><rect x="0" y="3" width="2.5" height="8" rx="1" opacity=".4"/><rect x="4" y="2" width="2.5" height="9" rx="1" opacity=".6"/><rect x="8" y="0" width="2.5" height="11" rx="1"/><rect x="12" y="1" width="2.5" height="9" rx="1" fill="none" stroke="currentColor" stroke-width="1"/></svg>
          38%
        </span>
      </div>
      <div class="home-search-bar">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.4)" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input id="home-search-input" placeholder="搜索布局" oninput="onHomeSearch(this.value)" autofocus>
        <span class="home-search-cancel" onclick="closeHomeSearch()">取消</span>
      </div>
      <div class="home-search-results" id="home-search-results">
        <div class="home-search-empty">输入关键词搜索布局</div>
      </div>
    </div>
  </div>

  <!-- =========== 分类页 =========== -->
  <div class="page hidden-right" id="page-category">
    <div class="status-bar">
      <span>17:40</span>
      <span style="display:flex;gap:5px;align-items:center;font-size:12px">
        <svg width="15" height="11" viewBox="0 0 15 11" fill="currentColor"><rect x="0" y="3" width="2.5" height="8" rx="1" opacity=".4"/><rect x="4" y="2" width="2.5" height="9" rx="1" opacity=".6"/><rect x="8" y="0" width="2.5" height="11" rx="1"/><rect x="12" y="1" width="2.5" height="9" rx="1" fill="none" stroke="currentColor" stroke-width="1"/></svg>
        38%
      </span>
    </div>
    <div class="page-header">
      <div class="back-btn" onclick="goBack('page-category')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
        游戏布局
      </div>
    </div>

function renderIconViewByGroups(icons, containerId, grouped) {
  const GRID = 'display:grid;grid-template-columns:repeat(5,1fr);gap:6px;padding:0 16px';
  let html = '';
  if (grouped) {
    CTRL_GROUPS.forEach(g => {
      const group = icons.filter(ic => ic.type === g.key);
      if (!group.length) return;
      html += '<div style="font-size:12px;font-weight:600;color:rgba(255,255,255,.4);padding:14px 16px 8px;letter-spacing:.5px">' + g.label + '</div>';
      html += '<div style="' + GRID + '">';
      group.forEach(ic => { html += iconCellHTML(ic); });
      html += '</div>';
    });
    const other = icons.filter(ic => !ic.type || !CTRL_GROUPS.find(g => g.key === ic.type));
    if (other.length) {
      html += '<div style="font-size:12px;font-weight:600;color:rgba(255,255,255,.4);padding:14px 16px 8px;letter-spacing:.5px">其他</div>';
      html += '<div style="' + GRID + '">';
      other.forEach(ic => { html += iconCellHTML(ic); });
      html += '</div>';
    }
  } else {
    html += '<div style="' + GRID + ';padding:12px 16px 24px">';
    icons.forEach(ic => { html += iconCellHTML(ic); });
    html += '</div>';
  }
  document.getElementById(containerId).innerHTML = html || '<div class="empty">暂无图标</div>';
}

      iv.style.display = ''; fv.style.display = 'none';
      const allIcons = [];
      ICON_PKGS.forEach(pkg => pkg.icons.forEach(ic => allIcons.push(ic)));
      renderIconViewByGroups(allIcons, 'official-icon-view', true);
    } else {
      iv.style.display = 'none'; fv.style.display = '';
      // 文件夹视图按控件分组
      let folderHtml = '';
      CTRL_GROUPS.forEach(g => {
        const pkgs = ICON_PKGS.filter(pkg => pkg.icons.some(ic => ic.type === g.key));
        if (!pkgs.length) return;
        folderHtml += '<div style="font-size:12px;font-weight:600;color:rgba(255,255,255,.4);padding:14px 16px 8px;letter-spacing:.5px">' + g.label + '</div>';
        folderHtml += '<div class="pkg-grid" style="padding-top:0">' + pkgs.map(p => pkgCardHTML(p)).join('') + '</div>';
      });
      document.getElementById('official-pkg-grid').innerHTML = folderHtml || ICON_PKGS.map(p => pkgCardHTML(p)).join('');
    }
  } else {
    const iv = document.getElementById('mine-icon-view');
    const fv = document.getElementById('mine-folder-view');
    if (viewMode.mine === 'icon') {
      iv.style.display = ''; fv.style.display = 'none';
      const allIcons = [];
      [...MY_DEMO_PKGS, myPkg, ...mySubPkgs].forEach(pkg => pkg.icons.forEach(ic => allIcons.push(ic)));
      renderIconViewByGroups(allIcons, 'mine-icon-view', false);
    } else {
      iv.style.display = 'none'; fv.style.display = '';
      document.getElementById('my-pkg-grid').innerHTML =
        [...MY_DEMO_PKGS, myPkg, ...mySubPkgs].map(p => pkgCardHTML(p)).join('');
    }
  }
}

function updateViewToggleBtn() {
  const mode = viewMode[currentIconTab];
  const label = document.getElementById('view-toggle-label');
  const icon = document.getElementById('view-toggle-icon');
  if (!label) return;
  if (mode === 'icon') {
    label.textContent = '图标视图';
    icon.innerHTML = '<rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>';
  } else {
    label.textContent = '文件夹视图';
    icon.innerHTML = '<path d="M3 7a2 2 0 012-2h4l2 2h8a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V7z"/>';
  }
}

function toggleCurrentView() {
  viewMode[currentIconTab] = viewMode[currentIconTab] === 'icon' ? 'folder' : 'icon';
  applyViewMode();
  updateViewToggleBtn();
}

function renderIconMgr() {
  currentIconTab = 'official';
  viewMode = {official: 'icon', mine: 'folder'};
  applyViewMode();
  updateViewToggleBtn();
}

function openIconPkg(pkgId) {
  currentPkgId = pkgId;
  const pkg = pkgId === 'my-1' ? myPkg
    : (ICON_PKGS.find(p => p.id === pkgId) || mySubPkgs.find(p => p.id === pkgId));
  document.getElementById('icon-pkg-back-label').textContent = pkg.name;
  renderIconPkgGrid(pkg);
  document.getElementById('page-icon-pkg').classList.remove('hidden-right');
}

function renderIconPkgGrid(pkg) {
  const grid = document.getElementById('icon-pkg-grid');
  if (!pkg.icons.length) {
    grid.innerHTML = '<div class="empty" style="grid-column:1/-1">暂无图标</div>';
    return;
  }
  grid.innerHTML = pkg.icons.map((ic, i) => `
    <div class="icon-cell" onclick="previewIcon(${i})">
      ${ic.dataUrl ? `<img src="${ic.dataUrl}">` : svgIcon(ic.svg)}
    </div>`).join('');
}

function previewIcon(idx) {
  const pkg = currentPkgId === 'my-1' ? myPkg
    : (ICON_PKGS.find(p => p.id === currentPkgId) || mySubPkgs.find(p => p.id === currentPkgId));
  const ic = pkg.icons[idx];
  const imgEl = document.getElementById('icon-preview-img');
  imgEl.innerHTML = ic.dataUrl
    ? `<img src="${ic.dataUrl}" style="width:100%;height:100%;object-fit:contain">`
    : svgIcon(ic.svg);
  document.getElementById('icon-preview-name').textContent = ic.name;
  document.getElementById('icon-overlay').classList.add('show');
}

function closeIconPreview() {
  document.getElementById('icon-overlay').classList.remove('show');
}

let coverEditPkgId = null;

function showToast(msg, duration) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration || 2200);
}

function importIconsToMy(e) {
  const files = Array.from(e.target.files).filter(f => f.type.startsWith('image/'));
  if (!files.length) { e.target.value = ''; return; }

  // 按文件夹路径分组（webkitRelativePath = "folder/sub/file.png"）
  const groups = {};
  files.forEach(file => {
    const parts = file.webkitRelativePath ? file.webkitRelativePath.split('/') : [];
    // 有子文件夹结构：parts[0]=根目录, parts[1]=子文件夹 or 文件名
    const groupKey = parts.length >= 3 ? parts[1] : (parts.length === 2 ? parts[0] : '我的图标包');
    if (!groups[groupKey]) groups[groupKey] = [];
    groups[groupKey].push(file);
  });

  const groupKeys = Object.keys(groups);
  let totalLoaded = 0;
  const totalFiles = files.length;
  const newPkgs = [];

  groupKeys.forEach(key => {
    const grpFiles = groups[key];
    const pkg = {id: 'my-' + Date.now() + '-' + key, name: key, icons: [], coverUrl: null};
    newPkgs.push(pkg);
    grpFiles.forEach(file => {
      const reader = new FileReader();
      reader.onload = ev => {
        pkg.icons.push({name: file.name.replace(/\.[^.]+$/, ''), dataUrl: ev.target.result});
        // 自动用第一张图作为封面
        if (!pkg.coverUrl) pkg.coverUrl = ev.target.result;
        totalLoaded++;
        if (totalLoaded === totalFiles) {
          newPkgs.forEach(p => {
            if (groupKeys.length === 1 && groupKeys[0] === '我的图标包') {
              p.icons.forEach(ic => myPkg.icons.push(ic));
            } else {
              const exists = mySubPkgs.find(x => x.name === p.name);
              if (exists) { p.icons.forEach(ic => exists.icons.push(ic)); }
              else { mySubPkgs.push(p); }
            }
          });
          renderIconMgr();
          showImportModal(newPkgs);
          e.target.value = '';
        }
      };
      reader.readAsDataURL(file);
    });
  });
}

function showImportModal(pkgs) {
  const scroll = document.getElementById('import-modal-scroll');
  document.getElementById('import-modal-title').textContent = '导入图标包';

  scroll.innerHTML = pkgs.map((pkg) => {
    const cells = pkg.icons.slice(0, 4).map(ic =>
      `<div class="import-pkg-cover-cell"><img src="${ic.dataUrl}"></div>`
    ).join('') + (pkg.icons.length < 4
      ? Array(4 - pkg.icons.length).fill('<div class="import-pkg-cover-cell"></div>').join('')
      : '');
    return `
      <div class="import-pkg-row">
        <div class="import-pkg-cover">${cells}</div>
        <div class="import-pkg-info">
          <div class="import-pkg-name">${pkg.name}</div>
          <div class="import-pkg-meta">${pkg.icons.length} 个图标</div>
        </div>
        <div class="import-pkg-edit" onclick="editPkgCover('${pkg.id}')">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.65)" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4z"/></svg>
        </div>
      </div>`;
  }).join('');

  document.getElementById('import-modal').classList.add('show');
}

function editPkgCover(pkgId) {
  coverEditPkgId = pkgId;
  document.getElementById('cover-file-input').click();
}

function applyCoverImage(e) {
  const file = e.target.files[0];
  if (!file || !coverEditPkgId) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const pkg = mySubPkgs.find(p => p.id === coverEditPkgId);
    if (pkg) {
      pkg.coverUrl = ev.target.result;
      showImportModal(mySubPkgs);
      renderIconMgr();
    }
  };
  reader.readAsDataURL(file);
  e.target.value = '';
}

function closeImportModal() {
  document.getElementById('import-modal').classList.remove('show');
}



function goIconPkgBack() {
  document.getElementById('page-icon-pkg').classList.add('hidden-right');
}

renderHomeHot();
renderHomeAll();

/* ===== 图标选择器（编辑预览） ===== */
let pickerRecommendExpanded = false;

function getAllPickerIcons() {
  const all = [];
  ICON_PKGS.forEach(pkg => pkg.icons.forEach(ic => all.push(Object.assign({}, ic, {pkgId: pkg.id, pkgName: pkg.name}))));
  MY_DEMO_PKGS.forEach(pkg => pkg.icons.forEach(ic => all.push(Object.assign({}, ic, {pkgId: pkg.id, pkgName: pkg.name}))));
  mySubPkgs.forEach(pkg => pkg.icons.forEach(ic => all.push(Object.assign({}, ic, {pkgId: pkg.id, pkgName: pkg.name}))));
  myPkg.icons.forEach(ic => all.push(Object.assign({}, ic, {pkgId: 'my-1', pkgName: '我的图标包'})));
  return all;
}

function pickerIconCell(ic) {
  const content = ic.dataUrl
    ? '<img src="' + ic.dataUrl + '" style="width:72%;height:72%;object-fit:contain">'
    : svgIcon(ic.svg);
  return '<div style="aspect-ratio:1;background:rgba(255,255,255,.06);border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;cursor:pointer;padding:4px">'
    + '<div style="width:30px;height:30px;display:flex;align-items:center;justify-content:center">' + content + '</div>'
    + '<div style="font-size:9px;color:rgba(255,255,255,.35);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;text-align:center">' + ic.name + '</div>'
    + '</div>';
}

function renderPickerRecommend(q) {
  const allIcons = getAllPickerIcons();
  const filtered = q ? allIcons.filter(ic => ic.name.toLowerCase().includes(q.toLowerCase())) : allIcons;
  const recommended = filtered.filter(ic => ic.type === 'button');
  const REC_LIMIT = 8;
  const recToShow = pickerRecommendExpanded ? recommended : recommended.slice(0, REC_LIMIT);
  document.getElementById('picker-recommend').innerHTML = recToShow.length
    ? recToShow.map(pickerIconCell).join('')
    : '<div style="grid-column:1/-1;text-align:center;padding:12px 0;color:rgba(255,255,255,.3);font-size:12px">暂无推荐</div>';
  const moreBtn = document.getElementById('picker-recommend-more');
  if (moreBtn) {
    if (recommended.length > REC_LIMIT) {
      moreBtn.style.display = '';
      moreBtn.textContent = pickerRecommendExpanded ? '收起' : '展开全部';
    } else {
      moreBtn.style.display = 'none';
    }
  }
}

function renderPickerFolderGrid() {
  const allPkgs = [...ICON_PKGS, ...MY_DEMO_PKGS, ...(myPkg.icons.length ? [myPkg] : []), ...mySubPkgs];
  const folderCards = allPkgs.map(function(pkg) {
    const cells = pkg.icons.slice(0, 4).map(function(ic) {
      const inner = ic.dataUrl
        ? '<img src="' + ic.dataUrl + '" style="width:100%;height:100%;object-fit:contain">'
        : svgIcon(ic.svg);
      return '<div style="display:flex;align-items:center;justify-content:center;overflow:hidden;background:rgba(255,255,255,.06)">' + inner + '</div>';
    }).join('') + Array(Math.max(0, 4 - pkg.icons.length)).fill('<div style="background:rgba(255,255,255,.04)"></div>').join('');
    return '<div style="cursor:pointer;background:rgba(255,255,255,.05);border-radius:10px;overflow:hidden">'
      + '<div style="width:100%;aspect-ratio:1;background:#0a1520;display:grid;grid-template-columns:1fr 1fr;gap:1px">' + cells + '</div>'
      + '<div style="padding:6px 8px 8px">'
      + '<div style="font-size:12px;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">' + pkg.name + '</div>'
      + '<div style="font-size:10px;color:rgba(255,255,255,.35)">' + pkg.icons.length + ' 个图标</div>'
      + '</div></div>';
  }).join('');
  document.getElementById('picker-folder-grid').innerHTML =
    '<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:8px">' + folderCards + '</div>';
}

function togglePickerRecommend() {
  pickerRecommendExpanded = !pickerRecommendExpanded;
  renderPickerRecommend(document.getElementById('picker-search').value.trim());
}

function filterPickerIcons(val) {
  renderPickerRecommend(val.trim());
}

function triggerPickerImport() {
  document.getElementById('picker-file-input').click();
}

function openIconPicker() {
  pickerRecommendExpanded = false;
  document.getElementById('picker-shell').style.display = '';
  document.getElementById('picker-search').value = '';
  renderPickerRecommend('');
  renderPickerFolderGrid();
}

function closeIconPicker() {
  document.getElementById('picker-shell').style.display = 'none';
}
</script>
