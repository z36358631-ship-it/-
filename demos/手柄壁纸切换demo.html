<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手柄壁纸切换 Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }

.controls { margin-bottom: 16px; display: flex; gap: 12px; align-items: center; }
.controls label { font-size: 14px; color: #666; }
.toggle-btn { padding: 6px 16px; border: 1px solid #ddd; border-radius: 16px; background: #fff; cursor: pointer; font-size: 13px; transition: all .2s; }
.toggle-btn.active { background: #1677ff; color: #fff; border-color: #1677ff; }

.phone { width: 375px; height: 812px; background: #fff; border-radius: 20px; box-shadow: 0 4px 24px rgba(0,0,0,.12); overflow: hidden; position: relative; transition: width .3s, height .3s; }
.phone.landscape { width: 812px; height: 375px; }

.status-bar { height: 44px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; font-size: 12px; color: #333; }
.phone.landscape .status-bar { height: 32px; }

.nav-bar { height: 44px; display: flex; align-items: center; padding: 0 12px; position: relative; }
.nav-bar .back { font-size: 18px; cursor: pointer; color: #333; padding: 4px 8px; }
.nav-bar .title { font-size: 16px; font-weight: 500; color: #333; margin-left: 4px; flex: 1; }
.nav-bar .nav-reset { font-size: 13px; color: #1677ff; cursor: pointer; background: none; border: none; padding: 4px 8px; }
.phone.landscape .nav-bar { height: 36px; }

.page-content { overflow-y: auto; padding: 0 16px 16px; height: calc(100% - 88px); }
.phone.landscape .page-content { height: calc(100% - 68px); }

/* 手柄预览区 - 可点击 */
.controller-preview { width: 100%; aspect-ratio: 2/1; background: #1a1a1a; border-radius: 12px; display: flex; align-items: center; justify-content: center; margin-bottom: 16px; position: relative; overflow: hidden; cursor: pointer; }
.controller-preview:active { opacity: .9; }
.screen-area { width: 160px; height: 80px; border-radius: 8px; overflow: hidden; border: 2px solid #444; background: #000; position: relative; }
.screen-area img { width: 100%; height: 100%; object-fit: cover; display: block; }
.screen-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: #666; font-size: 12px; }
.screen-label { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); color: #999; font-size: 10px; background: rgba(0,0,0,.6); padding: 2px 8px; border-radius: 4px; }
.upload-hint { position: absolute; bottom: 8px; right: 12px; display: flex; align-items: center; gap: 4px; color: rgba(255,255,255,.6); font-size: 11px; }
.upload-hint svg { width: 14px; height: 14px; fill: rgba(255,255,255,.6); }

/* Section */
.section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.section-title { font-size: 14px; font-weight: 500; color: #333; }

/* 历史网格 */
.history-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 20px; }
.phone.landscape .history-grid { grid-template-columns: repeat(4, 1fr); }
.history-item { aspect-ratio: 2/1; border-radius: 8px; overflow: hidden; position: relative; cursor: pointer; border: 2px solid transparent; transition: border-color .2s; }
.history-item.active { border-color: #1677ff; }
.history-item img { width: 100%; height: 100%; object-fit: cover; }
.history-item .wp-check { position: absolute; top: 4px; right: 4px; width: 18px; height: 18px; background: #1677ff; border-radius: 50%; display: none; align-items: center; justify-content: center; }
.history-item.active .wp-check { display: flex; }
.history-item .wp-check::after { content: ''; width: 5px; height: 9px; border: 2px solid #fff; border-top: none; border-left: none; transform: rotate(45deg) translateY(-1px); }
.history-time { position: absolute; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,.55); color: #fff; font-size: 9px; text-align: center; padding: 2px 0; }

/* 底部 */
.bottom-bar { padding: 12px 16px; border-top: 1px solid #f0f0f0; position: absolute; bottom: 0; left: 0; right: 0; background: #fff; }
.btn-apply { width: 100%; height: 40px; border-radius: 20px; background: #1677ff; color: #fff; font-size: 15px; border: none; cursor: pointer; }
.btn-apply:active { background: #0958d9; }
.btn-apply:disabled { background: #ccc; cursor: not-allowed; }

/* 裁切页 */
.crop-page { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 200; display: none; flex-direction: column; }
.crop-page.show { display: flex; }
.crop-header { height: 56px; display: flex; align-items: center; justify-content: space-between; padding: 0 16px; flex-shrink: 0; }
.crop-header span { color: #fff; font-size: 15px; cursor: pointer; padding: 8px; }
.crop-header .confirm { color: #1677ff; font-weight: 600; }
.crop-body { flex: 1; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; touch-action: none; }
.crop-canvas { position: relative; width: 100%; height: 100%; overflow: hidden; }
.crop-canvas img { position: absolute; cursor: grab; user-select: none; -webkit-user-drag: none; transform-origin: center center; }
.crop-canvas img:active { cursor: grabbing; }
.crop-mask { position: absolute; inset: 0; pointer-events: none; z-index: 2; }
.crop-rect { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 150px; box-shadow: 0 0 0 9999px rgba(0,0,0,0.6); border: 2px solid rgba(255,255,255,0.8); border-radius: 4px; }
.crop-hint { color: rgba(255,255,255,0.5); font-size: 13px; text-align: center; padding: 12px; flex-shrink: 0; }


.toast { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); background: rgba(0,0,0,.75); color: #fff; padding: 10px 20px; border-radius: 8px; font-size: 13px; z-index: 999; opacity: 0; transition: opacity .3s; pointer-events: none; }
.toast.show { opacity: 1; }
.empty-hint { text-align: center; color: #999; font-size: 12px; padding: 20px 0; }
</style>
</head>
<body>

<div class="controls">
  <label>屏幕方向：</label>
  <button class="toggle-btn active" onclick="setOrientation('portrait')">竖屏</button>
  <button class="toggle-btn" onclick="setOrientation('landscape')">横屏</button>
</div>

<div class="phone" id="phone">
  <div class="status-bar"><span>16:44</span><span>⚡ 100%</span></div>
  <div class="nav-bar">
    <span class="back">←</span>
    <span class="title">壁纸设置</span>
    <button class="nav-reset" onclick="confirmReset()">恢复默认</button>
  </div>

  <div class="page-content" id="pageContent">
    <!-- 手柄屏幕预览 - 点击拉起相册 -->
    <div class="controller-preview" onclick="pickImage()">
      <div class="screen-area" id="screenArea">
        <div class="screen-placeholder" id="screenPlaceholder">暂无壁纸</div>
      </div>
      <div class="upload-hint">
        <svg viewBox="0 0 24 24"><path d="M19 7v2.99s-1.99.01-2 0V7h-3s.01-1.99 0-2h3V2h2v3h3v2h-3zm-3 4V8h-3V5H5c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-8h-3zM5 19l3-4 2 3 3-4 4 5H5z"/></svg>
        <span>点击更换</span>
      </div>
    </div>

    <!-- 历史记录 -->
    <div class="section-header">
      <span class="section-title">历史记录</span>
    </div>
    <div class="history-grid" id="historyGrid"></div>
    <div class="empty-hint" id="historyEmpty" style="display:none;">暂无历史记录</div>

    <div style="height:60px"></div>
  </div>

  <!-- 底部按钮 -->
  <div class="bottom-bar">
    <button class="btn-apply" id="btnApply" onclick="applyWallpaper()">保存壁纸</button>
  </div>

  <!-- 裁切页 -->
  <div class="crop-page" id="cropPage">
    <div class="crop-header">
      <span onclick="closeCrop()">取消</span>
      <span class="confirm" onclick="confirmCrop()">确定</span>
    </div>
    <div class="crop-body" id="cropBody">
      <div class="crop-canvas" id="cropCanvas">
        <img id="cropImg" draggable="false">
        <div class="crop-mask">
          <div class="crop-rect" id="cropRect"></div>
        </div>
      </div>
    </div>
    <div class="crop-hint">拖动和缩放图片，调整壁纸显示区域</div>
  </div>

</div>

<div class="toast" id="toast"></div>
<input type="file" id="fileInput" accept="image/*" style="display:none">

<script>
const MAX_HISTORY = 5;
const DEFAULT_BG = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
let currentWp = { type: 'gradient', bg: DEFAULT_BG, name: '默认壁纸' };
let selectedWp = null;
let history = [];

// 预填5张历史记录
const mockHistoryColors = [
  'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)',
  'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)',
  'linear-gradient(135deg, #43e97b 0%, #38f9d7 100%)',
  'linear-gradient(135deg, #fa709a 0%, #fee140 100%)',
  'linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%)',
];
mockHistoryColors.forEach((bg, i) => {
  history.push({ type: 'gradient', bg, name: `历史壁纸${i+1}`, time: Date.now() - (i+1) * 3600000 });
});

selectedWp = currentWp;

// --- 裁切状态 ---
let crop = { scale: 1, minScale: 1, x: 0, y: 0, imgW: 0, imgH: 0 };
let dragState = null;
let pinchState = null;

function init() { render(); }

function render() {
  renderHistory();
  updatePreview();
  document.getElementById('btnApply').disabled = !selectedWp;
}

function renderHistory() {
  const grid = document.getElementById('historyGrid');
  const empty = document.getElementById('historyEmpty');
  grid.innerHTML = '';
  if (history.length === 0) { empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  const sorted = [...history].sort((a, b) => b.time - a.time);
  sorted.forEach(wp => {
    const div = document.createElement('div');
    div.className = 'history-item' + (selectedWp === wp ? ' active' : '');
    div.onclick = () => { selectedWp = wp; render(); };
    if (wp.type === 'gradient') {
      div.style.background = wp.bg;
    } else {
      const img = document.createElement('img');
      img.src = wp.dataUrl;
      div.appendChild(img);
    }
    const check = document.createElement('div');
    check.className = 'wp-check';
    div.appendChild(check);
    const time = document.createElement('div');
    time.className = 'history-time';
    time.textContent = formatTime(wp.time);
    div.appendChild(time);
    grid.appendChild(div);
  });
}

function updatePreview() {
  const area = document.getElementById('screenArea');
  const placeholder = document.getElementById('screenPlaceholder');
  const wp = selectedWp || currentWp;
  placeholder.style.display = 'none';
  const existImg = area.querySelector('img');
  if (wp.type === 'gradient') {
    if (existImg) existImg.remove();
    area.style.background = wp.bg;
  } else {
    area.style.background = '#000';
    if (existImg) existImg.src = wp.dataUrl;
    else { const img = document.createElement('img'); img.src = wp.dataUrl; area.appendChild(img); }
  }
}

function pickImage() {
  const input = document.getElementById('fileInput');
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => openCrop(ev.target.result);
    reader.readAsDataURL(file);
    input.value = '';
  };
  input.click();
}

// --- 裁切逻辑 ---
function openCrop(src) {
  const page = document.getElementById('cropPage');
  const img = document.getElementById('cropImg');
  page.classList.add('show');
  img.src = src;
  img.onload = () => {
    const canvas = document.getElementById('cropCanvas');
    const cW = canvas.clientWidth, cH = canvas.clientHeight;
    const rect = document.getElementById('cropRect');
    const rW = rect.clientWidth, rH = rect.clientHeight;
    const natW = img.naturalWidth, natH = img.naturalHeight;
    const fitScale = Math.max(rW / natW, rH / natH);
    crop = { scale: fitScale, minScale: fitScale, x: 0, y: 0, imgW: natW, imgH: natH, cW, cH, rW, rH };
    applyCropPos();
  };
}

function applyCropPos() {
  const img = document.getElementById('cropImg');
  const { scale, x, y, imgW, imgH, cW, cH } = crop;
  const w = imgW * scale, h = imgH * scale;
  img.style.width = w + 'px';
  img.style.height = h + 'px';
  img.style.left = (cW / 2 - w / 2 + x) + 'px';
  img.style.top = (cH / 2 - h / 2 + y) + 'px';
}

function clampCropPos() {
  const { scale, imgW, imgH, rW, rH } = crop;
  const w = imgW * scale, h = imgH * scale;
  const maxX = Math.max(0, (w - rW) / 2);
  const maxY = Math.max(0, (h - rH) / 2);
  crop.x = Math.max(-maxX, Math.min(maxX, crop.x));
  crop.y = Math.max(-maxY, Math.min(maxY, crop.y));
}

// Pointer拖拽
const cropBody = document.getElementById('cropBody');
cropBody.addEventListener('pointerdown', (e) => {
  if (e.pointerType === 'touch' && pinchState) return;
  dragState = { startX: e.clientX - crop.x, startY: e.clientY - crop.y };
  e.target.setPointerCapture && e.target.setPointerCapture(e.pointerId);
});
cropBody.addEventListener('pointermove', (e) => {
  if (!dragState) return;
  crop.x = e.clientX - dragState.startX;
  crop.y = e.clientY - dragState.startY;
  clampCropPos();
  applyCropPos();
});
cropBody.addEventListener('pointerup', () => { dragState = null; });

// 触摸双指缩放
cropBody.addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) {
    e.preventDefault();
    const d = getTouchDist(e.touches);
    pinchState = { startDist: d, startScale: crop.scale };
  }
}, { passive: false });
cropBody.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2 && pinchState) {
    e.preventDefault();
    const d = getTouchDist(e.touches);
    let newScale = pinchState.startScale * (d / pinchState.startDist);
    newScale = Math.max(crop.minScale, Math.min(crop.minScale * 4, newScale));
    crop.scale = newScale;
    clampCropPos();
    applyCropPos();
  }
}, { passive: false });
cropBody.addEventListener('touchend', (e) => { if (e.touches.length < 2) pinchState = null; });

// 鼠标滚轮缩放
cropBody.addEventListener('wheel', (e) => {
  e.preventDefault();
  let newScale = crop.scale * (e.deltaY < 0 ? 1.1 : 0.9);
  newScale = Math.max(crop.minScale, Math.min(crop.minScale * 4, newScale));
  crop.scale = newScale;
  clampCropPos();
  applyCropPos();
}, { passive: false });

function getTouchDist(touches) {
  const dx = touches[0].clientX - touches[1].clientX;
  const dy = touches[0].clientY - touches[1].clientY;
  return Math.sqrt(dx * dx + dy * dy);
}

function closeCrop() {
  document.getElementById('cropPage').classList.remove('show');
}

function confirmCrop() {
  const img = document.getElementById('cropImg');
  const { scale, x, y, imgW, imgH, cW, cH, rW, rH } = crop;
  const w = imgW * scale, h = imgH * scale;
  const imgLeft = cW / 2 - w / 2 + x;
  const imgTop = cH / 2 - h / 2 + y;
  const rectLeft = (cW - rW) / 2;
  const rectTop = (cH - rH) / 2;
  const sx = (rectLeft - imgLeft) / scale;
  const sy = (rectTop - imgTop) / scale;
  const sw = rW / scale;
  const sh = rH / scale;
  // 展示用大图（按原始裁切区域像素输出）
  const outW = Math.round(sw);
  const outH = Math.round(sh);
  const canvas = document.createElement('canvas');
  canvas.width = outW; canvas.height = outH;
  const ctx = canvas.getContext('2d');
  ctx.drawImage(img, sx, sy, sw, sh, 0, 0, outW, outH);
  const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
  const wp = { type: 'image', dataUrl, name: '自定义壁纸', time: Date.now() };
  currentWp = wp;
  selectedWp = wp;
  addToHistory(wp);
  closeCrop();
  render();
}

function addToHistory(wp) {
  if (history.length >= MAX_HISTORY) {
    // 替换时间最早的
    let oldestIdx = 0;
    for (let i = 1; i < history.length; i++) {
      if (history[i].time < history[oldestIdx].time) oldestIdx = i;
    }
    history.splice(oldestIdx, 1);
  }
  history.push(wp);
}

function confirmReset() {
  selectedWp = { type: 'gradient', bg: DEFAULT_BG, name: '默认壁纸' };
  render();
}

function applyWallpaper() {
  if (!selectedWp) return;
  if (selectedWp !== currentWp) {
    currentWp = selectedWp;
    if (selectedWp.type !== 'gradient') {
      if (!history.includes(selectedWp)) {
        selectedWp.time = Date.now();
        addToHistory(selectedWp);
      } else {
        selectedWp.time = Date.now();
      }
    }
  }
  render();
  showToast('壁纸已应用');
}

function setOrientation(mode) {
  const phone = document.getElementById('phone');
  const btns = document.querySelectorAll('.toggle-btn');
  btns.forEach(b => b.classList.remove('active'));
  if (mode === 'landscape') { phone.classList.add('landscape'); btns[1].classList.add('active'); }
  else { phone.classList.remove('landscape'); btns[0].classList.add('active'); }
}

function formatTime(ts) {
  const d = new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()} ${d.getHours()}:${String(d.getMinutes()).padStart(2,'0')}`;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1500);
}

init();
</script>
</body>
</html>
