<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>发行人计划 - 管理后台</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;color:#333}
.layout{display:flex;height:100vh}
.sidebar{width:220px;background:#001529;color:#fff;flex-shrink:0;display:flex;flex-direction:column}
.sidebar .logo{padding:20px 16px;font-size:16px;font-weight:700;border-bottom:1px solid #002140;color:#ff8c00}
.sidebar .menu{flex:1;padding:8px 0}
.menu-item{padding:12px 24px;font-size:14px;color:rgba(255,255,255,.65);cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .2s}
.menu-item:hover{color:#fff;background:#002140}
.menu-item.active{color:#fff;background:#ff8c00}
.menu-item .mi-icon{font-size:16px}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:56px;background:#fff;border-bottom:1px solid #e8e8e8;display:flex;align-items:center;justify-content:space-between;padding:0 24px}
.topbar .page-title{font-size:18px;font-weight:600}
.topbar .user-info{font-size:13px;color:#666}
.page-content{flex:1;overflow-y:auto;padding:24px}
.page{display:none}.page.active{display:block}
/* 通用组件 */
.card{background:#fff;border-radius:8px;padding:20px;margin-bottom:16px;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.card-title{font-size:16px;font-weight:600;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #f0f0f0}
.btn{padding:6px 16px;border-radius:4px;font-size:13px;cursor:pointer;border:1px solid #d9d9d9;background:#fff;color:#333;display:inline-flex;align-items:center;gap:4px}
.btn:hover{border-color:#ff8c00;color:#ff8c00}
.btn-primary{background:#ff8c00;color:#fff;border-color:#ff8c00}
.btn-primary:hover{background:#e67e00}
.btn-danger{color:#ff4d4f;border-color:#ff4d4f}
.btn-danger:hover{background:#fff1f0}
.btn-success{color:#52c41a;border-color:#52c41a}
.btn-success:hover{background:#f6ffed}
.btn-sm{padding:4px 10px;font-size:12px}
.filter-bar{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.filter-bar input,.filter-bar select{padding:6px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;outline:none}
.filter-bar input:focus,.filter-bar select:focus{border-color:#ff8c00}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#fafafa;padding:10px 12px;text-align:left;font-weight:500;color:#666;border-bottom:1px solid #f0f0f0}
td{padding:10px 12px;border-bottom:1px solid #f0f0f0}
tr:hover td{background:#fafafa}
.tag{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px}
.tag-green{background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f}
.tag-orange{background:#fff7e6;color:#fa8c16;border:1px solid #ffd591}
.tag-red{background:#fff1f0;color:#ff4d4f;border:1px solid #ffa39e}
.tag-blue{background:#e6f7ff;color:#1890ff;border:1px solid #91d5ff}
.tag-gray{background:#f5f5f5;color:#999;border:1px solid #d9d9d9}
/* 数据卡片 */
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:24px}
.stat-card{background:#fff;border-radius:8px;padding:20px;text-align:center;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.stat-card .sc-num{font-size:28px;font-weight:700;color:#333;margin-bottom:4px}
.stat-card .sc-label{font-size:12px;color:#999}
.stat-card .sc-change{font-size:11px;margin-top:4px}
.sc-change.up{color:#52c41a}
.sc-change.down{color:#ff4d4f}
/* 弹窗 */
.modal-mask{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.45);z-index:1000;display:none;align-items:center;justify-content:center}
.modal-mask.show{display:flex}
.modal-box{background:#fff;border-radius:8px;width:560px;max-height:80vh;overflow-y:auto;padding:24px}
.modal-box .modal-header{font-size:16px;font-weight:600;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}
.modal-box .modal-close{cursor:pointer;font-size:18px;color:#999}
.modal-box .modal-close:hover{color:#333}
.form-row{margin-bottom:16px}
.form-row label{display:block;font-size:13px;color:#666;margin-bottom:6px}
.form-row input,.form-row select,.form-row textarea{width:100%;padding:8px 12px;border:1px solid #d9d9d9;border-radius:4px;font-size:14px;outline:none}
.form-row input:focus,.form-row select:focus,.form-row textarea:focus{border-color:#ff8c00}
.form-row textarea{height:80px;resize:vertical}
.form-actions{display:flex;gap:12px;justify-content:flex-end;margin-top:20px}
.empty{text-align:center;padding:40px;color:#ccc;font-size:14px}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.75);color:#fff;padding:10px 24px;border-radius:4px;font-size:13px;z-index:2000;opacity:0;transition:opacity .3s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="layout">
<div class="sidebar">
<div class="logo">🎮 发行人计划后台</div>
<div class="menu">
<div class="menu-item active" onclick="switchPage('dashboard')"><span class="mi-icon">📊</span>数据看板</div>
<div class="menu-item" onclick="switchPage('tasks')"><span class="mi-icon">📋</span>任务管理</div>
<div class="menu-item" onclick="switchPage('audit-task')"><span class="mi-icon">✅</span>任务审核</div>
<div class="menu-item" onclick="switchPage('audit-video')"><span class="mi-icon">🎬</span>视频审核</div>
<div class="menu-item" onclick="switchPage('settlement')"><span class="mi-icon">💰</span>结算管理</div>
<div class="menu-item" onclick="switchPage('risk')"><span class="mi-icon">🛡️</span>风控中心</div>
<div class="menu-item" onclick="switchPage('creator-audit')"><span class="mi-icon">👤</span>创作者审核</div>
</div>
</div>
<div class="main">
<div class="topbar"><div class="page-title" id="page-title">数据看板</div><div class="user-info">管理员: 李四 | 超级管理员</div></div>
<div class="page-content" id="page-content"></div>
</div>
</div>
<div class="modal-mask" id="modal"><div class="modal-box" id="modal-box"></div></div>
<div class="toast" id="toast"></div>
<script src="发行人计划-后台demo.js"></script>
</body>
</html>
