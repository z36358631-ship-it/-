function deepClone(value){return JSON.parse(JSON.stringify(value))}
function escapeHtml(value){return String(value).replace(/[&<>"']/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]))}
function findApp(id){for(const item of layout){if(item.type==='folder'){const found=item.items.find(app=>app.id===id);if(found)return found}else if(item.id===id)return item}return APPS.find(app=>app.id===id)}
function findFolder(id){return layout.find(item=>item.type==='folder'&&item.id===id)}
function flattenedApps(){return layout.flatMap(item=>item.type==='folder'?item.items:[item])}
function byName(a,b){const primary=a.name.localeCompare(b.name,navigator.language||'zh-CN');return primary||a.id.localeCompare(b.id)}
function searchResults(query){const key=query.trim().toLocaleLowerCase();return key?flattenedApps().filter(app=>app.name.toLocaleLowerCase().includes(key)).sort(byName):[]}
function pageCount(){return Math.max(1,Math.ceil(layout.length/PAGE_SIZE))}
function currentPageItems(){state.page=Math.min(state.page,pageCount()-1);return layout.slice(state.page*PAGE_SIZE,(state.page+1)*PAGE_SIZE)}

function iconMarkup(item){if(item.type==='folder'){const minis=item.items.slice(0,9).map(app=>`<span class="folder-mini" style="${paletteStyle(app)}">${escapeHtml(app.symbol)}</span>`).join('');return `<span class="app-icon folder-icon">${minis}</span>`}return `<span class="app-icon" style="${paletteStyle(item)}">${escapeHtml(item.symbol)}</span>`}
function appCard(item,scope='top'){const action=item.type==='folder'?'open-folder':'launch',canDrag=state.editing&&scope==='top'&&item.type==='app',canDelete=state.editing&&item.type==='app'&&item.deletable;return `<div class="app-card${state.launchingId===item.id?' launching':''}" role="button" tabindex="0" draggable="false" data-can-drag="${canDrag}" data-item-id="${item.id}" data-item-type="${item.type}" data-deletable="${Boolean(item.deletable)}" data-scope="${scope}" data-action="${action}" data-id="${item.id}" title="${escapeHtml(item.name)}">${canDelete?`<button class="app-delete-badge" data-action="delete-app" data-id="${item.id}" aria-label="删除 ${escapeHtml(item.name)}">−</button>`:''}${iconMarkup(item)}<span class="app-name">${escapeHtml(item.name)}</span>${item.running?'<i class="running-dot" title="正在运行"></i>':''}</div>`}
function renderGrid(animate=false){const searching=Boolean(state.query.trim()),items=searching?searchResults(state.query):currentPageItems(),scope=searching?'search':'top';if(!items.length)return `<div class="empty-result"><div><div class="empty-icon">⌕</div><h2>未找到应用</h2></div></div>`;return `<div class="app-grid${animate?' page-enter':''}">${items.map(item=>appCard(item,scope)).join('')}</div>`}

function renderSettings(){if(!state.settings)return '';return `<div class="overlay-shade"></div><section class="settings-modal" data-annotation-id="11"><header class="settings-head"><button class="mac-close" data-action="close-settings" aria-label="关闭"></button>设置</header><div class="settings-scroll"><div class="settings-group-title">程序坞</div><div class="setting-card"><div class="setting-row"><div class="grow">添加到程序坞<small>使用盖世同款图标，点击直接打开全屏启动台</small></div>${settingToggle('dock',state.dockAdded)}</div></div><div class="settings-group-title">快速唤起</div><div class="setting-card"><div class="setting-row"><div class="grow">自定义快捷键</div><span class="setting-value">${state.settingsDraft.shortcut}</span><button class="settings-action" data-action="record-shortcut">重新录入</button></div><div class="setting-row"><div class="grow">F4 键<small>权限：${permissionLabel(permissions.f4)}</small></div>${permissions.f4==='denied'?'<button class="settings-action blue" data-action="request-permission" data-permission="f4">去授权</button>':settingToggle('f4',state.settingsDraft.f4,permissions.f4==='unsupported')}</div><div class="setting-row"><div class="grow">触控板手势<small>权限：${permissionLabel(permissions.trackpad)}</small></div>${permissions.trackpad==='denied'?'<button class="settings-action blue" data-action="request-permission" data-permission="trackpad">去授权</button>':settingToggle('trackpad',state.settingsDraft.trackpad,permissions.trackpad==='unsupported')}</div><div class="setting-row"><div class="grow">屏幕触发角</div><select class="settings-select" data-action="set-corner"><option>关闭</option><option ${state.settingsDraft.corner==='左上'?'selected':''}>左上</option><option ${state.settingsDraft.corner==='右上'?'selected':''}>右上</option><option ${state.settingsDraft.corner==='左下'?'selected':''}>左下</option><option ${state.settingsDraft.corner==='右下'?'selected':''}>右下</option></select></div></div><div class="settings-group-title">应用来源</div><div class="setting-card" data-annotation-id="13"><div class="setting-row"><div class="grow">标准应用目录<small class="source-path">/Applications · /System/Applications · ~/Applications</small></div><span class="source-status">正常</span></div>${customSources.map(source=>`<div class="setting-row"><div class="grow">自定义目录<small class="source-path">${escapeHtml(source.path)}</small></div><span class="source-status ${source.status==='granted'?'':'error'}">${source.status==='granted'?'已授权':'目录失效'}</span>${source.status==='granted'?'':`<button class="settings-action blue" data-action="reauthorize-source" data-id="${source.id}">重新授权</button>`}<button class="settings-action red" data-action="remove-source" data-id="${source.id}">移除</button></div>`).join('')}<div class="setting-row"><button class="settings-action blue" data-action="add-source">＋ 添加自定义目录</button><span class="grow"></span><button class="settings-action" data-action="invalidate-source">模拟目录失效</button></div></div><p style="font-size:9px;color:#85868b;line-height:1.55;margin:4px 2px 0">应用列表、绝对路径、排序与文件夹仅保存在本机。添加目录通过系统选择器申请持续访问授权。</p></div>${badge(11,'left:16px;top:12px')}${badge(13,'right:14px;bottom:70px')}</section>`}
function renderPermission(){if(!state.permission)return '';const label=state.permission.type==='f4'?'F4 键监听':'触控板手势';return `<div class="overlay-shade"></div><section class="permission-modal" data-annotation-id="12"><div class="permission-icon">⌘</div><h3>允许“盖世游戏”使用${label}</h3><p>仅用于在盖世前台、后台驻留或最小化时唤起启动台。盖世彻底退出后不会继续监听。</p><div class="permission-actions"><button data-action="resolve-permission" data-status="unsupported">模拟不支持</button><button data-action="resolve-permission" data-status="denied">拒绝</button><button class="primary" data-action="resolve-permission" data-status="granted">去授权并允许</button></div>${badge(12,'right:18px;top:18px')}</section>`}
