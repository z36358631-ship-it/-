function findApp(id){for(const item of layout){if(item.type==='folder'){const found=item.items.find(app=>app.id===id);if(found)return found}else if(item.id===id)return item}return APPS.find(app=>app.id===id)}

tingsDraft.corner==='左上'?'selected':''}>左上</option><option ${state.settingsDraft.corner==='右上'?'selected':''}>右上</option><option ${state.settingsDraft.corner==='左下'?'selected':''}>左下</option><option ${state.settingsDraft.corner==='右下'?'selected':''}>右下</option></select></div></div><div class="settings-group-title">应用来源</div><div class="setting-card" data-annotation-id="13"><div class="setting-row"><div class="grow">标准应用目录<small class="source-path">/Applications · /System/Applications · ~/Applications</small></div><span class="source-status">正常</span></div>${customSources.map(source=>`<div class="setting-row"><div class="grow">自定义目录<small class="source-path">${escapeHtml(source.path)}</small></div><span class="source-status ${source.status==='granted'?'':'error'}">${source.status==='granted'?'已授权':'目录失效'}</span>${source.status==='granted'?'':`<button class="settings-action blue" data-action="reauthorize-source" data-id="${source.id}">重新授权</button>`}<button class="settings-action red" data-action="remove-source" data-id="${source.id}">移除</button></div>`).join('')}<div class="setting-row"><button class="settings-action blue" data-action="add-source">＋ 添加自定义目录</button><span class="grow"></span><button class="settings-action" data-action="invalidate-source">模拟目录失效</button></div></div><p style="font-size:9px;color:#85868b;line-height:1.55;margin:4px 2px 0">应用列表、绝对路径、排序与文件夹仅保存在本机。添加目录通过系统选择器申请持续访问授权。</p></div>${badge(11,'left:16px;top:12px')}${badge(13,'right:14px;bottom:70px')}</section>`}

function requestDelete(appId){const app=findApp(appId);if(!app||!app.deletable)return showToast('系统或受保护应用不能删除');const origin=state.folderId?'folder':'edit';state.deleteDialog={type:app.running?'blocked':'confirm',appId,origin};state.screen=app.running?'deleteBlocked':'deleteConfirm';render()}
function closeDeleteDialog(){const origin=state.deleteDialog?.origin||'edit';state.deleteDialog=null;state.screen=origin;render()}
function trashApp(appId){const app=findApp(appId);if(!app)return closeDeleteDialog();if(app.running){state.deleteDialog={type:'blocked',appId,origin:state.deleteDialog?.origin||'edit'};state.screen='deleteBlocked';render();return}if(app.trashOutcome==='readonly'){state.deleteDialog=null;state.screen=state.folderId?'folder':'edit';render();return showToast(`不能将“${app.name}”移到废纸篓：应用位于只读卷`)}let removed=false;const topIndex=layout.findIndex(item=>item.id===appId);if(topIndex>=0){layout.splice(topIndex,1);removed=true}else{for(const folder of layout.filter(item=>item.type==='folder')){const index=folder.items.findIndex(item=>item.id===appId);if(index>=0){folder.items.splice(index,1);removed=true;dissolveFolderIfNeeded(folder);break}}}if(!removed)return closeDeleteDialog();normalizeLayout();state.deleteDialog=null;state.page=Math.min(state.page,pageCount()-1);state.screen=state.folderId?'folder':'edit';render();showToast(`已将“${app.name}”移到废纸篓`)}
function addToDock(){state.dockAdded=true;state.dockGuide=false;render();showToast('已添加启动台到程序坞')}
function openDockLauncher(){const cold=state.clientProcess==='quit';state.clientProcess='foreground';state.trigger='dock';state.dockAdded=true;state.dockGuide=false;state.screen='launchpad';state.menu=false;state.settings=false;state.permission=null;state.deleteDialog=null;state.editing=false;state.folderId=null;state.query='';render();showToast(cold?'已启动盖世并从程序坞打开全屏启动台':'已从程序坞打开全屏启动台')}
function requestPermission(type){state.permission={type,status:'pending'};state.settings=true;state.screen='permission';render()}
function resolvePermission(status){if(!state.permission)return;const type=state.permission.type;permissions[type]=status;state.settingsDraft[type]=status==='granted';state.permission=null;state.screen='settings';render();showToast(status==='granted'?'授权成功':status==='denied'?'已拒绝，仅关闭当前入口':'当前系统或设备不支持')}
function triggerAvailability(type){if(type==='shortcut')return state.settingsDraft.shortcutEnabled;if(type==='f4')return state.settingsDraft.f4&&permissions.f4==='granted';if(type==='trackpad')return state.settingsDraft.trackpad&&permissions.trackpad==='granted';if(type==='hot_corner')return state.settingsDraft.corner!=='关闭';return false}
function triggerLauncher(type){if(state.clientProcess==='quit')return showToast('盖世已彻底退出，全局入口不可用');if(!triggerAvailability(type))return showToast('该入口未启用、未授权或不受支持');if(state.screen!=='client'){state.screen='client';state.query='';state.folderId=null;state.settings=false;state.permission=null;state.deleteDialog=null;state.editing=false;render();return showToast('已关闭启动台并恢复唤起前应用')}state.trigger=type;state.screen='launchpad';state.editing=false;state.page=Math.min(state.page,pageCount()-1);render();showToast(`已通过${type==='shortcut'?'快捷键':type==='f4'?'F4':type==='trackpad'?'触控板':'触发角'}唤起`)}
function activateGameHub(){state.screen='client';state.query='';state.folderId=null;render();showToast('已激活盖世游戏窗口')}
function startLaunch(id){if(state.launchingId||state.editing)return;const app=findApp(id);if(!app||app.type==='folder')return;if(app.outcome==='return')return activateGameHub();state.launchOrigin=state.folderId?'folder':state.query?'search':'launchpad';state.launchingId=id;state.lastAppId=id;state.failedId='';state.screen='launching';render();showToast(app.running?'正在通过 NSWorkspace 激活已有窗口':'正在通过 NSWorkspace 打开应用');clearTimeout(launchTimer);launchTimer=setTimeout(()=>{state.launchingId='';if(app.outcome==='failure'){state.failedId=id;state.screen='failure';render();showToast('启动失败，启动台已保留')}else{state.screen=state.launchOrigin;render();showToast(`已调用 macOS ${app.running?'激活':'打开'} ${app.name}，Demo 不展示目标应用`)}},900)}
function setFlow(id){clearTimeout(launchTimer);clearLongPress();state.menu=false;state.settings=false;state.permission=null;state.editingFolder=false;state.editing=false;state.deleteDialog=null;state.launchingId='';state.failedId='';state.query='';state.folderId=null;if(id==='client')state.screen='client';else if(id==='launchpad')state.screen='launchpad';else if(id==='search'){state.screen='search';state.query='不存在的应用';state.preSearchPage=state.page}else if(id==='edit'){state.screen='edit';state.editing=true}else if(id==='folder'){state.screen='folder';state.folderId='folder-utilities'}else if(id==='deleteConfirm'){state.screen='deleteConfirm';state.editing=true;state.deleteDialog={type:'confirm',appId:'app-13',origin:'edit'}}else if(id==='deleteBlocked'){state.screen='deleteBlocked';state.editing=true;state.deleteDialog={type:'blocked',appId:'app-22',origin:'edit'}}else if(id==='settings'){state.screen='settings';state.settings=true}else if(id==='permission'){state.screen='permission';state.settings=true;state.permission={type:'f4',status:'pending'}}else if(id==='launching'){state.screen='launching';state.launchingId='app-22';state.lastAppId='app-22'}else if(id==='failure'){state.screen='failure';state.failedId='app-57'}render()}
function handleAction(action,el){
if(action==='flow')return setFlow(el.dataset.value);
if(action==='toggle-panel'){state.panel=!state.panel;shell.classList.toggle('panel-hidden',!state.panel);setTimeout(updateScale,230);return}
if(action==='toggle-markers'){state.showMarkers=!state.showMarkers;el.textContent=state.showMarkers?'隐藏标号':'显示标号';canvas.classList.toggle('markers-off',!state.showMarkers);return}
if(action==='anno-tab'){state.annotationTab=el.dataset.value;renderNotes();return}
if(action==='flash-annotation')return flashAnnotation(el.dataset.annotationRef);
if(action==='set-process'){state.clientProcess=el.dataset.value;if(state.clientProcess==='quit'){state.screen='client';state.editing=false;state.deleteDialog=null}render();return showToast(state.clientProcess==='quit'?'盖世已彻底退出':'盖世进程状态已切换')}
if(action==='global-trigger')return triggerLauncher(el.dataset.trigger);
if(action==='enter-launchpad'){if(state.clientProcess==='quit')return showToast('请先打开盖世客户端');state.trigger='sidebar';state.screen='launchpad';state.editing=false;render();return}
if(action==='open-dock-launcher')return openDockLauncher();
if(action==='add-to-dock')return addToDock();
if(action==='dismiss-dock-guide'){state.dockGuide=false;render();return showToast('引导已关闭，可随时在设置中添加')}
if(action==='toggle-more'){state.menu=!state.menu;render();return}
if(action==='open-settings'){state.menu=false;state.settings=true;state.screen='settings';render();return}
if(action==='exit-launchpad'){state.menu=false;state.screen='client';state.query='';render();return}
if(action==='close-settings'){state.settings=false;state.permission=null;state.screen='launchpad';render();return}
if(action==='toggle-setting'){const key=el.dataset.setting;if(key==='resident'){if(state.clientProcess==='quit')state.clientProcess='background';else state.clientProcess='quit';state.screen=state.clientProcess==='quit'?'client':'settings';render();return}if((key==='f4'||key==='trackpad')&&permissions[key]!=='granted')return requestPermission(key);state.settingsDraft[key]=!state.settingsDraft[key];render();return showToast('设置已保存并立即生效')}
if(action==='record-shortcut'){state.settingsDraft.shortcut=state.settingsDraft.shortcut==='⌥ Space'?'⌘ ⇧ L':'⌥ Space';render();return showToast('快捷键已保存；冲突组合会被拒绝')}
if(action==='set-corner')return;
if(action==='request-permission')return requestPermission(el.dataset.permission);
if(action==='resolve-permission')return resolvePermission(el.dataset.status);
if(action==='add-source'){if(customSources.some(source=>source.path==='/Volumes/Workspace/Applications'))return showToast('该目录已添加，不能重复');customSources.push({id:`source-${Date.now()}`,path:'/Volumes/Workspace/Applications',status:'granted'});render();return showToast('已添加自定义目录')}
if(action==='remove-source'){const index=customSources.findIndex(source=>source.id===el.dataset.id);if(index>=0)customSources.splice(index,1);render();return showToast('已移除目录来源，不会卸载应用')}
if(action==='invalidate-source'){if(customSources[0])customSources[0].status='invalid';render();return showToast('已模拟目录失效')}
if(action==='reauthorize-source'){const source=customSources.find(item=>item.id===el.dataset.id);if(source)source.status='granted';render();return showToast('目录已重新授权')}
if(action==='page-dot')return goToPage(el.dataset.page,'dot');
if(action==='launch')return startLaunch(el.dataset.id);
if(action==='open-folder')return openFolder(el.dataset.id);
if(action==='close-folder'){state.folderId=null;state.editingFolder=false;state.screen='launchpad';render();return}
if(action==='edit-folder-title'){state.editingFolder=true;render();return}
if(action==='remove-from-folder')return removeFromFolder(state.folderId,el.dataset.id);
if(action==='delete-app')return requestDelete(el.dataset.id);
if(action==='cancel-delete')return closeDeleteDialog();
if(action==='confirm-delete')return trashApp(state.deleteDialog?.appId);
if(action==='retry'){state.screen='launchpad';const id=state.failedId||'app-57';state.failedId='';return startLaunch(id)}
if(action==='simulate-edit')return setFlow('edit');
if(action==='simulate-failure')return setFlow('failure');
if(action==='reset-demo'){layout=deepClone(defaultLayout);Object.assign(state,{screen:'client',page:0,query:'',menu:false,settings:false,permission:null,folderId:null,editingFolder:false,editing:false,deleteDialog:null,launchingId:'',failedId:'',clientProcess:'foreground',drag:null,dockGuide:true,dockAdded:false});render();return showToast('Demo 已重置')}
if(action==='scope')return showToast('已模拟：现有启动台迁移到鼠标所在显示器，不创建第二实例');
if(action==='activate-gamehub')return activateGameHub()
}
document.addEventListener('pointerdown',event=>{if(event.button!==0||event.target.closest('.app-delete-badge'))return;const card=event.target.closest('.app-card');if(!card||state.screen==='client'||state.settings||state.deleteDialog)return;clearLongPress();pointerPress={x:event.clientX,y:event.clientY,id:event.pointerId};longPressTimer=setTimeout(()=>{if(pointerPress)enterEditMode()},LONG_PRESS_MS)});
document.addEventListener('pointermove',event=>{if(!pointerPress||pointerPress.id!==event.pointerId)return;if(Math.hypot(event.clientX-pointerPress.x,event.clientY-pointerPress.y)>MOVE_TOLERANCE)clearLongPress()});
document.addEventListener('pointerup',clearLongPress);document.addEventListener('pointercancel',clearLongPress);
document.addEventListener('click',event=>{const el=event.target.closest('[data-action]');if(Date.now()<state.suppressClickUntil&&el?.classList.contains('app-card'))return;if(state.editing&&el?.dataset.action==='launch')return;if(el)return handleAction(el.dataset.action,el);if(state.editing){state.editing=false;state.screen=state.folderId?'folder':'launchpad';render();showToast('已退出编辑模式')}});
document.addEventListener('change',event=>{if(event.target.matches('[data-action="set-corner"]')){state.settingsDraft.corner=event.target.value;render();showToast('触发角已保存并立即生效')}});
document.addEventListener('input',event=>{if(event.target.id==='launchpadSearch'){if(!state.query)state.preSearchPage=state.page;state.query=event.target.value;state.screen=state.query.trim()?'search':'launchpad';render();setTimeout(()=>{const input=document.getElementById('launchpadSearch');input?.focus();input?.setSelectionRange(input.value.length,input.value.length)},0)}});
document.addEventListener('focusout',event=>{if(event.target.id==='folderNameInput'&&state.editingFolder)renameFolder(state.folderId,event.target.value)});
document.addEventListener('dragstart',event=>{clearLongPress();const card=event.target.closest('.app-card');if(!card)return;state.drag={id:card.dataset.itemId,scope:card.dataset.scope,folderId:state.folderId};event.dataTransfer.effectAllowed='move';event.dataTransfer.setData('text/plain',state.drag.id);requestAnimationFrame(()=>card.classList.add('dragging'))});
document.addEventListener('dragover',event=>{if(!state.drag)return;event.preventDefault();event.dataTransfer.dropEffect='move'});
document.addEventListener('drop',event=>{if(!state.drag)return;event.preventDefault();const target=event.target.closest('.app-card');if(target&&target.dataset.itemId!==state.drag.id&&state.drag.scope==='top'&&target.dataset.scope==='top'){const targetItem=layout.find(item=>item.id===target.dataset.itemId);if(targetItem?.type==='folder')moveIntoFolder(state.drag.id,targetItem.id);else createFolder(state.drag.id,target.dataset.itemId)}state.drag=null;render()});
document.addEventListener('dragend',()=>{if(state.drag){state.drag=null;render()}});
document.addEventListener('keydown',event=>{
if(event.key==='Enter'&&event.target.id==='folderNameInput'){event.preventDefault();return renameFolder(state.folderId,event.target.value)}
if((event.metaKey||event.ctrlKey)&&event.key.toLowerCase()==='f'&&state.screen!=='client'){event.preventDefault();return document.getElementById('launchpadSearch')?.focus()}
if(event.key==='Escape'&&state.screen!=='client'){event.preventDefault();if(state.deleteDialog)return closeDeleteDialog();if(state.permission){state.permission=null;state.screen='settings';return render()}if(state.settings){state.settings=false;state.screen='launchpad';return render()}if(state.menu){state.menu=false;return render()}if(state.editingFolder){state.editingFolder=false;return render()}if(state.drag){state.drag=null;render();return showToast('已取消文件夹拖放')}if(state.editing){state.editing=false;state.screen=state.folderId?'folder':'launchpad';render();return showToast('已退出编辑模式')}if(state.folderId){state.folderId=null;state.screen='launchpad';return render()}if(state.query){state.query='';state.screen='launchpad';state.page=state.preSearchPage;return render()}if(state.launchingId)return showToast('应用正在启动，请等待结果');state.screen='client';return render()}
const card=event.target.closest('.app-card');if(card&&event.key==='Enter'){event.preventDefault();if(state.editing&&card.dataset.action==='launch')return;return handleAction(card.dataset.action,card)}if(card&&['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(event.key)){const cards=[...document.querySelectorAll('.app-card')],index=cards.indexOf(card);let next=index;if(event.key==='ArrowLeft')next=index-1;if(event.key==='ArrowRight')next=index+1;if(event.key==='ArrowUp')next=index-7;if(event.key==='ArrowDown')next=index+7;if(next>=0&&next<cards.length){event.preventDefault();cards[next].focus()}return}if(!card&&!state.query&&state.screen!=='client'){if(event.key==='ArrowLeft'){event.preventDefault();goToPage(state.page-1,'keyboard')}if(event.key==='ArrowRight'){event.preventDefault();goToPage(state.page+1,'keyboard')}}
});
canvas.addEventListener('wheel',event=>{if(state.screen==='client'||state.query||state.settings||state.folderId||state.deleteDialog)return;event.preventDefault();const direction=(Math.abs(event.deltaX)>Math.abs(event.deltaY)?event.deltaX:event.deltaY)>0?1:-1;if(!pageThrottle){goToPage(state.page+direction,event.deltaX?'trackpad':'wheel');pageThrottle=true;setTimeout(()=>pageThrottle=false,450)}},{passive:false});
window.addEventListener('resize',updateScale);
const previewParams=new URLSearchParams(location.search);
if(previewParams.get('markers')==='0')state.showMarkers=false;
const previewScreen=previewParams.get('screen');
if(previewScreen&&FLOW.some(flow=>flow.id===previewScreen))setFlow(previewScreen);else render();
updateScale();
</script>
</body>
</html>
