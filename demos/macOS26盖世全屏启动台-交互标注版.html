function appIsGame(app){return state.gameOverrides.has(app.id)?state.gameOverrides.get(app.id):app.game}
function iconGlyph(type){const map={explore:'◈',cloud:'☁',catalog:'◉',library:'▦',launcher:'▦',search:'⌕',download:'⇩',settings:'⚙'};return map[type]||'•'}
function clientMarkup(){const items=[['explore','探索'],['cloud','云游戏'],['catalog','找游戏'],['library','游戏库'],['launcher','启动台']];return `<div class="client"><aside class="client-rail"><div class="traffic"><i></i><i></i><i></i></div><div class="brand-mark">G</div>${items.map(([id,name])=>`<button class="rail-item ${id==='explore'?'active':''} ${id==='launcher'?'launcher-entry':''}" data-action="${id==='launcher'?'enter-launcher':'scope'}" ${id==='launcher'?'data-annotation-id="1"':''} title="${name}"><span class="rail-ico">${iconGlyph(id)}</span><span>${name}</span></button>`).join('')}<div class="rail-space"></div><button class="rail-item" data-action="scope"><span class="rail-ico">⚙</span><span>设置</span></button><div class="avatar">游</div></aside><main class="client-main"><header class="client-top"><h2>探索</h2><div class="search-pill">⌕　搜索游戏</div></header><section class="hero"><div class="hero-art">🌌</div><div class="hero-copy"><span class="hero-kicker">本周精选 · Mac 游戏</span><h1>在 Mac 上发现<br>下一款好游戏</h1><p>浏览、管理并启动你的游戏。<br>一个地方，连接所有平台。</p><button class="green-btn" data-action="scope">开始探索</button></div></section><section class="client-section"><h3>最近游玩</h3><div class="cover-row">${['DEATH STRANDING','Hades','Baldur\'s Gate 3','DAVE THE DIVER'].map((x,i)=>`<div class="cover" style="background:linear-gradient(140deg,${['#455d6d,#111b23','#9d3b38,#29101c','#785b3a,#281c1b','#166c86,#11283d'][i]})"><span>${x}</span></div>`).join('')}</div></section></main><span class="badge entry-badge" data-annotation-id="1">1</span></div>`}
function wallpaper(inner=''){return `<div class="wallpaper"><div class="desktop-menubar"><span><strong>●</strong>　盖世游戏</span><span>7月20日 周一　20:26　📶　◉</span></div>${inner}</div>`}
function renderTransition(){return wallpaper(`<div class="transition-client">${clientMarkup()}</div><div class="transition-copy" data-annotation-id="2">正在进入全屏启动台…</div><span class="badge" data-annotation-id="2" style="left:720px;bottom:76px">2</span>`)}
function renderScanning(){return wallpaper(`<main class="launcher">${launcherRail()}<section class="launcher-main"><div class="launcher-title-row"><div><h1>启动台</h1><p>正在读取这台 Mac 上的可启动应用</p></div></div><div class="scan-grid">${Array.from({length:12},()=>'<div class="skeleton"></div>').join('')}</div><div class="scan-copy" data-annotation-id="3"><h2>正在查找应用…</h2><p>已完成的结果会立即显示，扫描不会上传应用列表</p></div></section></main><span class="badge" data-annotation-id="3" style="left:536px;top:570px">3</span>`)}
function visibleApps(){let list=state.category==='games'?APPS.filter(appIsGame):APPS;if(state.empty&&state.category==='games')list=[];const q=state.query.trim().toLocaleLowerCase();return q?list.filter(a=>a.name.toLocaleLowerCase().includes(q)):list}
function appCard(app,index){const launching=state.launchingId===app.id;return `<button class="app-card ${launching?'is-launching':''}" data-action="launch" data-id="${app.id}" data-index="${index}" ${launching?'data-annotation-id="10"':''} title="${app.name}"><span class="app-icon" style="--c1:${app.c1};--c2:${app.c2};color:${app.dark?'#27313a':'#fff'}"><span>${app.symbol}</span></span><span class="app-name">${app.name}</span></button>`}
function gameCoverCard(app,index){const launching=state.launchingId===app.id;return `<button class="game-cover-card ${launching?'is-launching':''}" data-action="launch" data-id="${app.id}" data-index="${index}" ${launching?'data-annotation-id="10"':''} title="启动 ${app.name}"><span class="game-cover"><img src="${app.cover}" alt="${app.name}"></span><span class="game-card-title"><strong>${app.name}</strong><b class="game-score">${app.score||'9.0'}</b></span><span class="game-card-meta">${app.tags||'本地游戏'} · Steam</span></button>`}
function launcherRail(){return `<aside class="gaishi-launcher-rail"><button class="launcher-brand" data-action="scope" title="盖世游戏">↔…</button><button class="launcher-rail-btn" data-action="scope" title="首页">⌂</button><button class="launcher-rail-btn" data-action="scope" title="云游戏">☁</button><button class="launcher-rail-btn" data-action="scope" title="数据">≡</button><button class="launcher-rail-btn" data-action="scope" title="找游戏">⌕</button><button class="launcher-rail-btn active" title="启动台">▦</button><span class="launcher-rail-space"></span><button class="launcher-rail-btn" data-action="scope" title="搜索">○</button><button class="launcher-rail-btn" data-action="scope" title="下载">⇩</button><span class="avatar">游</span></aside>`}
function launcherChrome(content){const tabTarget=state.category==='games'?' data-annotation-id="4"':'';return wallpaper(`<main class="launcher">${launcherRail()}<section class="launcher-main"><div class="launcher-top"><div class="launcher-title-row"><div><h1>启动台</h1><p>浏览并启动这台 Mac 上的游戏与应用</p></div></div><div class="launcher-toolbar"><div class="segments"${tabTarget}><button class="segment ${state.category==='games'?'active':''}" data-action="category" data-value="games">游戏</button><button class="segment ${state.category==='all'?'active':''}" data-action="category" data-value="all">全部应用</button></div><button class="launcher-filter">全部 ⌄</button><button class="launcher-filter">名称 (A-Z) ⌄</button><label class="launcher-search" data-annotation-id="8"><input id="launcherSearch" value="${escapeHtml(state.query)}" placeholder="搜索${state.category==='games'?'游戏':'应用'}" aria-label="搜索当前分类"><span class="shortcut">⌘ F</span></label></div></div>${content}<div class="launcher-footer" data-annotation-id="6">Esc 退出启动台</div></section></main><span class="badge tabs-badge" data-annotation-id="${state.category==='games'?'4':'7'}">${state.category==='games'?'4':'7'}</span>${state.screen==='search'?'<span class="badge search-badge" data-annotation-id="8">8</span>':''}<span class="badge footer-badge" data-annotation-id="6">6</span>`)}
function renderLauncher(){const list=visibleApps();let content;if(!list.length){const noResult=Boolean(state.query.trim());content=`<div class="apps-viewport state-center" data-annotation-id="13"><div><div class="state-icon">${noResult?'⌕':'▦'}</div><h2>${noResult?'没有找到结果':'还没有可启动的游戏'}</h2><p>${noResult?(state.category==='games'?'“游戏”中没有匹配项，可切换到全部应用继续搜索。':'尝试其他应用名称。'):'前往全部应用，将本地应用添加到游戏。'}</p>${state.category==='games'?`<button class="text-action" data-action="category" data-value="all">${noResult?'切换到全部应用':'前往全部应用添加游戏'} →</button>`:''}</div></div>`}else{const games=state.category==='games',grid=games?`<div class="launcher-section-head"><h2>本地游戏</h2><span>(${list.length})</span></div><div class="game-cover-grid" data-annotation-id="5">${list.map(gameCoverCard).join('')}</div>`:`<div class="launcher-section-head"><h2>全部应用</h2><span>(${list.length})</span></div><div class="app-grid" data-annotation-id="7">${list.map(appCard).join('')}</div>`;content=`<div id="appsViewport" class="apps-viewport">${grid}</div><span class="badge grid-badge" data-annotation-id="${games?'5':'7'}">${games?'5':'7'}</span>`}const failed=state.failedId?`<div class="notice" data-annotation-id="12">无法打开 ${APPS.find(a=>a.id===state.failedId)?.name}：应用无响应。<button data-action="retry">重试</button></div>`:'';const menu=state.context?renderContextMenu():'';return launcherChrome(content+failed+menu)}
function renderContextMenu(){const app=APPS.find(a=>a.id===state.context.id),game=appIsGame(app);return `<div class="context-menu" data-annotation-id="9" style="left:${state.context.x}px;top:${state.context.y}px"><button data-action="toggle-game" data-id="${app.id}">${game?'从游戏中移除':'添加到游戏'}</button></div><span class="badge" data-annotation-id="9" style="left:${state.context.x+150}px;top:${state.context.y-12}px">9</span>`}
function renderExternal(){const app=APPS.find(a=>a.id===(state.launchingId||'death'))||APPS[2],cover=app.cover||'assets/macos-launcher/forza.jpg';return `<section class="game-fullscreen" data-annotation-id="11"><div class="game-fullscreen-bg" style="background-image:url('${cover}')"></div><div class="game-fullscreen-shade"></div><header class="game-fullscreen-top"><button class="return-launcher" data-action="back-launcher">‹ 返回启动台</button><div class="game-running-chip"><i></i>${app.name} 正在运行</div></header><div class="game-fullscreen-copy"><span>已从盖世启动</span><h1>${app.name}</h1><p>目标游戏以全屏方式运行。启动台保留在后层，结束或返回后重新显示启动台。</p><div class="game-fullscreen-actions"><button class="primary" data-action="back-launcher">结束演示并返回启动台</button></div></div><span class="badge" data-annotation-id="11" style="left:250px;top:82px">11</span></section>`}
function render(){let html='';if(state.screen==='entry')html=clientMarkup();else if(state.screen==='transition')html=renderTransition();else if(state.screen==='scanning')html=renderScanning();else if(state.screen==='external')html=renderExternal();else{if(state.screen==='games'||state.screen==='empty'){state.category='games';state.empty=state.screen==='empty'}if(state.screen==='all'||state.screen==='classify'){state.category='all';state.empty=false}if(state.screen==='launching')state.launchingId=state.launchingId||'death';if(state.screen==='failure')state.failedId=state.failedId||'cyberpunk';html=renderLauncher()}canvas.classList.toggle('fullscreen-preview',state.screen==='external');canvas.innerHTML=html;renderFlow();renderNotes();requestAnimationFrame(restoreScroll);updateScale()}
function renderFlow(){document.getElementById('flowList').innerHTML=FLOW.map((x,i)=>`${x.group?`<div class="flow-group">${x.group}</div>`:''}<button class="flow-item ${state.screen===x.id?'active':''}" data-action="flow" data-value="${x.id}"><span class="flow-index">${i+1}</span><span>${x.name}</span></button>`).join('')}
function globalNote(list){const index=Math.max(1,FLOW.findIndex(item=>item.id===state.screen)+1),copy=state.screen==='entry'?'入口仅对 macOS 26 及以上显示，客户端内不打开普通内容页。':state.screen==='external'?'目标游戏全屏运行时，启动台保留在后层；结束游戏后回到启动台。':state.screen==='games'?'开发实现基准：1076×734 内层画布、82px 左侧栏、内容区左右间距 31/36px、四列 16:9 游戏封面。':'启动台只读取本地可启动应用，不混入商城、广告、云游戏或未安装内容。';return{id:`G${index}`,ref:String(list[0]?.n||1),title:'全局逻辑',copy}}
function renderNotes(){const list=NOTES[state.screen]||NOTES[state.category]||[],page=FLOW.find(x=>x.id===state.screen)?.name||'交互标注',tabs=[...document.querySelectorAll('.anno-tab')];tabs.forEach(tab=>tab.classList.toggle('active',tab.dataset.value===state.annotationTab));document.getElementById('annoTitle').textContent=page;document.getElementById('annoSub').textContent=state.annotationTab==='interaction'?`${list.length} 个交互点 · 可点击反向定位`:`${list.length} 个异常与边界`;const section=`<div class="anno-section">${page.toUpperCase()}</div>`;if(state.annotationTab==='edge'){document.getElementById('annoList').innerHTML=section+list.map(n=>`<article class="anno-item" data-action="flash-annotation" data-annotation-ref="${n.n}"><div class="anno-item-head"><span class="anno-item-badge edge">E${n.n}</span><span class="anno-item-title">${n.title}</span></div><div class="anno-item-body"><div class="anno-line"><span class="tag tag-red">异常&amp;边界</span>${n.edge}</div></div></article>`).join('');return}const global=globalNote(list);document.getElementById('annoList').innerHTML=section+`<article class="anno-item" data-action="flash-annotation" data-annotation-ref="${global.ref}"><div class="anno-item-head"><span class="anno-item-badge global">${global.id}</span><span class="anno-item-title">${global.title}</span></div><div class="anno-item-body">${global.copy}</div></article>`+list.map(n=>`<article class="anno-item" data-action="flash-annotation" data-annotation-ref="${n.n}"><div class="anno-item-head"><span class="anno-item-badge">${n.n}</span><span class="anno-item-title">${n.title}</span></div><div class="anno-item-body"><div class="anno-line"><span class="tag tag-blue">触发</span>${n.trigger}</div><div class="anno-line"><span class="tag tag-green">展示</span>${n.display}</div><div class="anno-line"><span class="tag tag-orange">交互</span>${n.interaction}</div></div></article>`).join('')}
function flashAnnotation(id){const target=canvas.querySelector(`[data-annotation-id="${id}"]:not(.badge)`)||canvas.querySelector(`.badge[data-annotation-id="${id}"]`);if(!target)return showToast('当前状态下无可高亮元素');target.classList.remove('annotation-flash');requestAnimationFrame(()=>{target.classList.add('annotation-flash');target.scrollIntoView?.({behavior:'smooth',block:'nearest'})});setTimeout(()=>target.classList.remove('annotation-flash'),1500)}
function updateScale(){const pad=34,scale=Math.min((viewport.clientWidth-pad)/1076,(viewport.clientHeight-pad)/734,1);canvas.style.transform=`translate(-50%,-50%) scale(${Math.max(.1,scale)})`}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[c]))}
function saveScroll(){const el=document.getElementById('appsViewport');if(el)state.scroll[state.category]=el.scrollTop}
function restoreScroll(){const el=document.getElementById('appsViewport');if(el)el.scrollTop=state.scroll[state.category]||0}
function showToast(message){const el=document.getElementById('toast');el.textContent=message;el.classList.add('show');clearTimeout(state.toastTimer);state.toastTimer=setTimeout(()=>el.classList.remove('show'),1800)}
function setScreen(id){saveScroll();state.screen=id;state.query=id==='search'?'Safari':'';state.context=id==='classify'?{id:'safari',x:832,y:282}:null;state.launchingId='';state.failedId='';state.empty=id==='empty';if(id==='search')state.category='games';if(id==='classify'||id==='all')state.category='all';render()}
function startLaunch(id){if(state.launchingId)return;const app=APPS.find(a=>a.id===id);if(!app)return;if(app.outcome==='return'){setScreen('entry');return showToast('已返回盖世游戏')}state.launchingId=id;state.failedId='';state.screen='launching';render();setTimeout(()=>{if(app.outcome==='failure'){state.launchingId='';state.failedId=id;state.screen='failure';render();showToast('启动失败，启动台已保留')}else{state.screen='external';render()}},900)}
function handleAction(action,el){if(action==='flow')return setScreen(el.dataset.value);if(action==='enter-launcher'){state.screen='transition';render();setTimeout(()=>{if(state.screen==='transition'){state.screen='games';render()}},1300);return}if(action==='toggle-panel'){state.panel=!state.panel;shell.classList.toggle('panel-hidden',!state.panel);updateScale();return}if(action==='anno-tab'){state.annotationTab=el.dataset.value;renderNotes();return}if(action==='flash-annotation')return flashAnnotation(el.dataset.annotationRef);if(action==='demo-scan')return setScreen('scanning');if(action==='demo-empty')return setScreen('empty');if(action==='demo-failure')return setScreen('failure');if(action==='demo-reset')return setScreen('entry');if(action==='scope')return showToast('该导航不在启动台 Demo 范围内');if(action==='category'){saveScroll();state.category=el.dataset.value;state.screen=state.category==='games'?'games':'all';state.query='';state.context=null;state.failedId='';render();return}if(action==='launch')return startLaunch(el.dataset.id);if(action==='toggle-game'){const app=APPS.find(a=>a.id===el.dataset.id),next=!appIsGame(app);state.gameOverrides.set(app.id,next);state.context=null;render();return showToast(next?`已将 ${app.name} 添加到游戏`:`已将 ${app.name} 从游戏中移除`)}if(action==='retry'){const id=state.failedId;state.failedId='';return startLaunch(id)}if(action==='back-launcher'){state.screen='games';state.category='games';state.launchingId='';state.failedId='';render();return}}
document.addEventListener('click',e=>{const btn=e.target.closest('[data-action]');if(btn){if(e.ctrlKey&&btn.classList.contains('app-card')&&state.category==='all')return;e.preventDefault();handleAction(btn.dataset.action,btn)}else if(state.context){state.context=null;render()}});
document.addEventListener('input',e=>{if(e.target.id!=='launcherSearch')return;const pos=e.target.selectionStart;state.query=e.target.value;state.screen='search';state.context=null;render();const next=document.getElementById('launcherSearch');if(next){next.focus();next.setSelectionRange(pos,pos)}});
document.addEventListener('contextmenu',e=>{const card=e.target.closest('.app-card');if(!card||state.category!=='all')return;e.preventDefault();const rect=canvas.getBoundingClientRect(),scale=rect.width/1076,x=Math.max(12,Math.min(900,(e.clientX-rect.left)/scale)),y=Math.max(70,Math.min(650,(e.clientY-rect.top)/scale));state.context={id:card.dataset.id,x,y};state.screen='classify';render()});
document.addEventListener('click',e=>{if(!e.ctrlKey)return;const card=e.target.closest('.app-card');if(!card||state.category!=='all')return;const r=card.getBoundingClientRect(),c=canvas.getBoundingClientRect(),scale=c.width/1076;state.context={id:card.dataset.id,x:(r.right-c.left)/scale,y:(r.top-c.top)/scale};state.screen='classify';render()},{capture:true});
document.addEventListener('keydown',e=>{const inLauncher=!['entry','transition','scanning','external'].includes(state.screen);if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='f'&&inLauncher){e.preventDefault();document.getElementById('launcherSearch')?.focus();return}if(e.key==='Escape'&&inLauncher){e.preventDefault();if(state.context){state.context=null;render()}else if(state.query){state.query='';state.screen=state.category==='games'?'games':'all';render()}else setScreen('entry');return}const card=e.target.closest('.app-card,.game-cover-card');if(!card)return;const cards=[...document.querySelectorAll('.app-card,.game-cover-card')],i=cards.indexOf(card),cols=state.category==='games'?4:6;let next=i;if(e.key==='ArrowRight')next=Math.min(cards.length-1,i+1);if(e.key==='ArrowLeft')next=Math.max(0,i-1);if(e.key==='ArrowDown')next=Math.min(cards.length-1,i+cols);if(e.key==='ArrowUp')next=Math.max(0,i-cols);if(next!==i){e.preventDefault();cards[next].focus();cards[next].scrollIntoView({block:'nearest'})}if(e.key==='Enter'){e.preventDefault();startLaunch(card.dataset.id)}});
document.getElementById('badgeToggle').addEventListener('click',e=>{document.body.classList.toggle('badges-on');e.currentTarget.classList.toggle('active');e.currentTarget.textContent=document.body.classList.contains('badges-on')?'隐藏标号':'显示标号'});
window.addEventListener('resize',updateScale);new ResizeObserver(updateScale).observe(viewport);render();
window.__launcherDemo={state,APPS,NOTES,FLOW,setScreen,startLaunch,visibleApps};
</script>
