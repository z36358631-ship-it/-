<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>设备映射管理后台 Demo</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; background:#f5f6fa; color:#333; }
.layout { display:flex; min-height:100vh; }
.sidebar { width:220px; background:#1e1e2d; color:#fff; padding:20px 0; flex-shrink:0; }
.sidebar h2 { padding:0 20px 20px; font-size:16px; border-bottom:1px solid #2e2e3d; margin-bottom:12px; }
.sidebar .nav-item { padding:10px 20px; cursor:pointer; font-size:14px; transition:background .2s; }
.sidebar .nav-item:hover { background:#2e2e3d; }
.sidebar .nav-item.active { background:#4e73ff; border-radius:0 20px 20px 0; margin-right:12px; }
.main { flex:1; padding:24px 32px; overflow-x:auto; }
.page-title { font-size:20px; font-weight:600; margin-bottom:6px; }
.page-desc { font-size:13px; color:#888; margin-bottom:20px; }
.tab-bar { display:flex; gap:0; border-bottom:2px solid #e8e8e8; margin-bottom:20px; }
.tab-item { padding:10px 24px; cursor:pointer; font-size:14px; color:#666; border-bottom:2px solid transparent; margin-bottom:-2px; transition:all .2s; }
.tab-item.active { color:#4e73ff; border-bottom-color:#4e73ff; font-weight:600; }
.filter-bar { display:flex; gap:12px; align-items:center; margin-bottom:16px; flex-wrap:wrap; }
.filter-bar input, .filter-bar select { padding:6px 12px; border:1px solid #d9d9d9; border-radius:4px; font-size:13px; }
.filter-bar input { width:200px; }
.btn { padding:6px 16px; border:none; border-radius:4px; cursor:pointer; font-size:13px; transition:all .15s; }
.btn-primary { background:#4e73ff; color:#fff; }
.btn-primary:hover { background:#3a5ee6; }
.btn-danger { background:#ff4d4f; color:#fff; }
.btn-danger:hover { background:#d9363e; }
.btn-outline { background:#fff; border:1px solid #d9d9d9; color:#333; }
.btn-outline:hover { border-color:#4e73ff; color:#4e73ff; }
table { width:100%; border-collapse:collapse; background:#fff; border-radius:8px; overflow:hidden; box-shadow:0 1px 4px rgba(0,0,0,.06); }
th, td { padding:12px 16px; text-align:left; font-size:13px; border-bottom:1px solid #f0f0f0; }
th { background:#fafafa; font-weight:600; color:#666; }
tr:hover { background:#f8f9ff; }
.status-tag { display:inline-block; padding:2px 8px; border-radius:4px; font-size:12px; }
.status-active { background:#f6ffed; color:#52c41a; border:1px solid #b7eb8f; }
.status-pending { background:#fff7e6; color:#fa8c16; border:1px solid #ffd591; }
.op-link { color:#4e73ff; cursor:pointer; margin-right:12px; font-size:13px; text-decoration:none; }
.op-link:hover { text-decoration:underline; }
.op-link.danger { color:#ff4d4f; }
.stats-bar { display:flex; gap:20px; margin-bottom:20px; }
.stat-card { background:#fff; border-radius:8px; padding:16px 24px; box-shadow:0 1px 4px rgba(0,0,0,.06); min-width:160px; }
.stat-card .num { font-size:28px; font-weight:700; color:#4e73ff; }
.stat-card .label { font-size:12px; color:#888; margin-top:4px; }
.modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:1000; justify-content:center; align-items:center; }
.modal-overlay.show { display:flex; }
.modal { background:#fff; border-radius:12px; padding:24px; width:480px; max-width:90vw; }
.modal h3 { margin-bottom:16px; font-size:16px; }
.modal .form-row { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
.modal .form-row label { width:90px; text-align:right; font-size:13px; flex-shrink:0; }
.modal .form-row input, .modal .form-row select { flex:1; padding:6px 12px; border:1px solid #d9d9d9; border-radius:4px; font-size:13px; }
.modal .form-actions { display:flex; justify-content:flex-end; gap:10px; margin-top:20px; }
.empty-state { text-align:center; padding:48px; color:#999; }
.badge { display:inline-block; background:#e8f0fe; color:#4e73ff; padding:2px 8px; border-radius:4px; font-size:12px; margin-left:8px; }
</style>
</head>
<body>
<div class="layout">
    <div class="sidebar">
        <h2>盖世游戏后台</h2>
        <div class="nav-item active">设备映射管理</div>
        <div class="nav-item" style="opacity:.5;">兼容性评价管理</div>
        <div class="nav-item" style="opacity:.5;">身份管理</div>
        <div class="nav-item" style="opacity:.5;">问题标签管理</div>
    </div>
    <div class="main">
        <div class="page-title">设备映射管理</div>
        <div class="page-desc">管理设备型号与CPU的可读名称映射，映射未配置时前端展示原始型号兜底</div>

        <div class="stats-bar">
            <div class="stat-card"><div class="num" id="stat-device">0</div><div class="label">设备映射条目</div></div>
            <div class="stat-card"><div class="num" id="stat-cpu">0</div><div class="label">CPU映射条目</div></div>
            <div class="stat-card"><div class="num" id="stat-pending">0</div><div class="label">待补充型号</div></div>
        </div>

        <div class="tab-bar">
            <div class="tab-item active" data-tab="device">设备型号映射</div>
            <div class="tab-item" data-tab="cpu">CPU型号映射</div>
        </div>

        <!-- 设备映射 -->
        <div id="panel-device">
            <div class="filter-bar">
                <input id="device-search" placeholder="搜索原始型号或映射名称" />
                <select id="device-status-filter">
                    <option value="all">全部状态</option>
                    <option value="active">已映射</option>
                    <option value="pending">待补充</option>
                </select>
                <button class="btn btn-outline" onclick="filterDevices()">查询</button>
                <button class="btn btn-outline" onclick="resetDeviceFilter()">重置</button>
                <div style="flex:1;"></div>
                <button class="btn btn-outline" onclick="exportData('device')">导出</button>
                <button class="btn btn-outline" onclick="document.getElementById('import-device').click()">导入</button>
                <input type="file" id="import-device" accept=".csv,.json" style="display:none;" onchange="importData('device',this)" />
                <button class="btn btn-primary" onclick="openModal('device')">+ 新增映射</button>
            </div>
            <table>
                <thead><tr><th>原始型号</th><th>映射名称</th><th>品牌</th><th>更新时间</th><th>状态</th><th>操作</th></tr></thead>
                <tbody id="device-tbody"></tbody>
            </table>
        </div>

        <!-- CPU映射 -->
        <div id="panel-cpu" style="display:none;">
            <div class="filter-bar">
                <input id="cpu-search" placeholder="搜索原始型号或映射名称" />
                <select id="cpu-status-filter">
                    <option value="all">全部状态</option>
                    <option value="active">已映射</option>
                    <option value="pending">待补充</option>
                </select>
                <button class="btn btn-outline" onclick="filterCPUs()">查询</button>
                <button class="btn btn-outline" onclick="resetCPUFilter()">重置</button>
                <div style="flex:1;"></div>
                <button class="btn btn-outline" onclick="exportData('cpu')">导出</button>
                <button class="btn btn-outline" onclick="document.getElementById('import-cpu').click()">导入</button>
                <input type="file" id="import-cpu" accept=".csv,.json" style="display:none;" onchange="importData('cpu',this)" />
                <button class="btn btn-primary" onclick="openModal('cpu')">+ 新增映射</button>
            </div>
            <table>
                <thead><tr><th>原始型号</th><th>映射名称</th><th>厂商</th><th>更新时间</th><th>状态</th><th>操作</th></tr></thead>
                <tbody id="cpu-tbody"></tbody>
            </table>
        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modal-overlay">
    <div class="modal">
        <h3 id="modal-title">新增映射</h3>
        <div class="form-row"><label>原始型号<span style="color:red;">*</span></label><input id="m-raw" placeholder="如 PLE110 或 SM8735" /></div>
        <div class="form-row"><label>映射名称<span style="color:red;">*</span></label><input id="m-name" placeholder="如 Oppo K13 Turbo Pro" /></div>
        <div class="form-row"><label id="m-brand-label">品牌/厂商</label><input id="m-brand" placeholder="如 OPPO / Qualcomm" /></div>
        <div class="form-row"><label>状态</label>
            <select id="m-status"><option value="active">已映射</option><option value="pending">待补充</option></select>
        </div>
        <div class="form-actions">
            <button class="btn btn-outline" onclick="closeModal()">取消</button>
            <button class="btn btn-primary" onclick="saveMapping()">确认</button>
        </div>
    </div>
</div>

<script>
let deviceData = [
    { id:1, raw:'PLE110', name:'OPPO K13 Turbo Pro', brand:'OPPO', status:'active', time:'2026-05-26 14:00' },
    { id:2, raw:'24122RKC7C', name:'Redmi K80 Pro', brand:'Xiaomi', status:'active', time:'2026-05-26 14:01' },
    { id:3, raw:'V2381A', name:'vivo X200 Pro', brand:'vivo', status:'active', time:'2026-05-25 10:30' },
    { id:4, raw:'ALT-AN10', name:'Huawei Pura 70 Ultra', brand:'Huawei', status:'active', time:'2026-05-25 09:00' },
    { id:5, raw:'SM-S928B', name:'Samsung Galaxy S25 Ultra', brand:'Samsung', status:'active', time:'2026-05-24 16:20' },
    { id:6, raw:'iPhone17,1', name:'iPhone 16 Pro Max', brand:'Apple', status:'active', time:'2026-05-24 11:00' },
    { id:7, raw:'RMX5011', name:'', brand:'realme', status:'pending', time:'2026-05-27 09:00' },
    { id:8, raw:'23113RKC9C', name:'', brand:'Xiaomi', status:'pending', time:'2026-05-27 08:50' },
    { id:9, raw:'NTN-AN20', name:'Huawei Mate 70', brand:'Huawei', status:'active', time:'2026-05-23 15:00' },
    { id:10, raw:'OnePlus12T', name:'OnePlus 12T', brand:'OnePlus', status:'active', time:'2026-05-22 14:30' },
];

let cpuData = [
    { id:1, raw:'SM8735', name:'Qualcomm Snapdragon 8s Gen4', brand:'Qualcomm', status:'active', time:'2026-05-26 14:00' },
    { id:2, raw:'SM8750', name:'Qualcomm Snapdragon 8 Elite', brand:'Qualcomm', status:'active', time:'2026-05-26 13:50' },
    { id:3, raw:'MT6991', name:'MediaTek Dimensity 9400', brand:'MediaTek', status:'active', time:'2026-05-25 11:00' },
    { id:4, raw:'A18Pro', name:'Apple A18 Pro', brand:'Apple', status:'active', time:'2026-05-25 10:00' },
    { id:5, raw:'Kirin9100', name:'Kirin 9100', brand:'HiSilicon', status:'active', time:'2026-05-24 09:30' },
    { id:6, raw:'Exynos2500', name:'Samsung Exynos 2500', brand:'Samsung', status:'active', time:'2026-05-24 09:00' },
    { id:7, raw:'SM8650', name:'Qualcomm Snapdragon 8 Gen 3', brand:'Qualcomm', status:'active', time:'2026-05-23 16:00' },
    { id:8, raw:'MT6989', name:'', brand:'MediaTek', status:'pending', time:'2026-05-27 08:30' },
    { id:9, raw:'SM8x50-AB', name:'', brand:'Qualcomm', status:'pending', time:'2026-05-27 09:10' },
];

let currentTab = 'device';
let editingId = null;
let editingType = null;

// Tab switch
document.querySelectorAll('.tab-item').forEach(t => {
    t.addEventListener('click', () => {
        document.querySelectorAll('.tab-item').forEach(x => x.classList.remove('active'));
        t.classList.add('active');
        currentTab = t.dataset.tab;
        document.getElementById('panel-device').style.display = currentTab === 'device' ? '' : 'none';
        document.getElementById('panel-cpu').style.display = currentTab === 'cpu' ? '' : 'none';
    });
});

function updateStats() {
    document.getElementById('stat-device').textContent = deviceData.length;
    document.getElementById('stat-cpu').textContent = cpuData.length;
    const pending = deviceData.filter(d => d.status === 'pending').length + cpuData.filter(c => c.status === 'pending').length;
    document.getElementById('stat-pending').textContent = pending;
}

function renderDevices(list) {
    const data = list || deviceData;
    const tbody = document.getElementById('device-tbody');
    if (data.length === 0) { tbody.innerHTML = '<tr><td colspan="6" class="empty-state">暂无数据</td></tr>'; return; }
    tbody.innerHTML = data.map(d => `<tr>
        <td><code style="background:#f5f5f5;padding:2px 6px;border-radius:3px;">${esc(d.raw)}</code></td>
        <td>${d.name ? esc(d.name) : '<span style="color:#ccc;">—</span>'}</td>
        <td>${esc(d.brand)}</td>
        <td style="color:#888;">${d.time}</td>
        <td><span class="status-tag ${d.status === 'active' ? 'status-active' : 'status-pending'}">${d.status === 'active' ? '已映射' : '待补充'}</span></td>
        <td>
            <a class="op-link" onclick="editMapping('device',${d.id})">编辑</a>
            <a class="op-link danger" onclick="deleteMapping('device',${d.id})">删除</a>
        </td>
    </tr>`).join('');
}

function renderCPUs(list) {
    const data = list || cpuData;
    const tbody = document.getElementById('cpu-tbody');
    if (data.length === 0) { tbody.innerHTML = '<tr><td colspan="6" class="empty-state">暂无数据</td></tr>'; return; }
    tbody.innerHTML = data.map(d => `<tr>
        <td><code style="background:#f5f5f5;padding:2px 6px;border-radius:3px;">${esc(d.raw)}</code></td>
        <td>${d.name ? esc(d.name) : '<span style="color:#ccc;">—</span>'}</td>
        <td>${esc(d.brand)}</td>
        <td style="color:#888;">${d.time}</td>
        <td><span class="status-tag ${d.status === 'active' ? 'status-active' : 'status-pending'}">${d.status === 'active' ? '已映射' : '待补充'}</span></td>
        <td>
            <a class="op-link" onclick="editMapping('cpu',${d.id})">编辑</a>
            <a class="op-link danger" onclick="deleteMapping('cpu',${d.id})">删除</a>
        </td>
    </tr>`).join('');
}

function filterDevices() {
    const kw = document.getElementById('device-search').value.trim().toLowerCase();
    const st = document.getElementById('device-status-filter').value;
    let list = deviceData;
    if (kw) list = list.filter(d => d.raw.toLowerCase().includes(kw) || d.name.toLowerCase().includes(kw));
    if (st !== 'all') list = list.filter(d => d.status === st);
    renderDevices(list);
}
function resetDeviceFilter() {
    document.getElementById('device-search').value = '';
    document.getElementById('device-status-filter').value = 'all';
    renderDevices();
}

function filterCPUs() {
    const kw = document.getElementById('cpu-search').value.trim().toLowerCase();
    const st = document.getElementById('cpu-status-filter').value;
    let list = cpuData;
    if (kw) list = list.filter(d => d.raw.toLowerCase().includes(kw) || d.name.toLowerCase().includes(kw));
    if (st !== 'all') list = list.filter(d => d.status === st);
    renderCPUs(list);
}
function resetCPUFilter() {
    document.getElementById('cpu-search').value = '';
    document.getElementById('cpu-status-filter').value = 'all';
    renderCPUs();
}

function openModal(type, id) {
    editingType = type;
    editingId = id || null;
    const overlay = document.getElementById('modal-overlay');
    document.getElementById('modal-title').textContent = id ? '编辑映射' : '新增映射';
    document.getElementById('m-brand-label').textContent = type === 'device' ? '品牌' : '厂商';
    if (id) {
        const list = type === 'device' ? deviceData : cpuData;
        const item = list.find(x => x.id === id);
        document.getElementById('m-raw').value = item.raw;
        document.getElementById('m-name').value = item.name;
        document.getElementById('m-brand').value = item.brand;
        document.getElementById('m-status').value = item.status;
    } else {
        document.getElementById('m-raw').value = '';
        document.getElementById('m-name').value = '';
        document.getElementById('m-brand').value = '';
        document.getElementById('m-status').value = 'active';
    }
    overlay.classList.add('show');
}
function closeModal() { document.getElementById('modal-overlay').classList.remove('show'); editingId = null; editingType = null; }

function saveMapping() {
    const raw = document.getElementById('m-raw').value.trim();
    const name = document.getElementById('m-name').value.trim();
    const brand = document.getElementById('m-brand').value.trim();
    const status = document.getElementById('m-status').value;
    if (!raw) { alert('原始型号不可为空'); return; }
    const now = new Date().toLocaleString('zh-CN',{hour12:false}).replace(/\//g,'-');
    const list = editingType === 'device' ? deviceData : cpuData;
    if (editingId) {
        const item = list.find(x => x.id === editingId);
        Object.assign(item, { raw, name, brand, status, time: now });
    } else {
        list.push({ id: Date.now(), raw, name, brand, status, time: now });
    }
    closeModal();
    renderAll();
}

function editMapping(type, id) { openModal(type, id); }

function deleteMapping(type, id) {
    if (!confirm('确定删除该映射？')) return;
    if (type === 'device') deviceData = deviceData.filter(x => x.id !== id);
    else cpuData = cpuData.filter(x => x.id !== id);
    renderAll();
}

function renderAll() { renderDevices(); renderCPUs(); updateStats(); }

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function exportData(type) {
    const list = type === 'device' ? deviceData : cpuData;
    const brandLabel = type === 'device' ? '品牌' : '厂商';
    const header = `原始型号,映射名称,${brandLabel},状态`;
    const rows = list.map(d => `${d.raw},${d.name},${d.brand},${d.status === 'active' ? '已映射' : '待补充'}`);
    const csv = '﻿' + [header, ...rows].join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${type === 'device' ? '设备型号映射' : 'CPU型号映射'}_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    URL.revokeObjectURL(url);
}

function importData(type, input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function(e) {
        const text = e.target.result;
        let imported = [];
        if (file.name.endsWith('.json')) {
            try {
                const arr = JSON.parse(text);
                if (!Array.isArray(arr)) { alert('JSON 格式错误，需为数组'); return; }
                imported = arr.map(item => ({
                    id: Date.now() + Math.random(),
                    raw: String(item['原始型号'] || item.raw || '').trim(),
                    name: String(item['映射名称'] || item.name || '').trim(),
                    brand: String(item['品牌'] || item['厂商'] || item.brand || '').trim(),
                    status: (item['状态'] === '待补充' || item.status === 'pending') ? 'pending' : 'active',
                    time: new Date().toLocaleString('zh-CN',{hour12:false}).replace(/\//g,'-')
                }));
            } catch(err) { alert('JSON 解析失败：' + err.message); return; }
        } else {
            const lines = text.replace(/^﻿/, '').split('\n').filter(l => l.trim());
            if (lines.length < 2) { alert('CSV 文件为空或格式不正确'); return; }
            for (let i = 1; i < lines.length; i++) {
                const cols = lines[i].split(',');
                if (cols.length < 2) continue;
                imported.push({
                    id: Date.now() + Math.random() + i,
                    raw: (cols[0] || '').trim(),
                    name: (cols[1] || '').trim(),
                    brand: (cols[2] || '').trim(),
                    status: (cols[3] || '').trim() === '待补充' ? 'pending' : 'active',
                    time: new Date().toLocaleString('zh-CN',{hour12:false}).replace(/\//g,'-')
                });
            }
        }
        imported = imported.filter(x => x.raw);
        if (imported.length === 0) { alert('未解析到有效数据'); return; }
        const list = type === 'device' ? deviceData : cpuData;
        let addCount = 0, updateCount = 0;
        imported.forEach(item => {
            const existing = list.find(x => x.raw === item.raw);
            if (existing) {
                Object.assign(existing, { name: item.name, brand: item.brand, status: item.status, time: item.time });
                updateCount++;
            } else {
                list.push(item);
                addCount++;
            }
        });
        renderAll();
        alert(`导入完成：新增 ${addCount} 条，更新 ${updateCount} 条`);
    };
    reader.readAsText(file, 'utf-8');
    input.value = '';
}

renderAll();
</script>
</body>
</html>
