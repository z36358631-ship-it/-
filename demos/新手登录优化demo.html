<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>新手登录优化Demo - 盖世游戏</title>
<style>
:root {
  --bg-page: #000000;
  --bg-desktop: #111111;
  --bg-card: rgba(255,255,255,0.05);
  --border-card: rgba(255,255,255,0.08);
  --btn-primary: linear-gradient(90deg, #1a6cf7, #00a8ff);
  --btn-primary-shadow: inset 0 1px 0 rgba(255,255,255,0.1);
  --text-primary: #e6e6e6;
  --text-secondary: #666666;
  --text-link: #338feb;
  --input-underline: rgba(255,255,255,0.15);
  --divider: rgba(255,255,255,0.1);
  --icon-bg: rgba(255,255,255,0.1);
  --accent: #1a6cf7;
  --wechat: #27d35a;
  --qq: #1fa9f3;
  --steam-bg: #1b2838;
  --radius-modal: 16px;
  --radius-btn: 12px;
  --radius-pill: 30px;
  --radius-card: 16px;
  --shadow-card: 0 4px 20px rgba(0,0,0,0.3);
  --transition: 300ms ease;
  --sheet-transition: 350ms cubic-bezier(0.32, 0.72, 0, 1);
  --font: -apple-system, "PingFang SC", "Helvetica Neue", sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg-desktop);
  display: flex;
  flex-direction: column;
  align-items: center;
  min-height: 100vh;
  font-family: var(--font);
  -webkit-font-smoothing: antialiased;
}
/* Phone Frame */
.phone-frame {
  width: 402px;
  height: 874px;
  background: var(--bg-page);
  border-radius: 44px;
  border: 3px solid #222;
  overflow: hidden;
  position: relative;
  box-shadow: 0 20px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.05);
}

/* Status Bar */
.status-bar {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 54px;
  padding: 14px 24px 0;
  display: flex;
  justify-content: space-between;
  align-items: center;
  z-index: 100;
}
.status-bar .time { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: -0.3px; }
.status-bar .icons { display: flex; align-items: center; gap: 6px; }
.status-bar .icons svg { width: 16px; height: 16px; fill: #fff; }

/* Version Toggle */
.version-toggle {
  display: flex;
  gap: 4px;
  background: rgba(255,255,255,0.05);
  border-radius: 20px;
  padding: 3px;
  margin-bottom: 16px;
}
.version-toggle button {
  padding: 6px 16px;
  border: none;
  border-radius: 17px;
  font-size: 13px;
  cursor: pointer;
  background: transparent;
  color: #888;
  font-family: var(--font);
  transition: var(--transition);
}
.version-toggle button.active {
  background: rgba(255,255,255,0.1);
  color: #e6e6e6;
}

/* Tab Bar */
.tab-bar {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 83px;
  padding: 8px 0 28px;
  background: rgba(0,0,0,0.95);
  border-top: 1px solid rgba(255,255,255,0.06);
  display: flex;
  justify-content: space-around;
  align-items: center;
  z-index: 50;
  backdrop-filter: blur(20px);
}
.tab-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  cursor: pointer;
  opacity: 0.4;
  transition: var(--transition);
}
.tab-item.active { opacity: 1; }
.tab-item.active span { color: var(--accent); }
.tab-item svg { width: 24px; height: 24px; }
.tab-item span { font-size: 10px; color: #e6e6e6; }
/* Profile Page */
.profile-page {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  padding-top: 54px;
  padding-bottom: 83px;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
}
.profile-page::-webkit-scrollbar { display: none; }

/* Top Bar */
.profile-topbar {
  display: flex;
  justify-content: flex-end;
  align-items: center;
  padding: 12px 20px;
  gap: 16px;
}
.profile-topbar svg { width: 22px; height: 22px; fill: rgba(255,255,255,0.7); cursor: pointer; }
.profile-topbar svg:active { opacity: 0.6; }

/* Avatar Area */
.avatar-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 0 8px;
  cursor: pointer;
}
.avatar-circle {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 12px;
  position: relative;
}
.avatar-circle svg { width: 40px; height: 40px; fill: rgba(255,255,255,0.3); }
.avatar-badge {
  position: absolute;
  bottom: -2px;
  right: -2px;
  background: #555;
  color: #fff;
  font-size: 10px;
  padding: 2px 6px;
  border-radius: 8px;
  display: none;
}
.avatar-badge.show { display: block; }
.avatar-name {
  font-size: 16px;
  font-weight: 600;
  color: #fff;
  margin-bottom: 4px;
}
.avatar-subtitle {
  font-size: 12px;
  color: var(--text-secondary);
  display: none;
}
.avatar-subtitle.show { display: block; }

/* Steam Sync Card */
.steam-card {
  margin: 20px 16px;
  padding: 20px;
  background: var(--bg-card);
  border: 1px solid var(--border-card);
  border-radius: var(--radius-card);
}
.steam-card-icons {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
}
.steam-card-icons svg { width: 20px; height: 20px; }
.steam-card-title {
  font-size: 16px;
  color: #fff;
  font-weight: 500;
  margin-bottom: 6px;
}
.steam-card-desc {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 16px;
}
.steam-card-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 10px 24px;
  border-radius: var(--radius-pill);
  border: 1px solid rgba(255,255,255,0.2);
  background: rgba(255,255,255,0.05);
  color: #fff;
  font-size: 14px;
  cursor: pointer;
  font-family: var(--font);
  transition: var(--transition);
}
.steam-card-btn:active { transform: scale(0.97); background: rgba(255,255,255,0.1); }

/* Banner */
.promo-banner {
  margin: 16px 16px;
  height: 80px;
  border-radius: 12px;
  background: linear-gradient(135deg, #4a1a8a, #8a2be2, #6a1b9a);
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: 18px;
  font-weight: 600;
  letter-spacing: 1px;
  position: relative;
  overflow: hidden;
}
.promo-banner::before {
  content: "";
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  animation: shimmer 3s infinite;
}
@keyframes shimmer {
  0% { transform: translateX(-100%); }
  100% { transform: translateX(100%); }
}

/* My Device Section */
.section-title {
  padding: 20px 16px 12px;
  font-size: 16px;
  font-weight: 600;
  color: #fff;
}
.device-card {
  margin: 0 16px 20px;
  padding: 24px;
  background: var(--bg-card);
  border: 1px solid var(--border-card);
  border-radius: var(--radius-card);
  display: flex;
  flex-direction: column;
  align-items: center;
  cursor: pointer;
  transition: var(--transition);
}
.device-card:active { transform: scale(0.98); }
.device-icon {
  width: 56px;
  height: 56px;
  border-radius: 50%;
  background: rgba(255,255,255,0.06);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 10px;
}
.device-icon svg { width: 28px; height: 28px; fill: rgba(255,255,255,0.4); }
.device-label { font-size: 14px; color: var(--text-secondary); }

/* Guest Limit Banner */
.guest-limit-banner {
  display: none;
  margin: 12px 16px;
  padding: 10px 14px;
  background: rgba(255,165,0,0.06);
  border: 1px solid rgba(255,165,0,0.15);
  border-radius: 10px;
  color: rgba(255,165,0,0.9);
  font-size: 12px;
  align-items: center;
  gap: 8px;
}
.guest-limit-banner.show { display: flex; }
/* Bottom Sheet Overlay */
.sheet-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.6);
  z-index: 200;
  opacity: 0;
  visibility: hidden;
  transition: opacity 300ms ease;
}
.sheet-overlay.show { opacity: 1; visibility: visible; }

/* Login Bottom Sheet */
.login-sheet {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: #0d1520;
  border-radius: var(--radius-modal) var(--radius-modal) 0 0;
  z-index: 210;
  transform: translateY(100%);
  transition: transform var(--sheet-transition);
  max-height: 82%;
  overflow: hidden;
}
.login-sheet.show { transform: translateY(0); }
.login-sheet::before {
  content: "";
  position: absolute;
  top: -80px;
  left: 50%;
  transform: translateX(-50%);
  width: 300px;
  height: 300px;
  background: radial-gradient(ellipse at center, rgba(0,218,221,0.12), transparent 65%);
  pointer-events: none;
}

/* Sheet Handle & Close */
.sheet-handle {
  width: 40px;
  height: 4px;
  background: rgba(255,255,255,0.2);
  border-radius: 2px;
  margin: 8px auto 0;
}
.sheet-close {
  position: absolute;
  top: 12px; right: 16px;
  width: 30px; height: 30px;
  border: none;
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.6);
  font-size: 22px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 50%;
  transition: var(--transition);
  z-index: 10;
}
.sheet-close:active { background: rgba(255,255,255,0.15); }

/* Login Sheet Content */
.login-sheet-body {
  padding: 24px 24px 32px;
  position: relative;
}
.login-logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 20px;
}
.login-logo-icon {
  width: 40px; height: 40px;
  background: rgba(255,255,255,0.08);
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-logo-icon svg { width: 24px; height: 24px; fill: #e6e6e6; }
.login-logo-text { font-size: 16px; color: rgba(255,255,255,0.6); font-weight: 500; }
.login-title {
  font-size: 24px;
  font-weight: 600;
  color: #fff;
  text-align: center;
  margin-bottom: 24px;
}
.sim-phone-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 20px;
  padding: 12px 0;
}
.sim-phone-row svg { width: 18px; height: 18px; fill: rgba(255,255,255,0.5); }
.sim-phone-row span { font-size: 18px; color: #fff; font-weight: 500; letter-spacing: 1px; }
.sim-phone-row .edit-icon {
  width: 24px; height: 24px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; opacity: 0.5;
}
.sim-phone-row .edit-icon:active { opacity: 0.8; }
.login-btn-primary {
  width: 100%;
  height: 52px;
  border: none;
  border-radius: var(--radius-btn);
  background: var(--btn-primary);
  box-shadow: var(--btn-primary-shadow);
  color: #fff;
  font-size: 16px;
  font-weight: 500;
  cursor: pointer;
  font-family: var(--font);
  transition: var(--transition);
}
.login-btn-primary:active { transform: scale(0.97); opacity: 0.9; }
.login-agreement {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  margin-top: 14px;
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  line-height: 1.6;
}
.login-agreement input[type="checkbox"] { margin-top: 3px; accent-color: var(--accent); flex-shrink: 0; }
.login-agreement a { color: var(--text-link); text-decoration: none; }
.login-divider {
  display: flex;
  align-items: center;
  margin: 24px 0 18px;
  color: rgba(255,255,255,0.4);
  font-size: 12px;
}
.login-divider::before, .login-divider::after { content: ""; flex: 1; height: 1px; background: var(--divider); }
.login-divider span { padding: 0 14px; }
.third-party-row {
  display: flex;
  justify-content: center;
  gap: 32px;
  margin-bottom: 16px;
}
.tp-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  cursor: pointer;
}
.tp-circle {
  width: 44px; height: 44px;
  border-radius: 50%;
  background: var(--icon-bg);
  display: flex;
  align-items: center;
  justify-content: center;
  transition: var(--transition);
}
.tp-circle:active { transform: scale(0.9); }
.tp-circle svg { width: 22px; height: 22px; }
.tp-name { font-size: 11px; color: rgba(255,255,255,0.5); }
.guest-mode-link {
  text-align: center;
  margin-top: 14px;
  padding-bottom: 8px;
}
.guest-mode-link a { color: var(--text-link); font-size: 14px; text-decoration: none; cursor: pointer; }

/* Phone Input View */
.phone-input-view { display: none; }
.phone-input-view.show { display: block; }
.input-field {
  display: flex;
  align-items: center;
  border-bottom: 1px solid var(--input-underline);
  padding: 14px 0;
  gap: 10px;
  margin-bottom: 12px;
}
.input-field .country-code {
  padding: 4px 10px;
  background: var(--icon-bg);
  border-radius: 20px;
  font-size: 13px;
  color: var(--text-primary);
  white-space: nowrap;
}
.input-field input {
  flex: 1;
  border: none;
  background: transparent;
  font-size: 14px;
  color: #fff;
  outline: none;
  font-family: var(--font);
}
.input-field input::placeholder { color: rgba(255,255,255,0.3); }
.input-field .code-link { font-size: 13px; color: var(--text-link); white-space: nowrap; cursor: pointer; }
/* Steam Bottom Sheet */
.steam-sheet {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: var(--steam-bg);
  border-radius: var(--radius-modal) var(--radius-modal) 0 0;
  z-index: 210;
  transform: translateY(100%);
  transition: transform var(--sheet-transition);
  max-height: 82%;
  overflow: hidden;
}
.steam-sheet.show { transform: translateY(0); }
.steam-sheet-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 20px 20px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.steam-sheet-title { font-size: 16px; font-weight: 600; color: #e6e6e6; }
.steam-tabs {
  display: flex;
  padding: 0 20px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.steam-tab {
  padding: 12px 16px;
  font-size: 13px;
  color: #666;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  transition: var(--transition);
}
.steam-tab.active { color: #e6e6e6; border-bottom-color: var(--accent); }
.steam-form { padding: 20px; }
.steam-input {
  width: 100%;
  padding: 12px 0;
  border: none;
  border-bottom: 1px solid var(--input-underline);
  background: transparent;
  font-size: 14px;
  color: var(--text-primary);
  outline: none;
  margin-bottom: 16px;
  font-family: var(--font);
}
.steam-input::placeholder { color: rgba(255,255,255,0.3); }
.steam-pwd-row { position: relative; }
.steam-pwd-row .eye-toggle {
  position: absolute;
  right: 0; top: 12px;
  background: none;
  border: none;
  color: #666;
  cursor: pointer;
  font-size: 18px;
  padding: 4px;
}
.steam-bind-btn {
  width: 100%;
  height: 48px;
  border: none;
  border-radius: var(--radius-btn);
  background: var(--btn-primary);
  box-shadow: var(--btn-primary-shadow);
  color: #fff;
  font-size: 15px;
  font-weight: 500;
  cursor: pointer;
  margin-top: 8px;
  font-family: var(--font);
  transition: var(--transition);
}
.steam-bind-btn:active { transform: scale(0.97); }
.steam-qr-section { text-align: center; padding: 16px 20px 24px; }
.steam-qr-link { color: var(--text-link); font-size: 13px; cursor: pointer; margin-bottom: 12px; display: inline-block; }
.steam-qr-box {
  width: 140px; height: 140px;
  margin: 12px auto;
  border: 2px dashed rgba(255,255,255,0.15);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #666;
  font-size: 12px;
}
.steam-qr-desc { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 8px; }

/* Toast */
.toast {
  position: absolute;
  top: 80px; left: 50%;
  transform: translateX(-50%) translateY(-10px);
  background: rgba(30,30,30,0.95);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text-primary);
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 13px;
  z-index: 500;
  opacity: 0;
  pointer-events: none;
  transition: all 300ms ease;
  white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Success Overlay */
.success-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.85);
  z-index: 400;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  opacity: 0;
  visibility: hidden;
  transition: var(--transition);
}
.success-overlay.show { opacity: 1; visibility: visible; }
.success-check {
  width: 64px; height: 64px;
  border-radius: 50%;
  background: linear-gradient(135deg, #1a6cf7, #00a8ff);
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 16px;
  animation: successPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
.success-check svg { width: 32px; height: 32px; fill: #fff; }
@keyframes successPop { 0% { transform: scale(0); } 100% { transform: scale(1); } }
.success-text { font-size: 16px; color: var(--text-primary); font-weight: 500; }

/* Active states */
button:active, .clickable:active { transform: scale(0.97); }

/* Quick Action Buttons (outside phone) */
.quick-actions {
  display: flex;
  gap: 8px;
  margin-top: 16px;
  flex-wrap: wrap;
  justify-content: center;
}
.quick-actions button {
  padding: 6px 14px;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  background: rgba(255,255,255,0.04);
  color: #aaa;
  font-size: 12px;
  cursor: pointer;
  font-family: var(--font);
  transition: var(--transition);
}
.quick-actions button:hover { background: rgba(255,255,255,0.08); color: #e6e6e6; }

/* Bind Prompt Modal (center modal inside phone) */
.bind-prompt-overlay {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.7);
  z-index: 220;
  opacity: 0;
  visibility: hidden;
  transition: opacity 300ms ease;
  display: flex;
  align-items: center;
  justify-content: center;
}
.bind-prompt-overlay.show { opacity: 1; visibility: visible; }
.bind-prompt-modal {
  width: 340px;
  background: #1a1a2e;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.08);
  padding: 28px 24px;
  transform: scale(0.95);
  transition: transform 250ms ease;
  text-align: center;
}
.bind-prompt-overlay.show .bind-prompt-modal { transform: scale(1); }
.bind-prompt-icon { font-size: 36px; margin-bottom: 12px; }
.bind-prompt-title { font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 8px; }
.bind-prompt-desc { font-size: 13px; color: #888; margin-bottom: 20px; line-height: 1.5; }
.bind-prompt-btn {
  width: 100%; height: 46px; border: none; border-radius: 10px;
  background: var(--btn-primary); color: #fff; font-size: 15px; font-weight: 500;
  cursor: pointer; font-family: var(--font); margin-bottom: 12px;
}
.bind-prompt-dismiss {
  background: none; border: none; color: #666; font-size: 13px;
  cursor: pointer; font-family: var(--font); padding: 8px;
}

/* Conflict Modal */
.conflict-modal {
  width: 340px;
  background: #1a1a2e;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.08);
  padding: 28px 24px;
  transform: scale(0.95);
  transition: transform 250ms ease;
  text-align: center;
}
.bind-prompt-overlay.show .conflict-modal { transform: scale(1); }
.conflict-icon { font-size: 36px; margin-bottom: 12px; }
.conflict-title { font-size: 18px; font-weight: 600; color: #fff; margin-bottom: 8px; }
.conflict-desc { font-size: 13px; color: #888; margin-bottom: 20px; line-height: 1.6; }
.conflict-btn-primary {
  width: 100%; height: 46px; border: none; border-radius: 10px;
  background: var(--btn-primary); color: #fff; font-size: 15px; font-weight: 500;
  cursor: pointer; font-family: var(--font); margin-bottom: 10px;
}
.conflict-btn-secondary {
  width: 100%; height: 46px; border: 1px solid rgba(255,255,255,0.15); border-radius: 10px;
  background: transparent; color: #ccc; font-size: 14px;
  cursor: pointer; font-family: var(--font);
}

<script>
// ============ STATE ============
let currentVersion = 'domestic';
let userState = 'loggedOut'; // 'loggedOut' | 'guest' | 'loggedIn'
let pendingSteamBind = false;

// ============ VERSION SWITCH ============
function switchVersion(version) {
  currentVersion = version;
  document.querySelectorAll('.version-toggle button').forEach(b => {
    b.classList.toggle('active',
      (version === 'domestic' && b.textContent === '国内版') ||
      (version === 'overseas' && b.textContent === '海外版')
    );
  });
  updateProfilePage();
  // If login sheet is open, re-render it
  if (document.getElementById('loginSheet').classList.contains('show')) {
    renderLoginSheet();
  }
}

// ============ PROFILE PAGE UPDATE ============
function updateProfilePage() {
  const d = currentVersion === 'domestic';
  const avatarName = document.getElementById('avatarName');
  const avatarSubtitle = document.getElementById('avatarSubtitle');
  const avatarBadge = document.getElementById('avatarBadge');

  const steamCardDesc = document.getElementById('steamCardDesc');

  const guestLimitBanner = document.getElementById('guestLimitBanner');
  const guestLimitText = document.getElementById('guestLimitText');
  const deviceTitle = document.getElementById('deviceTitle');
  const deviceLabel = document.getElementById('deviceLabel');
  const promoBanner = document.getElementById('promoBanner');

  // Device section
  deviceTitle.textContent = d ? '我的设备' : 'My Devices';
  deviceLabel.textContent = d ? '添加设备' : 'Add Device';
  promoBanner.textContent = d ? '新人见面 多重豪礼' : 'Welcome Bonus Rewards';

  // Steam card
  steamCardTitle.textContent = d ? 'Steam 数据同步功能' : 'Steam Data Sync';
  steamCardDesc.textContent = d ? '绑定账号后可查看个人游戏库' : 'Bind account to view your game library';

  if (userState === 'loggedOut') {
    avatarName.textContent = d ? '登录/注册' : 'Sign In / Register';
    avatarSubtitle.classList.remove('show');
    avatarBadge.classList.remove('show');
    guestLimitBanner.classList.remove('show');
    steamCardBtn.textContent = d ? '绑定 Steam 账号' : 'Bind Steam Account';
  } else if (userState === 'guest') {
    avatarName.textContent = d ? '游客模式' : 'Guest Mode';
    avatarSubtitle.textContent = d ? '点击登录' : 'Tap to sign in';
    avatarSubtitle.classList.add('show');
    avatarBadge.textContent = d ? '游客' : 'Guest';
    avatarBadge.classList.add('show');
    guestLimitBanner.classList.add('show');
    guestLimitText.textContent = d ? '游客模式 · 存档功能、充值付费暂不可用' : 'Guest Mode · Cloud save & payments unavailable';
    steamCardBtn.textContent = d ? '登录后绑定' : 'Sign in to Bind';
  } else {
    avatarName.textContent = d ? '盖世玩家' : 'GameHub Player';
    avatarSubtitle.classList.remove('show');
    avatarBadge.classList.remove('show');
    guestLimitBanner.classList.remove('show');
    steamCardBtn.textContent = d ? '绑定 Steam 账号' : 'Bind Steam Account';
  }
}

// ============ AVATAR CLICK ============
function onAvatarClick() {
  if (userState === 'loggedOut' || userState === 'guest') {
    openLoginSheet();
  } else {
    showToast(currentVersion === 'domestic' ? '已登录' : 'Already signed in');
  }
}

// ============ STEAM BUTTON CLICK ============
function onSteamBtnClick() {
  if (userState === 'guest' || userState === 'loggedOut') {
    pendingSteamBind = true;
    openLoginSheet();
  } else {
    openSteamSheet();
  }
}

// ============ STEAM SHEET ============
function openSteamSheet() {
  document.getElementById('steamSheetOverlay').classList.add('show');
  document.getElementById('steamSheet').classList.add('show');
}

function closeSteamSheet() {
  document.getElementById('steamSheetOverlay').classList.remove('show');
  document.getElementById('steamSheet').classList.remove('show');
}

function onSteamBind() {
  closeSteamSheet();
  setTimeout(function() {
    showSuccess(currentVersion === 'domestic' ? 'Steam 绑定成功' : 'Steam Connected');
  }, 200);
}

function togglePwd() {
  const pwd = document.getElementById('steamPwd');
  pwd.type = pwd.type === 'password' ? 'text' : 'password';
}

// ============ GUEST MODE ============
function enterGuest() {
  userState = 'guest';
  closeLoginSheet();
  setTimeout(function() {
    showToast(currentVersion === 'domestic' ? '已进入游客模式' : 'Entered Guest Mode');
    updateProfilePage();
  }, 400);
}

// ============ LOGIN SUCCESS ============
function doLogin() {
  closeLoginSheet();
  closeSteamSheet();
  setTimeout(function() {
    const d = currentVersion === 'domestic';
    let msg;
    if (userState === 'guest') {
      msg = d ? '登录成功，已升级为正式账号' : 'Logged in, account upgraded';
    } else {
      msg = d ? '登录成功' : 'Login successful';
    }
    showSuccess(msg);
  }, 200);
}

function showSuccess(msg) {
  const overlay = document.getElementById('successOverlay');
  document.getElementById('successText').textContent = msg;
  overlay.classList.add('show');
  setTimeout(function() {
    overlay.classList.remove('show');
    userState = 'loggedIn';
    updateProfilePage();
    if (pendingSteamBind) {
      pendingSteamBind = false;
      setTimeout(function() { openSteamSheet(); }, 300);
    }
  }, 2000);
}

// ============ TOAST ============
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(function() { toast.classList.remove('show'); }, 2000);
}
