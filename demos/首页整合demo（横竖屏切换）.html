<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>盖世游戏 - 首页整合（横竖屏切换）</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--pri:#287dfa;--bg:#0a0e13;--card:#151a24;--border:rgba(255,255,255,0.06);--dim:rgba(255,255,255,0.45);--score:#ff9500;--radius:16px;}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;scrollbar-width:none;}
*::-webkit-scrollbar{display:none;}
body{background:#000;color:#fff;height:100vh;width:100vw;display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:13px;}

.shell{position:relative;overflow:hidden;box-shadow:0 0 50px rgba(0,0,0,0.8);transition:all 0.4s ease;background:var(--bg);}
.shell.land{width:860px;height:460px;border-radius:var(--radius);display:flex;flex-direction:column;}
.shell.port{width:390px;height:844px;border-radius:40px;display:flex;flex-direction:column;}

/* 竖屏底部导航 */
.btm-nav{display:none;height:60px;background:rgba(10,14,19,0.97);backdrop-filter:blur(10px);border-top:1px solid var(--border);flex-shrink:0;z-index:20;padding:0 10px;}
.shell.port .btm-nav{display:flex;align-items:center;justify-content:space-around;}
.btm-nav .ni{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--dim);cursor:pointer;font-size:9px;padding:6px 10px;}
.btm-nav .ni i{font-size:18px;}
.btm-nav .ni.on{color:#fff;}

/* 横屏顶部导航 */
.top-nav{display:none;height:40px;background:rgba(10,14,19,0.95);border-bottom:1px solid var(--border);align-items:center;padding:0 20px;gap:0;flex-shrink:0;z-index:20;justify-content:center;}
.shell.land .top-nav{display:flex;}
.top-nav .ni{display:flex;align-items:center;gap:5px;color:var(--dim);cursor:pointer;font-size:12px;padding:6px 16px;transition:0.2s;border-radius:6px;}
.top-nav .ni i{font-size:14px;}
.top-nav .ni.on{color:#fff;background:rgba(255,255,255,0.08);}
.top-nav .right-area{margin-left:auto;display:flex;align-items:center;gap:10px;color:var(--dim);font-size:11px;}

/* 主滚动区 */
.main{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;z-index:10;}

/* 竖屏内容 */
.p-wrap{display:none;flex-direction:column;padding:0 14px 16px;gap:18px;}
.shell.port .p-wrap{display:flex;}

/* 横屏内容 */
.l-wrap{display:none;flex-direction:column;padding:0;gap:0;}
.shell.land .l-wrap{display:flex;}

/* 横屏第一屏：全屏hero + 最近游戏卡片 */
.land-hero{position:relative;width:100%;min-height:380px;flex-shrink:0;}
.land-hero .bg{position:absolute;inset:0;background-size:cover;background-position:center;z-index:0;}
.land-hero .bg::after{content:'';position:absolute;inset:0;background:linear-gradient(to right,rgba(0,0,0,0.7) 0%,rgba(0,0,0,0.2) 50%,transparent 100%);}
.land-hero .cards-area{position:relative;z-index:2;padding:16px 30px;display:flex;flex-direction:column;height:100%;min-height:380px;}
.land-hero .cards-row{display:flex;gap:12px;flex:1;align-items:center;}
.land-hero .hero-card{width:100px;flex-shrink:0;cursor:pointer;transition:0.3s;position:relative;}
.land-hero .hero-card:hover{transform:scale(1.05);}
.land-hero .hero-card img{width:100px;height:133px;border-radius:10px;object-fit:cover;border:2px solid rgba(255,255,255,0.15);box-shadow:0 6px 20px rgba(0,0,0,0.5);}
.land-hero .hero-card .hc-name{font-size:10px;color:rgba(255,255,255,0.8);text-align:center;margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.land-hero .btn-row{display:flex;gap:8px;padding-top:10px;}
.land-hero .detail-btn{display:inline-flex;align-items:center;gap:6px;background:var(--pri);border:none;border-radius:6px;padding:7px 16px;color:#fff;font-size:11px;font-weight:600;cursor:pointer;transition:0.2s;}
.land-hero .detail-btn:hover{opacity:0.85;}
.land-hero .more-btn{width:30px;height:30px;border-radius:6px;background:rgba(255,255,255,0.12);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;cursor:pointer;transition:0.2s;}
.land-hero .more-btn:hover{background:rgba(255,255,255,0.2);}
.land-hero .scroll-hint{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.4);font-size:14px;animation:bounce 1.5s infinite;z-index:2;}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(4px)}}

/* 横屏第二屏：游戏库金刚区 + 后续内容 */
.land-lib{padding:20px 30px;display:flex;flex-direction:column;gap:16px;}
/* 游戏库金刚区卡片 — icon+渐变风格 */
.land-kong-row{display:flex;gap:12px;}
.land-kong-card{width:100px;height:130px;flex-shrink:0;border-radius:10px;overflow:hidden;position:relative;cursor:pointer;transition:0.3s;border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;}
.land-kong-card:hover{transform:scale(1.04);border-color:rgba(255,255,255,0.2);}
.land-kong-card .kong-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;}
.land-kong-card .kong-label{font-size:11px;font-weight:600;color:#fff;}
.land-kong-card:nth-child(1){background:linear-gradient(135deg,#1a365d,#2d3748);}
.land-kong-card:nth-child(1) .kong-icon{background:rgba(255,255,255,0.15);}
.land-kong-card:nth-child(2){background:linear-gradient(135deg,#1b2838,#2a475e);}
.land-kong-card:nth-child(2) .kong-icon{background:rgba(255,255,255,0.15);}
.land-kong-card:nth-child(3){background:linear-gradient(135deg,#1a1a2e,#16213e);}
.land-kong-card:nth-child(3) .kong-icon{background:rgba(255,255,255,0.15);}
.land-kong-card:nth-child(4){background:linear-gradient(135deg,#2d1b4e,#1a1a2e);}
.land-kong-card:nth-child(4) .kong-icon{background:rgba(255,255,255,0.15);}
.land-kong-card:nth-child(5){background:linear-gradient(135deg,#1e3a2f,#0f2027);}
.land-kong-card:nth-child(5) .kong-icon{background:rgba(255,255,255,0.15);}

/* 横屏运营Banner一排2个 */
.land-banner-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.land-banner-card{border-radius:10px;overflow:hidden;position:relative;cursor:pointer;transition:0.2s;height:100px;}
.land-banner-card:hover{transform:translateY(-2px);}
.land-banner-card img{width:100%;height:100%;object-fit:cover;}
.land-banner-card .ov{position:absolute;bottom:0;left:0;right:0;padding:8px 12px;background:linear-gradient(transparent,rgba(0,0,0,0.85));}
.land-banner-card .ov .tag{display:inline-block;background:linear-gradient(90deg,#ff9500,#ff5e00);color:#fff;font-size:8px;font-weight:800;padding:2px 5px;border-radius:3px;margin-bottom:2px;}
.land-banner-card .ov .t{font-size:12px;font-weight:700;}

/* 横屏后续内容区 */
.land-feed{padding:0 30px 30px;display:flex;flex-direction:column;gap:20px;}
.land-feed .l-rec-scroll{display:flex;gap:14px;overflow-x:auto;padding-bottom:4px;}
.land-feed .l-rec-card{width:100px;flex-shrink:0;cursor:pointer;transition:0.2s;}
.land-feed .l-rec-card:hover{transform:translateY(-3px);}
.land-feed .l-rec-card img{width:100px;height:133px;border-radius:8px;object-fit:cover;border:1px solid var(--border);}
.land-feed .l-rec-card span{font-size:10px;color:var(--dim);display:block;margin-top:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.land-feed .l-news-scroll{display:flex;gap:16px;overflow-x:auto;}
.land-feed .l-news-card{width:280px;flex-shrink:0;background:var(--card);border-radius:10px;overflow:hidden;border:1px solid var(--border);cursor:pointer;display:flex;gap:10px;padding:10px;transition:0.2s;}
.land-feed .l-news-card:hover{background:rgba(255,255,255,0.05);}
.land-feed .l-news-card img{width:80px;height:60px;border-radius:6px;object-fit:cover;flex-shrink:0;}
.land-feed .l-news-card .txt{flex:1;font-size:11px;color:var(--dim);line-height:1.4;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.land-feed .l-instant-scroll{display:flex;gap:16px;overflow-x:auto;}
.land-feed .l-instant-card{width:200px;flex-shrink:0;border-radius:12px;overflow:hidden;position:relative;cursor:pointer;transition:0.2s;height:160px;}
.land-feed .l-instant-card:hover{transform:translateY(-3px);}
.land-feed .l-instant-card img{width:100%;height:100%;object-fit:cover;}
.land-feed .l-instant-card .info{position:absolute;bottom:0;left:0;right:0;padding:10px 12px;background:linear-gradient(transparent,rgba(0,0,0,0.9));}
.land-feed .l-instant-card .info .name{font-size:13px;font-weight:600;margin-bottom:2px;}
.land-feed .l-instant-card .info .desc{font-size:10px;color:var(--dim);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.land-feed .l-instant-card .info .btn{display:inline-block;background:#22c55e;color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:4px;}
.land-feed .l-rank-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.land-feed .l-rank-item{display:flex;align-items:center;gap:10px;padding:10px;background:rgba(255,255,255,0.03);border-radius:10px;border:1px solid var(--border);cursor:pointer;transition:0.2s;}
.land-feed .l-rank-item:hover{background:rgba(255,255,255,0.06);}
.land-feed .l-rank-item img{width:50px;height:50px;border-radius:8px;object-fit:cover;flex-shrink:0;}
.land-feed .l-rank-item .info{flex:1;min-width:0;}
.land-feed .l-rank-item .info .t{font-size:12px;font-weight:600;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.land-feed .l-rank-item .info .d{font-size:10px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.land-feed .l-rank-item .score{font-size:13px;font-weight:700;color:var(--score);}

/* Banner 竖屏 */
.banner-p{width:100%;border-radius:12px;overflow:hidden;position:relative;height:140px;flex-shrink:0;cursor:pointer;}
.banner-p img{width:100%;height:100%;object-fit:cover;}
.banner-p .ov{position:absolute;bottom:0;left:0;right:0;padding:10px 14px;background:linear-gradient(transparent,rgba(0,0,0,0.85));}
.banner-p .ov .tag{display:inline-block;background:linear-gradient(90deg,#ff9500,#ff5e00);color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:3px;margin-bottom:3px;}
.banner-p .ov .t{font-size:14px;font-weight:700;}
.banner-p .dots{position:absolute;bottom:8px;right:12px;display:flex;gap:4px;}
.banner-p .dots i{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.4);}
.banner-p .dots i.on{background:#fff;width:14px;border-radius:3px;}

/* 子页面覆盖层 */
.subpage{position:absolute;inset:0;background:var(--bg);z-index:50;display:flex;flex-direction:column;animation:slideIn 0.25s ease;}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.subpage .sp-header{display:flex;align-items:center;gap:12px;padding:14px 16px;flex-shrink:0;}
.subpage .sp-header .back{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--dim);font-size:14px;}
.subpage .sp-header .back:hover{color:#fff;background:rgba(255,255,255,0.15);}
.subpage .sp-header .title{font-size:18px;font-weight:700;}
.subpage .sp-header .orient-icon{margin-left:auto;width:28px;height:28px;border-radius:6px;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:13px;cursor:pointer;}
.subpage .sp-tools{display:flex;align-items:center;gap:10px;padding:0 16px 12px;flex-shrink:0;}
.subpage .sp-tools .sp-search{flex:1;display:flex;align-items:center;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:10px;padding:8px 12px;gap:8px;}
.subpage .sp-tools .sp-search i{color:var(--dim);font-size:14px;}
.subpage .sp-tools .sp-search span{color:var(--dim);font-size:12px;}
.subpage .sp-tools .tool-btn{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,0.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:14px;cursor:pointer;}
.subpage .sp-import-btn{margin:0 16px 12px;padding:10px;border-radius:10px;border:1px dashed rgba(255,255,255,0.2);text-align:center;color:var(--dim);font-size:13px;cursor:pointer;transition:0.2s;}
.subpage .sp-import-btn:hover{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.3);}
.subpage .sp-body{flex:1;overflow-y:auto;padding:0 16px 16px;}
.subpage .sp-body .empty{text-align:center;padding:60px 0;color:var(--dim);font-size:13px;}
/* 竖屏子页面 卡片横版 */
.subpage .sp-body .game-cards-p{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.subpage .sp-body .gcp{background:var(--card);border-radius:10px;overflow:hidden;cursor:pointer;transition:0.2s;border:1px solid var(--border);}
.subpage .sp-body .gcp:hover{border-color:rgba(255,255,255,0.15);}
.subpage .sp-body .gcp img{width:100%;aspect-ratio:16/10;object-fit:cover;}
.subpage .sp-body .gcp .gcp-info{padding:8px 10px;}
.subpage .sp-body .gcp .gcp-info .t{font-size:12px;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.subpage .sp-body .gcp .gcp-info .m{font-size:10px;color:var(--dim);display:flex;align-items:center;gap:4px;}
/* 横屏子页面网格 */
.subpage .sp-body .game-grid-sub{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;}
.subpage .sp-body .game-grid-sub .gc{background:var(--card);border-radius:10px;overflow:hidden;cursor:pointer;transition:0.2s;border:1px solid var(--border);}
.subpage .sp-body .game-grid-sub .gc:hover{transform:translateY(-3px);border-color:rgba(255,255,255,0.15);}
.subpage .sp-body .game-grid-sub .gc img{width:100%;aspect-ratio:16/10;object-fit:cover;}
.subpage .sp-body .game-grid-sub .gc .gc-info{padding:8px 10px;}
.subpage .sp-body .game-grid-sub .gc .gc-info .t{font-size:12px;font-weight:600;margin-bottom:3px;}
.subpage .sp-body .game-grid-sub .gc .gc-info .m{font-size:10px;color:var(--dim);display:flex;align-items:center;gap:4px;}

/* === 通用组件 === */
.sec-title{font-size:15px;font-weight:700;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.sec-title .more{margin-left:auto;font-size:11px;color:var(--dim);cursor:pointer;}

/* 搜索栏 */
.search-row{display:flex;align-items:center;gap:10px;padding:12px 0 4px;}
.search-box{flex:1;display:flex;align-items:center;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:20px;padding:8px 14px;gap:8px;cursor:pointer;}
.search-box i{color:var(--dim);font-size:13px;}
.search-box span{color:var(--dim);font-size:12px;}
.orient-btn{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--dim);font-size:13px;transition:0.2s;}
.orient-btn:hover{background:rgba(255,255,255,0.12);color:#fff;}

/* 最近游玩 竖屏 */
.recent-p{display:flex;align-items:stretch;gap:10px;}
.recent-p .label{writing-mode:vertical-rl;font-size:11px;font-weight:600;color:var(--dim);letter-spacing:2px;display:flex;align-items:center;flex-shrink:0;}
.recent-p .cards{display:flex;gap:8px;overflow-x:auto;}
.recent-p .rc{width:50px;flex-shrink:0;cursor:pointer;}
.recent-p .rc img{width:50px;height:66px;border-radius:6px;object-fit:cover;border:1px solid var(--border);}
.recent-p .rc span{font-size:9px;color:var(--dim);display:block;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;width:50px;}

/* 金刚区 */
.kong-section{display:flex;flex-direction:column;gap:10px;}
.kong-row{display:flex;gap:16px;justify-content:space-between;}
.kong-item{display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;flex:1;}
.kong-item .icon{width:44px;height:44px;border-radius:12px;background:rgba(255,255,255,0.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--dim);transition:0.2s;}
.kong-item:hover .icon{background:rgba(40,125,250,0.15);border-color:var(--pri);color:var(--pri);}
.kong-item span{font-size:10px;color:var(--dim);}

/* 为你推荐 横滑 */
.rec-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px;}
.rec-card{width:110px;flex-shrink:0;cursor:pointer;transition:0.2s;}
.rec-card:hover{transform:translateY(-2px);}
.rec-card img{width:110px;height:146px;border-radius:8px;object-fit:cover;border:1px solid var(--border);}
.rec-card span{font-size:10px;color:var(--dim);display:block;margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* 最新资讯 */
.news-scroll{display:flex;gap:12px;overflow-x:auto;}
.news-card{width:220px;flex-shrink:0;background:var(--card);border-radius:10px;overflow:hidden;border:1px solid var(--border);cursor:pointer;transition:0.2s;}
.news-card:hover{transform:translateY(-2px);border-color:rgba(255,255,255,0.15);}
.news-card img{width:100%;height:100px;object-fit:cover;}
.news-card .txt{padding:8px 10px;font-size:11px;color:var(--dim);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* 秒玩 */
.instant-scroll{display:flex;gap:14px;overflow-x:auto;}
.instant-card{width:160px;flex-shrink:0;cursor:pointer;transition:0.2s;position:relative;}
.instant-card:hover{transform:translateY(-3px);}
.instant-card img{width:160px;height:200px;border-radius:10px;object-fit:cover;border:1px solid var(--border);}
.instant-card .info{position:absolute;bottom:0;left:0;right:0;padding:10px;background:linear-gradient(transparent,rgba(0,0,0,0.85));border-radius:0 0 10px 10px;}
.instant-card .info .name{font-size:12px;font-weight:600;margin-bottom:4px;}
.instant-card .info .desc{font-size:10px;color:var(--dim);margin-bottom:6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.instant-card .info .btn{display:inline-block;background:#22c55e;color:#fff;font-size:10px;font-weight:700;padding:3px 10px;border-radius:4px;}

/* 热玩榜单 竖屏 */
.rank-list{display:flex;flex-direction:column;gap:10px;}
.rank-item{display:flex;align-items:center;gap:10px;padding:8px;background:rgba(255,255,255,0.03);border-radius:10px;border:1px solid var(--border);cursor:pointer;transition:0.2s;}
.rank-item:hover{background:rgba(255,255,255,0.06);}
.rank-item img{width:50px;height:50px;border-radius:8px;object-fit:cover;flex-shrink:0;}
.rank-item .info{flex:1;min-width:0;}
.rank-item .info .t{font-size:13px;font-weight:600;margin-bottom:2px;}
.rank-item .info .d{font-size:11px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rank-item .score{font-size:13px;font-weight:700;color:var(--score);}

/* 今日推荐 大Banner */
.today-banner{border-radius:14px;overflow:hidden;position:relative;cursor:pointer;transition:0.2s;}
.today-banner:hover{transform:translateY(-2px);}
.today-banner img{width:100%;height:180px;object-fit:cover;}
.today-banner .overlay{position:absolute;bottom:0;left:0;right:0;padding:14px 16px;background:linear-gradient(transparent,rgba(0,0,0,0.85));}
.today-banner .overlay .desc{font-size:11px;color:var(--dim);margin-bottom:2px;}
.today-banner .overlay .name{font-size:16px;font-weight:700;}

/* === 横屏特有 (保留子页面用) === */
</style>
</head>
<body>
<div class="shell land" id="shell">
<!-- 横屏顶部导航 -->
<nav class="top-nav">
    <div class="ni on"><i class="fas fa-home"></i> 首页</div>
    <div class="ni"><i class="fas fa-users"></i> 社区</div>
    <div class="ni"><i class="fas fa-gamepad"></i> 玩游戏</div>
