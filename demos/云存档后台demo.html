<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>云存档管理 - 后台Demo</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#f0f2f5;color:#333;font-size:13px}
.layout{display:flex;height:100vh}
.sidebar{width:200px;background:#001529;color:#fff;flex-shrink:0;display:flex;flex-direction:column}
.sidebar .logo{padding:16px;font-size:15px;font-weight:700;border-bottom:1px solid #002140;color:#d4b473}
.menu-item{padding:11px 20px;font-size:13px;color:rgba(255,255,255,.65);cursor:pointer;display:flex;align-items:center;gap:8px;transition:0.2s}
.menu-item:hover{color:#fff;background:#002140}
.menu-item.active{color:#fff;background:#d4b473}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:50px;background:#fff;border-bottom:1px solid #e8e8e8;display:flex;align-items:center;justify-content:space-between;padding:0 20px}
.topbar .title{font-size:16px;font-weight:600}
.content{flex:1;overflow-y:auto;padding:20px}
.card{background:#fff;border-radius:8px;padding:18px;margin-bottom:14px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px}
.stat-card{background:#fff;border-radius:8px;padding:16px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.stat-card .num{font-size:24px;font-weight:bold;color:#333}
.stat-card .label{font-size:12px;color:#999;margin-top:4px}
.filter-bar{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap;align-items:center}
.filter-bar input,.filter-bar select{padding:6px 10px;border:1px solid #d9d9d9;border-radius:4px;font-size:12px;outline:none}
.filter-bar input:focus,.filter-bar select:focus{border-color:#d4b473}
.btn{padding:5px 14px;border-radius:4px;font-size:12px;cursor:pointer;border:1px solid #d9d9d9;background:#fff;color:#333;display:inline-flex;align-items:center;gap:4px}
.btn:hover{border-color:#d4b473;color:#d4b473}
.btn-primary{background:#d4b473;color:#fff;border-color:#d4b473}
.btn-primary:hover{background:#c5a562}
.btn-danger{color:#ff4d4f;border-color:#ff4d4f}
.btn-sm{padding:3px 10px;font-size:11px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:#fafafa;padding:9px 10px;text-align:left;font-weight:500;color:#666;border-bottom:1px solid #f0f0f0}
td{padding:9px 10px;border-bottom:1px solid #f0f0f0}
tr:hover td{background:#fafafa}
.tag{display:inline-block;padding:2px 7px;border-radius:10px;font-size:10px}
.tag-green{background:#f6ffed;color:#52c41a;border:1px solid #b7eb8f}
.tag-gray{background:#f5f5f5;color:#999;border:1px solid #d9d9d9}
.tag-orange{background:#fff7e6;color:#fa8c16;border:1px solid #ffd591}
.cover-img{width:60px;height:40px;border-radius:4px;object-fit:cover;background:#f0f0f0}
.modal-mask{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;z-index:100}
.modal-mask.show{display:flex}
.modal-box{background:#fff;width:500px;border-radius:8px;overflow:hidden}
.modal-head{padding:14px 18px;border-bottom:1px solid #f0f0f0;font-size:14px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
.modal-head .close{cursor:pointer;color:#999;font-size:18px}
.modal-body{padding:18px;max-height:60vh;overflow-y:auto}
.modal-foot{padding:12px 18px;border-top:1px solid #f0f0f0;display:flex;justify-content:flex-end;gap:8px}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:12px;color:#666;margin-bottom:5px;font-weight:500}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:8px 10px;border:1px solid #d9d9d9;border-radius:4px;font-size:13px;outline:none}
.form-group textarea{height:80px;resize:vertical}
.form-group input:focus,.form-group textarea:focus{border-color:#d4b473}
.toast{position:fixed;top:60px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:8px 20px;border-radius:16px;font-size:13px;opacity:0;transition:0.3s;z-index:200;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="layout">
<div class="sidebar">
<div class="logo">盖世游戏 · 存档管理</div>
<div class="menu-item active" onclick="switchPage('list')"><i class="fas fa-list"></i> 存档列表</div>
<div class="menu-item" onclick="switchPage('stats')"><i class="fas fa-chart-bar"></i> 数据统计</div>
<div class="menu-item" onclick="switchPage('orders')"><i class="fas fa-receipt"></i> 订单明细</div>
</div>
<div class="main">
<div class="topbar"><div class="title" id="pageTitle">存档列表</div><div style="color:#999">管理员: 王五</div></div>
<div class="content" id="pageContent"></div>
</div>
</div>

<div class="modal-mask" id="modal">
<div class="modal-box">
<div class="modal-head"><span id="modalTitle">新建存档</span><span class="close" onclick="closeModal()">×</span></div>
<div class="modal-body" id="modalBody"></div>
<div class="modal-foot"><button class="btn" onclick="closeModal()">取消</button><button class="btn btn-primary" onclick="saveItem()">保存</button></div>
</div>
</div>
<div class="toast" id="toast"></div>

<script>
var saves=[
{id:'SAVE001',title:'500多万CR，440辆车全收集',game:'GTA V',type:'通关存档',price:6,status:'已上架',buyers:877,time:'2026-05-20',cover:'https://images.unsplash.com/photo-1542751371-adc38448a05e?w=120&h=80&fit=crop',uid:'官方',source:'官方'},
{id:'SAVE002',title:'线上模式满级+全武器+1000万',game:'GTA V',type:'通关存档',price:6,status:'已上架',buyers:1200,time:'2026-05-18',cover:'https://images.unsplash.com/photo-1493711662062-fa541adb3fc8?w=120&h=80&fit=crop',uid:'官方',source:'官方'},
{id:'SAVE003',title:'全BOSS击杀存档（含DLC）',game:'GTA V',type:'BOSS存档',price:6,status:'已上架',buyers:644,time:'2026-05-22',cover:'https://images.unsplash.com/photo-1511512578047-dfb367046420?w=120&h=80&fit=crop',uid:'官方',source:'官方'},
{id:'SAVE004',title:'全成就通关存档',game:'艾尔登法环',type:'通关存档',price:6,status:'已上架',buyers:320,time:'2026-05-15',cover:'https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=120&h=80&fit=crop',uid:'u10086',source:'用户寄售'},
{id:'SAVE005',title:'全角色满级存档',game:'赛博朋克2077',type:'通关存档',price:6,status:'已下架',buyers:89,time:'2026-05-10',cover:'https://images.unsplash.com/photo-1606144042614-b2417e99c4e3?w=120&h=80&fit=crop',uid:'u20088',source:'用户寄售'},
{id:'SAVE006',title:'96辆车全改装',game:'GTA V',type:'通关存档',price:6,status:'已上架',buyers:234,time:'2026-05-25',cover:'https://images.unsplash.com/photo-1550745165-9bc0b252726f?w=120&h=80&fit=crop',uid:'u30055',source:'用户寄售'}
];

var editIdx=-1;

function switchPage(page){
document.querySelectorAll('.menu-item').forEach(function(m){m.classList.remove('active')});
event.currentTarget.classList.add('active');
if(page==='list'){document.getElementById('pageTitle').textContent='存档列表';renderList();}
else if(page==='stats'){document.getElementById('pageTitle').textContent='数据统计';renderStats();}
else{document.getElementById('pageTitle').textContent='订单明细';renderOrders();}
}

function renderList(){
var h='<div class="card"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><h3 style="font-size:14px">存档管理</h3><button class="btn btn-primary" onclick="openNew()"><i class="fas fa-plus"></i> 新建存档</button></div>';
h+='<div class="filter-bar"><input placeholder="标题搜索" style="width:120px"><input placeholder="游戏名搜索" style="width:120px"><input placeholder="用户UID" style="width:100px"><select><option>全部类型</option><option>通关存档</option><option>BOSS存档</option></select><select><option>全部状态</option><option>已上架</option><option>已下架</option></select><input type="date" style="width:130px" title="开始日期"><span style="color:#999">~</span><input type="date" style="width:130px" title="结束日期"><button class="btn" onclick="showToast(\'查询成功\')">查询</button><button class="btn">重置</button></div>';
h+='<table><thead><tr><th>ID</th><th>封面</th><th>标题</th><th>游戏</th><th>类型</th><th>来源</th><th>UID</th><th>价格</th><th>状态</th><th>购买数</th><th>上架时间</th><th>操作</th></tr></thead><tbody>';
saves.forEach(function(s,i){
var statusTag=s.status==='已上架'?'tag-green':'tag-gray';
var sourceTag=s.source==='官方'?'<span class="tag tag-orange">官方</span>':'<span class="tag" style="background:#e6f7ff;color:#1890ff;border:1px solid #91d5ff">寄售</span>';
h+='<tr><td>'+s.id+'</td><td><img class="cover-img" src="'+s.cover+'"></td><td>'+s.title+'</td><td>'+s.game+'</td><td><span class="tag tag-orange">'+s.type+'</span></td><td>'+sourceTag+'</td><td>'+s.uid+'</td><td>¥'+s.price.toFixed(2)+'</td><td><span class="tag '+statusTag+'">'+s.status+'</span></td><td>'+s.buyers+'</td><td>'+s.time+'</td><td><button class="btn btn-sm" onclick="openEdit('+i+')">编辑</button> ';
h+=s.status==='已上架'?'<button class="btn btn-sm" onclick="toggleStatus('+i+')">下架</button>':'<button class="btn btn-sm" onclick="toggleStatus('+i+')">上架</button>';
h+=' <button class="btn btn-sm btn-danger" onclick="delItem('+i+')">删除</button></td></tr>';
});
h+='</tbody></table></div>';
document.getElementById('pageContent').innerHTML=h;
}

function renderStats(){
var total=saves.length;
var online=saves.filter(function(s){return s.status==='已上架'}).length;
var totalBuyers=saves.reduce(function(a,s){return a+s.buyers},0);
var revenue=totalBuyers*6;
var giftMinutes=totalBuyers*30;
var h='<div class="card"><div class="filter-bar" style="margin-bottom:0"><input type="date" style="width:130px" title="开始日期"><span style="color:#999">~</span><input type="date" style="width:130px" title="结束日期"><input placeholder="游戏名搜索" style="width:140px"><button class="btn" onclick="showToast(\'查询成功\')">查询</button><button class="btn">重置</button></div></div>';
h+='<div class="stats"><div class="stat-card"><div class="num">'+total+'</div><div class="label">总存档数</div></div><div class="stat-card"><div class="num">'+online+'</div><div class="label">已上架</div></div><div class="stat-card"><div class="num">'+totalBuyers+'</div><div class="label">总购买次数</div></div><div class="stat-card"><div class="num">¥'+revenue+'</div><div class="label">总收入</div></div></div>';
h+='<div class="stats" style="grid-template-columns:repeat(2,1fr)"><div class="stat-card"><div class="num" style="color:var(--primary)">'+giftMinutes+'分钟</div><div class="label">赠送云游时长（寄售奖励）</div></div><div class="stat-card"><div class="num" style="color:#52c41a">'+(giftMinutes/60).toFixed(1)+'小时</div><div class="label">折合小时</div></div></div>';
h+='<div class="card"><h3 style="font-size:14px;margin-bottom:14px">各游戏存档分布</h3><table><thead><tr><th>游戏</th><th>存档数</th><th>总购买</th><th>收入</th><th>赠送时长</th></tr></thead><tbody>';
var games={};
saves.forEach(function(s){if(!games[s.game])games[s.game]={count:0,buyers:0};games[s.game].count++;games[s.game].buyers+=s.buyers;});
Object.keys(games).forEach(function(g){var d=games[g];h+='<tr><td>'+g+'</td><td>'+d.count+'</td><td>'+d.buyers+'</td><td>¥'+(d.buyers*6)+'</td><td>'+(d.buyers*30)+'分钟</td></tr>';});
h+='</tbody></table></div>';
// 订单明细
h+='<div class="card"><h3 style="font-size:14px;margin-bottom:14px">订单明细</h3>';
h+='<div class="filter-bar"><input placeholder="买家UID" style="width:100px"><input placeholder="存档ID" style="width:100px"><input type="date" style="width:130px"><span style="color:#999">~</span><input type="date" style="width:130px"><button class="btn" onclick="showToast(\'查询成功\')">查询</button></div>';
h+='<table><thead><tr><th>订单号</th><th>买家UID</th><th>存档标题</th><th>游戏</th><th>金额</th><th>卖家</th><th>赠送时长</th><th>购买时间</th><th>状态</th></tr></thead><tbody>';
h+='<tr><td>ORD20260527001</td><td>u50001</td><td>500多万CR全收集</td><td>GTA V</td><td>¥6.00</td><td>官方</td><td>-</td><td>2026-05-27 14:30</td><td><span class="tag tag-green">已完成</span></td></tr>';
h+='<tr><td>ORD20260527002</td><td>u50023</td><td>全BOSS击杀存档</td><td>GTA V</td><td>¥6.00</td><td>官方</td><td>-</td><td>2026-05-27 15:10</td><td><span class="tag tag-green">已完成</span></td></tr>';
h+='<tr><td>ORD20260526001</td><td>u50045</td><td>全成就通关存档</td><td>艾尔登法环</td><td>¥6.00</td><td>u10086</td><td>+30分钟</td><td>2026-05-26 09:20</td><td><span class="tag tag-green">已完成</span></td></tr>';
h+='<tr><td>ORD20260525001</td><td>u50067</td><td>96辆车全改装</td><td>GTA V</td><td>¥6.00</td><td>u30055</td><td>+30分钟</td><td>2026-05-25 18:45</td><td><span class="tag tag-green">已完成</span></td></tr>';
h+='<tr><td>ORD20260525002</td><td>u50089</td><td>线上模式满级</td><td>GTA V</td><td>¥6.00</td><td>官方</td><td>-</td><td>2026-05-25 20:00</td><td><span class="tag tag-green">已完成</span></td></tr>';
h+='</tbody></table></div>';
document.getElementById('pageContent').innerHTML=h;
}

function renderOrders(){
var h='<div class="card"><h3 style="font-size:14px;margin-bottom:14px">订单明细</h3>';
h+='<div class="filter-bar"><input placeholder="买家UID" style="width:100px"><input placeholder="卖家UID" style="width:100px"><input placeholder="存档ID/标题" style="width:130px"><input type="date" style="width:130px"><span style="color:#999">~</span><input type="date" style="width:130px"><select><option>全部状态</option><option>已完成</option><option>已退款</option></select><button class="btn" onclick="showToast(\'查询成功\')">查询</button><button class="btn">重置</button><button class="btn" onclick="showToast(\'导出CSV\')"><i class="fas fa-download"></i> 导出</button></div>';
h+='<table><thead><tr><th>订单号</th><th>买家UID</th><th>存档标题</th><th>游戏</th><th>金额</th><th>卖家</th><th>赠送时长</th><th>购买时间</th><th>状态</th><th>操作</th></tr></thead><tbody>';
h+='<tr><td>ORD20260527001</td><td>u50001</td><td>500多万CR全收集</td><td>GTA V</td><td>¥6.00</td><td>官方</td><td>-</td><td>2026-05-27 14:30</td><td><span class="tag tag-green">已完成</span></td><td><button class="btn btn-sm" onclick="showToast(\'查看详情\')">详情</button></td></tr>';
h+='<tr><td>ORD20260527002</td><td>u50023</td><td>全BOSS击杀存档</td><td>GTA V</td><td>¥6.00</td><td>官方</td><td>-</td><td>2026-05-27 15:10</td><td><span class="tag tag-green">已完成</span></td><td><button class="btn btn-sm" onclick="showToast(\'查看详情\')">详情</button></td></tr>';
h+='<tr><td>ORD20260526001</td><td>u50045</td><td>全成就通关存档</td><td>艾尔登法环</td><td>¥6.00</td><td>u10086</td><td>+30分钟</td><td>2026-05-26 09:20</td><td><span class="tag tag-green">已完成</span></td><td><button class="btn btn-sm" onclick="showToast(\'查看详情\')">详情</button></td></tr>';
h+='<tr><td>ORD20260525001</td><td>u50067</td><td>96辆车全改装</td><td>GTA V</td><td>¥6.00</td><td>u30055</td><td>+30分钟</td><td>2026-05-25 18:45</td><td><span class="tag tag-green">已完成</span></td><td><button class="btn btn-sm" onclick="showToast(\'查看详情\')">详情</button></td></tr>';
h+='<tr><td>ORD20260525002</td><td>u50089</td><td>线上模式满级</td><td>GTA V</td><td>¥6.00</td><td>官方</td><td>-</td><td>2026-05-25 20:00</td><td><span class="tag tag-green">已完成</span></td><td><button class="btn btn-sm" onclick="showToast(\'查看详情\')">详情</button></td></tr>';
h+='<tr><td>ORD20260524001</td><td>u50100</td><td>全角色满级存档</td><td>赛博朋克2077</td><td>¥6.00</td><td>u20088</td><td>+30分钟</td><td>2026-05-24 12:00</td><td><span class="tag" style="background:#fff1f0;color:#ff4d4f;border:1px solid #ffa39e">已退款</span></td><td><button class="btn btn-sm" onclick="showToast(\'查看详情\')">详情</button></td></tr>';
h+='</tbody></table></div>';
document.getElementById('pageContent').innerHTML=h;
}

function openNew(){
editIdx=-1;
document.getElementById('modalTitle').textContent='新建存档';
document.getElementById('modalBody').innerHTML=getForm(null);
document.getElementById('modal').classList.add('show');
}

function openEdit(idx){
editIdx=idx;
document.getElementById('modalTitle').textContent='编辑存档 - '+saves[idx].id;
document.getElementById('modalBody').innerHTML=getForm(saves[idx]);
document.getElementById('modal').classList.add('show');
}

function getForm(data){
return '<div class="form-group"><label>* 关联游戏</label><select id="f-game"><option'+(data&&data.game==='GTA V'?' selected':'')+'>GTA V</option><option'+(data&&data.game==='艾尔登法环'?' selected':'')+'>艾尔登法环</option><option'+(data&&data.game==='赛博朋克2077'?' selected':'')+'>赛博朋克2077</option><option>空洞骑士</option><option>巫师3</option></select></div>'+
'<div class="form-group"><label>* 存档类型</label><select id="f-type"><option'+(data&&data.type==='通关存档'?' selected':'')+'>通关存档</option><option'+(data&&data.type==='BOSS存档'?' selected':'')+'>BOSS存档</option></select></div>'+
'<div class="form-group"><label>* 标题</label><input id="f-title" value="'+(data?data.title:'')+'"></div>'+
'<div class="form-group"><label>* 描述</label><textarea id="f-desc" placeholder="存档内容描述...">'+(data?'存档描述内容...':'')+'</textarea></div>'+
'<div class="form-group"><label>封面图</label><div style="display:flex;align-items:center;gap:10px">'+(data?'<img src="'+data.cover+'" style="width:80px;height:50px;border-radius:4px;object-fit:cover">':'')+'<button class="btn btn-sm" onclick="showToast(\'选择图片\')"><i class="fas fa-upload"></i> 上传</button></div></div>'+
'<div class="form-group"><label>存档文件</label><button class="btn btn-sm" onclick="showToast(\'选择存档文件\')"><i class="fas fa-file"></i> 上传存档文件</button>'+(data?' <span style="color:#52c41a;font-size:11px">✓ 已上传</span>':'')+'</div>'+
'<div class="form-group"><label>价格</label><div style="padding:8px 10px;background:#f5f5f5;border-radius:4px;color:#d4b473;font-weight:bold">¥6.00（固定价格）</div></div>'+
(data?'<div class="form-group"><label>状态</label><select id="f-status"><option'+(data.status==='已上架'?' selected':'')+'>已上架</option><option'+(data.status==='已下架'?' selected':'')+'>已下架</option></select></div>':'');
}

function saveItem(){
var title=document.getElementById('f-title').value;
if(!title){showToast('请填写标题');return;}
if(editIdx>=0){
saves[editIdx].title=title;
saves[editIdx].game=document.getElementById('f-game').value;
saves[editIdx].type=document.getElementById('f-type').value;
var st=document.getElementById('f-status');
if(st)saves[editIdx].status=st.value;
showToast('编辑保存成功');
}else{
saves.unshift({id:'SAVE'+String(saves.length+1).padStart(3,'0'),title:title,game:document.getElementById('f-game').value,type:document.getElementById('f-type').value,price:6,status:'已上架',buyers:0,time:new Date().toISOString().split('T')[0],cover:'https://images.unsplash.com/photo-1542751371-adc38448a05e?w=120&h=80&fit=crop'});
showToast('新建成功，已上架');
}
closeModal();renderList();
}

function toggleStatus(idx){
saves[idx].status=saves[idx].status==='已上架'?'已下架':'已上架';
renderList();
showToast('状态已更新为：'+saves[idx].status);
}

function delItem(idx){
if(confirm('确定删除「'+saves[idx].title+'」？删除后不可恢复。\n已购买用户不受影响。')){
saves.splice(idx,1);renderList();showToast('已删除');
}
}

function closeModal(){document.getElementById('modal').classList.remove('show')}
function showToast(msg){var t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show')},2000)}

renderList();
</script>
</body>
</html>
