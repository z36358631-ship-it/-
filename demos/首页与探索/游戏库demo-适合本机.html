<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>盖世游戏 - 游戏库（含H5小游戏）</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--pri:#287dfa;--bg:#0a0e13;--card:#151a24;--border:rgba(255,255,255,0.06);--dim:rgba(255,255,255,0.45);--radius:16px;--h5:#10b981;}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;scrollbar-width:none;}
*::-webkit-scrollbar{display:none;}
body{background:#000;color:#fff;height:100vh;width:100vw;display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:13px;}

.shell{position:relative;overflow:hidden;box-shadow:0 0 50px rgba(0,0,0,0.8);transition:all 0.4s ease;background:var(--bg);}
.shell.port{width:520px;height:836px;border-radius:40px;display:flex;flex-direction:column;}
.shell.land{width:1200px;height:520px;border-radius:var(--radius);display:flex;flex-direction:column;}

/* === 竖屏顶部 === */
.port-top{display:none;align-items:center;padding:14px 16px 6px;flex-shrink:0;}
.port-top .tabs{display:flex;gap:0;flex:1;}
.port-top .tabs .tab{padding:6px 12px;font-size:17px;font-weight:700;color:var(--dim);cursor:pointer;position:relative;transition:0.2s;}
.port-top .tabs .tab.on{color:#fff;}
.port-top .tabs .tab.on::after{content:'';position:absolute;bottom:-2px;left:12px;width:20px;height:3px;background:var(--pri);border-radius:2px;}
.port-top .right{display:flex;align-items:center;gap:12px;}
.port-top .right .icon-btn{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:13px;cursor:pointer;transition:0.2s;}
.port-top .right .icon-btn:hover{background:rgba(255,255,255,0.12);color:#fff;}

/* === 横屏顶部导航 === */
.land-nav{display:none;height:40px;background:rgba(10,14,19,0.95);border-bottom:1px solid var(--border);align-items:center;padding:0 20px;flex-shrink:0;z-index:20;justify-content:center;}
.shell.land .land-nav{display:flex;}
.land-nav .ni{display:flex;align-items:center;gap:5px;color:var(--dim);cursor:pointer;font-size:12px;padding:6px 16px;transition:0.2s;border-radius:6px;}
.land-nav .ni i{font-size:14px;}
.land-nav .ni.on{color:#fff;background:rgba(255,255,255,0.08);}
.land-nav .right-area{margin-left:auto;display:flex;align-items:center;gap:10px;}
.land-nav .orient-btn{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--dim);font-size:12px;transition:0.2s;}
.land-nav .orient-btn:hover{background:rgba(255,255,255,0.12);color:#fff;}

/* === 主滚动区 === */
.main{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;}

/* === 竖屏内容 === */
.p-content{display:none;flex-direction:column;gap:14px;padding:6px 16px 16px;}
.shell.port .p-content{display:flex;}

/* 搜索icon+展开 */
.search-trigger{display:flex;align-items:center;gap:8px;}
.search-trigger .s-icon{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:14px;cursor:pointer;transition:0.2s;flex-shrink:0;}
.search-trigger .s-icon:hover{background:rgba(255,255,255,0.12);color:#fff;}
.search-trigger .s-box{width:0;overflow:hidden;transition:width 0.3s ease;display:flex;align-items:center;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:10px;padding:0;gap:8px;opacity:0;}
.search-trigger.open .s-box{width:160px;padding:7px 12px;opacity:1;}
.search-trigger .s-box input{background:none;border:none;outline:none;color:#fff;font-size:12px;width:100%;}
.search-trigger .s-box input::placeholder{color:var(--dim);}
.search-trigger .s-box .s-close{color:var(--dim);font-size:11px;cursor:pointer;flex-shrink:0;}
.search-trigger.left-expand{flex-direction:row-reverse;}
.search-trigger.left-expand .s-box{direction:rtl;}
.search-trigger.left-expand .s-box input{direction:ltr;}

/* 入口卡片 */
.entry-row{display:flex;gap:10px;}
.entry-card{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 8px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:0.2s;}
.entry-card:hover{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.15);}
.entry-card .ec-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;color:#fff;flex-shrink:0;}
.entry-card:nth-child(1) .ec-icon{background:linear-gradient(135deg,#1b2838,#2a475e);}
.entry-card:nth-child(2) .ec-icon{background:linear-gradient(135deg,#1a1a2e,#2d1b69);}
.entry-card:nth-child(3) .ec-icon{background:linear-gradient(135deg,#1e3a2f,#0f2027);}
.entry-card .ec-text{display:flex;flex-direction:column;gap:1px;}
.entry-card .ec-text .ec-label{font-size:12px;font-weight:600;color:rgba(255,255,255,0.9);}
.entry-card .ec-text .ec-sub{font-size:10px;color:var(--dim);}

/* 我的游戏标题行 */
.my-header{display:flex;align-items:center;}
.my-header .left{display:flex;align-items:center;gap:8px;}
.my-header .left .title{font-size:15px;font-weight:700;}
.my-header .left .count{font-size:12px;color:var(--dim);}
.my-header .right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.my-header .right .sort-btn{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--dim);cursor:pointer;padding:5px 10px;border-radius:6px;background:rgba(255,255,255,0.04);border:1px solid var(--border);}
.my-header .right .sort-btn:hover{background:rgba(255,255,255,0.08);}
.my-header .right .filter-btn{width:28px;height:28px;border-radius:6px;background:rgba(255,255,255,0.04);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:11px;cursor:pointer;}
.my-header .right .filter-btn:hover{background:rgba(255,255,255,0.08);}

/* 游戏卡片网格 */
.game-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.gc{background:var(--card);border-radius:10px;overflow:hidden;cursor:pointer;transition:0.2s;border:1px solid var(--border);position:relative;}
.gc:hover{transform:translateY(-2px);border-color:rgba(255,255,255,0.15);}
.gc img{width:100%;aspect-ratio:16/10;object-fit:cover;}
.gc .gc-info{padding:8px 10px;}
.gc .gc-info .t{font-size:12px;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gc .gc-info .m{font-size:10px;color:var(--dim);display:flex;align-items:center;gap:4px;}
.gc .gc-info .m i{font-size:10px;}
.gc .gc-info .gc-score{font-size:12px;font-weight:700;color:#ffcc43;font-family:'D-DIN-PRO',-apple-system,sans-serif;}
.gc .badge{position:absolute;top:6px;left:6px;display:flex;gap:3px;}
.gc .badge i{width:18px;height:18px;border-radius:4px;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;font-size:9px;color:rgba(255,255,255,0.85);}

/* 适配状态标签 */
.compat-tag{position:absolute;top:6px;right:6px;padding:2px 6px;border-radius:4px;font-size:9px;font-weight:600;z-index:2;line-height:1.4;}
.compat-tag.cloud-compat{background:linear-gradient(135deg,#ffcc43,#10b981);color:#000;}
.compat-tag.compat-only{background:#10b981;color:#000;}
.compat-tag.cloud-only{background:#ffcc43;color:#000;}
.compat-tag.not-compat{background:rgba(255,255,255,0.15);color:rgba(255,255,255,0.6);backdrop-filter:blur(2px);}

/* 不适配蒙层 */
.gc-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.5);z-index:1;border-radius:10px;pointer-events:none;}
.gc-dimmed{opacity:0.7;}
.gc-dimmed:hover{opacity:0.85;}

/* H5小游戏特有样式 */
.h5-cat-row{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;}
.h5-cat{padding:5px 14px;font-size:12px;font-weight:500;color:var(--dim);background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:16px;cursor:pointer;white-space:nowrap;transition:0.2s;}
.h5-cat.on{color:#fff;background:rgba(16,185,129,0.15);border-color:var(--h5);}
.h5-banner{background:linear-gradient(135deg,#064e3b,#0f766e);border-radius:12px;padding:16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:0.2s;}
.h5-banner:hover{opacity:0.9;}
.h5-banner .hb-icon{width:48px;height:48px;border-radius:12px;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.h5-banner .hb-text{display:flex;flex-direction:column;gap:3px;}
.h5-banner .hb-text .hb-title{font-size:14px;font-weight:700;color:#fff;}
.h5-banner .hb-text .hb-desc{font-size:11px;color:rgba(255,255,255,0.7);}
.h5-badge{position:absolute;top:6px;right:6px;padding:2px 6px;border-radius:4px;background:var(--h5);font-size:9px;font-weight:600;color:#fff;}
.gc .h5-play-btn{position:absolute;bottom:40px;right:8px;width:28px;height:28px;border-radius:50%;background:var(--h5);display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;opacity:0;transition:0.2s;}
.gc:hover .h5-play-btn{opacity:1;}

/* 横屏内容 */
.l-content{display:none;flex-direction:column;gap:0;padding:0;}
.shell.land .l-content{display:flex;}
.l-recent{padding:12px 24px;display:flex;flex-direction:column;gap:8px;}
.l-recent .sec-row{display:flex;align-items:center;gap:10px;}
.l-recent .sec-t{font-size:13px;font-weight:700;color:rgba(255,255,255,0.9);}
.l-recent .cards-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;}
.l-recent .rc{cursor:pointer;transition:0.2s;background:var(--card);border-radius:8px;overflow:hidden;border:1px solid var(--border);}
.l-recent .rc:hover{transform:translateY(-2px);border-color:rgba(255,255,255,0.15);}
.l-recent .rc img{width:100%;aspect-ratio:3/4;object-fit:cover;}
.l-recent .rc span{font-size:10px;color:var(--dim);display:block;padding:5px 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.l-section{padding:8px 24px;display:flex;flex-direction:column;gap:10px;}
.l-tab-row{display:flex;align-items:center;gap:0;justify-content:center;}
.l-tab-row .tab{padding:5px 14px;font-size:13px;font-weight:600;color:var(--dim);cursor:pointer;border-radius:6px;transition:0.2s;}
.l-tab-row .tab.on{color:#fff;background:rgba(255,255,255,0.08);}
.l-entry-row{display:flex;gap:10px;}
.l-entry-card{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:0.2s;}
.l-entry-card:hover{border-color:rgba(255,255,255,0.2);}
.l-entry-card .ec-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;flex-shrink:0;}
.l-entry-card:nth-child(1) .ec-icon{background:linear-gradient(135deg,#1b2838,#2a475e);}
.l-entry-card:nth-child(2) .ec-icon{background:linear-gradient(135deg,#1a1a2e,#2d1b69);}
.l-entry-card:nth-child(3) .ec-icon{background:linear-gradient(135deg,#1e3a2f,#0f2027);}
.l-entry-card .ec-label{font-size:11px;font-weight:600;color:rgba(255,255,255,0.8);}
.l-entry-card .ec-sub{font-size:9px;color:var(--dim);margin-top:1px;}
.l-entry-card .ec-text{display:flex;flex-direction:column;}
.l-games{padding:10px 24px 24px;display:flex;flex-direction:column;gap:10px;}
.l-games .my-header .left .title{font-size:13px;}
.l-games .my-header .left .count{font-size:11px;}
.l-games .game-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
.l-games .gc img{aspect-ratio:16/10;}
.l-games .gc .gc-info{padding:6px 8px;}
.l-games .gc .gc-info .t{font-size:11px;}

/* 子页面 */
.subpage{position:absolute;inset:0;background:var(--bg);z-index:50;display:flex;flex-direction:column;animation:slideIn 0.25s ease;}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.subpage .sp-header{display:flex;align-items:center;gap:12px;padding:14px 16px;flex-shrink:0;}
.subpage .sp-header .back{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--dim);font-size:14px;}
.subpage .sp-header .back:hover{color:#fff;background:rgba(255,255,255,0.15);}
.subpage .sp-header .title{font-size:16px;font-weight:700;}
.subpage .sp-body{flex:1;overflow-y:auto;padding:0 16px 16px;display:flex;flex-direction:column;gap:16px;}
.subpage .sp-body .game-grid{grid-template-columns:repeat(2,1fr);}
.shell.land .subpage .sp-body .game-grid{grid-template-columns:repeat(7,1fr);}
.sp-bind-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;gap:14px;flex:1;}
.sp-bind-state .bind-icon{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#1b2838,#2a475e);display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;}
.sp-bind-state .bind-title{font-size:16px;font-weight:700;color:#fff;}
.sp-bind-state .bind-desc{font-size:12px;color:var(--dim);max-width:240px;line-height:1.5;}
.sp-bind-state .bind-btn{padding:10px 32px;background:var(--pri);color:#fff;font-size:13px;font-weight:600;border-radius:8px;cursor:pointer;transition:0.2s;}
.sp-bind-state .bind-btn:hover{opacity:0.85;}

/* 底部导航 */
.btm-nav{display:none;height:60px;background:rgba(10,14,19,0.97);backdrop-filter:blur(10px);border-top:1px solid var(--border);flex-shrink:0;z-index:20;padding:0 10px;}

/* 非常适合本机子页面 */
.compat-device-info{display:flex;align-items:center;gap:12px;padding:14px;background:var(--card);border-radius:12px;border:1px solid var(--border);margin-bottom:14px;}
.cdi-icon{width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#0d4a2e,#10b981);display:flex;align-items:center;justify-content:center;font-size:18px;color:#fff;flex-shrink:0;}
.cdi-text{display:flex;flex-direction:column;gap:2px;}
.cdi-model{font-size:14px;font-weight:600;color:#fff;}
.cdi-spec{font-size:11px;color:var(--dim);}
.compat-legend{display:flex;flex-direction:column;gap:6px;margin-bottom:14px;padding:10px 12px;background:rgba(255,255,255,0.02);border-radius:8px;border:1px solid var(--border);}
.cl-item{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--dim);}
.cl-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.compat-count{font-size:13px;font-weight:600;color:rgba(255,255,255,0.85);margin-bottom:12px;}
.compat-toolbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.compat-toolbar .right{display:flex;align-items:center;gap:8px;}
.compat-toolbar .sort-btn{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--dim);cursor:pointer;padding:5px 10px;border-radius:6px;background:rgba(255,255,255,0.04);border:1px solid var(--border);}
.compat-toolbar .sort-btn:hover{background:rgba(255,255,255,0.08);}
.compat-toolbar .search-trigger{display:flex;align-items:center;gap:8px;}
.compat-toolbar .s-icon{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:12px;cursor:pointer;transition:0.2s;}
.compat-toolbar .s-icon:hover{background:rgba(255,255,255,0.12);color:#fff;}
.compat-toolbar .s-box{width:0;overflow:hidden;transition:width 0.3s ease;display:flex;align-items:center;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:10px;padding:0;gap:8px;opacity:0;}
.compat-toolbar .search-trigger.open .s-box{width:140px;padding:6px 10px;opacity:1;}
.compat-toolbar .s-box input{background:none;border:none;outline:none;color:#fff;font-size:12px;width:100%;}
.compat-toolbar .s-box input::placeholder{color:var(--dim);}
.compat-toolbar .s-box .s-close{color:var(--dim);font-size:10px;cursor:pointer;flex-shrink:0;}
.entry-card.fit-device{border-color:rgba(16,185,129,0.3);background:rgba(16,185,129,0.06);}
.entry-card.fit-device:hover{border-color:rgba(16,185,129,0.5);background:rgba(16,185,129,0.1);}
.l-entry-card.fit-device{border-color:rgba(16,185,129,0.3);background:rgba(16,185,129,0.06);}
.l-entry-card.fit-device:hover{border-color:rgba(16,185,129,0.5);background:rgba(16,185,129,0.1);}
.shell.port .btm-nav{display:flex;align-items:center;justify-content:space-around;}
.btm-nav .ni{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--dim);cursor:pointer;font-size:9px;padding:6px 10px;}
.btm-nav .ni i{font-size:18px;}
.btm-nav .ni.on{color:#fff;}

/* 搜索页 */
.search-page{position:absolute;inset:0;background:var(--bg);z-index:500;display:flex;flex-direction:column;transform:translateX(100%);transition:transform 0.3s cubic-bezier(0.2,0.8,0.2,1);}
.search-page.show{transform:translateX(0);}
.search-header{display:flex;align-items:center;gap:10px;padding:10px 16px;background:rgba(10,14,19,0.95);flex-shrink:0;}
.search-input-wrap{flex:1;display:flex;align-items:center;background:rgba(255,255,255,0.08);border-radius:20px;height:34px;padding:0 12px;gap:8px;}
.search-input-wrap input{flex:1;background:transparent;border:none;color:#fff;font-size:13px;outline:none;}
.search-input-wrap input::placeholder{color:var(--dim);}
.search-btn{background:var(--h5);color:#fff;padding:5px 14px;border-radius:14px;font-size:12px;font-weight:600;cursor:pointer;}
.search-tabs{display:flex;justify-content:space-around;background:rgba(10,14,19,0.95);border-bottom:1px solid var(--border);flex-shrink:0;}
.s-tab{padding:10px 0;font-size:13px;color:var(--dim);cursor:pointer;position:relative;font-weight:500;}
.s-tab.on{color:#fff;font-weight:700;}
.s-tab.on::after{content:'';position:absolute;bottom:-1px;left:50%;transform:translateX(-50%);width:18px;height:3px;background:var(--pri);border-radius:2px;}
.search-results{flex:1;overflow-y:auto;padding:12px 16px;display:flex;flex-direction:column;gap:10px;}
.sr-section{display:flex;flex-direction:column;gap:8px;}
.sr-section-title{font-size:13px;font-weight:700;color:rgba(255,255,255,0.8);padding-bottom:4px;border-bottom:1px solid var(--border);}
.sr-item{display:flex;align-items:center;gap:10px;padding:8px;border-radius:8px;cursor:pointer;transition:0.15s;}
.sr-item:hover{background:rgba(255,255,255,0.05);}
.sr-item img{width:48px;height:48px;border-radius:8px;object-fit:cover;background:#1a2332;flex-shrink:0;}
.sr-item-info{flex:1;display:flex;flex-direction:column;gap:2px;overflow:hidden;}
.sr-item-info .name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.sr-item-info .meta{font-size:11px;color:var(--dim);}
.sr-item .sr-tag{padding:2px 6px;border-radius:4px;font-size:9px;font-weight:600;flex-shrink:0;}
.sr-tag.pc{background:rgba(40,125,250,0.15);color:var(--pri);}
.sr-tag.retro{background:rgba(139,92,246,0.15);color:#8b5cf6;}
.sr-tag.h5{background:rgba(16,185,129,0.15);color:var(--h5);}
.sr-empty{text-align:center;padding:40px;color:var(--dim);font-size:13px;}

/* 首页内容 */
.home-content{display:none;flex-direction:column;gap:0;padding:0 16px 16px;}
.shell.port .home-content.active{display:flex;}
.sub-tabs-home{display:flex;align-items:center;gap:0;padding:10px 0 6px;position:sticky;top:0;z-index:15;background:var(--bg);}
.sub-tabs-home .st{padding:6px 12px;font-size:13px;font-weight:600;color:var(--dim);cursor:pointer;border-radius:6px;transition:0.2s;white-space:nowrap;}
.sub-tabs-home .st.on{color:#fff;background:rgba(255,255,255,0.08);}

        if(!isCompat) return '<span class="compat-tag not-compat">不适配</span>';
    }
    return '';
}

function compatInfoHtml(g){
    if(!g) return '';
    var isCompat = g.compat==='perfect'||g.compat==='good';
    if(typeof tagMode!=='undefined' && tagMode==='D'){
        if(isCompat) return '<span style="color:#10b981;font-weight:600;">本机适配</span> · ';
        else return '<span style="color:rgba(255,255,255,0.4);font-weight:600;">不适配</span> · ';
    }
    return '<i class="fas fa-play"></i> ';
}

function gameCardHtml(g){
    var overlay = '';
    var dimClass = '';
    var cloudBtn = g.cloud ? '<span style="position:absolute;bottom:8px;right:8px;background:#10b981;color:#fff;font-size:9px;font-weight:700;padding:4px 10px;border-radius:4px;z-index:2;">秒玩</span>' : '';
    return '<div class="gc'+dimClass+'">'+badgeHtml(g.platform)+overlay+compatTagHtml(g)+cloudBtn+'<img src="'+hd(g.name)+'"><div class="gc-info"><div class="t">'+g.name+'</div><div class="m">'+compatInfoHtml(g)+g.tags+'</div></div></div>';
}

function openSearch(){
    document.getElementById('searchPage').classList.add('show');
    setTimeout(()=>document.getElementById('searchInput').focus(),300);
}
function closeSearch(){
    document.getElementById('searchPage').classList.remove('show');
}
function doSearch(){
    renderSearchResults();
}
function renderSearchResults(){
    const q=document.getElementById('searchInput').value.trim().toLowerCase();
    const el=document.getElementById('searchResults');
    if(!q){el.innerHTML='<div class="sr-empty">输入关键词搜索游戏</div>';return;}
    const matchPC=pcGames.filter(g=>g.name.toLowerCase().includes(q)||g.genre.toLowerCase().includes(q));
    const matchRetro=retroGames.filter(g=>g.name.toLowerCase().includes(q));
    const matchH5=h5Games.filter(g=>g.name.toLowerCase().includes(q)||g.cat.includes(q));
    let html='';
    const showPC=searchTabFilter==='all'||searchTabFilter==='pc';
    const showRetro=searchTabFilter==='all'||searchTabFilter==='retro';
    const showH5=searchTabFilter==='all'||searchTabFilter==='h5';
    if(showPC&&matchPC.length){
        if(searchTabFilter==='pc'){
            html+=`<div class="sr-section"><div class="sr-section-title">PC游戏 (${matchPC.length})</div>`;
            html+='<div class="game-grid" style="grid-template-columns:repeat(2,1fr);gap:10px;margin-top:8px;">';
            html+=matchPC.map(g=>gameCardHtml(g)).join('');
            html+='</div></div>';
        } else {
            html+=`<div class="sr-section"><div class="sr-section-title" style="display:flex;justify-content:space-between;align-items:center;">游戏<span style="font-size:11px;color:var(--dim);font-weight:400;cursor:pointer;">查看更多 ›</span></div>`;
            html+=matchPC.slice(0,5).map(g=>{
                var isCompat=g.compat==='perfect'||g.compat==='good';
                var statusTag='';
                if(isCompat) statusTag='<span style="color:#10b981;font-size:10px;font-weight:600;margin-left:8px;">本机适配</span>';
                else statusTag='<span style="color:rgba(255,255,255,0.35);font-size:10px;font-weight:600;margin-left:8px;">不适配</span>';
                var nameHtml=g.name.replace(new RegExp('('+q+')','gi'),'<span style="color:#5ba8f5;">$1</span>');
                return '<div class="sr-item" style="padding:10px 8px;gap:12px;align-items:flex-start;"><img src="'+hd(g.name)+'" style="width:56px;height:56px;border-radius:8px;"><div class="sr-item-info" style="gap:3px;"><div class="name" style="font-size:14px;font-weight:600;">'+nameHtml+'</div><div class="meta" style="font-size:11px;color:var(--dim);">'+g.genre+'</div><div class="meta" style="font-size:11px;display:flex;align-items:center;"><span style="color:#ffcc43;">★ '+g.score+'</span> <span style="color:var(--dim);margin-left:4px;">'+g.genre.split(' ').join('·')+'</span>'+statusTag+'</div></div></div>';
            }).join('');
            html+='</div>';
        }
    }
    if(showRetro&&matchRetro.length){
        html+=`<div class="sr-section"><div class="sr-section-title">复古游戏 (${matchRetro.length})</div>`;
        html+=matchRetro.map(g=>`<div class="sr-item"><img src="${hd(g.name)}"><div class="sr-item-info"><div class="name">${g.name}</div><div class="meta">${g.tags}</div></div><span class="sr-tag retro">复古</span></div>`).join('');
        html+='</div>';
    }
    if(showH5&&matchH5.length){
        html+=`<div class="sr-section"><div class="sr-section-title">小游戏 (${matchH5.length})</div>`;
        html+=matchH5.map(g=>`<div class="sr-item"><img src="${g.cover}" style="border-radius:10px;"><div class="sr-item-info"><div class="name">${g.name}</div><div class="meta">${g.cat} · ${g.players}</div></div><span class="sr-tag h5">免登录</span></div>`).join('');
        html+='</div>';
    }
    if(!html) html='<div class="sr-empty">未找到"'+q+'"相关游戏</div>';
    el.innerHTML=html;
}
document.querySelectorAll('#searchTabs .s-tab').forEach(t=>{
    t.addEventListener('click',()=>{
        document.querySelectorAll('#searchTabs .s-tab').forEach(x=>x.classList.remove('on'));
        t.classList.add('on');
        searchTabFilter=t.dataset.stab;
        doSearch();
    });
});

// 首页搜索入口（游戏库内）
document.querySelector('.port-top .right .icon-btn')?.addEventListener('click',()=>{if(!isLand)openSearch();});

switchPage('home');
</script>

<!-- 方案切换按钮 -->
<div style="position:fixed;top:20px;left:20px;background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:12px;z-index:9999;font-size:12px;color:#ccc;">
<div style="font-size:11px;color:#ffcc43;margin-bottom:8px;font-weight:600;">标签方案切换</div>
<div style="display:flex;gap:6px;">
<button onclick="setTagMode('A')" id="modeA" style="padding:6px 12px;border-radius:6px;border:1px solid #555;background:#333;color:#fff;cursor:pointer;font-size:11px;font-weight:600;">方案A：胶囊标签</button>
<button onclick="setTagMode('D')" id="modeD" style="padding:6px 12px;border-radius:6px;border:1px solid #555;background:#222;color:#aaa;cursor:pointer;font-size:11px;">方案D：类型行前加</button>
</div>
<div style="margin-top:8px;font-size:10px;color:#666;">A=左上角胶囊 | D=类型名称前显示适配状态</div>
</div>

<script>
function setTagMode(mode){
    tagMode=mode;
    document.getElementById('modeA').style.background=mode==='A'?'#333':'#222';
    document.getElementById('modeA').style.color=mode==='A'?'#fff':'#aaa';
    document.getElementById('modeD').style.background=mode==='D'?'#333':'#222';
    document.getElementById('modeD').style.color=mode==='D'?'#fff':'#aaa';
    if(typeof renderPort==='function') renderPort();
    if(typeof renderHome==='function') renderHome();
    if(document.querySelector('.search-page.show') && typeof renderSearchResults==='function') renderSearchResults();
}
</script>
