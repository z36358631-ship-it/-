<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>盖世游戏 - 游戏库</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
:root{--pri:#287dfa;--bg:#0a0e13;--card:#151a24;--border:rgba(255,255,255,0.06);--dim:rgba(255,255,255,0.45);--radius:16px;}
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;scrollbar-width:none;}
*::-webkit-scrollbar{display:none;}
body{background:#000;color:#fff;height:100vh;width:100vw;display:flex;align-items:center;justify-content:center;overflow:hidden;font-size:13px;}

.shell{position:relative;overflow:hidden;box-shadow:0 0 50px rgba(0,0,0,0.8);transition:all 0.4s ease;background:var(--bg);}
.shell.port{width:520px;height:836px;border-radius:40px;display:flex;flex-direction:column;}
.shell.land{width:1200px;height:520px;border-radius:var(--radius);display:flex;flex-direction:column;}

/* === 竖屏顶部 === */
.port-top{display:none;align-items:center;padding:14px 16px 6px;flex-shrink:0;}
.shell.port .port-top{display:flex;}
.port-top .tabs{display:flex;gap:0;flex:1;}
.port-top .tabs .tab{padding:6px 12px;font-size:17px;font-weight:700;color:var(--dim);cursor:pointer;position:relative;transition:0.2s;}
.port-top .tabs .tab.on{color:#fff;}
.port-top .tabs .tab.on::after{content:'';position:absolute;bottom:-2px;left:12px;width:20px;height:3px;background:var(--pri);border-radius:2px;}
.port-top .right{display:flex;align-items:center;gap:12px;}
.port-top .right .avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#667eea,#764ba2);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;}
.port-top .right .icon-btn{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:13px;cursor:pointer;transition:0.2s;}
.port-top .right .icon-btn:hover{background:rgba(255,255,255,0.12);color:#fff;}

/* === 横屏顶部导航 === */
.land-nav{display:none;height:40px;background:rgba(10,14,19,0.95);border-bottom:1px solid var(--border);align-items:center;padding:0 20px;flex-shrink:0;z-index:20;justify-content:center;}
.shell.land .land-nav{display:flex;}
.land-nav .ni{display:flex;align-items:center;gap:5px;color:var(--dim);cursor:pointer;font-size:12px;padding:6px 16px;transition:0.2s;border-radius:6px;}
.land-nav .ni i{font-size:14px;}
.land-nav .ni.on{color:#fff;background:rgba(255,255,255,0.08);}
.land-nav .right-area{margin-left:auto;display:flex;align-items:center;gap:10px;}
.land-nav .orient-btn{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--dim);font-size:12px;transition:0.2s;}
.land-nav .orient-btn:hover{background:rgba(255,255,255,0.12);color:#fff;}

/* === 主滚动区 === */
.main{flex:1;overflow-y:auto;overflow-x:hidden;position:relative;}

/* === 竖屏内容 === */
.p-content{display:none;flex-direction:column;gap:14px;padding:6px 16px 16px;}
.shell.port .p-content{display:flex;}

/* 搜索icon+展开 */
.search-trigger{display:flex;align-items:center;gap:8px;}
.search-trigger .s-icon{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:14px;cursor:pointer;transition:0.2s;flex-shrink:0;}
.search-trigger .s-icon:hover{background:rgba(255,255,255,0.12);color:#fff;}
.search-trigger .s-box{width:0;overflow:hidden;transition:width 0.3s ease;display:flex;align-items:center;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:10px;padding:0;gap:8px;opacity:0;}
.search-trigger.open .s-box{width:160px;padding:7px 12px;opacity:1;}
.search-trigger .s-box input{background:none;border:none;outline:none;color:#fff;font-size:12px;width:100%;}
.search-trigger .s-box input::placeholder{color:var(--dim);}
.search-trigger .s-box .s-close{color:var(--dim);font-size:11px;cursor:pointer;flex-shrink:0;}
/* 横屏搜索向左展开 */
.search-trigger.left-expand{flex-direction:row-reverse;}
.search-trigger.left-expand .s-box{direction:rtl;}
.search-trigger.left-expand .s-box input{direction:ltr;}

/* 入口卡片 */
.entry-row{display:flex;gap:10px;}
.entry-card{flex:1;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 8px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:0.2s;}
.entry-card:hover{background:rgba(255,255,255,0.05);border-color:rgba(255,255,255,0.15);}
.entry-card .ec-icon{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:17px;color:#fff;flex-shrink:0;}
.entry-card:nth-child(1) .ec-icon{background:linear-gradient(135deg,#1b2838,#2a475e);}
.entry-card:nth-child(2) .ec-icon{background:linear-gradient(135deg,#1a1a2e,#2d1b69);}
.entry-card:nth-child(3) .ec-icon{background:linear-gradient(135deg,#1e3a2f,#0f2027);}
.entry-card .ec-text{display:flex;flex-direction:column;gap:1px;}
.entry-card .ec-text .ec-label{font-size:12px;font-weight:600;color:rgba(255,255,255,0.9);}
.entry-card .ec-text .ec-sub{font-size:10px;color:var(--dim);}

/* 我的游戏标题行 */
.my-header{display:flex;align-items:center;}
.my-header .left{display:flex;align-items:center;gap:8px;}
.my-header .left .title{font-size:15px;font-weight:700;}
.my-header .left .count{font-size:12px;color:var(--dim);}
.my-header .right{margin-left:auto;display:flex;align-items:center;gap:8px;}
.my-header .right .sort-btn{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--dim);cursor:pointer;padding:5px 10px;border-radius:6px;background:rgba(255,255,255,0.04);border:1px solid var(--border);}
.my-header .right .sort-btn:hover{background:rgba(255,255,255,0.08);}
.my-header .right .filter-btn{width:28px;height:28px;border-radius:6px;background:rgba(255,255,255,0.04);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:11px;cursor:pointer;}
.my-header .right .filter-btn:hover{background:rgba(255,255,255,0.08);}

/* 游戏卡片网格 */
.game-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
.gc{background:var(--card);border-radius:10px;overflow:hidden;cursor:pointer;transition:0.2s;border:1px solid var(--border);position:relative;}
.gc:hover{transform:translateY(-2px);border-color:rgba(255,255,255,0.15);}
.gc img{width:100%;aspect-ratio:16/10;object-fit:cover;}
.gc .gc-info{padding:8px 10px;}
.gc .gc-info .t{font-size:12px;font-weight:600;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.gc .gc-info .m{font-size:10px;color:var(--dim);display:flex;align-items:center;gap:4px;}
.gc .gc-info .m i{font-size:10px;}
.gc .badge{position:absolute;top:6px;left:6px;display:flex;gap:3px;}
.gc .badge i{width:18px;height:18px;border-radius:4px;background:rgba(0,0,0,0.75);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;font-size:9px;color:rgba(255,255,255,0.85);}

/* === 横屏内容 === */
.l-content{display:none;flex-direction:column;gap:0;padding:0;}
.shell.land .l-content{display:flex;}

/* 横屏最近游戏 */
.l-recent{padding:12px 24px;display:flex;flex-direction:column;gap:8px;}
.l-recent .sec-row{display:flex;align-items:center;gap:10px;}
.l-recent .sec-row .s-icon{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:12px;cursor:pointer;flex-shrink:0;}
.l-recent .sec-row .s-icon:hover{color:#fff;background:rgba(255,255,255,0.12);}
.l-recent .sec-t{font-size:13px;font-weight:700;color:rgba(255,255,255,0.9);}
.l-recent .cards-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;}
.l-recent .rc{cursor:pointer;transition:0.2s;background:var(--card);border-radius:8px;overflow:hidden;border:1px solid var(--border);}
.l-recent .rc:hover{transform:translateY(-2px);border-color:rgba(255,255,255,0.15);}
.l-recent .rc img{width:100%;aspect-ratio:3/4;object-fit:cover;}
.l-recent .rc span{font-size:10px;color:var(--dim);display:block;padding:5px 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

/* 横屏子tab+入口 */
.l-section{padding:8px 24px;display:flex;flex-direction:column;gap:10px;}
.l-tab-row{display:flex;align-items:center;gap:0;}
.l-tab-row .tab{padding:5px 14px;font-size:13px;font-weight:600;color:var(--dim);cursor:pointer;border-radius:6px;transition:0.2s;}
.l-tab-row .tab.on{color:#fff;background:rgba(255,255,255,0.08);}
.l-entry-row{display:flex;gap:10px;}
.l-entry-card{flex:1;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:0.2s;}
.l-entry-card:hover{border-color:rgba(255,255,255,0.2);}
.l-entry-card.active{border-color:var(--pri);background:rgba(40,125,250,0.08);}
.l-entry-card .ec-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;flex-shrink:0;}
.l-entry-card:nth-child(1) .ec-icon{background:linear-gradient(135deg,#1b2838,#2a475e);}
.l-entry-card:nth-child(2) .ec-icon{background:linear-gradient(135deg,#1a1a2e,#2d1b69);}
.l-entry-card:nth-child(3) .ec-icon{background:linear-gradient(135deg,#1e3a2f,#0f2027);}
.l-entry-card .ec-label{font-size:11px;font-weight:600;color:rgba(255,255,255,0.8);}
.l-entry-card .ec-sub{font-size:9px;color:var(--dim);margin-top:1px;}
.l-entry-card .ec-text{display:flex;flex-direction:column;}

/* 横屏游戏列表 */
.l-games{padding:10px 24px 24px;display:flex;flex-direction:column;gap:10px;}
.l-games .my-header .left .title{font-size:13px;}
.l-games .my-header .left .count{font-size:11px;}
.l-games .game-grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;}
.l-games .gc img{aspect-ratio:16/10;}
.l-games .gc .gc-info{padding:6px 8px;}
.l-games .gc .gc-info .t{font-size:11px;}

/* 竖屏子页面 */
.subpage{position:absolute;inset:0;background:var(--bg);z-index:50;display:flex;flex-direction:column;animation:slideIn 0.25s ease;}
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
.subpage .sp-header{display:flex;align-items:center;gap:12px;padding:14px 16px;flex-shrink:0;}
.subpage .sp-header .back{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,0.08);display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--dim);font-size:14px;}
.subpage .sp-header .back:hover{color:#fff;background:rgba(255,255,255,0.15);}
.subpage .sp-header .title{font-size:16px;font-weight:700;}
.subpage .sp-body{flex:1;overflow-y:auto;padding:0 16px 16px;display:flex;flex-direction:column;gap:16px;}
.subpage .sp-body .game-grid{grid-template-columns:repeat(2,1fr);}
.shell.land .subpage .sp-body .game-grid{grid-template-columns:repeat(7,1fr);}

/* 子页面工具栏 */
.sp-toolbar{display:flex;align-items:center;gap:8px;}
.sp-search-bar{flex:1;display:flex;align-items:center;background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:8px;padding:7px 10px;gap:6px;}
.sp-search-bar i{color:var(--dim);font-size:12px;}
.sp-search-bar input{background:none;border:none;outline:none;color:#fff;font-size:12px;width:100%;}
.sp-search-bar input::placeholder{color:var(--dim);}
.sp-sort{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--dim);cursor:pointer;padding:5px 10px;border-radius:6px;background:rgba(255,255,255,0.04);border:1px solid var(--border);white-space:nowrap;flex-shrink:0;}
.sp-filter-icon{width:30px;height:30px;border-radius:6px;background:rgba(255,255,255,0.04);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:11px;cursor:pointer;flex-shrink:0;}
.sp-count{font-size:12px;color:var(--dim);}

/* 子页面头像+下拉 */
.sp-avatar{margin-left:auto;position:relative;cursor:pointer;}
.sp-avatar img{width:30px;height:30px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);object-fit:cover;}
.sp-dropdown{display:none;position:absolute;top:38px;right:0;background:#1e2430;border:1px solid var(--border);border-radius:10px;padding:6px 0;min-width:140px;z-index:100;box-shadow:0 8px 24px rgba(0,0,0,0.5);}
.sp-dropdown.show{display:block;}
.dd-item{display:flex;align-items:center;gap:8px;padding:9px 14px;font-size:12px;color:rgba(255,255,255,0.8);cursor:pointer;transition:0.15s;}
.dd-item:hover{background:rgba(255,255,255,0.06);}
.dd-item i{font-size:13px;width:16px;text-align:center;color:var(--dim);}
.dd-item.danger{color:#ef4444;}
.dd-item.danger i{color:#ef4444;}

/* 绑定缺省态 */
.sp-bind-state{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 20px;text-align:center;gap:14px;flex:1;}
.sp-bind-state .bind-icon{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,#1b2838,#2a475e);display:flex;align-items:center;justify-content:center;font-size:28px;color:#fff;}
.sp-bind-state .bind-title{font-size:16px;font-weight:700;color:#fff;}
.sp-bind-state .bind-desc{font-size:12px;color:var(--dim);max-width:240px;line-height:1.5;}
.sp-bind-state .bind-btn{padding:10px 32px;background:var(--pri);color:#fff;font-size:13px;font-weight:600;border-radius:8px;cursor:pointer;transition:0.2s;}
.sp-bind-state .bind-btn:hover{opacity:0.85;}

/* 底部导航 */
.btm-nav{display:none;height:60px;background:rgba(10,14,19,0.97);backdrop-filter:blur(10px);border-top:1px solid var(--border);flex-shrink:0;z-index:20;padding:0 10px;}
.shell.port .btm-nav{display:flex;align-items:center;justify-content:space-around;}
.btm-nav .ni{display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--dim);cursor:pointer;font-size:9px;padding:6px 10px;}
.btm-nav .ni i{font-size:18px;}
.btm-nav .ni.on{color:#fff;}
</style>
</head>

let curTab='pc';
let landFilter='all'; // all, steam, epic
let isLand=false;

function toggle(){
    isLand=!isLand;
    document.getElementById('shell').className='shell '+(isLand?'land':'port');
    render();
}

function switchTab(tab){
    curTab=tab;
    landFilter='all';
    render();
}

function setLandFilter(f){
    landFilter=landFilter===f?'all':f;
    render();
}

function badgeHtml(platforms){
    if(!platforms||!platforms.length) return '';
    return `<div class="badge">${platforms.map(p=>
        p==='steam'?'<i class="fab fa-steam"></i>':
        p==='epic'?'<i class="fas fa-cube"></i>':''
    ).join('')}</div>`;
}

function getFilteredGames(){
    const games=curTab==='pc'?pcGames:retroGames;
    if(landFilter==='all'||curTab==='retro') return games;
    return games.filter(g=>g.platform.includes(landFilter));
}

    {name:"黑神话：悟空",tags:"动作 · 冒险",cat:"动作"},
    {name:"艾尔登法环",tags:"动作 · RPG",cat:"RPG"},

    {name:"博德之门3",tags:"RPG · 回合制",cat:"RPG"},

];
const epicGames=[

    {name:"荒野大镖客2",tags:"动作 · 冒险",cat:"动作"},
    {name:"战神4",tags:"动作 · 冒险",cat:"动作"},
    {name:"GTA5",tags:"动作 · 开放世界",cat:"动作"}

const categories=['全部','动作','RPG','竞速','冒险'];

function openSubpage(name){
    const shell=document.getElementById('shell');
    const existing=shell.querySelector('.subpage');
    if(existing) existing.remove();

    const isImport=name==='导入游戏';
    const isRetroSub=name==='导入复古游戏';
    const isSteam=name==='Steam';
    const isEpic=name==='Epic';
    const games=isSteam?steamGames:isEpic?epicGames:[];
    const isBound=isSteam||isEpic;

    const sp=document.createElement('div');
    sp.className='subpage';

    if(isImport||isRetroSub){
        sp.innerHTML=`
            <div class="sp-header">
                <div class="back"><i class="fas fa-chevron-left"></i></div>
                <div class="title">${isRetroSub?'导入复古游戏':'导入游戏'}</div>
            </div>
            <div class="sp-body">
                <div style="text-align:center;padding:60px 20px;color:var(--dim);">
                    <i class="fas fa-file-import" style="font-size:36px;margin-bottom:12px;display:block;"></i>
                    <div>点击选择游戏文件导入</div>
                </div>
            </div>`;
    } else {
        sp.innerHTML=`
            <div class="sp-header">
                <div class="back"><i class="fas fa-chevron-left"></i></div>
                <div class="title">${name}游戏</div>
                <div class="sp-avatar" id="spAvatar" style="display:none;">
                    <img src="https://cdn.cloudflare.steamstatic.com/steamcommunity/public/images/avatars/fe/fef49e7fa7e1997310d705b2a6158ff8dc1cdfeb_medium.jpg">
                    <div class="sp-dropdown" id="spDropdown">
                        <div class="dd-item"><i class="fas fa-user"></i> 查看主页</div>
                        <div class="dd-item"><i class="fas fa-exchange-alt"></i> 切换账号</div>
                        <div class="dd-item danger"><i class="fas fa-sign-out-alt"></i> 退出登录</div>
                    </div>
                </div>
            </div>
            <div class="sp-body" id="spBody">
                <div class="sp-bind-state" id="spBindState">
                    <div class="bind-icon"><i class="${isSteam?'fab fa-steam':'fas fa-cube'}"></i></div>
                    <div class="bind-title">绑定${name}账号</div>
                    <div class="bind-desc">绑定后可同步你的${name}游戏库，一键启动游戏</div>
                    <div class="bind-btn" id="spBindBtn">立即绑定</div>
                </div>
                <div class="sp-game-state" id="spGameState" style="display:none;">
                    <div class="my-header">
                        <div class="left"><div class="title">全部游戏</div><div class="count">${games.length}款</div></div>
                        <div class="right">
                            <div class="search-trigger left-expand" id="spSearchTrigger">
                                <div class="s-icon"><i class="fas fa-search"></i></div>
                                <div class="s-box"><input type="text" placeholder="搜索游戏名"><div class="s-close"><i class="fas fa-times"></i></div></div>
                            </div>
                            <div class="sort-btn"><i class="fas fa-sort-amount-down"></i> 最近游玩</div>
                            <div class="filter-btn"><i class="fas fa-sliders-h"></i></div>
                        </div>
                    </div>
                    <div class="game-grid" id="spGrid">
                        ${games.map(g=>`<div class="gc"><img src="${hd(g.name)}"><div class="gc-info"><div class="t">${g.name}</div><div class="m">${g.tags}</div></div></div>`).join('')}
                    </div>
                </div>
            </div>`;
    }

    shell.appendChild(sp);
    sp.querySelector('.back').addEventListener('click',()=>sp.remove());

    // 头像下拉菜单
    const avatar=sp.querySelector('#spAvatar');
    if(avatar){
        avatar.addEventListener('click',(e)=>{
            e.stopPropagation();
            const dd=sp.querySelector('#spDropdown');
            dd.classList.toggle('show');
        });
        sp.addEventListener('click',()=>{
            const dd=sp.querySelector('#spDropdown');
            if(dd) dd.classList.remove('show');
        });
        // 退出登录 → 回到绑定态
        sp.querySelectorAll('.dd-item.danger').forEach(item=>{
            item.addEventListener('click',(e)=>{
                e.stopPropagation();
                sp.querySelector('#spBindState').style.display='';
                sp.querySelector('#spGameState').style.display='none';
                sp.querySelector('#spDropdown').classList.remove('show');
                sp.querySelector('#spAvatar').style.display='none';
            });
        });
    }

    // 绑定按钮 → 显示游戏列表
    const bindBtn=sp.querySelector('#spBindBtn');
    if(bindBtn){
        bindBtn.addEventListener('click',()=>{
            sp.querySelector('#spBindState').style.display='none';
            sp.querySelector('#spGameState').style.display='';
            // 绑定后显示头像
            const avatar=sp.querySelector('#spAvatar');
            if(avatar) avatar.style.display='';
            // 绑定后初始化搜索icon
            const spSt=sp.querySelector('#spSearchTrigger');
            if(spSt){
                spSt.querySelector('.s-icon').addEventListener('click',()=>{spSt.classList.toggle('open');const inp=spSt.querySelector('input');if(spSt.classList.contains('open'))inp.focus();});
                spSt.querySelector('.s-close').addEventListener('click',()=>{spSt.classList.remove('open');spSt.querySelector('input').value='';});
            }
        });
    }
}

function renderPort(){
    const el=document.getElementById('pContent');
    const games=curTab==='pc'?pcGames:retroGames;
    const showEntry=curTab==='pc';

    el.innerHTML=`
        ${showEntry?`<div class="entry-row">
            <div class="entry-card" data-entry="Steam"><div class="ec-icon"><i class="fab fa-steam"></i></div><div class="ec-text"><div class="ec-label">Steam</div><div class="ec-sub">查看游戏 ›</div></div></div>
            <div class="entry-card" data-entry="Epic"><div class="ec-icon"><i class="fas fa-cube"></i></div><div class="ec-text"><div class="ec-label">Epic Games</div><div class="ec-sub">查看游戏 ›</div></div></div>
            <div class="entry-card" data-entry="导入游戏"><div class="ec-icon"><i class="fas fa-plus"></i></div><div class="ec-text"><div class="ec-label">导入游戏</div><div class="ec-sub">手动添加 ›</div></div></div>
        </div>`:`<div class="entry-row">
            <div class="entry-card" data-entry="导入复古游戏" style="flex:none;width:auto;"><div class="ec-icon" style="background:linear-gradient(135deg,#1e3a2f,#0f2027);"><i class="fas fa-plus"></i></div><div class="ec-text"><div class="ec-label">导入游戏</div><div class="ec-sub">手动添加 ›</div></div></div>
        </div>`}
        <div class="my-header">
            <div class="left"><div class="title">我的游戏</div><div class="count">${games.length}款游戏</div></div>
            <div class="right">
                <div class="search-trigger" id="searchTrigger">
                    <div class="s-icon"><i class="fas fa-search"></i></div>
                    <div class="s-box"><input type="text" placeholder="搜索游戏名"><div class="s-close"><i class="fas fa-times"></i></div></div>
                </div>
                ${curTab==='pc'?'<div class="sort-btn"><i class="fas fa-sort-amount-down"></i> 最近游玩</div>':''}
                ${curTab==='pc'?'<div class="filter-btn"><i class="fas fa-sliders-h"></i></div>':''}
            </div>
        </div>
        <div class="game-grid">${games.map(g=>`<div class="gc">${badgeHtml(g.platform)}<img src="${hd(g.name)}"><div class="gc-info"><div class="t">${g.name}</div><div class="m"><i class="fas fa-play"></i> ${g.tags}</div></div></div>`).join('')}</div>
    `;

    // 竖屏tab事件
    document.querySelectorAll('#portTabs .tab').forEach(t=>{
        t.onclick=()=>switchTab(t.dataset.tab);
        t.classList.toggle('on',t.dataset.tab===curTab);
    });
    // 入口跳转子页面
    el.querySelectorAll('.entry-card[data-entry]').forEach(c=>{
        c.addEventListener('click',()=>openSubpage(c.dataset.entry));
    });
    // 搜索icon展开收起
    const st=document.getElementById('searchTrigger');
    if(st){
        st.querySelector('.s-icon').addEventListener('click',()=>{st.classList.toggle('open');const inp=st.querySelector('input');if(st.classList.contains('open'))inp.focus();});
        st.querySelector('.s-close').addEventListener('click',()=>{st.classList.remove('open');st.querySelector('input').value='';});
    }
}
