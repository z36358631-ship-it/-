<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>布局编辑器 Demo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{
  width:100%;min-height:100vh;background:#111;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:-apple-system,'PingFang SC',sans-serif;user-select:none;
}
.phone-wrap{display:flex;flex-direction:column;align-items:center;}
.phone{
  width:900px;height:400px;position:relative;overflow:hidden;
  border-radius:22px;background:#000;
  box-shadow:0 0 0 1.5px #383838,0 0 0 3.5px #1c1c1c,0 28px 64px rgba(0,0,0,.9);
}
.ext-row{margin-top:16px;display:flex;gap:10px;}
.ext-btn{
  background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.2);
  color:rgba(255,255,255,.82);padding:9px 28px;border-radius:20px;
  cursor:pointer;font-size:13px;font-weight:600;transition:all .17s;
}
.ext-btn:hover{background:rgba(255,255,255,.13);border-color:rgba(255,255,255,.36);}

.view{position:absolute;inset:0;display:none;}
.view.active{display:block;}

/* Toast */
#toast{
  position:absolute;top:54px;left:50%;
  transform:translateX(-50%) translateY(-4px);
  background:rgba(26,26,26,.97);border:1px solid rgba(255,255,255,.12);
  color:#fff;padding:6px 18px;border-radius:16px;font-size:12px;font-weight:600;
  z-index:999;opacity:0;transition:opacity .18s,transform .18s;
  pointer-events:none;white-space:nowrap;
}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0);}

/* ═══════════ EDITOR ═══════════ */
#ed{background:#080808;}
.ed-border{position:absolute;inset:5px;border:1.5px dashed rgba(255,255,255,.11);border-radius:4px;pointer-events:none;z-index:40;}
.ed-vline{position:absolute;right:12%;top:0;bottom:0;border-right:1.5px dashed rgba(255,255,255,.11);pointer-events:none;z-index:40;}
.ed-topdot{position:absolute;right:calc(12% - 9px);top:-2px;width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,.38);background:#080808;z-index:41;pointer-events:none;}
.ed-thumb{position:absolute;right:calc(12% - 15px);top:38%;width:30px;height:30px;border-radius:50%;background:radial-gradient(circle at 36% 34%,#282828,#0d0d0d);box-shadow:0 2px 7px rgba(0,0,0,.75);z-index:41;}

/* Toolbar */
.ed-bar{
  position:absolute;top:14px;left:50%;transform:translateX(-50%);
  display:inline-flex;align-items:center;
  background:rgba(15,15,15,.98);border:1px solid rgba(255,255,255,.1);
  border-radius:40px;padding:7px 14px;z-index:50;
  backdrop-filter:blur(14px);box-shadow:0 3px 16px rgba(0,0,0,.6);
  white-space:nowrap;gap:0;
}
.tb{
  background:none;border:none;color:rgba(255,255,255,.78);
  padding:5px 6px;cursor:pointer;border-radius:8px;flex-shrink:0;
  transition:background .13s;display:flex;align-items:center;justify-content:center;gap:4px;
}
.tb:hover{background:rgba(255,255,255,.1);}
.tb svg{display:block;pointer-events:none;}
.tb-d{width:1px;height:18px;background:rgba(255,255,255,.13);margin:0 4px;flex-shrink:0;}
.tb-name{
  color:#fff;font-size:13px;font-weight:700;
  padding:0 8px;min-width:48px;text-align:center;
  white-space:nowrap;
}

/* 新建子布局按钮 */
.tb-create{
  border:1px dashed rgba(255,255,255,.28);border-radius:8px;
  color:rgba(255,255,255,.55);font-size:11px;font-weight:600;
  padding:4px 10px;gap:4px;transition:all .15s;
}
.tb-create:hover{border-color:rgba(255,255,255,.5);color:rgba(255,255,255,.85);background:rgba(255,255,255,.07);}

/* 删除布局按钮 */
.tb-del-layout{
  color:rgba(220,80,80,.8);padding:5px 6px;
}
.tb-del-layout:hover{background:rgba(200,50,50,.15);color:#f77;}

/* Add panel */
.add-panel{
  position:absolute;bottom:48px;left:50%;transform:translateX(-50%);
  background:rgba(11,11,11,.98);border:1px solid rgba(255,255,255,.1);
  border-radius:14px;padding:12px 13px;z-index:70;
  display:none;box-shadow:0 6px 22px rgba(0,0,0,.65);
}
.add-panel.open{display:block;}
.add-panel h4{color:rgba(255,255,255,.3);font-size:10px;text-align:center;margin-bottom:9px;letter-spacing:.1em;font-weight:600;}
.add-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;}
.add-item{
  width:48px;height:48px;border-radius:50%;
  background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.15);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;gap:2px;transition:all .15s;
}
.add-item:hover{background:rgba(255,255,255,.13);border-color:rgba(255,255,255,.3);}
.add-item em{font-style:normal;font-size:9px;color:rgba(255,255,255,.34);}

/* Virtual buttons */
#ed-canvas{position:absolute;inset:0;z-index:10;}
.vb{position:absolute;cursor:grab;touch-action:none;}
.vb:active{cursor:grabbing;}

.vb-c{
  border-radius:50%;background:rgba(255,255,255,.09);
  border:2px solid rgba(255,255,255,.28);
  display:flex;align-items:center;justify-content:center;
  width:100%;height:100%;transition:border-color .12s,background .12s;
}
.vb-c.sel{border-color:rgba(255,255,255,.72);background:rgba(255,255,255,.16);}

.vb-joy{
  border-radius:50%;background:rgba(255,255,255,.07);
  border:2px solid rgba(255,255,255,.23);
  width:100%;height:100%;position:relative;
  display:flex;align-items:center;justify-content:center;
  transition:border-color .12s;
}
.vb-joy.sel{border-color:rgba(255,255,255,.62);}
.joy-inner{width:33%;height:33%;border-radius:50%;background:rgba(255,255,255,.2);}
.joy-arrows{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  color:rgba(255,255,255,.3);font-size:8px;line-height:1.55;
  pointer-events:none;
}

.vb-r{
  border-radius:7px;background:rgba(255,255,255,.09);
  border:2px solid rgba(255,255,255,.25);
  display:flex;align-items:center;justify-content:center;
  width:100%;height:100%;transition:border-color .12s;
}
.vb-r.sel{border-color:rgba(255,255,255,.65);}

/* 切换布局圆圈控件 */
.vb-sw{
  border-radius:50%;background:rgba(255,255,255,.09);
  border:2px solid rgba(255,255,255,.28);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:100%;height:100%;
  cursor:grab;gap:3px;padding:8px;
  transition:border-color .12s,background .12s;
}
.vb-sw .sw-label{font-size:10px;font-weight:700;line-height:1;color:rgba(255,255,255,.6);}
.vb-sw.sel{border-color:rgba(255,255,255,.72);background:rgba(255,255,255,.16);}
.vb-sw.sel .sw-label{color:rgba(255,255,255,.9);}

/* Selection popover */
#sel-pop{
  position:absolute;z-index:80;display:none;
  background:rgba(16,16,16,.98);border:1px solid rgba(255,255,255,.13);
  border-radius:11px;padding:6px 7px;
  box-shadow:0 4px 18px rgba(0,0,0,.7);backdrop-filter:blur(12px);
  align-items:center;gap:4px;white-space:nowrap;
}
#sel-pop.show{display:flex;}
.sp-btn{
  height:27px;padding:0 9px;border-radius:7px;border:1px solid rgba(255,255,255,.13);
  background:rgba(255,255,255,.07);color:rgba(255,255,255,.62);
  cursor:pointer;font-size:11px;font-weight:700;
  display:flex;align-items:center;gap:3px;transition:all .13s;
}
.sp-btn:hover,.sp-btn.on{background:rgba(255,255,255,.16);color:#fff;border-color:rgba(255,255,255,.28);}
.sp-del{background:rgba(200,50,50,.1);border-color:rgba(200,50,50,.28);color:rgba(220,75,75,.9);}
.sp-del:hover{background:rgba(200,50,50,.22);border-color:rgba(200,50,50,.45);color:#f77;}
.sp-div{width:1px;height:17px;background:rgba(255,255,255,.1);}

/* ═══════════ GAME ═══════════ */
#gm{background:#0a0d14;}
.gm-bg{
  position:absolute;inset:0;z-index:1;
  background:linear-gradient(180deg,#080c14 0%,#0d1420 55%,#131313 100%);
  display:flex;align-items:center;justify-content:center;
}
.gm-ph{display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;}
.gm-ph svg{width:46px;height:46px;opacity:.05;}
.gm-ph span{color:rgba(255,255,255,.05);font-size:12px;font-weight:700;letter-spacing:.18em;}

.g-stats{
  position:absolute;top:0;left:0;right:0;
  padding:4px 14px;background:rgba(0,0,0,.48);
  display:flex;align-items:center;gap:9px;
  font-size:10.5px;font-weight:700;z-index:50;
  backdrop-filter:blur(5px);font-family:monospace;
}
.gs{display:flex;gap:2px;align-items:center;}
.gl{color:#444;}.gv{color:#ccc;}
.g-star{margin-left:auto;color:#FFD700;font-size:11px;letter-spacing:1px;}

#gm-ctrl{position:absolute;inset:0;z-index:30;pointer-events:none;}
.gc-c{
  position:absolute;border-radius:50%;
  background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.3);
  display:flex;align-items:center;justify-content:center;
}
.gc-r{
  position:absolute;border-radius:7px;
  background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.26);
  display:flex;align-items:center;justify-content:center;
}
.gc-joy{
  position:absolute;border-radius:50%;
  background:rgba(255,255,255,.07);border:2px solid rgba(255,255,255,.23);
  display:flex;align-items:center;justify-content:center;
}

#layout-flash{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(.84);
  background:rgba(0,0,0,.92);border:1px solid rgba(255,255,255,.15);
  color:#fff;padding:10px 30px;border-radius:14px;
  font-size:16px;font-weight:700;z-index:200;
  opacity:0;transition:opacity .18s,transform .18s;pointer-events:none;
}
#layout-flash.on{opacity:1;transform:translate(-50%,-50%) scale(1);}

@keyframes ctrlIn{from{opacity:0;transform:scale(.72)}to{opacity:1;transform:scale(1)}}
</style>
</head>
<body>

<div class="phone-wrap">
  <div class="phone" id="phone">
    <div id="toast"></div>

    <!-- ══════ EDITOR ══════ -->
    <div id="ed" class="view active">
      <div class="ed-border"></div>
      <div class="ed-vline"></div>
      <div class="ed-topdot"></div>
      <div class="ed-thumb"></div>

      <div class="ed-bar" id="ed-bar">
        <button class="tb" onclick="goGame()" title="游戏预览">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.8)" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
        </button>
        <div class="tb-d"></div>
        <span class="tb-name">阿呵</span>
        <div class="tb-d"></div>
        <button class="tb" onclick="toggleAdd()" title="添加按键">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.8)" stroke-width="2.3" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        </button>
        <button class="tb" onclick="doUndo()" title="撤销">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.8)" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M9 14 4 9l5-5"/><path d="M4 9h10.5a5.5 5.5 0 0 1 0 11H11"/></svg>
        </button>
        <button class="tb" onclick="doRedo()" title="重做">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.8)" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M15 14l5-5-5-5"/><path d="M20 9H9.5a5.5 5.5 0 0 0 0 11H13"/></svg>
        </button>
        <div class="tb-d" id="tb-sw-div"></div>
        <!-- 动态区域：新建子布局 或 切换+删除 -->
        <div id="tb-sw-area" style="display:inline-flex;align-items:center;gap:2px;"></div>
      </div>

      <div id="ed-canvas"></div>
      <div id="sel-pop"></div>

      <div class="add-panel" id="add-panel">
        <h4>添加按键</h4>
        <div class="add-grid" id="add-grid"></div>
      </div>
    </div>

    <!-- ══════ GAME ══════ -->
    <div id="gm" class="view">
      <div class="gm-bg">
        <div class="gm-ph">
          <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.2">
            <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
          </svg>
          <span>游戏画面</span>
        </div>
      </div>
      <div class="g-stats">
        <div class="gs"><span class="gl">DXVK</span></div>
        <div class="gs"><span class="gl" style="color:#4ec96a">GPU</span><span class="gv">34%</span></div>
        <div class="gs"><span class="gl" style="color:#ff6b6b">CPU</span><span class="gv">34%</span></div>
        <div class="gs"><span class="gl" style="color:#ffa94d">RAM</span><span class="gv">96%</span></div>
        <div class="gs"><span class="gl" style="color:#ff6b6b">TMP</span><span class="gv">66.7°C</span></div>
        <div class="gs"><span class="gl" style="color:#74b9ff">FPS</span><span class="gv">50</span></div>
        <div class="gs"><span class="gl" style="color:#c07af5">PWR</span><span class="gv">5.8W</span></div>
        <div class="g-star">★★★★☆</div>
      </div>
      <div id="gm-ctrl"></div>
      <div id="layout-flash"></div>
    </div>
  </div>

  <div class="ext-row">
    <button class="ext-btn" onclick="goEditor()">进入编辑页</button>
  </div>
</div>

<script>
/* ══════════════════════════
   SVG icons
══════════════════════════ */
const IC = {
  aim:   `<circle cx="12" cy="12" r="7"/><line x1="12" y1="2" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="22"/><line x1="2" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="22" y2="12"/><circle cx="12" cy="12" r="2.2" fill="rgba(255,255,255,.5)" stroke="none"/>`,
  horn:  `<path d="M11 5 6 9H2v6h4l5 4V5z"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M19 5a10 10 0 0 1 0 14"/>`,
  cover: `<circle cx="12" cy="5.5" r="2.5" fill="rgba(255,255,255,.45)" stroke="none"/><path d="M9 9c0 0-2 3-2 5.5h10C17 12 15 9 15 9l-3-.8L9 9z"/><line x1="4" y1="20" x2="20" y2="20" stroke-width="2.4" stroke-linecap="round"/>`,
  gyro:  `<circle cx="12" cy="12" r="3"/><ellipse cx="12" cy="12" rx="9.5" ry="4"/><ellipse cx="12" cy="12" rx="9.5" ry="4" transform="rotate(90 12 12)"/>`,
  enter: `<path d="M20 6v6a2 2 0 0 1-2 2H4"/><path d="M7 11l-3 3 3 3"/>`,
  screen:`<rect x="2" y="4" width="20" height="14" rx="2"/><line x1="8" y1="22" x2="16" y2="22"/><line x1="12" y1="18" x2="12" y2="22"/>`,
  gun:   `<path d="M3 13h10v-2h3V9h3v6H3z"/><path d="M3 13v3h7v-3"/><circle cx="6.5" cy="18.5" r="1.5" fill="rgba(255,255,255,.6)" stroke="none"/>`,
  tablet:`<rect x="4" y="2" width="16" height="20" rx="2"/><line x1="9" y1="7" x2="15" y2="7"/><line x1="9" y1="10" x2="13" y2="10"/><circle cx="12" cy="18.5" r="1.2" fill="rgba(255,255,255,.6)" stroke="none"/>`,
  melee: `<path d="M14.5 17.5 3 6V3h3l11.5 11.5"/><path d="M13 19l6-6 2 5-3 3-5-2z"/>`,
  car:   `<path d="M5 17H3v-4l2-6h14l2 6v4h-2"/><circle cx="7.5" cy="17.5" r="1.5" fill="rgba(255,255,255,.6)" stroke="none"/><circle cx="16.5" cy="17.5" r="1.5" fill="rgba(255,255,255,.6)" stroke="none"/><path d="M5 13h14"/>`,
  sprint:`<path d="M13.5 4.5h2.5L13 9h4l-5 9 1.5-6h-3z" fill="rgba(255,255,255,.5)" stroke="none"/>`,
  npc:   `<circle cx="12" cy="5.5" r="2.8" fill="rgba(255,255,255,.4)" stroke="none"/><path d="M8 10a4 4 0 0 0-1 5.5h10A4 4 0 0 0 16 10l-3.5-1L8 10z"/><line x1="9.5" y1="21" x2="10" y2="15.5"/><line x1="14.5" y1="21" x2="14" y2="15.5"/>`,
  fire:  `<polygon points="5,4 19,12 5,21" fill="rgba(255,255,255,.55)" stroke="rgba(255,255,255,.8)" stroke-width="1.4"/>`,
  jump:  `<line x1="12" y1="20" x2="12" y2="6"/><polyline points="5 13 12 6 19 13"/>`,
  reload:`<path d="M12 3a9 9 0 1 1-9 9"/><path d="M3 3v6h6"/>`,
  bomb:  `<circle cx="10" cy="13" r="6"/><path d="M14.5 8l2.5-2.5"/><path d="M17.5 5.5l1.5-1.5"/>`,
  menu:  `<line x1="4" y1="6" x2="20" y2="6"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="18" x2="20" y2="18"/>`,
  grid:  `<rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/>`,
  menu2: `<line x1="4" y1="7" x2="20" y2="7"/><line x1="4" y1="12" x2="20" y2="12"/><line x1="4" y1="17" x2="20" y2="17"/>`,
  cycle: `<path d="M17 2l4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="M7 22l-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>`,
  trash: `<polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>`,
};

function mkIcon(key, sz, stroke) {
  sz = sz || 20;
  stroke = stroke || 'rgba(255,255,255,.78)';
  return `<svg width="${sz}" height="${sz}" viewBox="0 0 24 24" fill="none" stroke="${stroke}" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">${IC[key]||''}</svg>`;
}

/* ══════════════════════════
   LAYOUT DATA
══════════════════════════ */
const LAYOUT_1_DEF = {
  name: '阿呵',
  btns: [
    {id:'joy', t:'joy', x:3.5, y:28,  s:120},
    {id:'horn',t:'c',   x:1.5, y:8,   s:62, ic:'horn'},
    {id:'aim', t:'c',   x:9.5, y:8,   s:62, ic:'aim'},
    {id:'cov', t:'c',   x:5.2, y:23,  s:62, ic:'cover'},
    {id:'gyro',t:'c',   x:1,   y:57,  s:46, ic:'gyro'},
    {id:'ent', t:'c',   x:83,  y:5,   s:60, ic:'enter'},
    {id:'scr', t:'c',   x:90.5,y:5,   s:60, ic:'screen'},
    {id:'gun', t:'c',   x:83,  y:21,  s:60, ic:'gun'},
    {id:'tab', t:'c',   x:90.5,y:21,  s:60, ic:'tablet'},
    {id:'mel', t:'c',   x:83,  y:37,  s:60, ic:'melee'},
    {id:'car', t:'c',   x:90.5,y:37,  s:60, ic:'car'},
    {id:'spr', t:'c',   x:78,  y:46,  s:62, ic:'sprint'},
    {id:'npc', t:'c',   x:88.5,y:50,  s:60, ic:'npc'},
    {id:'m1',  t:'r',   x:70,  y:81,  s:68, ic:'menu'},
    {id:'m2',  t:'r',   x:79,  y:81,  s:68, ic:'grid'},
    {id:'m3',  t:'r',   x:88.5,y:81,  s:68, ic:'menu2'},
  ]
};

const LAYOUT_2_DEF = {
  name: '原名布局2',
  btns: [
    {id:'joy', t:'joy', x:4,    y:30,  s:115},
    {id:'aim', t:'c',   x:15,   y:18,  s:68, ic:'aim'},
    {id:'fire',t:'c',   x:71,   y:42,  s:80, ic:'fire'},
    {id:'jump',t:'c',   x:85.5, y:20,  s:64, ic:'jump'},
    {id:'rel', t:'c',   x:85.5, y:51,  s:58, ic:'reload'},
    {id:'cov', t:'c',   x:72.5, y:67,  s:58, ic:'cover'},
    {id:'spr', t:'c',   x:12.5, y:65,  s:58, ic:'sprint'},
    {id:'ent', t:'c',   x:91,   y:5,   s:50, ic:'enter'},
    {id:'m1',  t:'r',   x:83,   y:82,  s:60, ic:'menu'},
  ]
};

/* 切换控件默认位置 */
const SW_DEFAULT = { x: 42, y: 80, s: 62 };

/* ══════════════════════════
   STATE
══════════════════════════ */
let hasSubLayout = false;   // 是否已创建子布局
let curLayout    = 1;       // 当前编辑/预览的布局 (1 or 2)
let curView      = 'ed';

// 可编辑的布局数据（深拷贝）
let editState = {
  1: JSON.parse(JSON.stringify(LAYOUT_1_DEF))
};

// 切换控件状态（独立于布局）
let swWidget = null; // null 表示未创建

let undoStack = [];
let redoStack = [];
let selData   = null;

/* ══════════════════════════
   BOOT
══════════════════════════ */
window.addEventListener('load', () => {
  buildAddGrid();
  updateToolbar();
  renderEditor();
});

/* ══════════════════════════
   VIEWS
══════════════════════════ */
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  curView = id;
}
function goGame() {
  closeAdd(); closePopover();
  showView('gm');
  requestAnimationFrame(() => renderGame(true));
}
function goEditor() {
  closeAdd(); closePopover();
  showView('ed');
  requestAnimationFrame(renderEditor);
}

/* ══════════════════════════
   TOOLBAR 动态区域
══════════════════════════ */
function updateToolbar() {
  const area = document.getElementById('tb-sw-area');
  if (!hasSubLayout) {
    // 显示"新建子布局"按钮
    area.innerHTML = `
      <button class="tb tb-create" onclick="createSubLayout()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        新建子布局
      </button>`;
  } else {
    // 显示"切换"按钮 + "删除布局"按钮

      <button class="tb" onclick="edCycleLayout()" title="切换布局">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,.8)" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">${IC.cycle}</svg>
      </button>
      <button class="tb tb-del-layout" onclick="deleteSubLayout()" title="删除子布局">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round">${IC.trash}</svg>
      </button>`;
  }

/* ══════════════════════════
   子布局 创建 / 删除
══════════════════════════ */
function createSubLayout() {
  hasSubLayout = true;
  // 初始化子布局为预设数据（或可以克隆布局1）
  editState[2] = JSON.parse(JSON.stringify(LAYOUT_2_DEF));
  // 自动在画布上放置切换控件
  swWidget = { ...SW_DEFAULT };
  undoStack = []; redoStack = [];
  updateToolbar();
  renderEditor();
  toast('已创建子布局，切换控件已添加到画布');
}

function deleteSubLayout() {
  // 删除子布局，回到初始状态
  hasSubLayout = false;
  curLayout    = 1;
  delete editState[2];
  swWidget     = null;
  undoStack    = []; redoStack = [];
  updateToolbar();
  renderEditor();
  toast('子布局已删除，已回到初始布局');
}

/* ══════════════════════════
   布局切换 (editor)
══════════════════════════ */
function edCycleLayout() {
  if (!hasSubLayout) return;
  curLayout = curLayout === 1 ? 2 : 1;
  undoStack = []; redoStack = [];
  closePopover();
  renderEditor();
  toast('切换到 · ' + editState[curLayout].name);
}

/* ══════════════════════════
   布局切换 (game)
══════════════════════════ */
function gmCycleLayout() {
  if (!hasSubLayout) return;
  curLayout = curLayout === 1 ? 2 : 1;
  const ctrl = document.getElementById('gm-ctrl');
  ctrl.style.opacity = '0';
  ctrl.style.transition = 'opacity .15s';
  setTimeout(() => {
    renderGame(false);
    ctrl.style.opacity = '1';
    setTimeout(() => ctrl.style.transition = '', 200);
  }, 160);
  flashLabel(editState[curLayout].name);
}

function flashLabel(name) {
  const el = document.getElementById('layout-flash');
  el.textContent = name;
  el.classList.add('on');
  setTimeout(() => el.classList.remove('on'), 1100);
}

/* ══════════════════════════
   EDITOR RENDER
══════════════════════════ */
function renderEditor() {
  const canvas = document.getElementById('ed-canvas');
  canvas.querySelectorAll('.vb').forEach(e => e.remove());
  closePopover();

  const L = editState[curLayout];
  const W = canvas.offsetWidth, H = canvas.offsetHeight;

  L.btns.forEach(b => {
    const el = mkVBtnEl(b, W, H);
    canvas.appendChild(el);
    bindDrag(el, b, 'btn');
  });

  // 只有创建了子布局，才渲染切换控件
  if (swWidget) {
    const sw = mkSwEl(W, H);
    canvas.appendChild(sw);
    bindDrag(sw, swWidget, 'sw');
  }
}

/* ─── 普通按键元素 ─── */
function mkVBtnEl(b, W, H) {
  const el = document.createElement('div');
  el.className = 'vb';
  el.id = 'vb_' + b.id;
  const px = b.x / 100 * W, py = b.y / 100 * H;

  if (b.t === 'joy') {
    el.style.cssText = `left:${px}px;top:${py}px;width:${b.s}px;height:${b.s}px;`;
    const gap = b.s * .27;
    el.innerHTML = `<div class="vb-joy">
      <div class="joy-arrows">
        <span>▲</span>
        <div style="display:flex;gap:${gap}px"><span>◀</span><span>▶</span></div>
        <span>▼</span>
      </div>
      <div class="joy-inner"></div>
    </div>`;
  } else if (b.t === 'r') {
    const h = Math.round(b.s * .52);
    el.style.cssText = `left:${px}px;top:${py}px;width:${b.s}px;height:${h}px;`;
    el.innerHTML = `<div class="vb-r">${mkIcon(b.ic, Math.round(b.s * .5))}</div>`;
  } else {
    el.style.cssText = `left:${px}px;top:${py}px;width:${b.s}px;height:${b.s}px;`;
    el.innerHTML = `<div class="vb-c">${mkIcon(b.ic, Math.round(b.s * .55))}</div>`;
  }

  el.addEventListener('pointerdown', e => { e.stopPropagation(); onSelectBtn(el, b, b.t === 'joy' ? 'joy' : 'btn'); });
  return el;
}

/* ─── 切换控件元素（圆圈：上icon + 下文字） ─── */
function mkSwEl(W, H) {
  const el = document.createElement('div');
  el.className = 'vb';
  el.id = 'vb__sw';
  const px = swWidget.x / 100 * W, py = swWidget.y / 100 * H;
  const s  = swWidget.s;
  el.style.cssText = `left:${px}px;top:${py}px;width:${s}px;height:${s}px;`;
  const iconSz = Math.round(s * 0.36);
  el.innerHTML = `<div class="vb-sw">
    ${mkIcon('cycle', iconSz)}
    <span class="sw-label">切换</span>
  </div>`;
  el.addEventListener('pointerdown', e => { e.stopPropagation(); onSelectBtn(el, swWidget, 'sw'); });
  return el;
}

/* ══════════════════════════
   DRAG
══════════════════════════ */
function bindDrag(el, data, type) {
  let sx, sy, sl, st, moved;
  el.addEventListener('pointerdown', e => {
    e.preventDefault();
    el.setPointerCapture(e.pointerId);
    sx = e.clientX; sy = e.clientY;
    sl = parseFloat(el.style.left); st = parseFloat(el.style.top);
    moved = false;
    const ox = data.x, oy = data.y;

    const onMove = ev => {
      const dx = ev.clientX - sx, dy = ev.clientY - sy;
      if (!moved && (Math.abs(dx) > 3 || Math.abs(dy) > 3)) { moved = true; closePopover(); }
      if (moved) { el.style.left = (sl + dx) + 'px'; el.style.top = (st + dy) + 'px'; }
    };
    const onUp = () => {
      el.removeEventListener('pointermove', onMove);
      el.removeEventListener('pointerup', onUp);
      if (!moved) return;
      const canvas = document.getElementById('ed-canvas');
      const W = canvas.offsetWidth, H = canvas.offsetHeight;
      const nx = parseFloat(el.style.left) / W * 100;
      const ny = parseFloat(el.style.top) / H * 100;
      undoStack.push({ type, lid: curLayout, id: data.id || '__sw', x: data.x, y: data.y });
      redoStack = [];
      data.x = nx; data.y = ny;
    };
    el.addEventListener('pointermove', onMove);
    el.addEventListener('pointerup', onUp);
  });
}

/* ══════════════════════════
   SELECTION & POPOVER
══════════════════════════ */
function onSelectBtn(el, data, type) {
  clearSelection();
  selData = { el, data, type };
  const inner = el.querySelector('.vb-c,.vb-joy,.vb-r,.vb-sw');
  if (inner) inner.classList.add('sel');
  showPopover(el, data, type);
}

function clearSelection() {
  if (selData) {
    const inner = selData.el.querySelector('.vb-c,.vb-joy,.vb-r,.vb-sw');
    if (inner) inner.classList.remove('sel');
  }
  selData = null;
  closePopover();
}

function showPopover(el, data, type) {
  const pop = document.getElementById('sel-pop');
  const canvas = document.getElementById('ed-canvas');
  const W = canvas.offsetWidth;

  let html = '';
  if (type !== 'sw') {
    const bases = { btn:[44,58,72], joy:[88,115,140], r:[52,68,84] };
    const key = type === 'joy' ? 'joy' : (data.t === 'r' ? 'r' : 'btn');
    bases[key].forEach((sz, i) => {
      const on = Math.round(data.s) === sz ? ' on' : '';
      html += `<button class="sp-btn${on}" onclick="resizeBtn(${sz})">${['S','M','L'][i]}</button>`;
    });
    html += `<div class="sp-div"></div>`;
  }
  html += `<button class="sp-btn sp-del" onclick="deleteSelected()">${mkIcon('trash',12,'currentColor')} 删除</button>`;

  pop.innerHTML = html;
  pop.classList.add('show');

  const elL = parseFloat(el.style.left), elT = parseFloat(el.style.top);
  const elW = parseFloat(el.style.width), elH = parseFloat(el.style.height);

  requestAnimationFrame(() => {
    const pw = pop.offsetWidth, ph = pop.offsetHeight;
    let px = elL + elW / 2 - pw / 2;
    let py = elT - ph - 8;
    if (py < 8) py = elT + elH + 8;
    px = Math.max(6, Math.min(W - pw - 6, px));
    pop.style.left = px + 'px';
    pop.style.top  = py + 'px';
  });
}

function closePopover() {
  document.getElementById('sel-pop').classList.remove('show');
}

function resizeBtn(sz) {
  if (!selData || selData.type === 'sw') return;
  const b = selData.data;
  undoStack.push({ type:'size', lid:curLayout, id:b.id, s:b.s });
  redoStack = [];
  b.s = sz;
  const canvas = document.getElementById('ed-canvas');
  const W = canvas.offsetWidth, H = canvas.offsetHeight;
  const old = document.getElementById('vb_' + b.id);
  const newEl = mkVBtnEl(b, W, H);
  if (old) canvas.replaceChild(newEl, old);
  bindDrag(newEl, b, b.t === 'joy' ? 'joy' : 'btn');
  onSelectBtn(newEl, b, b.t === 'joy' ? 'joy' : 'btn');
}

function deleteSelected() {
  if (!selData) return;
  const { type, data, el } = selData;
  if (type === 'sw') {
    // 只删除画布上的切换控件，不删除子布局数据
    swWidget = null;
    el.remove();
    closePopover(); selData = null;
    toast('切换控件已移除（子布局仍保留）');
  } else {
    const L = editState[curLayout];
    const idx = L.btns.findIndex(b => b.id === data.id);
    if (idx !== -1) {
      undoStack.push({ type:'delete', lid:curLayout, btn:JSON.parse(JSON.stringify(data)), idx });
      redoStack = [];
      L.btns.splice(idx, 1);
    }
    el.remove();
    closePopover(); selData = null;
    toast('已删除按键');
  }
}

document.getElementById('ed').addEventListener('pointerdown', e => {
  if (!e.target.closest('.vb') && !e.target.closest('#sel-pop') && !e.target.closest('.add-panel') && !e.target.closest('.ed-bar'))
    clearSelection();
});

/* ══════════════════════════
   UNDO / REDO
══════════════════════════ */
function doUndo() {
  if (!undoStack.length) { toast('没有可撤销的操作'); return; }
  const a = undoStack.pop();
  applyHistoryStep(a, redoStack);
  toast('已撤销');
}
function doRedo() {
  if (!redoStack.length) { toast('没有可重做的操作'); return; }
  const a = redoStack.pop();
  applyHistoryStep(a, undoStack);
  toast('已重做');
}

function applyHistoryStep(a, oppositeStack) {
  if (a.type === 'size') {
    const btn = editState[a.lid]?.btns.find(b => b.id === a.id);
    if (btn) {
      oppositeStack.push({ type:'size', lid:a.lid, id:a.id, s:btn.s });
      btn.s = a.s; renderEditor();
    }
  } else if (a.type === 'delete') {
    oppositeStack.push({ type:'undelete', lid:a.lid, btn:a.btn, idx:a.idx });
    editState[a.lid]?.btns.splice(a.idx, 0, JSON.parse(JSON.stringify(a.btn)));
    renderEditor();
  } else if (a.type === 'undelete') {
    oppositeStack.push({ type:'delete', lid:a.lid, btn:a.btn, idx:a.idx });
    editState[a.lid]?.btns.splice(a.idx, 1);
    renderEditor();
  } else {
    // position
    const isSw = a.id === '__sw';
    const target = isSw ? swWidget : editState[a.lid]?.btns.find(b => b.id === a.id);
    if (target) {
      oppositeStack.push({ ...a, x:target.x, y:target.y });
      target.x = a.x; target.y = a.y;
      const canvas = document.getElementById('ed-canvas');
      const el = document.getElementById(isSw ? 'vb__sw' : 'vb_' + a.id);
      if (el) {
        el.style.left = target.x / 100 * canvas.offsetWidth + 'px';
        el.style.top  = target.y / 100 * canvas.offsetHeight + 'px';
      }
    }
  }
}

/* ══════════════════════════
   ADD PANEL
══════════════════════════ */
const ADD_ITEMS = [
  {ic:'aim',label:'瞄准'},{ic:'fire',label:'射击'},
  {ic:'jump',label:'跳跃'},{ic:'reload',label:'换弹'},
  {ic:'sprint',label:'冲刺'},{ic:'car',label:'载具'},
  {ic:'bomb',label:'投弹'},{ic:'menu',label:'菜单'},
];
function buildAddGrid() {
  const grid = document.getElementById('add-grid');
  ADD_ITEMS.forEach(item => {
    const d = document.createElement('div');
    d.className = 'add-item';
    d.innerHTML = mkIcon(item.ic, 20) + `<em>${item.label}</em>`;
    d.onclick = () => addCustomBtn(item.ic, item.label);
    grid.appendChild(d);
  });
}
function toggleAdd() { document.getElementById('add-panel').classList.toggle('open'); }
function closeAdd()  { document.getElementById('add-panel').classList.remove('open'); }
function addCustomBtn(icKey, label) {
  const btn = { id:'u'+Date.now(), t:'c', x:35+Math.random()*30, y:28+Math.random()*38, s:58, ic:icKey };
  editState[curLayout].btns.push(btn);
  const canvas = document.getElementById('ed-canvas');
  const el = mkVBtnEl(btn, canvas.offsetWidth, canvas.offsetHeight);
  canvas.appendChild(el);
  bindDrag(el, btn, 'btn');
  closeAdd();
  toast('已添加 ' + label);
}

/* ══════════════════════════
   GAME RENDER
══════════════════════════ */
function renderGame(animate) {
  const ctrl = document.getElementById('gm-ctrl');
  ctrl.innerHTML = '';
  const L = editState[curLayout];
  const W = 900, H = 400;

  L.btns.forEach((b, i) => {
    const x = b.x / 100 * W, y = b.y / 100 * H;
    const delay = animate ? (i * .028).toFixed(3) + 's' : '0s';
    const anim  = animate ? `animation:ctrlIn .28s ease ${delay} both` : '';
    const el = document.createElement('div');

    if (b.t === 'joy') {
      el.className = 'gc-joy';
      el.style.cssText = `left:${x}px;top:${y}px;width:${b.s}px;height:${b.s}px;${anim}`;
      const gap = b.s * .27;
      el.innerHTML = `<div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:rgba(255,255,255,.28);font-size:8px;line-height:1.5"><span>▲</span><div style="display:flex;gap:${gap}px"><span>◀</span><span>▶</span></div><span>▼</span></div><div style="width:33%;height:33%;border-radius:50%;background:rgba(255,255,255,.2)"></div>`;
    } else if (b.t === 'r') {
      const h = Math.round(b.s * .52);
      el.className = 'gc-r';
      el.style.cssText = `left:${x}px;top:${y}px;width:${b.s}px;height:${h}px;${anim}`;
      el.innerHTML = mkIcon(b.ic, Math.round(b.s * .5));
    } else {
      el.className = 'gc-c';
      el.style.cssText = `left:${x}px;top:${y}px;width:${b.s}px;height:${b.s}px;${anim}`;
      el.innerHTML = mkIcon(b.ic, Math.round(b.s * .55));
    }
    ctrl.appendChild(el);
  });

  // 切换控件（仅在有子布局且控件存在时渲染）
  if (hasSubLayout && swWidget) {
    const sx = swWidget.x / 100 * W, sy = swWidget.y / 100 * H;
    const s  = swWidget.s;
    const delay = animate ? (L.btns.length * .028).toFixed(3) + 's' : '0s';
    const anim  = animate ? `animation:ctrlIn .28s ease ${delay} both` : '';
    const iconSz = Math.round(s * 0.36);
    const swEl = document.createElement('div');
    swEl.className = 'gc-c';
    swEl.style.cssText = `left:${sx}px;top:${sy}px;width:${s}px;height:${s}px;${anim};cursor:pointer;pointer-events:all;flex-direction:column;gap:3px;padding:8px;`;
    swEl.innerHTML = mkIcon('cycle', iconSz) + `<span style="font-size:10px;font-weight:700;color:rgba(255,255,255,.62);line-height:1">切换</span>`;
    swEl.onclick = gmCycleLayout;
    ctrl.appendChild(swEl);
  }
}

  _tt = setTimeout(() => el.classList.remove('on'), 1800);
}

/* Badge & tooltip system */
const prdState = { open: {} };

function initPRD() {
  const style = document.createElement('style');
  style.textContent = `
    .prd-badge{
      position:fixed;display:inline-block;
      background:rgb(250,173,20);color:#fff;font-size:10px;font-weight:700;
      line-height:14px;padding:0 4px;border-radius:2px;cursor:pointer;
      z-index:10000;user-select:none;white-space:nowrap;
      /* NO right/bottom — only top+left set by JS */
    }
    .prd-badge:hover{filter:brightness(1.12);}
    .prd-tip{
      position:fixed;width:450px;background:#f0efef;border-radius:4px;
      box-shadow:0 4px 24px rgba(0,0,0,.22);z-index:10001;font-size:13px;
      line-height:1.6;
    }
    .prd-tip-header{
      display:flex;align-items:center;padding:10px 12px 8px;
      border-bottom:1px solid rgba(0,0,0,.1);gap:8px;cursor:move;
    }
    .prd-tip-num{
      background:rgb(250,173,20);color:#fff;font-size:10px;font-weight:700;
      line-height:14px;padding:0 4px;border-radius:2px;flex-shrink:0;
    }
    .prd-tip-title{flex:1;font-weight:700;color:#111;font-size:13px;}
    .prd-tip-close{
      font-size:18px;color:#888;cursor:pointer;line-height:1;padding:0 4px;
      flex-shrink:0;border-radius:4px;
    }
    .prd-tip-close:hover{color:#111;background:rgba(0,0,0,.08);}
    .prd-tip-body{
      padding:12px 14px 14px;color:#222;overflow-y:auto;max-height:420px;
    }
    .prd-tip-body p{margin:0 0 10px;}
    .prd-tip-body strong{font-weight:700;}
    .prd-tip-body em{font-style:italic;}
    .prd-tip-body ul,.prd-tip-body ol{margin:0 0 10px 0;padding-left:20px;}
    .prd-tip-body li{margin-bottom:4px;}
    .prd-tip-body table{border-collapse:collapse;width:100%;margin-bottom:10px;font-size:12px;}
    .prd-tip-body th,.prd-tip-body td{border:1px solid rgba(0,0,0,.15);padding:5px 8px;text-align:left;}
    .prd-tip-body th{background:rgba(0,0,0,.06);font-weight:700;}
    .prd-tip-body blockquote{margin:0 0 10px;padding:6px 12px;border-left:3px solid #ccc;color:#555;background:rgba(0,0,0,.03);}
    .prd-tip-body code{background:rgba(0,0,0,.07);padding:1px 4px;border-radius:3px;font-family:monospace;font-size:12px;}
  `;
  document.head.appendChild(style);

  placeAnchor('ann-toolbar',     document.querySelector('.ed-bar'));
  placeAnchor('ann-canvas',      document.getElementById('ed-canvas'));
  placeAnchor('ann-sublayout',   document.getElementById('tb-sw-area'));
  placeAnchor('ann-gamepreview', document.getElementById('gm'));
}

function placeAnchor(anchorId, targetEl) {
  if (!targetEl) return;
  const item = PRD.find(p => p.anchor === anchorId);
  if (!item) return;

  const badge = document.createElement('div');
  badge.id = 'prd-badge-' + anchorId;
  badge.className = 'prd-badge';
  badge.textContent = item.id;

  document.body.appendChild(badge);

  function reposition() {
    const r = targetEl.getBoundingClientRect();
    // place badge at top-right corner of target, 8px above, 4px to the right
    badge.style.top  = Math.max(2, r.top - 8) + 'px';
    badge.style.left = (r.right - 4) + 'px';
    // clear any inherited right/bottom
    badge.style.right  = 'auto';
    badge.style.bottom = 'auto';
  }
  reposition();
  window.addEventListener('resize', reposition);

  // Click to toggle — only X can close
  badge.addEventListener('click', e => {
    e.stopPropagation();
    if (prdState.open[item.id]) {
      closeTip(item.id);
    } else {
      openTip(item.id, badge);
    }
  });
}

function openTip(id, badgeEl) {
  if (prdState.open[id]) return;
  const item = PRD.find(p => p.id === id);
  if (!item) return;

  const tip = document.createElement('div');
  tip.className = 'prd-tip';
  tip.innerHTML = `
    <div class="prd-tip-header">
      <span class="prd-tip-num">${id}</span>
      <span class="prd-tip-title">需求描述：${item.title}</span>
      <span class="prd-tip-close" id="prd-close-${id}">×</span>
    </div>
    <div class="prd-tip-body">${mdToHtml(item.md)}</div>
  `;
  document.body.appendChild(tip);
  prdState.open[id] = tip;

  // Must attach close after DOM insert so element exists
  tip.querySelector('#prd-close-' + id).addEventListener('click', e => {
    e.stopPropagation();
    closeTip(id);
  });

  positionTip(tip, badgeEl);
  makeTipDraggable(tip);

  // Block ALL events from reaching page underneath
  tip.addEventListener('mousedown',   e => e.stopPropagation());
  tip.addEventListener('pointerdown', e => e.stopPropagation());
  tip.addEventListener('click',       e => e.stopPropagation());
  tip.addEventListener('wheel',       e => e.stopPropagation());
}

function closeTip(id) {
  const tip = prdState.open[id];
  if (tip) { tip.remove(); delete prdState.open[id]; }
}

function positionTip(tip, badgeEl) {
  const vw = window.innerWidth, vh = window.innerHeight;
  const tw = 450, th = Math.min(440, vh - 20);
  let left = 0, top = 0;

  if (badgeEl) {
    const r = badgeEl.getBoundingClientRect();
    left = r.left - tw - 8;
    top  = r.bottom + 8;
  } else {
    left = vw / 2 - tw / 2;
    top  = 80;
  }

  if (left < 8) left = 8;
  if (left + tw > vw - 8) left = vw - tw - 8;
  if (top + th > vh - 8) top = vh - th - 8;
  if (top < 8) top = 8;

  tip.style.left = left + 'px';
  tip.style.top  = top  + 'px';
}

function makeTipDraggable(tip) {
  const header = tip.querySelector('.prd-tip-header');
  let sx, sy, sl, st, dragging = false;

  header.addEventListener('pointerdown', e => {
    if (e.target.classList.contains('prd-tip-close')) return;
    e.stopPropagation();
    header.setPointerCapture(e.pointerId);
    sx = e.clientX; sy = e.clientY;
    sl = parseFloat(tip.style.left) || 0;
    st = parseFloat(tip.style.top)  || 0;
    dragging = true;
  });
  header.addEventListener('pointermove', e => {
    if (!dragging) return;
    tip.style.left = (sl + e.clientX - sx) + 'px';
    tip.style.top  = (st + e.clientY - sy) + 'px';
  });
  header.addEventListener('pointerup', () => { dragging = false; });
}

/* Minimal Markdown → HTML */
function mdToHtml(md) {
  return md
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    // restore intentional HTML-like table syntax after escaping
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/`(.+?)`/g,'<code>$1</code>')
    // table: header row
    .replace(/\|(.+)\|\n\|[-| :]+\|\n/g, (_, row) => {
      const cells = row.split('|').filter(c=>c.trim()).map(c=>`<th>${c.trim()}</th>`).join('');
      return `<table><thead><tr>${cells}</tr></thead><tbody>`;
    })
    // table: data rows (simple: line starting with |)
    .replace(/^\|(.+)\|$/gm, (_, row) => {
      const cells = row.split('|').filter(c=>c.trim()).map(c=>`<td>${c.trim()}</td>`).join('');
      return `<tr>${cells}</tr>`;
    })
    .replace(/<\/tbody>(?![\s\S]*<tbody>)/,'')
    .replace(/<tr>/,'</tbody></table><tr>') // close open tables — handled inline
    // blockquote
    .replace(/^> (.+)$/gm,'<blockquote>$1</blockquote>')
    // h3 headings (### only)
    .replace(/^### (.+)$/gm,'<p><strong>$1</strong></p>')
    // unordered list items
    .replace(/^[\s]*[-*] (.+)$/gm,'<li>$1</li>')
    .replace(/(<li>[\s\S]*?<\/li>)/g,'<ul>$1</ul>')
    // collapse consecutive </ul><ul>
    .replace(/<\/ul>\s*<ul>/g,'')
    // paragraphs: blank-line separated blocks
    .split(/\n{2,}/)
    .map(block => {
      block = block.trim();
      if (!block) return '';
      if (/^<(ul|ol|table|blockquote|tr|thead|tbody|p|h[1-6])/.test(block)) return block;
      if (/<li>/.test(block)) return `<ul>${block}</ul>`;
      return `<p>${block.replace(/\n/g,'<br>')}</p>`;
    })
    .join('\n');
}

window.addEventListener('load', () => {
  setTimeout(initPRD, 150); // slight delay so layout is painted
});
</script>
